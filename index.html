// Build grouped <option> HTML for meal selector dropdown
function buildMealSelectOpts(slotMeals, activeId){
  const byProt={};
  slotMeals.forEach(function(m){
    const p=getPrimaryProtein(m,true);
    if(!byProt[p])byProt[p]=[];
    byProt[p].push(m);
  });
  const protKeys=Object.keys(byProt).sort();
  protKeys.forEach(function(pk){byProt[pk].sort(function(a,b){return a.label<b.label?-1:1;});});
  if(protKeys.length<=1){
    return slotMeals.map(function(m){return'<option value="'+m.id+'"'+(m.id===activeId?' selected':'')+'>'+m.label+'</option>';}).join('');
  }
  return protKeys.map(function(pk){
    const optHtml=byProt[pk].map(function(m){
      return'<option value="'+m.id+'"'+(m.id===activeId?' selected':'')+'>'+m.label+'</option>';
    }).join('');
    return'<optgroup label="'+pk+'">'+optHtml+'</optgroup>';
  }).join('');
}

// Compute adjusted macros and ingredient HTML for a meal card
function computeCardMacros(port, person, day, s, cookServings, showBanner){
  const ovrMacros = getPortMacrosOvr(port,person,day,s);
  const slotAdj = getSlotAdjustment(person,day,s);
  const isSkipped = !!SKIPPED[sk(person,day,s)];
  const hasOverrides = !!getOverrides(person,day,s);
  let pm, adjBanner='', ingrHtml='';

  if(isSkipped){
    pm={kcal:0,pro:0,fat:0,carb:0};
  } else if(slotAdj!==0){
    const adjIngr = applyOverrides(port,person,day,s);
    if(adjIngr && adjIngr.length && adjIngr[0].dbKey!==undefined){
      const adjResult = adjustIngredients(adjIngr, slotAdj, s);
      pm = {kcal:0,pro:0,fat:0,carb:0};
      adjResult.forEach(function(a){
        const db = NUTRI_DB[a.ing.dbKey];
        if(!db)return;
        pm.kcal+=Math.round(db.kcal*a.newAmt);
        pm.pro+=Math.round(db.pro*a.newAmt);
        pm.fat+=Math.round(db.fat*a.newAmt);
        pm.carb+=Math.round(db.carb*a.newAmt);
      });
      ingrHtml = adjResult.map(function(a, idx) {
        return buildIngrEditRow(a.ing, a.newAmt, person, day, s, idx);
      }).join('');
      ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';
      if(showBanner){
        const adjDir = slotAdj>0?'+':'';
        const changeLines = [];
        adjResult.forEach(function(a){
          if(Math.abs(a.newAmt - a.ing.amt) > 0.02){
            const db = NUTRI_DB[a.ing.dbKey];
            const unit = db ? db.unit : '';
            const fmtAmt = fmtFrac;
            const dir = a.newAmt > a.ing.amt ? '↑' : '↓';
            const kcalDiff = Math.round((a.newAmt - a.ing.amt) * (db?db.kcal:0));
            const diffSign = kcalDiff > 0 ? '+' : '';
            changeLines.push(dir+' <b>'+a.ing.dbKey+'</b>: '+fmtAmt(a.ing.amt)+' → '+fmtAmt(a.newAmt)+' '+unit+' ('+diffSign+kcalDiff+' kcal)');
          }
        });
        if(changeLines.length){
          adjBanner='<div class="adj-info">⚡ Auto-adjusted <b>'+adjDir+slotAdj+' kcal</b> to hit daily target:<br>'
            +changeLines.join('<br>')+'</div>';
        }
      }
    } else {
      pm = ovrMacros;
    }
  } else {
    pm = ovrMacros;
  }
  return {pm:pm, adjBanner:adjBanner, ingrHtml:ingrHtml};
}

function buildMealCardHtml(s, person, day, other){
  const slotMeals=getMealsForSlot(s).filter(function(m){return m[person]});
  if(!slotMeals.length)return '';
  const activeId=getMealId(person,day,s);
  const activeMeal=getMeal(activeId)||slotMeals[0];
  const port=activeMeal[person];if(!port)return '';
  const k=sk(person,day,s);
  const isOpen=openCards[k]||false;
  const isManual=!!MANUAL_SET[k];
  const setPill=isManual?'<span class="set-pill">Set</span>':'';

  const opts=buildMealSelectOpts(slotMeals, activeId);

  const otherId=getMealId(other,day,s);
  const isSharedSlot=(otherId&&otherId===activeId);
  const sharedPill='<div class="mc-pill mc-pill-shared'+(isSharedSlot?' on':'')+'" onclick="event.stopPropagation();toggleShared(\''+s+'\','+(!isSharedSlot)+')">Shared</div>';
  const leftovers=computeLeftovers();
  const loKey=sk(person,day,s);
  const loInfo=leftovers[loKey];
  let leftoverBadge='';
  let leftoverPill='';
  if(loInfo&&loInfo.isLeftover){
    const fromLabel=loInfo.crossPerson?(loInfo.cookedBy==='him'?'his':'her')+' '+loInfo.cookDay:loInfo.cookDay;
    leftoverBadge='<span class="leftover-badge">🍱 '+fromLabel+'</span>';
    leftoverPill='<div class="mc-pill mc-pill-leftover on no-click">Leftovers</div>';
  }
  let cookPill='';
  if(loInfo&&!loInfo.isLeftover){
    if(loInfo.servings>1||loInfo.crossPersonCook) cookPill='<div class="mc-pill mc-pill-cook on no-click">Big Cook</div>';
  }
  const notePill=activeMeal.note?'<div class="note-pill">⏰ '+activeMeal.note+'</div>':'';

  // Ingredient display with per-ingredient nutrition — EDITABLE
  const hasOverrides = !!getOverrides(person,day,s);
  let ingrHtml='';
  const cookServings=(loInfo&&!loInfo.isLeftover&&loInfo.servings>1)?loInfo.servings:1;
  const ingrSectionTitle=cookServings>1?'🥗 Combined ingredients (serves '+cookServings+')':'🥗 Ingredients';
  if (port.ingredients && port.ingredients.length && port.ingredients[0].dbKey !== undefined) {
    // Get ingredients with overrides applied
    const ovrIngr = applyOverrides(port,person,day,s);

    ingrHtml = ovrIngr.map(function(ing, idx) {
      const displayAmt=Math.round(ing.amt*cookServings*100)/100;
      return buildIngrEditRow(ing, displayAmt, person, day, s, idx);
    }).join('');
    ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';

    // Add reset button if there are overrides
    if(hasOverrides){
      const slotEsc2 = s.replace(/'/g,"\\'");
      ingrHtml += '<button class="ingr-reset-btn" onclick="onIngrReset(\''+person+'\',\''+day+'\',\''+slotEsc2+'\')">↺ Reset to original</button>';
    }
  } else {
    ingrHtml=(port.ingredients||[]).map(function(i){return'<li>'+(typeof i==='string'?i:i.displayText)+'</li>'}).join('');
    ingrHtml='<ul class="ingr-list">'+ingrHtml+'</ul>';
  }

  // Compute macros: base from overridden ingredients, then with calorie adjustment
  const isSkipped = !!SKIPPED[sk(person,day,s)];
  const hasSkips = SLOTS.some(function(sl){return !!SKIPPED[sk(person,day,sl)];});
  const hasAnyEatOut = SLOTS.some(function(sl){const eo=EAT_OUT[sk(person,day,sl)];return eo&&eo.kcal>0;});
  const showBanner = hasSkips || hasAnyEatOut || hasOverrides;
  const macroResult = computeCardMacros(port, person, day, s, cookServings, showBanner);
  const pm = macroResult.pm;
  const adjBanner = macroResult.adjBanner;
  if(macroResult.ingrHtml) ingrHtml = macroResult.ingrHtml;
  const mFat=pm.fat||0,mCarb=pm.carb||0;
  let mMacroKcal=pm.pro*4+mFat*9+mCarb*4;
  if(!mMacroKcal)mMacroKcal=pm.kcal||1;
  const mPct=Math.round(pm.pro*4/mMacroKcal*100);
  const fPct2=Math.round(mFat*9/mMacroKcal*100);
  const cPct2=100-mPct-fPct2;
  const macroLine=pm.kcal+' kcal · P '+pm.pro+'g ('+mPct+'%) · C '+mCarb+'g ('+cPct2+'%) · F '+mFat+'g ('+fPct2+'%)'+(port.fv?' · '+port.fv:'');

  const colorSteps=activeMeal._colorSteps||activeMeal.steps||[];
  const stepsHtml=colorSteps.map(function(st){return'<li>'+st+'</li>'}).join('');

  const skipPill='<div class="mc-pill mc-pill-skip'+(isSkipped?' on':'')+'" onclick="event.stopPropagation();toggleSkip(\''+person+'\',\''+day+'\',\''+s+'\')">Skip</div>';

  const eoKey=sk(person,day,s);
  const isEatOut=!!EAT_OUT[eoKey];
  const eoPill='<div class="mc-pill mc-pill-eo'+(isEatOut?' on':'')+'" onclick="event.stopPropagation();toggleEatOut(\''+person+'\',\''+day+'\',\''+s+'\')">Eat Out</div>';
  const topRowPills='<div class="mc-pills">'+(isSkipped||isEatOut?'':leftoverPill+cookPill)
    +(isSkipped?'':isEatOut?'':sharedPill)
    +skipPill
    +eoPill
    +'</div>';

  // Build skip summary when skipped
  let skipSummary='';
  if(isSkipped){
    const origMacros=getPortMacrosOvr(port,person,day,s);
    const slotIdx=ADJ_SLOTS.indexOf(s);
    // Shake is before all ADJ_SLOTS, so all are "later"
    const startIdx=(s==='shake')?0:slotIdx+1;
    const adjResult=buildAdjCheckboxes(person,day,startIdx,'');

    skipSummary='<div class="skip-summary">Skipped: '+origMacros.kcal+' kcal · P '+origMacros.pro+'g · C '+origMacros.carb+'g · F '+origMacros.fat+'g'
      +(adjResult.hasAny?adjResult.html:'')+'</div>';
  }

  if(isEatOut){
    const eo=EAT_OUT[eoKey];
    return buildEatOutFormHtml(person, day, s, k, eo, topRowPills, setPill);
  }

  return '<div class="mc slot-'+s+(isOpen?' open':'')+(isSkipped?' skipped':'')+'" id="mc_'+k+'">'
    +'<div class="mc-top"><div class="mc-top-row"><div class="slot-label">'+SLOT_LABEL[s]+setPill+'</div>'+topRowPills+'</div>'
    +'<select class="meal-select" onchange="changeMeal(\''+s+'\',this.value)">'+opts+'</select></div>'
    +skipSummary
    +'<div class="mc-meta" onclick="toggleCard(\''+k+'\')"><div><div class="mc-macros">'+macroLine+'</div>'
    +macroBar(pm.kcal,pm.pro,mFat,mCarb,person)
    +'</div><div class="expand-btn">⌄</div></div>'
    +notePill
    +'<div class="mc-body">'
    +adjBanner
    +'<div class="bsec"><div class="bsec-title ingr">'+ingrSectionTitle+'</div>'+ingrHtml+'</div>'
    +'<div class="bsec"><div class="bsec-title cook">👨‍🍳 How to make it</div><ol class="step-list">'+stepsHtml+'</ol></div>'
    +'</div></div>';
}

function changeMeal(slot,mealId){
  const selKey=sk(person,day,slot);
  stampSel(selKey,mealId);
  MANUAL_SET[selKey]=true;
  // Clear schedule state — manual choice overrides the plan
  const schedKey=dk(day,slot);
  const schedState=SHARED_SCHEDULE[schedKey];
  if(schedState){
    // If shared, clear it (manual pick breaks sharing)
    // If eat-out for this person, clear it (they're now eating a home meal)
    if(schedState==='shared') delete SHARED_SCHEDULE[schedKey];
    else if(person==='him'&&(schedState==='skip-him')) delete SHARED_SCHEDULE[schedKey];
    else if(person==='her'&&(schedState==='skip-her')) delete SHARED_SCHEDULE[schedKey];
    else if(person==='him'&&schedState==='skip-both') SHARED_SCHEDULE[schedKey]='skip-her';
    else if(person==='her'&&schedState==='skip-both') SHARED_SCHEDULE[schedKey]='skip-him';
    saveSharedSchedule();
  }
  clearOverrides(person,day,slot);invalidateLeftoverCache();autoSaveWeek();renderMeals();if(topTab==='shop')renderShop();
}
function toggleShared(slot,checked){
  const other=person==='him'?'her':'him';
  if(checked){
    // Set the other person's meal to match — manual shared
    const myId=getMealId(person,day,slot);
    if(myId){
      const otherKey=sk(other,day,slot);
      stampSel(otherKey,myId);
      clearOverrides(other,day,slot);
      // Mark both as manual set and update schedule to shared
      MANUAL_SET[sk(person,day,slot)]=true;
      MANUAL_SET[otherKey]=true;
      SHARED_SCHEDULE[dk(day,slot)]='shared';
      saveSharedSchedule();
    }
  } else {
    // Unshare — randomize the other person's meal for that slot
    const candidates=getMealsForSlot(slot).filter(function(m){return m[other];});
    const myId=getMealId(person,day,slot);
    const others=candidates.filter(function(m){return m.id!==myId;});
    if(others.length){
      const pick=others[Math.floor(Math.random()*others.length)];
      const otherKey=sk(other,day,slot);
      stampSel(otherKey,pick.id);
      clearOverrides(other,day,slot);
    }
  }
  invalidateLeftoverCache();autoSaveWeek();renderMeals();if(topTab==='shop')renderShop();
}

// Check if a meal uses any large-package ingredients
function mealUsesPkg(mealId) {
  const m = getMeal(mealId);
  if (!m || !m.ingredients) return false;
  return m.ingredients.some(function(ing) {
    const db = NUTRI_DB[ing.dbKey];
    return db && db.pkg && (db.pkg.drained || db.pkg.cups);
  });
}

// Calculate package waste penalty for a set of meal selections
// selections: {slotKey: mealId} map
function randomPick(arr){return arr[Math.floor(Math.random()*arr.length)];}


// Get meal IDs from the previous N days, including cross-week from last week
function getRecentMealIds(dayIndex, days, p, lookback) {
  const recent = [];
  for (let b = 1; b <= lookback; b++) {
    const prevIdx = dayIndex - b;
    if (prevIdx >= 0) {
      // Same week
      const prevDay = days[prevIdx];
      SLOTS.forEach(function(s) {
        if (s === 'late_snack' || s === 'shake') return;
        const id = getMealId(p, prevDay, s);
        if (id && recent.indexOf(id) < 0) recent.push(id);
      });
    } else {
      // Cross into last week
      const lastWeekDayIdx = 7 + prevIdx; // e.g., -1 -> 6 (Sunday), -2 -> 5 (Saturday)
      if (lastWeekDayIdx >= 0 && lastWeekDayIdx < 7) {
        const lastDay = DAYS[lastWeekDayIdx];
        const lastSel = weekData['last'] && weekData['last'].sel || {};
        SLOTS.forEach(function(s) {
          if (s === 'late_snack' || s === 'shake') return;
          const key = p + '_' + lastDay + '_' + s;
          const id = lastSel[key];
          if (id && recent.indexOf(id) < 0) recent.push(id);
        });
      }
    }
  }
  return recent;
}

function togglePaintMode(){
  if(_paintMode){
    // Cancel painting mode
    _paintMode=false;_paintSlot='';_paintMealId='';_paintQueued={};
  } else {
    const slotSel=document.getElementById('paintSlotSel');
    const mealSel=document.getElementById('paintMealSel');
    if(!slotSel||!mealSel||!slotSel.value||!mealSel.value) return;

function paintTap(d,side){
  if(!_paintMode) return;
  const p=(side==='left')?'him':'her';
  const k=pk(p,d);
  if(_paintQueued[k]) delete _paintQueued[k];
  else _paintQueued[k]=true;
  renderMeals();
}
function paintAccept(){
  if(!_paintMode) return;
  const now=Date.now();
  if(!weekData[activeWeek].ts) weekData[activeWeek].ts={};
  Object.keys(_paintQueued).forEach(function(k){
    const parts=k.split('_');
    const p=parts[0],d=parts[1];
    const selKey=sk(p,d,_paintSlot);
    SEL[selKey]=_paintMealId;
    MANUAL_SET[selKey]=true;
    weekData[activeWeek].ts[selKey]=now;
    clearOverrides(p,d,_paintSlot);
  });
  // Update schedule: if both him+her got painted on same day, set shared
  // Otherwise clear any conflicting schedule state
  const slot=_paintSlot;
  DAYS.forEach(function(d){
    const himQ=_paintQueued[pk('him',d)], herQ=_paintQueued[pk('her',d)];
    const schedKey=dk(d,slot);
    if(himQ&&herQ){
      SHARED_SCHEDULE[schedKey]='shared';
    } else if(himQ||herQ){
      const schedState=SHARED_SCHEDULE[schedKey];
      if(schedState==='shared') delete SHARED_SCHEDULE[schedKey];
      else if(himQ&&schedState==='skip-him') delete SHARED_SCHEDULE[schedKey];
      else if(herQ&&schedState==='skip-her') delete SHARED_SCHEDULE[schedKey];
      else if(himQ&&schedState==='skip-both') SHARED_SCHEDULE[schedKey]='skip-her';
      else if(herQ&&schedState==='skip-both') SHARED_SCHEDULE[schedKey]='skip-him';
    }
  });
  saveSharedSchedule();
  _paintMode=false;_paintSlot='';_paintMealId='';_paintQueued={};
  invalidateLeftoverCache();autoSaveWeek();renderMeals();if(topTab==='shop')renderShop();
}

function setSchedule(){

  DAYS.forEach(function(d){

      if(!state) return;
      if(state==='skip-him'||state==='skip-both') MANUAL_SET[sk('him',d,s)]=true;
      if(state==='skip-her'||state==='skip-both') MANUAL_SET[sk('her',d,s)]=true;
      if(state==='shared'){
        MANUAL_SET[sk('him',d,s)]=true;
        MANUAL_SET[sk('her',d,s)]=true;

        const himId=getMealId('him',d,s);

          clearOverrides('her',d,s);
        }
      }
      // Apply eat-outs
      if(state==='skip-him'||state==='skip-both'){
        if(!EAT_OUT[sk('him',d,s)]) EAT_OUT[sk('him',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
      if(state==='skip-her'||state==='skip-both'){
        if(!EAT_OUT[sk('her',d,s)]) EAT_OUT[sk('her',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }

function randomizeWeek(target){
  sharedSchedOpen=false;
  const randTarget=target||person; // use passed target or current person tab
  const savedSel = JSON.parse(JSON.stringify(SEL));
  const maxRetries = 10;
  for (let retry = 0; retry < maxRetries; retry++) {
    Object.keys(SEL).forEach(function(k){delete SEL[k];});
    Object.keys(savedSel).forEach(function(k){SEL[k]=savedSel[k];});

    _randomizeWeekCore(randTarget);

    invalidateLeftoverCache();
    let totalWaste = 0;
    ['sun','wed'].forEach(function(trip){
      const grouped = buildShoppingList(trip, 'both');
      Object.keys(grouped).forEach(function(cat){
        grouped[cat].forEach(function(item){ if(item.wasteLabel) totalWaste++; });
      });
    });
    if (totalWaste === 0 || retry === maxRetries - 1) break;
  }
  invalidateLeftoverCache();renderMeals(); if(topTab==='shop') renderShop();autoSaveWeek();
}

function _randomizeWeekCore(randTarget){
  const days = DAYS;
  const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  const bothPersons = persons.length > 1 || randTarget === 'shared';
  const locked = {};

  if(!weekData[activeWeek].ts) weekData[activeWeek].ts={};
  const now = Date.now();

  // ── PRE-PHASE: Lock eat-out slots (manual overrides), clear old skips ──
  // Eat-outs are manual entries — don't randomize those slots
  persons.forEach(function(p){
    days.forEach(function(d){
      SLOTS.forEach(function(s){
        const k=sk(p,d,s);
        if(EAT_OUT[k]){locked[k]=true;}
      });
    });
  });
  // Clear all skips so previous randomizations don't leak
  Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
  // Apply schedule eat-outs (skip-him/her/both are planned eat-outs)
  days.forEach(function(d){
    ['breakfast','lunch','dinner','shake','snack'].forEach(function(s){
      const state = SHARED_SCHEDULE[dk(d,s)];
      if(state==='skip-him'||state==='skip-both'){
        if(!EAT_OUT[sk('him',d,s)]) EAT_OUT[sk('him',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
      if(state==='skip-her'||state==='skip-both'){
        if(!EAT_OUT[sk('her',d,s)]) EAT_OUT[sk('her',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
    });
  });

  // ── PHASE 1: Anchor package meals into SHARED-SCHEDULE slots ─
  // Only place pkg meals in slots the user marked as shared.
  // Cook day is shared (both people), leftover day is per-person (take it to-go).
  // Cap: max 3 pkg meals per shopping trip to maintain variety.
  const pkgSlots = ['breakfast','lunch','dinner'];
  const tripCaps = {sun:0, wed:0};
  const PKG_CAP_PER_TRIP = 3;

  days.forEach(function(d, di) {
    const trip = TRIP_DAYS_STATIC.sun.indexOf(d) >= 0 ? 'sun' : 'wed';
    if (tripCaps[trip] >= PKG_CAP_PER_TRIP) return;
    if (di + 1 >= days.length) return;

    pkgSlots.forEach(function(s) {
      if (tripCaps[trip] >= PKG_CAP_PER_TRIP) return;
      // Only anchor into shared-schedule slots
      if (SHARED_SCHEDULE[d + '_' + s] !== 'shared') return;

      const anchorRecent = getRecentMealIds(di, days, persons[0], 2);
      let candidates = getMealsForSlot(s).filter(function(m){ return m[persons[0]] && anchorRecent.indexOf(m.id) < 0; });
      if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){ return m[persons[0]]; });
      if (!candidates.length) return;
      const pick = randomPick(candidates);
      if (!mealUsesPkg(pick.id)) return;
      const m = getMeal(pick.id);
      if (!m || m.noLeftover) return;

      const nextDay = days[di + 1];
      let conflict = false;
      persons.forEach(function(p) {
        if (locked[p + '_' + d + '_' + s] || locked[p + '_' + nextDay + '_' + s]) conflict = true;
      });
      if (conflict) return;

      // Cook day — shared (both people get same meal)
      persons.forEach(function(p) {
        if (!m[p]) return;
        const cookKey = p + '_' + d + '_' + s;
        SEL[cookKey] = pick.id;
        weekData[activeWeek].ts[cookKey] = now;
        clearOverrides(p, d, s);
        locked[cookKey] = true;
        // Leftover day — per person (can take it to-go on non-shared days)
        const loKey = p + '_' + nextDay + '_' + s;
        SEL[loKey] = pick.id;
        weekData[activeWeek].ts[loKey] = now;
        clearOverrides(p, nextDay, s);
        locked[loKey] = true;
      });
      tripCaps[trip]++;
    });
  });

  // ── PHASE 2: Randomize remaining slots (no pkg meals) ──────
  persons.forEach(function(p) {
    const target = CAL_BASE[p];

    days.forEach(function(d, di) {
      let bestSel = null;
      let bestScore = Infinity;
      const attempts = 60;
      const recentIds = getRecentMealIds(di, days, p, 2);

      for (let a = 0; a < attempts; a++) {
        const used = [];
        const trySel = {};
        let totalKcal = 0;

        SLOTS.forEach(function(s) {
          // Locked slots — use the anchored meal
          if (locked[p + '_' + d + '_' + s]) {
            const lockedId = SEL[p + '_' + d + '_' + s];
            if (lockedId) {
              trySel[s] = lockedId;
              used.push(lockedId);
              const m = getMeal(lockedId);
              if (m && m[p]) totalKcal += getPortMacros(m[p]).kcal;
            }
            return;
          }
          // Non-pkg meals only — pkg meals come through Phase 1 anchors only
          let candidates = getMealsForSlot(s).filter(function(m){ return m[p] && used.indexOf(m.id) < 0 && !mealUsesPkg(m.id) && recentIds.indexOf(m.id) < 0; });
          if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){ return m[p] && !mealUsesPkg(m.id); });
          if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){ return m[p]; }); // fallback
          if (!candidates.length) return;
          const pick = randomPick(candidates);
          trySel[s] = pick.id;
          used.push(pick.id);
          const port = pick[p];
          if (port) totalKcal += getPortMacros(port).kcal;
        });

        const diff = Math.abs(totalKcal - target);
        if (diff < bestScore) {
          bestScore = diff;
          bestSel = trySel;
          if (diff <= 100) break;
        }
      }

      if (bestSel) {
        SLOTS.forEach(function(s) {
          if (locked[p + '_' + d + '_' + s]) return;
          clearOverrides(p, d, s);
          const selKey = p + '_' + d + '_' + s;
          if (bestSel[s]) { SEL[selKey] = bestSel[s]; weekData[activeWeek].ts[selKey] = now; }
          else delete SEL[selKey];
        });
      }
    });
  });

  // Trip-level waste optimization pass
  optimizeTripWaste();

  // ── PHASE 3: Replace unpaired pkg meals in shared slots ──
  // If a pkg meal is shared but not leftover-paired (single cook, no consecutive day),
  // the package won't be fully used. Replace with a non-pkg meal.
  invalidateLeftoverCache();
  const loCheck = computeLeftovers();
  if (bothPersons) {
    days.forEach(function(d) {
      ['breakfast','lunch','dinner'].forEach(function(s) {
        if (SHARED_SCHEDULE[d + '_' + s] !== 'shared') return; // only check shared-schedule slots
        const himId = getMealId('him', d, s);
        if (!himId || !mealUsesPkg(himId)) return;
        const loInfo = loCheck['him_' + d + '_' + s];
        const isPaired = loInfo && !loInfo.isLeftover && loInfo.servings > 1;
        const isLeftover = loInfo && loInfo.isLeftover;
        if (isPaired || isLeftover) return; // has leftover coverage
        // Unpaired pkg meal — swap for non-pkg
        let candidates = getMealsForSlot(s).filter(function(m){ return m.him && m.her && !mealUsesPkg(m.id) && m.id !== himId; });
        if (!candidates.length) return;
        const pick = randomPick(candidates);
        SEL['him_' + d + '_' + s] = pick.id;
        SEL['her_' + d + '_' + s] = pick.id;
        weekData[activeWeek].ts['him_' + d + '_' + s] = now;
        weekData[activeWeek].ts['her_' + d + '_' + s] = now;
      });
    });
  }

  // ── FINAL: Enforce shared schedule (runs absolutely last) ──
  days.forEach(function(d) {
    ['breakfast','lunch','dinner'].forEach(function(s) {
      const himId = getMealId('him', d, s);
      const herId = getMealId('her', d, s);
      if (SHARED_SCHEDULE[dk(d,s)] === 'shared') {
        // Force share
        if (himId && himId !== herId) {
          SEL[sk('her',d,s)] = himId;
          weekData[activeWeek].ts[sk('her',d,s)] = now;
        }
      } else if (himId && himId === herId && !MANUAL_SET[sk('him',d,s)] && !MANUAL_SET[sk('her',d,s)]) {
        // Not scheduled as shared and not manually set — un-share by giving her a different meal
        const candidates = getMealsForSlot(s).filter(function(m){ return m.her && m.id !== himId && !mealUsesPkg(m.id); });
        if (candidates.length) {
          const pick = randomPick(candidates);
          SEL[sk('her',d,s)] = pick.id;
          weekData[activeWeek].ts[sk('her',d,s)] = now;
        }
      }
    });
  });

}

// ── TRIP-LEVEL WASTE OPTIMIZATION ───────────────────────────
// After randomization, try swapping meals within each trip to reduce
// package waste (e.g., pair two bean meals in the same Mon-Wed trip)
function optimizeTripWaste() {
  const trips = [
    { key: 'sun', days: TRIP_DAYS_STATIC.sun },
    { key: 'wed', days: TRIP_DAYS_STATIC.wed }
  ];
  const persons = person === 'shared' ? ['him','her'] : [person === 'shared' ? 'him' : person];
  const swapSlots = ['breakfast','lunch','dinner'];

  trips.forEach(function(trip) {
    // Calculate current waste for this trip
    let currentWaste = calcTripWaste(trip.days, persons);
    const maxSwaps = 30;

    for (let attempt = 0; attempt < maxSwaps; attempt++) {
      // Pick a random person, day, and slot within this trip
      const p = persons[Math.floor(Math.random() * persons.length)];
      const d = trip.days[Math.floor(Math.random() * trip.days.length)];
      const s = swapSlots[Math.floor(Math.random() * swapSlots.length)];
      const selKey = p + '_' + d + '_' + s;

      // Skip locked meals (skipped, eat-out)
      if (SKIPPED[selKey] || EAT_OUT[selKey]) continue;

      const currentMealId = getMealId(p, d, s);
      if (!currentMealId) continue;

      // Find alternative meals for this slot
      const candidates = getMealsForSlot(s).filter(function(m) {
        return m[p] && m.id !== currentMealId;
      });
      if (!candidates.length) continue;

      // Try a random swap
      const candidate = candidates[Math.floor(Math.random() * candidates.length)];
      const origSel = SEL[selKey];
      SEL[selKey] = candidate.id;

      // Check calorie impact
      const newTotals = calcTotals(p, d);
      const calDiff = Math.abs(newTotals.kcal - CAL_BASE[p]);

      if (calDiff > 150) {
        // Too much calorie deviation — revert
        if (origSel) SEL[selKey] = origSel; else delete SEL[selKey];
        continue;
      }

      const newWaste = calcTripWaste(trip.days, persons);
      if (newWaste < currentWaste - 5) {
        // Improvement — keep the swap
        currentWaste = newWaste;
        if (weekData[activeWeek].ts) weekData[activeWeek].ts[selKey] = Date.now();
      } else {
        // No improvement — revert
        if (origSel) SEL[selKey] = origSel; else delete SEL[selKey];
      }
    }
  });
}

// Calculate total package waste across a set of days for given persons
function calcTripWaste(days, persons) {
  const totals = {};
  days.forEach(function(d) {
    persons.forEach(function(p) {
      SLOTS.forEach(function(s) {
        if (s === 'late_snack') return;
        const selKey = p + '_' + d + '_' + s;
        if (SKIPPED[selKey] || EAT_OUT[selKey]) return;
        const mealId = getMealId(p, d, s);
        if (!mealId) return;
        const m = getMeal(mealId);
        if (!m || !m.ingredients) return;
        m.ingredients.forEach(function(ing) {
          const db = NUTRI_DB[ing.dbKey];
          if (!db || !db.pkg) return;
          if (!totals[ing.dbKey]) totals[ing.dbKey] = 0;
          totals[ing.dbKey] += (ing.amt || 0);
        });
      });
    });
  });

  let totalWaste = 0;
  Object.keys(totals).forEach(function(dbKey) {
    const db = NUTRI_DB[dbKey];
    const pkg = db.pkg;
    const perPkg = (pkg.drained && (db.unit === 'cup' || db.unit === 'oz')) ? pkg.drained : (pkg.cups || 0);
    if (perPkg <= 0) return;
    const needed = totals[dbKey];
    const pkgsNeeded = Math.ceil(needed / perPkg);
    const waste = (pkgsNeeded * perPkg) - needed;
    totalWaste += (waste / perPkg) * 100;
  });
  return totalWaste;
}

// ── WEEK MANAGEMENT ─────────────────────────────────────────
var activeWeek='this'; // 'last', 'this', or 'next'
var weekData={last:{sel:{},monday:''},this:{sel:{},monday:''},next:{sel:{},monday:''}};

function getMondayStr(d){const dt=new Date(d);const diff=dt.getDay()===0?-6:1-dt.getDay();dt.setDate(dt.getDate()+diff);return dt.toISOString().slice(0,10);}
function fmtWeekLabel(mondayStr){const d=new Date(mondayStr+'T12:00:00');const end=new Date(d);end.setDate(d.getDate()+6);const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[d.getMonth()]+' '+d.getDate()+' – '+mo[end.getMonth()]+' '+end.getDate();}
function todayMonday(){return getMondayStr(new Date().toISOString().slice(0,10));}
function nextMonday(){const d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);}
function lastMonday(){const d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);}

function loadWeeks(){
  const saved=lsGet('mealPlannerWeekData',null);
  if(saved)weekData=saved;
  
  // Ensure all week slots exist (old localStorage may not have 'last')
  if(!weekData['last'])weekData['last']={sel:{},monday:''};
  if(!weekData['this'])weekData['this']={sel:{},monday:''};
  if(!weekData['next'])weekData['next']={sel:{},monday:''};

  // Auto-rollover: check if the calendar has moved forward
  const currentMonday=todayMonday();
  const thisMonday=weekData['this'].monday||'';
  const nextMon=weekData['next'].monday||'';
  
  if(thisMonday && thisMonday!==currentMonday){
    // The real-world week has changed
    if(nextMon===currentMonday){
      // Shift: last <- this (full state), this <- next (with schedule copied forward), next <- empty
      const prevSchedule=JSON.parse(JSON.stringify(weekData['this'].sharedSchedule||{}));
      weekData['last']=JSON.parse(JSON.stringify(weekData['this']));
      weekData['last'].monday=weekData['this'].monday;
      weekData['this']=JSON.parse(JSON.stringify(weekData['next']));
      weekData['this'].monday=currentMonday;
      weekData['this'].sharedSchedule=prevSchedule; // carry schedule forward
      weekData['next']={sel:{},monday:nextMonday(),sharedSchedule:JSON.parse(JSON.stringify(prevSchedule))};
    } else {
      // More than a week has passed, or dates don't match — reset all
      weekData['last']={sel:{},monday:lastMonday()};
      weekData['this']={sel:{},monday:currentMonday};
      weekData['next']={sel:{},monday:nextMonday()};
    }
    // Clear manual overrides for the new week
    Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
    Object.keys(EAT_OUT).forEach(function(k){delete EAT_OUT[k];});
    Object.keys(OVERRIDES).forEach(function(k){delete OVERRIDES[k];});
    Object.keys(LATE_SNACK).forEach(function(k){delete LATE_SNACK[k];});
    Object.keys(MANUAL_SET).forEach(function(k){delete MANUAL_SET[k];});
    // Save the rollover
    lsSet('mealPlannerWeekData',weekData);
  }

  // Ensure monday stamps are set
  if(!weekData['last'].monday)weekData['last'].monday=lastMonday();
  if(!weekData['this'].monday)weekData['this'].monday=currentMonday;
  if(!weekData['next'].monday)weekData['next'].monday=nextMonday();
  
  // Load active week's state into globals
  loadWeekState(activeWeek);

  // Migrate old shared schedule from separate localStorage into this week's weekData
  if(!weekData[activeWeek].sharedSchedule){
    const ss=lsGet('mealPlannerSharedSchedule',null);if(ss)weekData[activeWeek].sharedSchedule=ss;
  }
}
function saveWeeks(){
  // Bundle per-week state into weekData
  weekData[activeWeek].sel=JSON.parse(JSON.stringify(SEL));
  weekData[activeWeek].skipped=JSON.parse(JSON.stringify(SKIPPED));
  weekData[activeWeek].eatOut=JSON.parse(JSON.stringify(EAT_OUT));
  weekData[activeWeek].overrides=JSON.parse(JSON.stringify(OVERRIDES));
  weekData[activeWeek].lateSnack=JSON.parse(JSON.stringify(LATE_SNACK));
  weekData[activeWeek].manualSet=JSON.parse(JSON.stringify(MANUAL_SET));
  weekData[activeWeek].sharedSchedule=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
  weekData['last'].monday=lastMonday();
  weekData['this'].monday=todayMonday();
  weekData['next'].monday=nextMonday();
  lsSet('mealPlannerWeekData',weekData);
}
function loadWeekState(w){
  // Load all per-week state from weekData into globals
  const wd=weekData[w]||{};
  function loadInto(target,source){Object.keys(target).forEach(function(k){delete target[k];});Object.keys(source||{}).forEach(function(k){target[k]=source[k];});}
  loadInto(SEL,wd.sel);
  loadInto(SKIPPED,wd.skipped);
  loadInto(EAT_OUT,wd.eatOut);
  loadInto(OVERRIDES,wd.overrides);
  loadInto(LATE_SNACK,wd.lateSnack);
  loadInto(MANUAL_SET,wd.manualSet);
  loadInto(SHARED_SCHEDULE,wd.sharedSchedule);
  initSharedSchedule(); // ensure defaults if empty
}
function switchWeek(w){
  saveWeeks();
  activeWeek=w;
  loadWeekState(w);
  renderWeekBar();renderDayTabs();renderMeals();
  if(topTab==='shop')renderShop();
}
function renderWeekBar(){
  const bar=document.getElementById('weekBar');if(!bar)return;
  const thisLabel=fmtWeekLabel(todayMonday());
  const nextLabel=fmtWeekLabel(nextMonday());
  bar.innerHTML='<div class="week-toggle">'
    +'<div class="week-pill'+(activeWeek==='last'?' on':'')+'" onclick="switchWeek(\'last\')">Last</div>'
    +'<div class="week-pill'+(activeWeek==='this'?' on':'')+'" onclick="switchWeek(\'this\')">This Week</div>'
    +'<div class="week-pill'+(activeWeek==='next'?' on':'')+'" onclick="switchWeek(\'next\')">Next</div>'
    +'</div>';
}

// ── CLOUD SYNC (GitHub Gist) ────────────────────────────────
var GIST_API='https://api.github.com/gists';
var syncId=null;var syncToken=null;var syncStatus='';
function loadSyncId(){
  syncId=lsGetRaw('mealPlannerSyncId');
  syncToken=lsGetRaw('mealPlannerSyncToken');
}
function saveSyncIdLocal(id){syncId=id;lsSetRaw('mealPlannerSyncId',id);}
function saveSyncToken(token){syncToken=token;lsSetRaw('mealPlannerSyncToken',token);}
function setSyncStatus(msg,type){const c=type==='err'?'#DC2626':type==='ok'?'#059669':'var(--gray)';syncStatus='<span style="color:'+c+'">'+msg+'</span>';const el=document.getElementById('syncStatusMsg');if(el)el.innerHTML=syncStatus;}
function gistHeaders(){return {'Content-Type':'application/json','Authorization':'token '+syncToken};}
function getSyncPayload(){
  return {weekData:weekData,customMeals:customMeals,customIngredients:customIngredients,eatOutDB:EAT_OUT_DB,version:3};
}
function mergeSyncData(remote){
  // Week data: merge per-slot, last-write-wins using timestamps
  if(remote.weekData){
    ['last','this','next'].forEach(function(w){
      if(!remote.weekData[w])return;
      if(!weekData[w])weekData[w]={sel:{},ts:{},monday:''};
      if(!weekData[w].ts)weekData[w].ts={};
      const remoteSel=remote.weekData[w].sel||{};
      const remoteTs=remote.weekData[w].ts||{};
      const localSel=weekData[w].sel;
      const localTs=weekData[w].ts;

      // All keys from both sides
      const allKeys={};
      Object.keys(remoteSel).forEach(function(k){allKeys[k]=true;});
      Object.keys(localSel).forEach(function(k){allKeys[k]=true;});
      
      // Bundled per-week state from remote
      const remoteState={skipped:remote.weekData[w].skipped||{},eatOut:remote.weekData[w].eatOut||{},overrides:remote.weekData[w].overrides||{},lateSnack:remote.weekData[w].lateSnack||{},manualSet:remote.weekData[w].manualSet||{}};
      if(!weekData[w].skipped)weekData[w].skipped={};
      if(!weekData[w].eatOut)weekData[w].eatOut={};
      if(!weekData[w].overrides)weekData[w].overrides={};
      if(!weekData[w].lateSnack)weekData[w].lateSnack={};
      if(!weekData[w].manualSet)weekData[w].manualSet={};

      Object.keys(allKeys).forEach(function(k){
        const localTime=localTs[k]||0;
        const remoteTime=remoteTs[k]||0;
        if(remoteTime>localTime){
          localSel[k]=remoteSel[k];
          localTs[k]=remoteTime;
          // Take remote's bundled state for this slot
          if(remoteState.skipped[k]!==undefined) weekData[w].skipped[k]=remoteState.skipped[k]; else delete weekData[w].skipped[k];
          if(remoteState.eatOut[k]!==undefined) weekData[w].eatOut[k]=remoteState.eatOut[k]; else delete weekData[w].eatOut[k];
          if(remoteState.overrides[k]!==undefined) weekData[w].overrides[k]=remoteState.overrides[k]; else delete weekData[w].overrides[k];
          if(remoteState.manualSet[k]!==undefined) weekData[w].manualSet[k]=remoteState.manualSet[k]; else delete weekData[w].manualSet[k];
        }
      });
      // Late snack uses person_day key, merge separately
      Object.keys(remoteState.lateSnack).forEach(function(k){
        if(!weekData[w].lateSnack[k]) weekData[w].lateSnack[k]=remoteState.lateSnack[k];
      });

      weekData[w].sel=localSel;
      weekData[w].ts=localTs;
      if(remote.weekData[w].monday)weekData[w].monday=remote.weekData[w].monday;
      // Merge shared schedule per-week: take remote entries that local doesn't have
      const remSched=remote.weekData[w].sharedSchedule||{};
      if(!weekData[w].sharedSchedule)weekData[w].sharedSchedule={};
      Object.keys(remSched).forEach(function(k){
        if(!weekData[w].sharedSchedule[k])weekData[w].sharedSchedule[k]=remSched[k];
      });
    });
  }
  
  // Custom meals: merge by ID, don't overwrite existing
  if(remote.customMeals){
    Object.keys(remote.customMeals).forEach(function(k){
      if(!customMeals[k])customMeals[k]=remote.customMeals[k];
    });
  }
  
  // Custom ingredients: merge by key, don't overwrite existing
  if(remote.customIngredients){
    Object.keys(remote.customIngredients).forEach(function(k){
      if(!customIngredients[k]){
        customIngredients[k]=remote.customIngredients[k];
        NUTRI_DB[k]=remote.customIngredients[k];
      }
    });
  }
  
  // Eat-out DB: merge by name+restaurant, don't duplicate
  if(remote.eatOutDB){
    remote.eatOutDB.forEach(function(entry){
      const exists=EAT_OUT_DB.some(function(e){return e.name===entry.name&&e.restaurant===entry.restaurant;});
      if(!exists)EAT_OUT_DB.push(entry);
    });
  }
  
  // Shared schedule now per-week in weekData — merged with other bundled state above

  // Reload active week's state into globals
  loadWeekState(activeWeek);
  
  saveWeeks();saveCustomMeals();saveCustomIngredients();saveEatOutDB();
  injectCustomMeals();renderWeekBar();
}

function createSync(){
  if(!syncToken){setSyncStatus('Enter your GitHub token first.','err');return;}
  setSyncStatus('Creating sync...','loading');
  saveWeeks();
  const payload=getSyncPayload();
  fetch(GIST_API,{method:'POST',headers:gistHeaders(),body:JSON.stringify({
    description:'Meal Planner Sync',public:false,
    files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
  })}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(d){
    if(!d.id){setSyncStatus('Could not create.','err');return;}
    saveSyncIdLocal(d.id);
    setSyncStatus('Sync created! Share the Gist ID with your partner.','ok');
    renderSyncView();
  }).catch(function(e){setSyncStatus('Error: '+e.message,'err');});
}
function pushSync(){
  if(!syncId||!syncToken)return;
  saveWeeks();
  setSyncStatus('Syncing...','loading');
  // Pull first, merge, then push
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    const content=gist.files['meal-planner-sync.json'].content;
    const remote=JSON.parse(content);
    mergeSyncData(remote);
    const payload=getSyncPayload();
    return fetch(GIST_API+'/'+syncId,{method:'PATCH',headers:gistHeaders(),body:JSON.stringify({
      files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
    })});
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('Synced!','ok');renderMeals();
  }).catch(function(e){setSyncStatus('Sync failed: '+e.message,'err');});
}
function pullSync(){
  if(!syncId||!syncToken)return;
  setSyncStatus('Pulling...','loading');
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    const content=gist.files['meal-planner-sync.json'].content;
    const data=JSON.parse(content);
    mergeSyncData(data);
    setSyncStatus('Pulled!','ok');renderMeals();renderSyncView();
  }).catch(function(e){setSyncStatus('Pull failed: '+e.message,'err');});
}
function connectSync(){
  const tokenEl=document.getElementById('syncTokenInput');
  const idEl=document.getElementById('syncIdInput');
  if(tokenEl&&tokenEl.value.trim()) saveSyncToken(tokenEl.value.trim());
  if(idEl&&idEl.value.trim()) saveSyncIdLocal(idEl.value.trim());
  if(!syncToken){setSyncStatus('Enter your GitHub token.','err');renderSyncView();return;}
  if(!syncId){setSyncStatus('Enter a Gist ID or create a new sync.','err');renderSyncView();return;}
  // Verify the connection works
  setSyncStatus('Connecting...','loading');
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    if(!gist.files||!gist.files['meal-planner-sync.json']){throw new Error('Not a Meal Planner sync gist');}
    setSyncStatus('Connected!','ok');renderSyncView();
  }).catch(function(e){
    syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(x){}
    setSyncStatus('Connection failed: '+e.message,'err');renderSyncView();
  });
}
function clearSyncId(){syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(e){}setSyncStatus('Disconnected. Token saved.','ok');renderSyncView();}
function copyId(){if(syncId){navigator.clipboard.writeText(syncId).then(function(){setSyncStatus('ID copied!','ok');});}}
function shareSync(){
  const text='Meal Planner Sync\nToken: '+syncToken+'\nGist ID: '+syncId;
  if(navigator.share){
    navigator.share({title:'Meal Planner Sync',text:text}).catch(function(){});
  } else {
    navigator.clipboard.writeText(text).then(function(){setSyncStatus('Copied to clipboard!','ok');});
  }
}

function renderSyncView(){
  const el=document.getElementById('syncView');if(!el)return;
  let html='<div style="padding:0 0 80px"><div class="sync-panel"><div class="sync-title">☁️ Cloud Sync</div>'
    +'<p class="sync-desc">Sync via GitHub Gist. Create a token at github.com/settings/tokens (gist scope only).</p>';
  if(syncId&&syncToken){
    html+='<div class="sync-field-label">Gist ID</div>'
      +'<div class="sync-id-box" onclick="copyId()">'+syncId+'</div>'
      +'<div class="sync-token-hint">Token: ••••'+syncToken.slice(-4)+'</div>'
      +'<div class="sync-btn-grid">'
      +'<button class="sync-btn primary" onclick="pushSync()">Sync</button>'
      +'<button class="sync-btn primary" onclick="pullSync()">Pull</button>'
      +'<button class="sync-btn primary" onclick="shareSync()">Share</button>'
      +'</div>'
      +'<div style="margin-top:8px"><button class="sync-btn secondary" style="width:100%" onclick="clearSyncId()">Disconnect</button></div>';
  } else {
    html+='<form id="syncForm" autocomplete="on" onsubmit="event.preventDefault();connectSync()">'
      +'<div class="sync-field-label">Gist ID</div>'

// Build role->ingredients map from all meals
function buildRoleIngredients(){
  const map={protein:{},carb:{},fat:{},veg:{},condiment:{},fixed:{}};
  MEALS.forEach(function(m){
    if(!m.ingredients)return;
    m.ingredients.forEach(function(ing){
      if(!ing.dbKey)return;
      const role=ing.role||'fixed';
      if(map[role])map[role][ing.dbKey]=true;
    });
  });
  // Convert to sorted arrays
  const result={};
  Object.keys(map).forEach(function(role){
    result[role]=Object.keys(map[role]).sort();
  });
  // Unused DB keys only go into 'fixed' as a catch-all
  const allUsed={};
  Object.keys(result).forEach(function(r){result[r].forEach(function(k){allUsed[k]=true;});});
  const unused=Object.keys(NUTRI_DB).filter(function(k){return !allUsed[k];}).sort();
  unused.forEach(function(k){if(result.fixed.indexOf(k)<0)result.fixed.push(k);});
  result.fixed.sort();
  result.all=Object.keys(NUTRI_DB).sort();
  return result;
}

function addNewDbIngredient(){
  const name=document.getElementById('rf_new_name').value.trim().toLowerCase();

  const pro=Math.max(0,parseFloat(document.getElementById('rf_new_pro').value)||0);
  const fat=Math.max(0,parseFloat(document.getElementById('rf_new_fat').value)||0);

  const unit=document.getElementById('rf_new_unit').value||'each';
  const role=document.getElementById('rf_new_role').value||'protein';
  if(!name){alert('Enter an ingredient name.');return;}
  if(NUTRI_DB[name]){alert(name+' already exists in the database.');return;}

  // Build entry with required fields
  const entry={kcal:kcal,pro:pro,fat:fat,carb:carb,unit:unit};

  // Optional behavior fields
  const minAmt=parseFloat(document.getElementById('rf_new_minAmt').value);
  if(minAmt>0)entry.minAmt=minAmt;
  if(document.getElementById('rf_new_halfSnap').value==='yes')entry.halfSnap=true;
  if(document.getElementById('rf_new_wholeOnly').value==='yes')entry.wholeOnly=true;

  // Optional package fields
  const pkgSize=parseFloat(document.getElementById('rf_new_pkgSize').value);
  const pkgUnit=document.getElementById('rf_new_pkgUnit').value;
  const pkgDrained=parseFloat(document.getElementById('rf_new_pkgDrained').value);
  const pkgType=document.getElementById('rf_new_pkgType').value;
  if(pkgSize>0&&pkgUnit){
    entry.pkg={size:pkgSize,unit:pkgUnit};
    if(pkgDrained>0)entry.pkg.drained=pkgDrained;
    if(pkgUnit==='cups'&&pkgDrained>0)entry.pkg.cups=pkgDrained;
    if(pkgType)entry.pkg.type=pkgType;
  }

  NUTRI_DB[name]=entry;
  customIngredients[name]=entry;
  saveCustomIngredients();

  // Add to role cache so it appears in filtered dropdowns immediately
  if(ROLE_INGR){
    if(!ROLE_INGR[role])ROLE_INGR[role]=[];
    ROLE_INGR[role].push(name);ROLE_INGR[role].sort();
    if(!ROLE_INGR.all)ROLE_INGR.all=[];

  document.getElementById('rf_new_pkgType').value='';

    +'<div class="ni-field" style="flex:1"><label>½ Snap</label><select id="rf_new_halfSnap"><option value="no">No</option><option value="yes">Yes</option></select></div>'
    +'<div class="ni-field" style="flex:1"><label>Whole Only</label><select id="rf_new_wholeOnly"><option value="no">No</option><option value="yes">Yes</option></select></div>'
    +'</div>'
    +'<div class="ni-row">'
    +'<div class="ni-field" style="flex:1"><label>Pkg Size</label><input id="rf_new_pkgSize" type="number" min="0" step="0.5" placeholder="—"></div>'
    +'<div class="ni-field" style="flex:1"><label>Pkg Unit</label><select id="rf_new_pkgUnit"><option value="">—</option><option value="oz">oz</option><option value="cups">cups</option></select></div>'
    +'<div class="ni-field" style="flex:1"><label>Drained</label><input id="rf_new_pkgDrained" type="number" min="0" step="0.25" placeholder="—"></div>'
    +'<div class="ni-field" style="flex:1"><label>Pkg Type</label><select id="rf_new_pkgType"><option value="">—</option><option value="can">can</option><option value="carton">carton</option><option value="jar">jar</option><option value="bulk">bulk</option></select></div>'
    +'</div>'
    +'<button class="rf-save" style="padding:5px 14px;font-size:11px;margin-top:8px" onclick="addNewDbIngredient()">Add to Database</button>'
    +'</div>':'')
    +'</div>'
    // Edit Recipes collapsible
    +'<div style="background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);margin:10px 12px;box-shadow:var(--shadow)">'
    +'<div style="padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text)" onclick="_editRecipesOpen=!_editRecipesOpen;renderRecipesView()">'+erIcon+' Edit Recipes'+(listIds.length?' <span style="font-size:11px;color:var(--gray);font-weight:600">('+listIds.length+')</span>':'')+'</div>'
    +(_editRecipesOpen
      ?'<div style="padding:0 14px 14px">'
      // Slot + Meal picker + Edit button
      +'<div style="display:flex;gap:4px;align-items:center;margin-bottom:10px">'
      +'<select id="editSlotSel" style="padding:4px 4px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;flex-shrink:0" onchange="onEditSlotChange()">'
      +'<option value="">Slot</option><option value="breakfast"'+(_editSavedSlot==='breakfast'?' selected':'')+'>Bkfst</option><option value="lunch"'+(_editSavedSlot==='lunch'?' selected':'')+'>Lunch</option><option value="dinner"'+(_editSavedSlot==='dinner'?' selected':'')+'>Dinner</option><option value="snack"'+(_editSavedSlot==='snack'?' selected':'')+'>Snack</option><option value="shake"'+(_editSavedSlot==='shake'?' selected':'')+'>Shake</option>'
      +'</select>'
      +'<select id="editMealSel" style="flex:1;min-width:0;padding:4px 4px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;text-overflow:ellipsis" onchange="onEditMealChange()">'
      +(function(){
        let opts='<option value="">— Meal —</option>';
        if(_editSavedSlot){
          const meals=getMealsForSlot(_editSavedSlot);
          meals.sort(function(a,b){return a.label<b.label?-1:1;});
          meals.forEach(function(m){opts+='<option value="'+m.id+'"'+(_editSavedMeal===m.id?' selected':'')+'>'+m.label+'</option>';});
        }
        return opts;
      })()
      +'</select>'
      +'<div style="padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);color:'+(_editSavedMeal?(_editMode?'var(--shop)':'var(--text)'):'var(--gray)')+';font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();toggleEditMode()">'+(_editMode?'Cancel':'Edit')+'</div>'
      +'</div>'
      // Show selected meal preview/edit form
      +(function(){
        if(!_editSavedMeal) return '';
        const m=getMeal(_editSavedMeal);
        if(!m) return '';
        let html='';
        if(m.ingredients&&m.ingredients.length){
          const mc=computeMacros(m.ingredients.filter(function(i){return(i.amt||0)>0;}).map(function(i){return{dbKey:i.dbKey,amt:i.amt};}));
          html+='<div style="font-size:12px;color:var(--gray);margin-bottom:6px">'+mc.kcal+' kcal · P '+mc.pro+'g · C '+mc.carb+'g · F '+mc.fat+'g</div>';
          html+='<div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;margin-bottom:8px">';
          m.ingredients.forEach(function(ing,idx){
            const db=NUTRI_DB[ing.dbKey];
            const unit=db?db.unit:'';
            const kcal=db?Math.round(db.kcal*ing.amt):0;
            if(_editMode){
              const qtyOpts=buildQtyOptions(unit,ing.amt,db&&db.wholeOnly);
              const qtyHtml=qtyOpts.map(function(q){return '<option value="'+q.val+'"'+(Math.abs(q.val-ing.amt)<0.02?' selected':'')+'>'+q.label+'</option>';}).join('');
              html+='<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">'
                +'<select style="width:40px;padding:2px;border:1.5px solid var(--border);border-radius:4px;font-size:11px;background:var(--bg);color:var(--text)" onchange="_editChanges['+idx+']={amt:parseFloat(this.value)}">'
                +qtyHtml+'</select>'
                +'<span style="color:var(--gray);min-width:24px">'+unit+'</span>'
                +'<span style="flex:1;color:var(--text)">'+ing.dbKey+'</span>'
                +'<span style="color:var(--shop);font-size:10px">'+kcal+'cal</span></div>';
            } else {
              html+='<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">'
                +'<span style="color:var(--text);min-width:28px;text-align:right">'+fmtFrac(ing.amt)+'</span>'
                +'<span style="color:var(--gray);min-width:24px">'+unit+'</span>'
                +'<span style="flex:1;color:var(--text)">'+ing.dbKey+'</span>'
                +'<span style="color:var(--shop);font-size:10px">'+kcal+'cal</span></div>';
            }
          });
          html+='</div>';
        }
        if(m.steps&&m.steps.length){
          html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:4px">Steps</div>';
          html+='<ol style="font-size:11px;color:var(--text-mid);padding-left:16px;margin:0">';
          m.steps.forEach(function(st){html+='<li style="margin-bottom:3px">'+st+'</li>';});
          html+='</ol>';
        }
        if(_editMode){
          html+='<div style="margin-top:10px"><div style="padding:6px 14px;border-radius:6px;background:var(--shop);color:#000;font-size:12px;font-weight:700;cursor:pointer;display:inline-block" onclick="saveEditChanges()">Assign</div></div>';
        }
        return html;
      })()
      +'</div>'
      :'')
    +'</div>'
    +'</div>';
  renderSlotChips();
  // Add one starter ingredient row if not editing
  if(!editingRecipeId){
    addIngrRow();
  }
  if(editingRecipeId&&customMeals[editingRecipeId]){showRecipeForm(customMeals[editingRecipeId]);}
}

// ── INIT ────────────────────────────────────────────────────
loadSyncId();loadCustomIngredients();loadWeeks();renderWeekBar();
loadCustomMeals();loadEatOutDB();
MEALS.forEach(function(m){expandMealIngredients(m);});
MEALS.forEach(function(m){buildColorizedSteps(m);});
renderDayTabs();renderMeals();

// Register service worker for offline PWA support
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}

</script>
</body>
</html>
