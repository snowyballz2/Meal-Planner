        // Cache for OTHER slots stays — so pipeline mutations on batch slots
        // (lunch/dinner) and other days are preserved. Snacks are always
        // solo so they have no batch entanglement.
        SEL[key] = c.id;
        const newSnackCache = rebuildSnackCache(p,d);
        if(!newSnackCache){ SEL[key] = curId; return; }
        cached.snack = newSnackCache;
        const newDelta = calcTotals(p,d).kcal - CAL_BASE[p];
        const newAbsDelta = Math.abs(newDelta);
        const newMisses = dayMissCount(p,d);
        // Waste + INV14 invariant: snack swap filters out pkg meals AND
        // snacks are exempt from 5-day repeat. So waste + inv14 can't change.
        if(newAbsDelta < bestAbsDelta && newMisses <= baselineMisses){
          bestAbsDelta = newAbsDelta;
          bestSwap = c.id;
        }
        // Revert
        SEL[key] = curId;
        cached.snack = origSnackCache;
      });

      if(bestSwap){
        SEL[key] = bestSwap;
        weekData[activeWeek].ts[key] = now;
        const newSnackCache = rebuildSnackCache(p,d);
        if(newSnackCache) cached.snack = newSnackCache;
        _leftoverCache = null; // snack SEL changed — variety filters may read
      }
    });
  });
}

function rerollInv14Violations(randTarget){
  const now = Date.now();
  const noRandomizeIds={};
  MEALS.forEach(function(m){if(m.noRandomize)noRandomizeIds[m.id]=true;});
  const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];

  function totalWaste(){
    return _fastTripWasteForPersons(TRIP_DAYS_STATIC.cook1, persons)
         + _fastTripWasteForPersons(TRIP_DAYS_STATIC.cook2, persons);
  }
  function dayMissCount(d){
    let misses=0;
    persons.forEach(function(p){
      if(p!=='him'&&p!=='her')return;
      const calT=CAL_BASE[p], proT=PRO_TARGET[p];
      const t=calcTotals(p,d);
      const fv=computeDailyFV(p,d);
      const mk=t.pro*4+t.fat*9+t.carb*4;
      const carbPct=mk>0?(t.carb*4)/mk:0;
      const fatPct=mk>0?(t.fat*9)/mk:0;
      if(Math.abs(t.kcal-calT)>100)misses++;
      if(t.pro<proT)misses++;
      if(carbPct>0.55)misses++;
      if(fatPct>0.30)misses++;
      if(fv.veg<2.75)misses++;
      if(fv.fruit<1)misses++;
    });
    return misses;
  }
  function findPairs(){
    invalidateLeftoverCache();
    const cooks=_collectHouseholdCooks(computeLeftovers());
    const pairs=[];
    for(var i=0;i<cooks.length;i++){
      for(var j=i+1;j<cooks.length;j++){
        if(cooks[i].mealId===cooks[j].mealId
            && Math.abs(cooks[j].dayIdx-cooks[i].dayIdx)<5){
          // `later` = cooks[j]: cooks are built in DAYS-ascending order and j>i,
          // so cooks[j].dayIdx >= cooks[i].dayIdx always.
          pairs.push({later:cooks[j]});
        }
      }
    }
    return pairs;
  }

  const MAX_ITERS=5;
  for(let iter=0;iter<MAX_ITERS;iter++){
    const pairs=findPairs();
    if(pairs.length===0)break;
    let fixedAny=false;
    for(let pi=0;pi<pairs.length;pi++){
      const t=pairs[pi].later;
      const key=sk(t.p,t.d,t.s);
      if(EAT_OUT[key]||SKIPPED[key])continue;
      if(MANUAL_SET[key])continue;
      const isShared=SHARED_SCHEDULE[dk(t.d,t.s)]==='shared';
      const otherP=t.p==='him'?'her':'him';
      const dIdx=DAYS.indexOf(t.d);
      // Recent + last-week are household-level. Candidates must not be in either.
      const recent=getRecentMealIds(dIdx,DAYS,4);
      const lastWk=getLastWeekMealIds();
      const candidates=getMealsForSlot(t.s).filter(function(m){
        if(!m[t.p])return false;
        if(noRandomizeIds[m.id])return false;
        if(isShared&&!m[otherP])return false;
        if(mealUsesDiscouraged(m))return false; // never swap TO coconut etc.
        if(m.id===t.mealId)return false;
        if(t.s!=='snack'){
          if(lastWk.indexOf(m.id)>=0)return false;
          if(recent.indexOf(m.id)>=0 && !isBatchLeftoverEligible(t.d,t.s,m.id))return false;
        }
        return true;
      });
      if(!candidates.length)continue;

      const baselineWaste=totalWaste();
      const baselineInv14=countInv14();
      const baselineMisses=dayMissCount(t.d);
      let accepted=false;
      for(let ci=0;ci<candidates.length;ci++){
        const c=candidates[ci];
        const origSel=SEL[key];
        let otherKey=null, otherOrig=null;
        SEL[key]=c.id;
        if(isShared){
          otherKey=sk(otherP,t.d,t.s);
          otherOrig=SEL[otherKey];
          SEL[otherKey]=c.id;
        }
        invalidateLeftoverCache();
        const newWaste=totalWaste();
        const newInv14=countInv14();
        const newMisses=dayMissCount(t.d);
        // Accept if INV14 strictly decreases AND waste doesn't grow AND
        // misses rise by at most 2. The +2 miss tolerance is deliberate: we're
        // willing to trade up to two day-misses for closing an INV14 hard-feeling
        // violation since it's more important to prevent same-meal-within-5d
        // than to chase a couple of goal misses.
        if(newInv14<baselineInv14 && newWaste<=baselineWaste && newMisses<=baselineMisses+2){
          // Accept — keep SEL mutated
          weekData[activeWeek].ts[key]=now;
          if(otherKey)weekData[activeWeek].ts[otherKey]=now;
          accepted=true;
          fixedAny=true;
          break;
        }
        // Revert
        SEL[key]=origSel;
        if(otherKey)SEL[otherKey]=otherOrig;
        invalidateLeftoverCache();
      }
      if(accepted)break; // restart outer loop to re-find pairs
    }
    if(!fixedAny)break; // no progress, give up
  }
}

function _randomizeWeekCore(randTarget){
  const days = DAYS;
  const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  const bothPersons = persons.length > 1 || randTarget === 'shared';
  const locked = {};

  // Build noRandomize exclusion set (high-fat meals only assignable manually)
  const noRandomizeIds={};
  MEALS.forEach(function(m){if(m.noRandomize)noRandomizeIds[m.id]=true;});

  if(!weekData[activeWeek].ts) weekData[activeWeek].ts={};
  const now = Date.now();

  // ── PRE-PHASE: Lock eat-out + manually-set slots, clear old skips ──
  // EAT_OUT keeps its meal ID untouched (existing). MANUAL_SET also locks
  // the meal ID — Set means user chose this; Randomize keeps it but still
  // scales amounts post-pipeline to fit kcal budget.
  persons.forEach(function(p){
    days.forEach(function(d){
      SLOTS.forEach(function(s){
        const k=sk(p,d,s);
        if(isLockedForRandomize(k)){locked[k]=true;}
      });
    });
  });
  Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
  days.forEach(function(d){
    ['breakfast','lunch','dinner','shake','snack'].forEach(function(s){
      const state = SHARED_SCHEDULE[dk(d,s)];
      if(state==='skip-him'||state==='skip-both'){
        if(!EAT_OUT[sk('him',d,s)]) EAT_OUT[sk('him',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
      if(state==='skip-her'||state==='skip-both'){
        if(!EAT_OUT[sk('her',d,s)]) EAT_OUT[sk('her',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
    });
  });
  // Lock eat-out slots created by schedule
  persons.forEach(function(p){
    days.forEach(function(d){
      SLOTS.forEach(function(s){
        var k=sk(p,d,s);
        if(EAT_OUT[k]) locked[k]=true;
      });
    });
  });

  // ── PHASE 1: Initial random selection (ALL slots, any meal) ──
  // For each person/day, try 60 combos and pick closest to daily calorie target.
  // Package meals are allowed everywhere — Phase 2+3 resolve waste afterward.
  persons.forEach(function(p) {
    var target = CAL_BASE[p];

    days.forEach(function(d, di) {
      var bestSel = null;
      var bestScore = Infinity;
      var attempts = 60;
      var recentIds = getRecentMealIds(di, days, 4);
      // Variety filter: prefer meals not picked anywhere in last week. Falls
      // through to the existing candidate-empty fallback if last week exhausted
      // all viable options for a slot.
      var lastWeekIds = getLastWeekMealIds();
      // Pre-compute per-slot kcal budgets so Phase 1 scoring matches reality:
      // the adjuster scales each slot to its budget, so a low-base meal is
      // NOT actually worse than a high-base one — it just gets scaled up.
      var slotBudgets = computeSlotBudgets(p, d);
      // MAX_UP_SCALE: the actual adjuster (adjustIngredients) has no hard
      // scale cap — only per-ingredient minAmt/maxAmt clamps. Setting this
      // to Infinity lets Phase 1 score a small-base meal as equally fillable
      // for a large budget, freeing small-kcal recipes (many breakfasts)
      // to compete instead of losing on calDiff. Per-ingredient maxAmt still
      // governs final amounts.
      var MAX_UP_SCALE = Infinity;

      for (var a = 0; a < attempts; a++) {
        var used = [];
        var trySel = {};
        var totalKcal = 0;

        var totalFatCal = 0;
        var totalPro = 0;
        var incomplete = false;

        SLOTS.forEach(function(s) {
          if (locked[sk(p,d,s)]) {
            var lockedId = SEL[sk(p,d,s)];
            if (lockedId) {
              trySel[s] = lockedId;
              used.push(lockedId);
              var lm = getMeal(lockedId);
              if (lm && lm[p]) {
                var lmm = getPortMacros(lm[p]);
                // Locked slots: approximate adjusted kcal same as unlocked below.
                var lBudget = slotBudgets[s] || 0;
                var lEff = (s==='shake' || !lBudget) ? lmm.kcal
                          : Math.min(lmm.kcal * MAX_UP_SCALE, lBudget);
                var lScale = lmm.kcal > 0 ? lEff / lmm.kcal : 1;
                totalKcal += lEff;
                totalFatCal += lmm.fat * 9 * lScale;
                totalPro += lmm.pro * lScale;
              }
            }
            return;
          }
          // For shared-schedule slots, only pick meals both people have
          var isSharedSlot = bothPersons && SHARED_SCHEDULE[dk(d,s)] === 'shared';
          var candidates = getMealsForSlot(s).filter(function(m){
            if (!m[p]) return false;
            if (noRandomizeIds[m.id]) return false;
            if (used.indexOf(m.id) >= 0) return false;
            // Variety filters (recent-days + last-week) apply only to main meals.
            // Snacks have a small pool and are allowed to repeat freely.
            // Picks that would extend an existing batch (leftover within 3-day
            // window) bypass the recent filter — eating leftovers of an
            // existing cook is not a "new meal" for variety purposes.
            if (s !== 'snack') {
              if (lastWeekIds.indexOf(m.id) >= 0) return false;
              if (recentIds.indexOf(m.id) >= 0 && !isBatchLeftoverEligible(d, s, m.id)) return false;
            }
            if (isSharedSlot && (!m.him || !m.her)) return false;
            return true;
          });
          // Fallback cascade — for lunch/dinner, `used` AND variety filter are
          // BOTH preserved in all fallbacks. Only `shared` may be dropped. This
          // prevents both same-day-dupe (INV14 gap=0) and within-5d repeats
          // (INV14 gap=1..4). If variety leaves no candidate, the retry loop
          // picks a different combo on another retry.
          // For snacks, used/variety are irrelevant (exempt in primary), so
          // snack fallback can drop shared + used progressively.
          if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){
            if (!m[p]) return false;
            if (noRandomizeIds[m.id]) return false;
            if (used.indexOf(m.id) >= 0) return false;
            if (s !== 'snack') {
              if (lastWeekIds.indexOf(m.id) >= 0) return false;
              if (recentIds.indexOf(m.id) >= 0 && !isBatchLeftoverEligible(d, s, m.id)) return false;
            }
            return true;
          });
          // Snack-only fallback: drop `used` (small pool can repeat same day).
          if (!candidates.length && s === 'snack') candidates = getMealsForSlot(s).filter(function(m){
            if (!m[p]) return false;
            if (noRandomizeIds[m.id]) return false;
            if (isSharedSlot && (!m.him || !m.her)) return false;
            return true;
          });
          // Snack absolute last resort: any snack for this person.
          if (!candidates.length && s === 'snack') candidates = getMealsForSlot(s).filter(function(m){ return !!m[p] && !noRandomizeIds[m.id]; });
          // Lunch/dinner: if variety + used still produces empty pool, give up
          // on this slot for THIS retry. The retry loop will pick different
          // earlier meals that avoid this dead-end. Prevents INV14 hard fires.
          // Mark attempt incomplete so the score check rejects it — without
          // this, a partial trySel can win bestScore (missing-slot calDiff is
          // huge but if every attempt hits the same dead-end, the least-bad
          // partial commits and SEL gets a deleted slot).
          if (!candidates.length) {
            if (s === 'breakfast' || s === 'lunch' || s === 'dinner') incomplete = true;
            return;
          }
          var pick = randomPick(candidates);
          trySel[s] = pick.id;
          used.push(pick.id);
          var port = pick[p];
          if (port) {
            var pm = getPortMacros(port);
            // Simulate what the adjuster will do: scale this slot to its budget.
            // No hard scale cap — per-ingredient maxAmt governs. Small-base meals
            // can compete equally in Phase 1 scoring.
            var budget = slotBudgets[s] || 0;
            var effKcal = (s==='shake' || !budget) ? pm.kcal
                        : Math.min(pm.kcal * MAX_UP_SCALE, budget);
            var macroScale = pm.kcal > 0 ? effKcal / pm.kcal : 1;
            totalKcal += effKcal;
            totalFatCal += pm.fat * 9 * macroScale;
            totalPro += pm.pro * macroScale;
          }
        });

        // Score: calorie fit + fat penalty + discouraged-ingredient penalty
        var calDiff = Math.abs(totalKcal - target);
        var fatPct = totalKcal > 0 ? totalFatCal / totalKcal : 0;
        // Daily-stack fat penalty: starts at 0.31 (not 0.30) so the scorer
        // doesn't systematically exclude meals that sit just below the hard
        // 0.30 goal. Previously starting at 0.30 shut out all ground-turkey
        // recipes (26-29% base fat) because any daily combo with them scored
        // worse than a chicken-breast alternative. Hard goal still 0.30 —
        // we accept a few more borderline misses in exchange for variety.
        var fatPenalty = fatPct > 0.31 ? (fatPct - 0.31) * 3000 : 0;
        // Strong penalty per meal containing a discouraged ingredient (coconut milk).
        // 3000/meal dominates typical calDiff (0-500) so coconut meals only pick
        // when no reasonable alternative fits. Ratio-wise, coconut milk is fat-dense
        // and the remaining dishes that use it (shrimp_coconut_curry, coconut_turkey_curry,
        // chickpea_curry_bowl, red_curry) are top INV6 offenders — keep them rare.
        var discouragedCount = 0;
        SLOTS.forEach(function(s2){
          var mid = trySel[s2]; if (!mid) return;
          var mm = getMeal(mid); if (!mm || !mm.ingredients) return;
          if (mm.ingredients.some(function(i){ return DISCOURAGED_INGREDIENTS.indexOf(i.dbKey) >= 0; })) discouragedCount++;
        });
        var discouragedPenalty = discouragedCount * 3000;
        var score = calDiff + fatPenalty + discouragedPenalty;

        // Reject incomplete attempts (variety+used filter dead-end on
        // breakfast/lunch/dinner). Without this guard, the lowest-scoring
        // partial trySel could become bestSel and commit with deleted slots.
        if (incomplete) continue;

        if (score < bestScore) {
          bestScore = score;
          bestSel = trySel;
          // Early-exit ceiling aligned with fatPenalty threshold (>0.31). Was
          // <=0.30, which created a 0.301-0.31 blind spot: attempts in that
          // range got neither penalty nor early-exit, so the scorer relied
          // on calDiff alone. Aligning to <=0.31 makes the consistency
          // explicit — penalty triggers AT the same point early-exit refuses.
          if (calDiff <= 100 && fatPct <= 0.31) break;
        }
      }

      if (bestSel) {
        SLOTS.forEach(function(s) {
          if (locked[sk(p,d,s)]) return;
          clearOverrides(p, d, s);
          var selKey = sk(p,d,s);
          if (bestSel[s]) {
            SEL[selKey] = bestSel[s];
            weekData[activeWeek].ts[selKey] = now;
          } else {
            delete SEL[selKey];
          }
        });
        // Invalidate leftover cache so NEXT day's isBatchLeftoverEligible
        // sees the just-committed picks (otherwise cache is stale and solo
        // cooks look like anchors for days that are actually out of window).
        invalidateLeftoverCache();
      }
    });

    // For shared-schedule slots, sync her to him after him is placed
    if (bothPersons && p === 'him') {
      days.forEach(function(d) {
        ['breakfast','lunch','dinner'].forEach(function(s) {
          if (SHARED_SCHEDULE[dk(d,s)] === 'shared') {
            // Don't override her's meal-ID on a Set slot — even if shared
            // schedule says "match him". User's manual pick on her side is
            // explicit; she opted out of mirroring for this slot.
            if (isLockedForRandomize(sk('her',d,s))) return;
            var himId = getMealId('him', d, s);
            if (himId) {
              SEL[sk('her',d,s)] = himId;
              weekData[activeWeek].ts[sk('her',d,s)] = now;
              locked[sk('her',d,s)] = true;
            }
          }
        });
      });
      // Mirror changed Her's SEL — her Phase 1 iteration will read leftover
      // cache via isBatchLeftoverEligible and needs fresh data.
      invalidateLeftoverCache();
    }
  });

  // ── PHASE 1.5 removed 2026-04-21 ──
  // Previously: replaced solo pkg meals with non-pkg alternatives to avoid
  // opening a full package for one serving. Superseded by `applyTripFlexScaling`
  // which now handles every pkg ingredient in the DB (all are in
  // `PKG_FLEX_CONFIG`). Enforcement moved to **INV4** in `verifyInvariants` as
  // a hard invariant: if a solo pkg meal uses a pkg ingredient NOT in
  // PKG_FLEX_CONFIG, INV4 fires (means someone added a pkg ingredient without
  // flex config, or the recipe shouldn't be usable as a solo dinner/lunch).

  // (Phase 1.6 removed — its "swap if base snack kcal > budget+50" logic
  //  was redundant with the end-of-pipeline rerollKcalOffSnacks pass which
  //  catches the same case reactively using POST-pipeline day kcal,
  //  rather than pre-adjustment base kcal. Removing 1.6 saves a per-retry
  //  candidate scan inside the 60-iteration Phase 1-4 loop without
  //  changing the eventual day-kcal correctness.)

  // ── PHASE 1.7: Swap snacks that are the sole user of a package ──
  // If a snack is the only meal in the trip using a pkg ingredient,
  // it opens a whole package just for one snack. Replace with non-pkg.
  ['cook1','cook2'].forEach(function(tripKey){
    var tripDays=TRIP_DAYS_STATIC[tripKey]||[];
    // Build pkg usage map: dbKey -> {snackSlots:[], otherSlots:[]}
    var pkgUsage={};
    persons.forEach(function(p){
      tripDays.forEach(function(d){
        ['breakfast','lunch','snack','dinner'].forEach(function(s){
          var key=sk(p,d,s);
          if(locked[key]||SKIPPED[key]||EAT_OUT[key])return;
          var mid=getMealId(p,d,s);if(!mid)return;
          var m=getMeal(mid);if(!m||!m.ingredients)return;
          m.ingredients.forEach(function(i){
            var db=NUTRI_DB[i.dbKey];
            if(!db||!db.pkg||db.pkg.longShelfLife)return;
            if(!pkgUsage[i.dbKey])pkgUsage[i.dbKey]={snackSlots:[],otherSlots:[]};
            if(s==='snack')pkgUsage[i.dbKey].snackSlots.push({p:p,d:d,key:key,mealId:mid});
            else pkgUsage[i.dbKey].otherSlots.push({p:p,d:d,s:s});
          });
        });
      });
    });
    // For each pkg used ONLY in snack slots, swap those snacks to non-pkg
    Object.keys(pkgUsage).forEach(function(dbKey){
      var usage=pkgUsage[dbKey];
      if(usage.otherSlots.length>0)return; // other meals share this pkg, fine
      if(!usage.snackSlots.length)return;
      usage.snackSlots.forEach(function(ss){
        if(locked[ss.key])return;
        var isShared=bothPersons&&SHARED_SCHEDULE[dk(ss.d,'snack')]==='shared';
        var candidates=getMealsForSlot('snack').filter(function(cm){
          if(!cm[ss.p]||cm.id===ss.mealId)return false;
          if(noRandomizeIds[cm.id])return false;
          if(isShared&&(!cm.him||!cm.her))return false;
          if(mealUsesPkg(cm.id))return false;
          return true;
        });
        if(!candidates.length)return;
        var pick=randomPick(candidates);
        SEL[ss.key]=pick.id;
        weekData[activeWeek].ts[ss.key]=now;
        if(isShared){
          var otherP=ss.p==='him'?'her':'him';
          var otherKey=sk(otherP,ss.d,'snack');
          // Don't overwrite the other person's Set/eat-out slot when the
          // shared-snack swap mirrors. User's explicit pick wins.
          if(!isLockedForRandomize(otherKey)){
            SEL[otherKey]=pick.id;
            weekData[activeWeek].ts[otherKey]=now;
          }
        }
      });
    });
  });

  // ── PHASE 2: Package analysis per shopping trip ──────────────
  // Compute leftover pairing, then sum package ingredient needs per trip.
  invalidateLeftoverCache();
  var leftovers = computeLeftovers();

  var trips = [
    { key: 'cook1', days: TRIP_DAYS_STATIC.cook1 },
    { key: 'cook2', days: TRIP_DAYS_STATIC.cook2 }
  ];

  // Helper: get perPkg amount for a packaged ingredient
  function _perPkg(dbKey) {
    var db = NUTRI_DB[dbKey];
    if (!db || !db.pkg) return 0;
    return (db.pkg.drained && (db.unit === 'cup' || db.unit === 'oz')) ? db.pkg.drained : (db.pkg.cups || 0);
  }

  // Helper: analyze package waste for a trip
  function _analyzeTripPackages(tripDays) {
    var totals = {}; // dbKey -> {total, mealsUsing:[{p,d,s,mealId,amt}]}
    // Fast approximation: apply uniform scale (slot budget / base kcal) to
    // estimate post-adjuster package usage. Good enough for Phase 3's
    // optimization signal; the shopping list itself uses the exact
    // day-balanced amounts for display.
    tripDays.forEach(function(d) {
      persons.forEach(function(p) {
        SLOTS.forEach(function(s) {
          if (s === 'late_snack') return;
          var selKey = sk(p,d,s);
          if (SKIPPED[selKey] || EAT_OUT[selKey]) return;
          var mealId = getMealId(p, d, s);
          if (!mealId) return;
          var loInfo = leftovers[selKey];
          if (loInfo && loInfo.isLeftover) return;
          var leftoverMult = (loInfo && !loInfo.isLeftover && loInfo.servings > 1) ? loInfo.servings : 1;
          var m = getMeal(mealId);
          if (!m || !m.ingredients) return;
          // Fast scale estimate: base kcal vs slot budget.
          var scale = 1;
          if (s !== 'shake' && SLOT_BUDGET[s] && (p === 'him' || p === 'her')) {
            var baseKcal = 0;
            m.ingredients.forEach(function(i){
              var db = NUTRI_DB[i.dbKey]; if (db) baseKcal += db.kcal * (i.amt||0);
            });
            if (baseKcal > 0) {
              var budget = getSlotBudget(p, d, s);
              scale = budget / baseKcal;
            }
          }
          m.ingredients.forEach(function(ing) {
            var db = NUTRI_DB[ing.dbKey];
            if (!db || !db.pkg) return;
            if (db.pkg.longShelfLife) return;
            if (!totals[ing.dbKey]) totals[ing.dbKey] = {total:0, mealsUsing:[]};
            // Scalable items scale with the slot; non-scalable (veg/fruit/condiment) stay at base
            var effectiveAmt = (ing.scalable === false) ? (ing.amt || 0) : (ing.amt || 0) * scale;
            var amt = effectiveAmt * leftoverMult;
            totals[ing.dbKey].total += amt;
            totals[ing.dbKey].mealsUsing.push({p:p, d:d, s:s, mealId:mealId, amt:effectiveAmt, servings:leftoverMult});
          });
          // Cross-person cook adds the other person's scaled serving
          if (loInfo && loInfo.crossPersonCook) {
            var otherP = loInfo.feedsAlso;
            var otherPort = m[otherP];
            if (otherPort && otherPort.ingredients) {
              // Compute scale for other person's portion (same approach as primary)
              var otherScale = 1;
              var feedsDay = loInfo.feedsDay || d;
              var feedsSlot = null;
              ['breakfast','lunch','dinner','snack'].forEach(function(os){
                if(feedsSlot)return;
                if(getMealId(otherP,feedsDay,os)===mealId)feedsSlot=os;
              });
              if (feedsSlot && SLOT_BUDGET[feedsSlot]) {
                var otherBase = 0;
                otherPort.ingredients.forEach(function(oi){
                  var odb = NUTRI_DB[oi.dbKey]; if(odb) otherBase += odb.kcal*(oi.amt||0);
                });
                if (otherBase > 0) {
                  otherScale = getSlotBudget(otherP, feedsDay, feedsSlot) / otherBase;
                }
              }
              otherPort.ingredients.forEach(function(oi) {
                var odb = NUTRI_DB[oi.dbKey];
                if (!odb || !odb.pkg || odb.pkg.longShelfLife) return;
                if (!totals[oi.dbKey]) totals[oi.dbKey] = {total:0, mealsUsing:[]};
                var oAmt = (oi.scalable === false) ? (oi.amt || 0) : (oi.amt || 0) * otherScale;
                totals[oi.dbKey].total += oAmt;
                totals[oi.dbKey].mealsUsing.push({p:otherP, d:feedsDay, s:feedsSlot||s, mealId:mealId, amt:oAmt, servings:1});
              });
            }
          }
        });
      });
    });

    var results = [];
    Object.keys(totals).forEach(function(dbKey) {
      var ppkg = _perPkg(dbKey);
      if (ppkg <= 0) return;
      var info = totals[dbKey];
      var pkgsNeeded = Math.ceil(info.total / ppkg);
      var waste = (pkgsNeeded * ppkg) - info.total;
      results.push({
        dbKey: dbKey,
        totalNeeded: info.total,
        perPkg: ppkg,
        packagesNeeded: pkgsNeeded,
        waste: waste,
        mealsUsing: info.mealsUsing
      });
    });
    return results;
  }

  // ── PHASE 3: Package resolution — SMART ──────────────────────
  // Iterate until waste stops decreasing (convergence). Each outer pass
  // re-analyzes the trip so swaps applied for one package are reflected
  // when scoring swaps for the next package.
  trips.forEach(function(trip) {
    var maxPhase3Iters = 6;
    var prevTripWaste = Infinity;
    for (var ph3iter = 0; ph3iter < maxPhase3Iters; ph3iter++) {
    // Recompute leftovers each iteration — Strategy A swaps can break
    // leftover pairings, making the old snapshot stale. Without this,
    // _analyzeTripPackages overcounts servings for broken pairs and
    // Strategy C can't detect solo pkg meals that Strategy A created.
    invalidateLeftoverCache();
    leftovers = computeLeftovers();
    var analysis = _analyzeTripPackages(trip.days);
    var currentTripWaste = 0;
    analysis.forEach(function(p){ currentTripWaste += (p.waste || 0); });
    if (currentTripWaste < 0.01) break;       // nothing left to fix
    if (currentTripWaste >= prevTripWaste) break; // no progress → stop
    prevTripWaste = currentTripWaste;

    analysis.forEach(function(pkg) {
      if (pkg.waste < 0.01) return; // no waste to resolve

      var resolved = false;

      // ── Strategy A: Swap in a meal that uses this ingredient ──
      // Only swap into SHARED or LEFTOVER-PAIRED slots — never place a pkg meal
      // solo (INV4 enforces all solo pkg meals must be flex-resolvable; placing
      // a pkg meal in a solo slot here would risk creating an INV4 violation).
      if (!resolved) {
        var swapSlots = ['breakfast','lunch','dinner'];
        var swapCandidates = [];
        trip.days.forEach(function(d) {
          persons.forEach(function(p) {
            swapSlots.forEach(function(s) {
              var selKey = sk(p,d,s);
              if (locked[selKey] || SKIPPED[selKey] || EAT_OUT[selKey]) return;
              // Only allow swaps into shared slots or leftover-paired slots
              var isSharedSlot = bothPersons && SHARED_SCHEDULE[dk(d,s)] === 'shared';
              var loInfo = leftovers[selKey];
              var isPaired = !!(loInfo && (loInfo.servings > 1 || loInfo.totalServings > 1 || loInfo.crossPersonCook || loInfo.isLeftover));
              if (!isSharedSlot && !isPaired) return; // solo slot — skip
              var curId = getMealId(p, d, s);
              if (!curId) return;
              // Skip if this slot already uses this package ingredient
              var curMeal = getMeal(curId);
              if (curMeal && curMeal.ingredients) {
                var alreadyUses = curMeal.ingredients.some(function(ing){ return ing.dbKey === pkg.dbKey; });
                if (alreadyUses) return;
              }
              // Variety filter for lunch/dinner (breakfast exempt). Both helpers
              // are household-level — p3aRecent/p3aLastWk are misnomers, retained
              // to avoid noisy renames; same applies in Strategy C and Phase 4.
              var p3aRecent = (s==='lunch'||s==='dinner') ? getRecentMealIds(DAYS.indexOf(d), DAYS, 4) : [];
              var p3aLastWk = (s==='lunch'||s==='dinner') ? getLastWeekMealIds() : [];
              // Find meals for this slot that use the needed ingredient
              var replacements = getMealsForSlot(s).filter(function(m) {
                if (!m[p] || m.id === curId) return false;
                if (noRandomizeIds[m.id]) return false;
                if (mealUsesDiscouraged(m)) return false; // never swap TO coconut etc.
                if (isSharedSlot && (!m.him || !m.her)) return false;
                if (!m.ingredients) return false;
                if (s==='lunch'||s==='dinner') {
                  if (p3aLastWk.indexOf(m.id) >= 0) return false;
                  if (p3aRecent.indexOf(m.id) >= 0 && !isBatchLeftoverEligible(d, s, m.id)) return false;
                }
                return m.ingredients.some(function(ing){ return ing.dbKey === pkg.dbKey; });
              });
              if (replacements.length) {
                swapCandidates.push({p:p, d:d, s:s, curId:curId, replacements:replacements, isSharedSlot:isSharedSlot});
              }
            });
          });
        });

        // Baseline TOTAL trip waste across ALL packages (before swap)
        var baselineTripWaste = 0;
        _analyzeTripPackages(trip.days).forEach(function(px){ baselineTripWaste += (px.waste || 0); });
        // Baseline INV14 + INV11 counts — reject swaps that would raise either.
        // INV11 added 2026-04-27: Strategy A previously checked only INV14, but
        // a swap that displaces a same-meal-batch's leftover (e.g., adding
        // ground_chicken to Wed when Fri+Sun were already a batch) can shrink
        // the Sun-batch out of Fri's window without raising INV14, while
        // creating a gap-too-small INV11 between the two resulting batches.
        invalidateLeftoverCache();
        var baselineInv14 = countInv14();
        var baselineInv11 = countInv11();

        // Try each candidate, pick the one that best reduces TOTAL trip waste
        // (not just waste for this one package — a swap that fixes tofu but
        // creates bean waste is a wash). Must not raise INV14.
        var bestSwap = null;
        var bestTotalTripWaste = baselineTripWaste;
        // Cheap base-kcal lookup for calDiff estimate (avoids day-balancer recompute per swap)
        function _baseKcalOf(mealId){
          var mm = getMeal(mealId); if (!mm || !mm.ingredients) return 0;
          var k = 0;
          mm.ingredients.forEach(function(i){ var db = NUTRI_DB[i.dbKey]; if (db) k += db.kcal*(i.amt||0); });
          return k;
        }
        swapCandidates.forEach(function(sc) {
          sc.replacements.forEach(function(rep) {
            // Approximate cal impact: compare candidate's base kcal vs current slot budget.
            // If the candidate is way outside the slot budget (can't be scaled to fit), skip.
            var slotBudget = getSlotBudget(sc.p, sc.d, sc.s);
            var repBase = _baseKcalOf(rep.id);
            if (slotBudget > 0 && (repBase < slotBudget * 0.4 || repBase > slotBudget * 2.2)) return;

            // Temporarily apply swap
            var origSel = SEL[sk(sc.p, sc.d, sc.s)];
            SEL[sk(sc.p, sc.d, sc.s)] = rep.id;
            var otherKey = null, otherOrig = null;
            if (sc.isSharedSlot) {
              var otherP = sc.p === 'him' ? 'her' : 'him';
              otherKey = sk(otherP, sc.d, sc.s);
              otherOrig = SEL[otherKey];
              SEL[otherKey] = rep.id;
            }
            invalidateLeftoverCache();

            // Score by total trip waste
            var postSwapTripWaste = 0;
            _analyzeTripPackages(trip.days).forEach(function(px){ postSwapTripWaste += (px.waste || 0); });
            var postSwapInv14 = countInv14();
            var postSwapInv11 = countInv11();

            // Revert
            SEL[sk(sc.p, sc.d, sc.s)] = origSel;
            if (otherKey) SEL[otherKey] = otherOrig;
            invalidateLeftoverCache();

            if (postSwapInv14 > baselineInv14) return; // reject swaps that create INV14
            if (postSwapInv11 > baselineInv11) return; // reject swaps that create INV11 (gap < 2 between same-meal batches)
            if (postSwapTripWaste < bestTotalTripWaste) {
              bestTotalTripWaste = postSwapTripWaste;
              bestSwap = {sc:sc, rep:rep};
            }
          });
        });

        if (bestSwap) {
          var bsc = bestSwap.sc;
          SEL[sk(bsc.p, bsc.d, bsc.s)] = bestSwap.rep.id;
          weekData[activeWeek].ts[sk(bsc.p, bsc.d, bsc.s)] = now;
          if (bsc.isSharedSlot) {
            var otherP3 = bsc.p === 'him' ? 'her' : 'him';
            SEL[sk(otherP3, bsc.d, bsc.s)] = bestSwap.rep.id;
            weekData[activeWeek].ts[sk(otherP3, bsc.d, bsc.s)] = now;
          }
          invalidateLeftoverCache();
          // Recompute this pkg's waste post-swap for downstream resolved check
          var re = _analyzeTripPackages(trip.days).filter(function(px){return px.dbKey===pkg.dbKey;})[0];
          if (re) {
            pkg.totalNeeded = re.totalNeeded;
            pkg.packagesNeeded = re.packagesNeeded;
            pkg.waste = re.waste;
          }
          if (pkg.waste < 0.01) resolved = true;
        }
      }

      // ── Strategy B: Nudge ingredient amounts to fill packages ──
      if (!resolved && pkg.mealsUsing.length > 0) {
        var targetTotal = pkg.packagesNeeded * pkg.perPkg;
        var totalServings = 0;
        pkg.mealsUsing.forEach(function(mu){ totalServings += mu.servings; });
        var targetPerServing = targetTotal / totalServings;

        // Per-ingredient flex ranges
        // Strategy B predicts whether `applyTripFlexScaling` can resolve this
        // package's waste. Read flex ranges from the single source of truth
        // so this check matches what flex actually does. Ingredients not in
        // PKG_FLEX_CONFIG fall through to the conservative 0.25/0.25 default.
        var _bCfg = PKG_FLEX_CONFIG[pkg.dbKey] || {maxUp: 0.25, maxDown: 0.25};
        var maxUp = _bCfg.maxUp, maxDown = _bCfg.maxDown;

        var canNudge = true;
        pkg.mealsUsing.forEach(function(mu) {
          var diff = targetPerServing - mu.amt;
          if (diff > 0 && diff > mu.amt * maxUp) canNudge = false;
          if (diff < 0 && Math.abs(diff) > mu.amt * maxDown) canNudge = false;
          // Check calorie impact of nudge
          var db = NUTRI_DB[pkg.dbKey];
          var kcalChange = Math.abs(diff) * db.kcal;
          if (kcalChange > 75) canNudge = false;
        });

        if (canNudge && Math.abs(targetPerServing - (pkg.mealsUsing[0] && pkg.mealsUsing[0].amt || 0)) > 0.001) {
          // Apply the nudge — note: this adjusts the base recipe amounts via OVERRIDES
          // Since we only need to affect shopping totals, we don't modify the meal definition.
          // The shopping list builder already applies calorie adjustments per-slot which will
          // handle the flex. The waste is resolved at the shopping-list level by buildShoppingList.
          // So Strategy B is effectively a signal that the flex ranges CAN absorb the waste,
          // and the existing shopping optimizer will handle it.
          resolved = true;
        }
      }

      // ── Strategy C: Remove package meals if waste can't be resolved ──
      // Fires on ANY residual waste, but only removes a meal if the removal
      // STRICTLY reduces total trip waste. This means:
      //  - Unpairable singles get removed (removal reduces waste → zero).
      //  - Pairable meals with acceptable combined waste are preserved
      //    (removal would INCREASE waste → no action).
      if (!resolved && pkg.mealsUsing.length > 0) {
        // Find package meals that appear only once (no leftover pairing).
        // `isPaired` must match the Phase 3-A definition: totalServings>1 OR
        // crossPersonCook OR shared — otherwise shared same-day anchors
        // (servings=1 but totalServings=2) get wrongly treated as solo and
        // removed, shutting out every ground-meat recipe from the test.
        var singleUse = [];
        pkg.mealsUsing.forEach(function(mu) {
          var loInfo = leftovers[sk(mu.p, mu.d, mu.s)];
          var isPaired = !!(loInfo && !loInfo.isLeftover
            && (loInfo.servings > 1 || loInfo.totalServings > 1 || loInfo.crossPersonCook || loInfo.shared));
          var isLeftover = loInfo && loInfo.isLeftover;
          if (!isPaired && !isLeftover) singleUse.push(mu);
        });

        singleUse.forEach(function(mu) {
          var selKey = sk(mu.p, mu.d, mu.s);
          if (locked[selKey]) return;
          var isSharedSlot = bothPersons && SHARED_SCHEDULE[dk(mu.d, mu.s)] === 'shared';
          // Variety filter for lunch/dinner (breakfast exempt) — household-level.
          var p3cRecent = (mu.s==='lunch'||mu.s==='dinner') ? getRecentMealIds(DAYS.indexOf(mu.d), DAYS, 4) : [];
          var p3cLastWk = (mu.s==='lunch'||mu.s==='dinner') ? getLastWeekMealIds() : [];
          var candidates = getMealsForSlot(mu.s).filter(function(m) {
            if (!m[mu.p] || m.id === mu.mealId) return false;
            if (noRandomizeIds[m.id]) return false;
            if (isSharedSlot && (!m.him || !m.her)) return false;
            if (mealUsesPkg(m.id)) return false;
            if (mealUsesDiscouraged(m)) return false; // never swap TO coconut etc.
            if (mu.s==='lunch'||mu.s==='dinner') {
              if (p3cLastWk.indexOf(m.id) >= 0) return false;
              if (p3cRecent.indexOf(m.id) >= 0 && !isBatchLeftoverEligible(mu.d, mu.s, m.id)) return false;
            }
            return true;
          });
          if (!candidates.length) return;

          // Current trip waste (across ALL packages) as baseline
          var baselineTripWaste = 0;
          _analyzeTripPackages(trip.days).forEach(function(px){ baselineTripWaste += (px.waste || 0); });
          // Baseline INV14 — reject swaps that would raise it
          invalidateLeftoverCache();
          var baselineInv14_3c = countInv14();

          // Pick the candidate that minimizes TOTAL trip waste (not just kcal)
          var bestRep = null;
          var bestTripWaste = baselineTripWaste;
          candidates.forEach(function(c) {
            // Cheap base-kcal check — avoid the expensive calcTotals/day-balancer
            var cBase = 0;
            if (c.ingredients) c.ingredients.forEach(function(i){ var db=NUTRI_DB[i.dbKey]; if(db) cBase += db.kcal*(i.amt||0); });
            var slotBudget = getSlotBudget(mu.p, mu.d, mu.s);
            if (slotBudget > 0 && (cBase < slotBudget * 0.35 || cBase > slotBudget * 2.5)) return;
            var origSel = SEL[selKey];
            var otherKey = null, otherOrig = null;
            SEL[selKey] = c.id;
            if (isSharedSlot) {
              var otherP = mu.p === 'him' ? 'her' : 'him';
              otherKey = sk(otherP, mu.d, mu.s); otherOrig = SEL[otherKey]; SEL[otherKey] = c.id;
            }
            invalidateLeftoverCache();
            var newTripWaste = 0;
            _analyzeTripPackages(trip.days).forEach(function(px){ newTripWaste += (px.waste || 0); });
            var newInv14_3c = countInv14();
            SEL[selKey] = origSel;
            if (otherKey) SEL[otherKey] = otherOrig;
            invalidateLeftoverCache();
            // Only accept removal if it actually reduces total trip waste AND doesn't raise INV14
            if (newInv14_3c > baselineInv14_3c) return;
            if (newTripWaste < bestTripWaste - 0.01) {
              bestTripWaste = newTripWaste;
              bestRep = c;
            }
          });

          if (bestRep) {
            SEL[selKey] = bestRep.id;
            weekData[activeWeek].ts[selKey] = now;
            if (isSharedSlot) {
              var otherP4 = mu.p === 'him' ? 'her' : 'him';
              SEL[sk(otherP4, mu.d, mu.s)] = bestRep.id;
              weekData[activeWeek].ts[sk(otherP4, mu.d, mu.s)] = now;
            }
            invalidateLeftoverCache();
          }
        });
      }
    });
    } // end Phase 3 convergence loop
  });

  // ── PHASE 4: Enforce shared schedule (runs absolutely last) ──
  // Cache refresh: Phase 3 may have mutated SEL; Phase 4 calls
  // isBatchLeftoverEligible which reads the leftover map.
  invalidateLeftoverCache();
  days.forEach(function(d) {
    ['breakfast','lunch','dinner'].forEach(function(s) {
      var himId = getMealId('him', d, s);
      var herId = getMealId('her', d, s);
      if (SHARED_SCHEDULE[dk(d,s)] === 'shared') {
        if (himId && himId !== herId) {
          // Skip if her's slot is locked (Set or eat-out). Her's meal-ID
          // stays as the user picked it; sharing intent is honored only on
          // un-Set slots.
          if (isLockedForRandomize(sk('her',d,s))) return;
          SEL[sk('her',d,s)] = himId;
          weekData[activeWeek].ts[sk('her',d,s)] = now;
          invalidateLeftoverCache();
        }
      } else if (himId && himId === herId && !MANUAL_SET[sk('him',d,s)] && !MANUAL_SET[sk('her',d,s)]) {
        // Variety filter for lunch/dinner (breakfast exempt) — household-level.
        var p4Recent = (s==='lunch'||s==='dinner') ? getRecentMealIds(DAYS.indexOf(d), DAYS, 4) : [];
        var p4LastWk = (s==='lunch'||s==='dinner') ? getLastWeekMealIds() : [];
        var candidates = getMealsForSlot(s).filter(function(m){
          if (!m.her || m.id === himId) return false;
          if (mealUsesPkg(m.id)) return false;
          if (mealUsesDiscouraged(m)) return false; // never swap TO coconut etc.
          if (noRandomizeIds[m.id]) return false;
          if (s==='lunch'||s==='dinner') {
            if (p4LastWk.indexOf(m.id) >= 0) return false;
            if (p4Recent.indexOf(m.id) >= 0 && !isBatchLeftoverEligible(d, s, m.id)) return false;
          }
          return true;
        });
        if (candidates.length) {
          var pick = randomPick(candidates);
          SEL[sk('her',d,s)] = pick.id;
          weekData[activeWeek].ts[sk('her',d,s)] = now;
          invalidateLeftoverCache();
        }
      }
    });
  });

}

// ── Shopping render ─────────────────────────────────────────
function getShopPersons(){return shopPerson==='both'?['him','her']:shopPerson==='him'?['him']:['her'];}
function setShopTrip(t){shopTrip=t;renderShop();}
function setShopPerson(p){shopPerson=p;renderShop();}
function toggleCustomMeal(d,s){
  const persons=getShopPersons();
  const allChecked=persons.every(function(p){return !!CUSTOM_SHOP_SEL[sk(p,d,s)];});
  persons.forEach(function(p){
    const k=sk(p,d,s);
    if(allChecked)delete CUSTOM_SHOP_SEL[k];
    else CUSTOM_SHOP_SEL[k]=true;
  });
  renderShop();
}
function toggleCustomDay(d){
  const persons=getShopPersons();
  let allChecked=true;
  persons.forEach(function(p){
    SLOTS.forEach(function(s){
      if(s==='late_snack')return;
      const id=getMealId(p,d,s);if(!id)return;
      if(!CUSTOM_SHOP_SEL[sk(p,d,s)])allChecked=false;
    });
  });
  persons.forEach(function(p){
    SLOTS.forEach(function(s){
      if(s==='late_snack')return;
      const id=getMealId(p,d,s);if(!id)return;
      const k=sk(p,d,s);
      if(allChecked)delete CUSTOM_SHOP_SEL[k];
      else CUSTOM_SHOP_SEL[k]=true;
    });
  });
  renderShop();
}
function customShopSelectAll(){
  const persons=getShopPersons();
  persons.forEach(function(p){DAYS.forEach(function(d){SLOTS.forEach(function(s){
    if(s==='late_snack')return;
    const id=getMealId(p,d,s);if(!id)return;
    CUSTOM_SHOP_SEL[sk(p,d,s)]=true;
  });});});
  renderShop();
}
function customShopClearAll(){CUSTOM_SHOP_SEL={};CUSTOM_RECIPE_SEL={};CUSTOM_PLAN_SEL={};renderShop();}
function toggleCustomRecipe(mealId,p){
  const k=mealId+'_'+p;
  CUSTOM_RECIPE_SEL[k]=!CUSTOM_RECIPE_SEL[k];
  if(!CUSTOM_RECIPE_SEL[k])delete CUSTOM_RECIPE_SEL[k];
  renderShop();
}
function clearCustomRecipes(){CUSTOM_RECIPE_SEL={};renderShop();}
// CUSTOM_PLAN_SEL: select from this week's actual plan. Reads balanced
// (post-pipeline) amounts via getBalancedSlotIngredients, summed across
// every (p,d,s) where the meal appears. For batch cooks, this naturally
// captures the full cook quantity (cook anchor + leftovers split kcal-
// proportionally across all portions sums to the batch total). Dedupes
// against CUSTOM_SHOP_SEL so the same (p,d,s) isn't double-counted.
function togglePlanMeal(mealId){
  CUSTOM_PLAN_SEL[mealId]=!CUSTOM_PLAN_SEL[mealId];
  if(!CUSTOM_PLAN_SEL[mealId])delete CUSTOM_PLAN_SEL[mealId];
  renderShop();
}
function clearPlanMeals(){CUSTOM_PLAN_SEL={};renderShop();}
function toggleCustomRecipeBoth(mealId){
  const hk=mealId+'_him',rk=mealId+'_her';
  const bothOn=!!CUSTOM_RECIPE_SEL[hk]&&!!CUSTOM_RECIPE_SEL[rk];
  if(bothOn){delete CUSTOM_RECIPE_SEL[hk];delete CUSTOM_RECIPE_SEL[rk];}
  else{CUSTOM_RECIPE_SEL[hk]=true;CUSTOM_RECIPE_SEL[rk]=true;}
  renderShop();
}
function toggleCheck(k){
  CHECKS[k]=!CHECKS[k];if(!CHECKS[k])delete CHECKS[k];
  renderShop();
}
function clearAll(){Object.keys(CHECKS).forEach(function(k){if(k.indexOf(shopTrip+'_')===0)delete CHECKS[k]});renderShop();}
function checkAll(){
  const grouped=buildShoppingList(shopTrip,shopPerson);
  Object.keys(grouped).forEach(function(cat){grouped[cat].forEach(function(item){CHECKS[shopTrip+'_'+cat+'_'+item.name.toLowerCase()]=true});});
  renderShop();
}
function checkCategory(cat){
  const grouped=buildShoppingList(shopTrip,shopPerson);
  if(!grouped[cat])return;
  grouped[cat].forEach(function(item){CHECKS[shopTrip+'_'+cat+'_'+item.name.toLowerCase()]=true;});
  renderShop();
}
function renderShop(){
  const shopEl=document.getElementById('shopView');
  const prevHeight=shopEl.offsetHeight;
  shopEl.style.minHeight=prevHeight+'px';
  const scrollY=window.scrollY;
  // Save recipe list scroll position
  const recipeListEl=shopEl.querySelector('.cs-recipe-list');
  const recipeScrollTop=recipeListEl?recipeListEl.scrollTop:0;
  const grouped=buildShoppingList(shopTrip,shopPerson);
  const totalItems=Object.keys(grouped).reduce(function(a,c){return a+grouped[c].length},0);
  const checkedCount=Object.keys(CHECKS).filter(function(k){return k.indexOf(shopTrip+'_')===0&&CHECKS[k]}).length;
  const sortedCats=Object.keys(grouped).sort(function(a,b){
    const isLowA=a.indexOf('If Low')===0, isLowB=b.indexOf('If Low')===0;
    if(isLowA&&!isLowB)return 1; // If Low always last
    if(!isLowA&&isLowB)return -1;
    if(isLowA&&isLowB)return a<b?-1:1; // alphabetical within If Low
    const ai=CAT_ORDER.indexOf(a),bi=CAT_ORDER.indexOf(b);
    return(ai<0?999:ai)-(bi<0?999:bi);
  });

// ── WEEK MANAGEMENT ─────────────────────────────────────────
var activeWeek='this'; // 'last', 'this', or 'next'
var weekData={last:{sel:{},monday:''},this:{sel:{},monday:''},next:{sel:{},monday:''}};

function getMondayStr(d){const dt=new Date(d+'T12:00:00');const diff=dt.getDay()===0?-6:1-dt.getDay();dt.setDate(dt.getDate()+diff);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function fmtWeekLabel(mondayStr){const d=new Date(mondayStr+'T12:00:00');const end=new Date(d);end.setDate(d.getDate()+6);const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[d.getMonth()]+' '+d.getDate()+' – '+mo[end.getMonth()]+' '+end.getDate();}
function todayMonday(){const d=new Date();return getMondayStr(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
function nextMonday(){const d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);}
function lastMonday(){const d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);}

function loadWeeks(){
  const saved=lsGet('mealPlannerWeekData',null);
  if(saved)weekData=saved;
  
  // Ensure all week slots exist (old localStorage may not have 'last')
  if(!weekData['last'])weekData['last']={sel:{},monday:''};
  if(!weekData['this'])weekData['this']={sel:{},monday:''};
  if(!weekData['next'])weekData['next']={sel:{},monday:''};

  // Auto-rollover: check if the calendar has moved forward
  const currentMonday=todayMonday();
  const thisMonday=weekData['this'].monday||'';
  const nextMon=weekData['next'].monday||'';
  
  if(thisMonday && thisMonday!==currentMonday){
    // The real-world week has changed
    if(nextMon===currentMonday){
      // Shift: last <- this (full state), this <- next (with schedule copied forward), next <- empty
      const prevSchedule=JSON.parse(JSON.stringify(weekData['this'].sharedSchedule||{}));
      weekData['last']=JSON.parse(JSON.stringify(weekData['this']));
      weekData['last'].monday=weekData['this'].monday;
      weekData['this']=JSON.parse(JSON.stringify(weekData['next']));
      weekData['this'].monday=currentMonday;
      weekData['this'].sharedSchedule=prevSchedule; // carry schedule forward
      weekData['next']={sel:{},monday:nextMonday(),sharedSchedule:JSON.parse(JSON.stringify(prevSchedule))};
    } else {
      // More than a week has passed, or dates don't match — reset all
      weekData['last']={sel:{},monday:lastMonday()};
      weekData['this']={sel:{},monday:currentMonday};
      weekData['next']={sel:{},monday:nextMonday()};
    }
    // Clear manual overrides for the new week
    Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
    Object.keys(EAT_OUT).forEach(function(k){delete EAT_OUT[k];});
    Object.keys(OVERRIDES).forEach(function(k){delete OVERRIDES[k];});
    Object.keys(LATE_SNACK).forEach(function(k){delete LATE_SNACK[k];});
    Object.keys(MANUAL_SET).forEach(function(k){delete MANUAL_SET[k];});
    // Save the rollover
    lsSet('mealPlannerWeekData',weekData);
  }

  // Ensure monday stamps are set
  if(!weekData['last'].monday)weekData['last'].monday=lastMonday();
  if(!weekData['this'].monday)weekData['this'].monday=currentMonday;
  if(!weekData['next'].monday)weekData['next'].monday=nextMonday();
  
  // Load active week's state into globals
  loadWeekState(activeWeek);

  // Migrate old shared schedule from separate localStorage into this week's weekData
  if(!weekData[activeWeek].sharedSchedule){
    const ss=lsGet('mealPlannerSharedSchedule',null);if(ss)weekData[activeWeek].sharedSchedule=ss;
  }
}
// Stamp per-key timestamps for any keys that changed since the last persist.
// Used by saveWeeks for lateSnack + sharedSchedule (which lacked timestamps in
// v3 and so had one-way merge — edits couldn't propagate). Compares the prior
// stored snapshot in weekData[w] against the current global, stamps any
// added/changed/removed key with `now`. For deletions we still stamp so the
// remote knows "this key was deleted at time X" (reconciled in mergeSyncData).
function _stampDiffTs(prior, curr, tsMap, now){
  var allKeys={};
  Object.keys(prior||{}).forEach(function(k){allKeys[k]=true;});
  Object.keys(curr||{}).forEach(function(k){allKeys[k]=true;});
  Object.keys(allKeys).forEach(function(k){
    var p=prior?prior[k]:undefined, c=curr?curr[k]:undefined;
    var changed=(p===undefined&&c!==undefined) || (c===undefined&&p!==undefined)
              || (typeof p==='object' ? JSON.stringify(p)!==JSON.stringify(c) : p!==c);
    if(changed) tsMap[k]=now;
  });
}
function saveWeeks(){
  var now=Date.now();
  var w=weekData[activeWeek];
  // Diff-stamp lateSnack and sharedSchedule BEFORE we overwrite the prior
  // snapshot. Each per-key timestamp records WHEN that key last changed,
  // enabling per-key last-write-wins merge across phones.
  if(!w.lateSnackTs) w.lateSnackTs={};
  if(!w.sharedScheduleTs) w.sharedScheduleTs={};
  _stampDiffTs(w.lateSnack, LATE_SNACK, w.lateSnackTs, now);
  _stampDiffTs(w.sharedSchedule, SHARED_SCHEDULE, w.sharedScheduleTs, now);
  // Bundle per-week state into weekData
  w.sel=JSON.parse(JSON.stringify(SEL));
  w.skipped=JSON.parse(JSON.stringify(SKIPPED));
  w.eatOut=JSON.parse(JSON.stringify(EAT_OUT));
  w.overrides=JSON.parse(JSON.stringify(OVERRIDES));
  w.lateSnack=JSON.parse(JSON.stringify(LATE_SNACK));
  w.manualSet=JSON.parse(JSON.stringify(MANUAL_SET));
  w.sharedSchedule=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
  // 2026-05-03: leftoverLinks is the LEFTOVER_LINKS alias; mutations already
  // persist via this reference. Just ensure the field is present.
  if(!w.leftoverLinks) w.leftoverLinks = LEFTOVER_LINKS;
  weekData['last'].monday=lastMonday();
  weekData['this'].monday=todayMonday();
  weekData['next'].monday=nextMonday();
  lsSet('mealPlannerWeekData',weekData);
}
function loadWeekState(w){
  // Load all per-week state from weekData into globals
  const wd=weekData[w]||{};
  function loadInto(target,source){Object.keys(target).forEach(function(k){delete target[k];});Object.keys(source||{}).forEach(function(k){target[k]=source[k];});}
  loadInto(SEL,wd.sel);
  loadInto(SKIPPED,wd.skipped);
  loadInto(EAT_OUT,wd.eatOut);
  loadInto(OVERRIDES,wd.overrides);
  loadInto(LATE_SNACK,wd.lateSnack);
  loadInto(MANUAL_SET,wd.manualSet);
  loadInto(SHARED_SCHEDULE,wd.sharedSchedule);
  initSharedSchedule(); // ensure defaults if empty
  rebindLeftoverLinks(); // 2026-05-03: bind LEFTOVER_LINKS to wd.leftoverLinks
}
function switchWeek(w){
  saveWeeks();
  activeWeek=w;
  loadWeekState(w);
  renderWeekBar();renderDayTabs();renderMeals();
  if(topTab==='shop')renderShop();
}
function renderWeekBar(){
  const bar=document.getElementById('weekBar');if(!bar)return;
  const thisLabel=fmtWeekLabel(todayMonday());

  function pill(w,label){
    const isOn=activeWeek===w;
    return '<div class="week-pill'+(isOn?' on on-'+theme:'')+'" onclick="switchWeek(\''+w+'\')">'+label+'</div>';
  }
  bar.innerHTML='<div class="week-toggle">'
    +pill('last','Last')
    +pill('this',thisLabel)
    +pill('next','Next')
    +'</div>';
}

// ── CLOUD SYNC (GitHub Gist) ────────────────────────────────
var GIST_API='https://api.github.com/gists';
var syncId=null;var syncToken=null;var syncStatus='';
function loadSyncId(){
  syncId=lsGetRaw('mealPlannerSyncId');
  syncToken=lsGetRaw('mealPlannerSyncToken');
}
function saveSyncIdLocal(id){syncId=id;lsSetRaw('mealPlannerSyncId',id);}
function saveSyncToken(token){syncToken=token;lsSetRaw('mealPlannerSyncToken',token);}
function setSyncStatus(msg,type){const c=type==='err'?'#DC2626':type==='ok'?'#059669':'var(--gray)';syncStatus='<span style="color:'+c+'">'+msg+'</span>';const el=document.getElementById('syncStatusMsg');if(el)el.innerHTML=syncStatus;}
function gistHeaders(){return {'Content-Type':'application/json','Authorization':'token '+syncToken};}
function getSyncPayload(){
  // version:4 (2026-04-26) — added ADJ_TARGETS, per-key timestamps on
  // customMeals/customIngredients/EAT_OUT_DB entries (via `_ts`), per-week
  // `lateSnackTs` and `sharedScheduleTs` maps for last-write-wins merge.
  // v3 payloads still merge cleanly (treated as ts=0 — local v4 entries with
  // real timestamps win). See mergeSyncData for migration handling.
  return {
    weekData:weekData,
    customMeals:customMeals,
    customIngredients:customIngredients,
    eatOutDB:EAT_OUT_DB,
    calBase:CAL_BASE,
    proTarget:PRO_TARGET,
    adjTargets:ADJ_TARGETS,
    adjTargetsTs:ADJ_TARGETS_TS,
    version:4
  };
}
function mergeSyncData(remote){
  // v3 → v4 migration: pre-v4 payloads have no per-entry timestamps. Treat
  // their entries as ts=0 so any local v4 entries with real timestamps win
  // automatically. New entries from v3 still merge in (ts=0 vs ts=undefined
  // locally is "remote has data, local doesn't" → take remote).
  var remoteV = remote.version || 3;
  var remoteIsLegacy = remoteV < 4;

  // Week data: merge by MONDAY DATE, not by position name.
  // Build a map of remote weeks keyed by monday date.
  if(remote.weekData){
    const remoteByDate={};
    ['last','this','next'].forEach(function(w){
      if(remote.weekData[w]&&remote.weekData[w].monday){
        remoteByDate[remote.weekData[w].monday]=remote.weekData[w];
      }
    });
    // Fuzzy match: if remote date is off by 1 day (timezone bug migration),
    // also index under the corrected date
    Object.keys(remoteByDate).forEach(function(dateStr){
      const d=new Date(dateStr+'T12:00:00');
      // Check day before and after
      for(let offset=-1;offset<=1;offset++){
        if(offset===0)continue;
        const adj=new Date(d);adj.setDate(adj.getDate()+offset);
        const adjStr=adj.getFullYear()+'-'+String(adj.getMonth()+1).padStart(2,'0')+'-'+String(adj.getDate()).padStart(2,'0');
        if(!remoteByDate[adjStr])remoteByDate[adjStr]=remoteByDate[dateStr];
      }
    });
    // For each local week, find the matching remote week by date and merge
    ['last','this','next'].forEach(function(w){
      if(!weekData[w])weekData[w]={sel:{},ts:{},monday:''};
      const localMonday=weekData[w].monday;
      if(!localMonday)return; // no date set yet, skip
      const remoteWeek=remoteByDate[localMonday];
      if(!remoteWeek)return; // no matching remote week for this date

      if(!weekData[w].ts)weekData[w].ts={};
      const remoteSel=remoteWeek.sel||{};
      const remoteTs=remoteWeek.ts||{};
      const localSel=weekData[w].sel;
      const localTs=weekData[w].ts;

      // All keys from both sides
      const allKeys={};
      Object.keys(remoteSel).forEach(function(k){allKeys[k]=true;});
      Object.keys(localSel).forEach(function(k){allKeys[k]=true;});

      // Bundled per-week state from remote
      const remoteState={skipped:remoteWeek.skipped||{},eatOut:remoteWeek.eatOut||{},overrides:remoteWeek.overrides||{},lateSnack:remoteWeek.lateSnack||{},manualSet:remoteWeek.manualSet||{}};
      if(!weekData[w].skipped)weekData[w].skipped={};
      if(!weekData[w].eatOut)weekData[w].eatOut={};
      if(!weekData[w].overrides)weekData[w].overrides={};
      if(!weekData[w].lateSnack)weekData[w].lateSnack={};
      if(!weekData[w].manualSet)weekData[w].manualSet={};

      Object.keys(allKeys).forEach(function(k){
        const localTime=localTs[k]||0;
        const remoteTime=remoteTs[k]||0;
        // Sync lock: when LOCK_MANUAL_SLOTS is on, skip remote overwrite if
        // local has MANUAL_SET[k]=true (the "Set" pill). Local user picked
        // this slot intentionally — sync shouldn't change it without an
        // explicit Force Push from the other phone. Note: only protects from
        // INCOMING overwrites; the local SEL still pushes outward normally
        // (the other phone will see this slot's timestamp and apply LWW).
        if(LOCK_MANUAL_SLOTS && weekData[w].manualSet && weekData[w].manualSet[k]) return;
        if(remoteTime>localTime){
          localSel[k]=remoteSel[k];
          localTs[k]=remoteTime;
          if(remoteState.skipped[k]!==undefined) weekData[w].skipped[k]=remoteState.skipped[k]; else delete weekData[w].skipped[k];
          if(remoteState.eatOut[k]!==undefined) weekData[w].eatOut[k]=remoteState.eatOut[k]; else delete weekData[w].eatOut[k];
          if(remoteState.overrides[k]!==undefined) weekData[w].overrides[k]=remoteState.overrides[k]; else delete weekData[w].overrides[k];
          if(remoteState.manualSet[k]!==undefined) weekData[w].manualSet[k]=remoteState.manualSet[k]; else delete weekData[w].manualSet[k];
        }
      });
      // Late snack: per-key last-write-wins via remoteWeek.lateSnackTs (v4+).
      // v3 remote has no ts → treated as ts=0 so any local v4 timestamps win.
      const remoteLsTs=remoteWeek.lateSnackTs||{};
      if(!weekData[w].lateSnackTs)weekData[w].lateSnackTs={};
      var lsKeys={};
      Object.keys(remoteState.lateSnack).forEach(function(k){lsKeys[k]=true;});
      Object.keys(weekData[w].lateSnack).forEach(function(k){lsKeys[k]=true;});
      Object.keys(lsKeys).forEach(function(k){
        var lt=weekData[w].lateSnackTs[k]||0;
        var rt=remoteIsLegacy?0:(remoteLsTs[k]||0);
        if(rt>lt){
          if(remoteState.lateSnack[k]!==undefined) weekData[w].lateSnack[k]=remoteState.lateSnack[k];
          else delete weekData[w].lateSnack[k];
          weekData[w].lateSnackTs[k]=rt;
        }
      });

      weekData[w].sel=localSel;
      weekData[w].ts=localTs;
      // Do NOT overwrite local monday — local rollover is authoritative

      // Shared schedule: per-key LWW via remoteWeek.sharedScheduleTs (v4+).
      // Lets un-shares propagate (was one-way add in v3).
      const remSched=remoteWeek.sharedSchedule||{};
      const remSchedTs=remoteWeek.sharedScheduleTs||{};
      if(!weekData[w].sharedSchedule)weekData[w].sharedSchedule={};
      if(!weekData[w].sharedScheduleTs)weekData[w].sharedScheduleTs={};
      var ssKeys={};
      Object.keys(remSched).forEach(function(k){ssKeys[k]=true;});
      Object.keys(weekData[w].sharedSchedule).forEach(function(k){ssKeys[k]=true;});
      Object.keys(ssKeys).forEach(function(k){
        var lt=weekData[w].sharedScheduleTs[k]||0;
        var rt=remoteIsLegacy?0:(remSchedTs[k]||0);
        if(rt>lt){
          if(remSched[k]!==undefined) weekData[w].sharedSchedule[k]=remSched[k];
          else delete weekData[w].sharedSchedule[k];
          weekData[w].sharedScheduleTs[k]=rt;
        }
      });
    });
  }
  
  // Calorie and protein targets: take remote if present
  if(remote.calBase){CAL_BASE=remote.calBase;lsSet('mealPlannerCalBase',CAL_BASE);}
  if(remote.proTarget){PRO_TARGET=remote.proTarget;lsSet('mealPlannerProTarget',PRO_TARGET);}

  // Custom meals: per-meal last-write-wins via entry._ts (v4+). Remote with
  // newer ts overwrites local; v3 remote has no _ts so treated as ts=0
  // (local v4 entries always win). Adds new meals from either side.
  if(remote.customMeals){
    Object.keys(remote.customMeals).forEach(function(k){
      var rEntry=remote.customMeals[k];
      var lEntry=customMeals[k];
      var rt=remoteIsLegacy?0:(rEntry&&rEntry._ts||0);
      var lt=lEntry&&lEntry._ts||0;
      if(!lEntry || rt>lt){customMeals[k]=rEntry;}
    });
  }

  // Custom ingredients: per-key last-write-wins via entry._ts (v4+).
  if(remote.customIngredients){
    Object.keys(remote.customIngredients).forEach(function(k){
      var rEntry=remote.customIngredients[k];
      var lEntry=customIngredients[k];
      var rt=remoteIsLegacy?0:(rEntry&&rEntry._ts||0);
      var lt=lEntry&&lEntry._ts||0;
      if(!lEntry || rt>lt){
        customIngredients[k]=rEntry;
        NUTRI_DB[k]=rEntry;
      }
    });
  }

  // Eat-out DB: per-entry last-write-wins via entry._ts (v4+). Identity is
  // name+restaurant. Remote newer ts overwrites local entry's macros.
  if(remote.eatOutDB){
    remote.eatOutDB.forEach(function(rEntry){
      var idx=EAT_OUT_DB.findIndex(function(e){return e.name===rEntry.name&&e.restaurant===rEntry.restaurant;});
      var rt=remoteIsLegacy?0:(rEntry._ts||0);
      if(idx<0){EAT_OUT_DB.push(rEntry);return;}
      var lEntry=EAT_OUT_DB[idx];
      var lt=lEntry._ts||0;
      if(rt>lt){EAT_OUT_DB[idx]=rEntry;}
    });
  }

  // ADJ_TARGETS: per-pk(p,d) last-write-wins. New in v4. v3 remote omits
  // entirely → no merge needed (preserves local).
  if(remote.adjTargets){
    var rAdj=remote.adjTargets, rAdjTs=remote.adjTargetsTs||{};
    var adjKeys={};
    Object.keys(rAdj).forEach(function(k){adjKeys[k]=true;});
    Object.keys(ADJ_TARGETS).forEach(function(k){adjKeys[k]=true;});
    Object.keys(adjKeys).forEach(function(k){
      var lt=ADJ_TARGETS_TS[k]||0;
      var rt=remoteIsLegacy?0:(rAdjTs[k]||0);
      if(rt>lt){
        if(rAdj[k]!==undefined) ADJ_TARGETS[k]=rAdj[k]; else delete ADJ_TARGETS[k];
        ADJ_TARGETS_TS[k]=rt;
      }
    });
    saveAdjTargets();
  }
  
  // Shared schedule now per-week in weekData — merged with other bundled state above

  // Reload active week's state into globals
  loadWeekState(activeWeek);
  
  saveWeeks();saveCustomMeals();saveCustomIngredients();saveEatOutDB();
  injectCustomMeals();renderWeekBar();
}

function createSync(){
  if(!syncToken){setSyncStatus('Enter your GitHub token first.','err');return;}
  setSyncStatus('Creating sync...','loading');
  saveWeeks();
  const payload=getSyncPayload();
  fetch(GIST_API,{method:'POST',headers:gistHeaders(),body:JSON.stringify({
    description:'Meal Planner Sync',public:false,
    files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
  })}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(d){
    if(!d.id){setSyncStatus('Could not create.','err');return;}
    saveSyncIdLocal(d.id);
    setSyncStatus('Sync created! Share the Gist ID with your partner.','ok');
    renderSyncView();
  }).catch(function(e){setSyncStatus('Error: '+e.message,'err');});
}
function pushSync(){
  if(!syncId||!syncToken)return;
  saveWeeks();
  setSyncStatus('Syncing...','loading');
  // Pull first, merge, then push
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    const content=gist.files['meal-planner-sync.json'].content;
    const remote=JSON.parse(content);
    mergeSyncData(remote);
    saveWeeks(); // Re-save to ensure correct monday dates after merge
    const payload=getSyncPayload();
    return fetch(GIST_API+'/'+syncId,{method:'PATCH',headers:gistHeaders(),body:JSON.stringify({
      files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
    })});
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('Synced!','ok');renderMeals();
  }).catch(function(e){setSyncStatus('Sync failed: '+e.message,'err');});
}
// Force push: overwrite remote with current local state, bumping ALL
// timestamps to "now" so the next pull on the other phone sees this version
// as the newest everywhere. Use case: "I want both phones on this exact
// state, ignore anything else." Confirmation prompt prevents accidental
// data loss if the user clicks instead of regular Sync.
function forcePushSync(){
  if(!syncId||!syncToken)return;
  if(!confirm('Force Push will overwrite the remote sync with your CURRENT local state, bumping every timestamp to now. The other phone\'s subsequent Pull will replace its state with yours. Continue?'))return;
  setSyncStatus('Force-pushing...','loading');
  var now=Date.now();
  // Bump every per-key timestamp so nothing on remote can win on subsequent merge.
  ['last','this','next'].forEach(function(w){
    if(!weekData[w])return;
    if(!weekData[w].ts)weekData[w].ts={};
    Object.keys(weekData[w].sel||{}).forEach(function(k){weekData[w].ts[k]=now;});
    if(!weekData[w].lateSnackTs)weekData[w].lateSnackTs={};
    Object.keys(weekData[w].lateSnack||{}).forEach(function(k){weekData[w].lateSnackTs[k]=now;});
    if(!weekData[w].sharedScheduleTs)weekData[w].sharedScheduleTs={};
    Object.keys(weekData[w].sharedSchedule||{}).forEach(function(k){weekData[w].sharedScheduleTs[k]=now;});
  });
  Object.keys(ADJ_TARGETS).forEach(function(k){ADJ_TARGETS_TS[k]=now;});
  Object.keys(customMeals).forEach(function(k){customMeals[k]._ts=now;});
  Object.keys(customIngredients).forEach(function(k){customIngredients[k]._ts=now;});
  EAT_OUT_DB.forEach(function(e){e._ts=now;});
  saveWeeks();saveAdjTargets();saveCustomMeals();saveCustomIngredients();saveEatOutDB();
  // Upload directly — no pull/merge first. This DOES drop any concurrent
  // remote edits made after our last pull. Confirmation above made the
  // user explicitly accept that.
  var payload=getSyncPayload();
  fetch(GIST_API+'/'+syncId,{method:'PATCH',headers:gistHeaders(),body:JSON.stringify({
    files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
  })}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('Force-pushed! Other device should Pull to receive.','ok');
  }).catch(function(e){setSyncStatus('Force push failed: '+e.message,'err');});
}
function pullSync(){
  if(!syncId||!syncToken)return;
  setSyncStatus('Pulling...','loading');
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    const content=gist.files['meal-planner-sync.json'].content;
    const data=JSON.parse(content);
    mergeSyncData(data);
    setSyncStatus('Pulled!','ok');renderMeals();renderSyncView();
  }).catch(function(e){setSyncStatus('Pull failed: '+e.message,'err');});
}
function connectSync(){
  const tokenEl=document.getElementById('syncTokenInput');
  const idEl=document.getElementById('syncIdInput');
  if(tokenEl&&tokenEl.value.trim()) saveSyncToken(tokenEl.value.trim());
  if(idEl&&idEl.value.trim()) saveSyncIdLocal(idEl.value.trim());
  if(!syncToken){setSyncStatus('Enter your GitHub token.','err');renderSyncView();return;}
  if(!syncId){setSyncStatus('Enter a Gist ID or create a new sync.','err');renderSyncView();return;}
  // Verify the connection works
  setSyncStatus('Connecting...','loading');
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    if(!gist.files||!gist.files['meal-planner-sync.json']){throw new Error('Not a Meal Planner sync gist');}
    setSyncStatus('Connected!','ok');renderSyncView();
  }).catch(function(e){
    syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(x){}
    setSyncStatus('Connection failed: '+e.message,'err');renderSyncView();
  });
}
function clearSyncId(){syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(e){}setSyncStatus('Disconnected. Token saved.','ok');renderSyncView();}
function copyId(){if(syncId){navigator.clipboard.writeText(syncId).then(function(){setSyncStatus('ID copied!','ok');});}}
function shareSync(){

}

  }

  // Sync-overwrite lock toggle (per-device pref, not synced).

    +'</div>';
  html+='</div>';
  el.innerHTML=html;
}

// ── CUSTOM RECIPE MANAGER ───────────────────────────────────
var customMeals={};var editingRecipeId=null;var selectedSlots=[];var selectedRecipePersons='both';
// Persisted form state across tab switches
var _rfSaved={label:'',url:'',steps:'',ingrRows:[]};

function loadCustomMeals(){customMeals=lsGet('mealPlannerCustom',{});injectCustomMeals();}
function saveCustomMeals(){lsSet('mealPlannerCustom',customMeals);}
function injectCustomMeals(){
  for(let i=MEALS.length-1;i>=0;i--){if(MEALS[i]._custom)MEALS.splice(i,1);}
  Object.keys(customMeals).forEach(function(id){
    const m=Object.assign({},customMeals[id],{_custom:true});
    expandMealIngredients(m);buildColorizedSteps(m);
    MEALS.push(m);
  });
}
function customMealId(label){return 'custom_'+label.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,40)+'_'+Date.now();}
function parseStepsLines(text){
  if(!text||!text.trim())return[];
  return text.trim().split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
}
function buildCustomMeal(){
  const label=document.getElementById('rf_label').value.trim();
  if(!label){alert('Please enter a recipe name.');return null;}
  if(!selectedSlots.length){alert('Please select at least one slot.');return null;}
  const url=document.getElementById('rf_url').value.trim();
  const sharedSteps=parseStepsLines(document.getElementById('rf_steps').value);
  const ingr=collectFormIngredients();
  if(!ingr.length){alert('Please add at least one ingredient.');return null;}
  const hasAmt=ingr.some(function(i){return(i.amt||0)>0;});
  if(!hasAmt){alert('Please add amounts for at least one ingredient.');return null;}
  // Auto-compute fv from veg + fruit ingredients
  let vegCups=0,fruitCups=0;
  ingr.forEach(function(i){
    const db=NUTRI_DB[i.dbKey];
    if(!db)return;
    if(i.role==='veg'){
      if(db.unit==='cup')vegCups+=i.amt;
      else if(db.unit==='each'&&db.cupsEach)vegCups+=db.cupsEach*i.amt;
    }
    if(i.role==='fruit'){
      if(db.unit==='cup')fruitCups+=i.amt;
      else if(db.unit==='each'&&db.cupsEach)fruitCups+=db.cupsEach*i.amt;
      else if(db.unit==='each')fruitCups+=1*i.amt; // fallback: 1 fruit ≈ 1c
    }
  });
  let fv='';
  if(vegCups>0)fv+=vegCups+'c veg';
  if(fruitCups>0)fv+=(fv?' + ':'')+fruitCups+'c fruit';
  const note=document.getElementById('rf_note').value.trim();
  const noLeftover=document.getElementById('rf_noLeftover').value==='yes';
  const him=selectedRecipePersons==='her'?null:{fv:fv};
  const her=selectedRecipePersons==='him'?null:{fv:fv};
  const meal={id:editingRecipeId||customMealId(label),label:label,slots:selectedSlots.slice(),steps:sharedSteps,him:him,her:her,ingredients:ingr,_custom:true};
  if(url)meal.sourceUrl=url;
  if(note)meal.note=note;
  if(noLeftover)meal.noLeftover=true;
  return meal;
}

// Collect I() ingredients from form rows
function collectFormIngredients(){
  const rows=document.querySelectorAll('.rf-ingr-row');
  const result=[];
  rows.forEach(function(row){
    const dbKey=row.querySelector('.rf-ingr-select').value;
    const amt=parseFloat(row.querySelector('.rf-ingr-amt').value)||0;
    const role=row.querySelector('.rf-ingr-role').value||'fixed';
    if(!dbKey||amt<=0)return;
    result.push(I(dbKey, amt, role));
  });
  return result;
}

  const optHtml=buildFilteredOptions(role||'protein',dbKey||'');
  const db=dbKey?NUTRI_DB[dbKey]:null;

  }).join('');
  const dotColor=ROLE_COLORS[role||'protein']||'var(--text-mid)';
  const rowHtml='<div class="rf-ingr-row">'
    +'<span class="rf-role-dot" style="background:'+dotColor+'"></span>'
    +'<select class="rf-ingr-role" onchange="onRoleChange(this)">'+roleOpts+'</select>'
    +'<select class="rf-ingr-select" onchange="onIngrSelectChange(this)">'+optHtml+'</select>'
    +'<select class="rf-ingr-amt" onchange="updateIngrRowMacro(this.closest(\'.rf-ingr-row\'));updateFormMacros()">'+buildQtyHtml(unit,amt||1)+'</select>'

// Build role->ingredients map from all meals
function buildRoleIngredients(){
  const map={protein:{},carb:{},fat:{},veg:{},condiment:{},fixed:{}};
  MEALS.forEach(function(m){
    if(!m.ingredients)return;
    m.ingredients.forEach(function(ing){
      if(!ing.dbKey)return;
      const role=ing.role||'fixed';
      if(map[role])map[role][ing.dbKey]=true;
    });
  });
  // Convert to sorted arrays
  const result={};
  Object.keys(map).forEach(function(role){
    result[role]=Object.keys(map[role]).sort();
  });
  // Unused DB keys only go into 'fixed' as a catch-all
  const allUsed={};
  Object.keys(result).forEach(function(r){result[r].forEach(function(k){allUsed[k]=true;});});
  const unused=Object.keys(NUTRI_DB).filter(function(k){return !allUsed[k];}).sort();
  unused.forEach(function(k){if(result.fixed.indexOf(k)<0)result.fixed.push(k);});
  result.fixed.sort();
  result.all=Object.keys(NUTRI_DB).sort();
  return result;
}

function addNewDbIngredient(){
  const name=document.getElementById('rf_new_name').value.trim().toLowerCase();
  const kcal=Math.max(0,parseFloat(document.getElementById('rf_new_kcal').value)||0);
  const pro=Math.max(0,parseFloat(document.getElementById('rf_new_pro').value)||0);
  const fat=Math.max(0,parseFloat(document.getElementById('rf_new_fat').value)||0);
  const carb=Math.max(0,parseFloat(document.getElementById('rf_new_carb').value)||0);
  const unit=document.getElementById('rf_new_unit').value||'each';
  const role=document.getElementById('rf_new_role').value||'protein';
  if(!name){alert('Enter an ingredient name.');return;}
  if(NUTRI_DB[name]){alert(name+' already exists in the database.');return;}

  // Build entry with required fields
  const entry={kcal:kcal,pro:pro,fat:fat,carb:carb,unit:unit};

  // Optional behavior fields
  const minAmt=parseFloat(document.getElementById('rf_new_minAmt').value);
  if(minAmt>0)entry.minAmt=minAmt;
  if(document.getElementById('rf_new_halfSnap').value==='yes')entry.halfSnap=true;
  if(document.getElementById('rf_new_wholeOnly').value==='yes')entry.wholeOnly=true;

  // Optional package fields
  const pkgSize=parseFloat(document.getElementById('rf_new_pkgSize').value);
  const pkgUnit=document.getElementById('rf_new_pkgUnit').value;
  const pkgDrained=parseFloat(document.getElementById('rf_new_pkgDrained').value);
  const pkgType=document.getElementById('rf_new_pkgType').value;
  if(pkgSize>0&&pkgUnit){
    entry.pkg={size:pkgSize,unit:pkgUnit};
    if(pkgDrained>0)entry.pkg.drained=pkgDrained;
    if(pkgUnit==='cups'&&pkgDrained>0)entry.pkg.cups=pkgDrained;
    if(pkgType)entry.pkg.type=pkgType;
  }

  entry._ts=Date.now();
  NUTRI_DB[name]=entry;
  customIngredients[name]=entry;
  saveCustomIngredients();

  // Add to role cache so it appears in filtered dropdowns immediately
  if(ROLE_INGR){
    if(!ROLE_INGR[role])ROLE_INGR[role]=[];
    ROLE_INGR[role].push(name);ROLE_INGR[role].sort();
    if(!ROLE_INGR.all)ROLE_INGR.all=[];
    ROLE_INGR.all.push(name);ROLE_INGR.all.sort();
  }
  alert('Added "'+name+'" to the database!');
  ['rf_new_name','rf_new_kcal','rf_new_pro','rf_new_fat','rf_new_carb','rf_new_minAmt','rf_new_pkgSize','rf_new_pkgDrained'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('rf_new_unit').value='oz';
  document.getElementById('rf_new_role').value='protein';
  document.getElementById('rf_new_halfSnap').value='no';
  document.getElementById('rf_new_wholeOnly').value='no';
  document.getElementById('rf_new_pkgUnit').value='';
  document.getElementById('rf_new_pkgType').value='';
}

// ══════════════════════════════════════════════════════════════════════
// Stress-Test Harness (dev-only, invoked from console / preview_eval)

window.MPStress=(function(){
  function mkRng(seed){var s=seed|0;return function(){s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
