// ── Daily totals ─────────────────────────────────────────────
// Each slot gets a calorie budget: percentage of (target - shake).
// Meals adjust independently to hit their slot budget.
function getShakeKcal(p,d){
  const port=getPort(p,d,'shake');
  return port?getPortMacros(port).kcal:0;
}
// Compute all slot budgets, redistributing when slots are skipped or eat-out
// Only later slots marked in ADJ_TARGETS absorb freed calories
function computeSlotBudgets(p,d){
  // Always compute base budgets from normal shake calories
  const shakeKcal=getShakeKcal(p,d);
  const remaining=CAL_BASE[p]-shakeKcal;
  const budgets={};
  ADJ_SLOTS.forEach(function(s){budgets[s]=Math.round(remaining*SLOT_BUDGET[s]);});

  const targets=getAdjTargets(p,d);
  
  // If shake is skipped, redistribute its calories to checked slots
  if(SKIPPED[sk(p,d,'shake')]&&shakeKcal>0){
    const shakeTargets=[];
    let shakePctTotal=0;
    ADJ_SLOTS.forEach(function(s){
      const sKey=sk(p,d,s);
      if(targets[s]&&!SKIPPED[sKey]&&!(EAT_OUT[sKey]&&EAT_OUT[sKey].kcal>0)){
        shakeTargets.push(s);
        shakePctTotal+=(SLOT_BUDGET[s]||0);
      }
    });
    if(shakeTargets.length&&shakePctTotal>0){
      shakeTargets.forEach(function(s){
        budgets[s]+=Math.round(shakeKcal*((SLOT_BUDGET[s]||0)/shakePctTotal));
      });
    }
  }
  
  // For each skipped or under-budget eat-out slot, redistribute to checked later slots
  ADJ_SLOTS.forEach(function(s,si){
    const key=sk(p,d,s);
    let diff=0;
    if(SKIPPED[key]){
      diff=budgets[s]; // freed calories (positive = redistribute forward)
      budgets[s]=0;
    } else if(EAT_OUT[key]&&EAT_OUT[key].kcal>0){
      const eoKcal=EAT_OUT[key].kcal;
      diff=budgets[s]-eoKcal; // positive = under budget, negative = over budget
      budgets[s]=eoKcal;
    }
    if(diff===0)return;
    // Find checked later slots to absorb (add if under, subtract if over)
    const laterSlots=[];
    let laterPctTotal=0;
    for(let j=si+1;j<ADJ_SLOTS.length;j++){
      const ls=ADJ_SLOTS[j];
      const lk=sk(p,d,ls);
      if(targets[ls]&&!SKIPPED[lk]&&!(EAT_OUT[lk]&&EAT_OUT[lk].kcal>0)){
        laterSlots.push(ls);
        laterPctTotal+=(SLOT_BUDGET[ls]||0);
      }
    }
    if(laterSlots.length&&laterPctTotal>0){
      laterSlots.forEach(function(ls){
        budgets[ls]+=Math.round(diff*((SLOT_BUDGET[ls]||0)/laterPctTotal));
      });
    }
  });
  return budgets;
}
function getSlotBudget(p,d,s){
  return computeSlotBudgets(p,d)[s]||0;
}

function calcTotals(p,d){
  let kcal=0,pro=0,fat=0,carb=0;

  SLOTS.forEach(function(s){
    if(s==='late_snack'){
      const ls=LATE_SNACK[pk(p,d)];
      if(ls){kcal+=(ls.kcal||0);pro+=(ls.pro||0);fat+=(ls.fat||0);carb+=(ls.carb||0);}
      return;
    }
    const eoKey=sk(p,d,s);
    if(SKIPPED[eoKey])return;
    if(EAT_OUT[eoKey]){
      const eo=EAT_OUT[eoKey];
      kcal+=(eo.kcal||0);pro+=(eo.pro||0);fat+=(eo.fat||0);carb+=(eo.carb||0);
      return;
    }
    // All ingredient-based slots (including shake): read from balanced cache.
    // Shake is in the cache as raw amounts; adjusted slots have final amounts.
    const balanced=getBalancedSlotIngredients(p,d,s);
    if(balanced){
      balanced.forEach(function(i){
        const db=NUTRI_DB[i.dbKey]; if(!db)return;
        kcal+=db.kcal*i.amt;pro+=db.pro*i.amt;fat+=db.fat*i.amt;carb+=db.carb*i.amt;
      });
      return;
    }
    // Fallback for non-ingredient meals or non-him/her
    const port=getPort(p,d,s);
    if(port){
      const m=getPortMacrosOvr(port,p,d,s);
      kcal+=m.kcal;pro+=m.pro;fat+=m.fat;carb+=m.carb;
    }
  });

  return{kcal:Math.round(kcal),pro:Math.round(pro),fat:Math.round(fat),carb:Math.round(carb)};
}

// Total cups of vegetables and fruit for a person on a given day,
// using post-adjustment ingredient amounts. Skipped and eat-out slots
// are excluded. Units: "cup" counts directly; "each" converts via
// NUTRI_DB[key].cupsEach. Anything else contributes 0.
// Returns {veg, fruit} in cups. Intended for test/diagnostic use.
// Sum veg/fruit cups across a list of balanced ingredients. Shared between
// computeDailyFV (whole day) and computeFvText (single slot card display).
// Conversion: unit:'cup' → amt as cups; unit:'each' with cupsEach → amt×cupsEach.
// Other units contribute 0 (e.g. rxbar 'each' without cupsEach).
function computeSlotFV(ings){
  if(!ings || !ings.length) return {veg:0, fruit:0};
  let veg=0, fruit=0;
  ings.forEach(function(ing){
    const db=NUTRI_DB[ing.dbKey]; if(!db)return;
    let cups=0;
    if(db.unit==='cup') cups=ing.amt;
    else if(db.unit==='each' && typeof db.cupsEach==='number') cups=ing.amt*db.cupsEach;
    if(ing.role==='veg') veg+=cups;
    else if(ing.role==='fruit') fruit+=cups;
  });
  return {veg:veg, fruit:fruit};
}
// Render-time FV string for a meal card. Returns e.g. "1.5c veg" or
// "1c veg, 1c fruit" or "" if the slot has no veg/fruit. Replaces the
// static per-meal `fv:'...'` property (which frequently drifted from
// actual ingredient totals). Rounds to nearest 0.25c to match the old
// granularity. Pass BALANCED ingredients so the text reflects what's
// actually on the card after scaling.
function computeFvText(ings){
  const fv = computeSlotFV(ings);
  function r(v){ return Math.round(v*4)/4; }
  const parts=[];
  const vR=r(fv.veg), fR=r(fv.fruit);
  if(vR>0) parts.push(vR+'c veg');
  if(fR>0) parts.push(fR+'c fruit');
  return parts.join(', ');
}
function computeDailyFV(p,d){
  let veg=0, fruit=0;
  SLOTS.forEach(function(s){
    if(s==='late_snack')return;
    const key=sk(p,d,s);
    if(SKIPPED[key])return;
    if(EAT_OUT[key])return;
    const port=getPort(p,d,s); if(!port)return;
    const ingr0=applyOverrides(port,p,d,s);
    if(!ingr0||!ingr0.length||ingr0[0].dbKey===undefined)return;
    let finalIngr=getBalancedSlotIngredients(p,d,s);
    if(!finalIngr) finalIngr=ingr0;
    const fv=computeSlotFV(finalIngr);
    veg+=fv.veg; fruit+=fv.fruit;
  });
  return {veg:Math.round(veg*100)/100, fruit:Math.round(fruit*100)/100};
}

// Get the per-slot adjustment delta for rendering ingredient changes
function getSlotAdjustment(p,d,s){
  if(p!=='him'&&p!=='her')return 0;
  if(EAT_OUT[sk(p,d,s)])return 0;
  if(SKIPPED[sk(p,d,s)])return 0;
  if(!SLOT_BUDGET[s])return 0;

  const port=getPort(p,d,s);
  if(!port)return 0;
  const ingr=applyOverrides(port,p,d,s);
  if(!ingr||!ingr.length||!ingr[0].dbKey)return 0;

  const baseKcal=computeMacros(ingr).kcal;
  const budget=getSlotBudget(p,d,s);

  // DAY-LEVEL CORRECTION: dinner absorbs the day's residual so the daily
  // total hits CAL_BASE exactly (modulo dinner's own snap error). Other
  // slots can miss their individual budget (from skip-if-close, snap,
  // package nudge, etc.) but dinner compensates.
  if(s==='dinner'&&getAdjTargets(p,d).dinner){
    let othersKcal=getShakeKcal(p,d);
    const leftovers=computeLeftovers();
    ['breakfast','lunch','snack'].forEach(function(other){
      const okey=sk(p,d,other);
      if(SKIPPED[okey])return;
      if(EAT_OUT[okey]){othersKcal+=(EAT_OUT[okey].kcal||0);return;}
      const oPort=getPort(p,d,other); if(!oPort)return;
      const oIngr=applyOverrides(oPort,p,d,other);
      if(!oIngr||!oIngr.length||oIngr[0].dbKey===undefined)return;
      const oBase=computeMacros(oIngr).kcal;
      const oBudget=getSlotBudget(p,d,other);
      let oDelta=oBudget-oBase;
      if(Math.abs(oDelta)<=10)oDelta=0;
      const oHints=buildMacroHints(p,d,other);
      const oLo=leftovers[okey];
      const oMts=(oLo&&!oLo.isLeftover)?(oLo.totalServings||oLo.servings||1):1;
      const oResult=(oDelta!==0)?adjustIngredients(oIngr,oDelta,other,oHints,oMts)
                                :oIngr.map(function(i){return {ing:i,newAmt:i.amt};});
      oResult.forEach(function(a){
        const oDb=NUTRI_DB[a.ing.dbKey];
        if(oDb)othersKcal+=oDb.kcal*a.newAmt;
      });
    });
    // Late snack is user-entered macros, include if present
    const lateSnack=LATE_SNACK[pk(p,d)];
    if(lateSnack&&lateSnack.kcal)othersKcal+=lateSnack.kcal;

    const dinnerTarget=CAL_BASE[p]-othersKcal;
    const corrDelta=dinnerTarget-baseKcal;
    if(Math.abs(corrDelta)<=10)return 0;
    return corrDelta;
  }

  const delta=budget-baseKcal;
  if(Math.abs(delta)<=10)return 0;
  return delta;
}
// For shared meals: average both people's slot adjustments so both eat same proportions
function getSharedSlotAdjustment(d,s){
  const himAdj=getSlotAdjustment('him',d,s);
  const herAdj=getSlotAdjustment('her',d,s);
  return Math.round((himAdj+herAdj)/2);
}

// ── Shared render helpers ───────────────────────────────────
function buildIngrEditRow(ing, amt, person, day, s, idx){
  const db = NUTRI_DB[ing.dbKey];
  const unitLabel = db ? db.unit : '';
  const allKeys = Object.keys(NUTRI_DB).sort();
  const eggCount = (ing.dbKey==='egg white') ? ' ('+Math.round(amt*8)+')' : '';
  const optHtml = allKeys.map(function(k){
    const label = (k==='egg white' && k===ing.dbKey) ? k+eggCount : k;
    return '<option value="'+k+'"'+(k===ing.dbKey?' selected':'')+'>'+label+'</option>';
  }).join('');
  const slotEsc = s.replace(/'/g,"\\'");
  const amtId = 'amt_'+person+'_'+day+'_'+s+'_'+idx;
  const qtyOpts = buildQtyOptions(unitLabel, amt, db && db.wholeOnly);
  let qtyHtml = qtyOpts.map(function(q){
    const sel = (Math.abs(q.val - amt) < 0.02) ? ' selected' : '';
    return '<option value="'+q.val+'"'+sel+'>'+q.label+'</option>';
  }).join('');
  // Big Cook redistribution produces off-grid per-serving amounts (e.g.
  // 7.701 oz when an 11 oz batch splits 2:1). For batch members ONLY,
  // display the custom-amount option label rounded to 1 decimal. The
  // stored amount stays at full precision. Non-batch slots keep the
  // existing 3-decimal display — if those go fractional it's a bug we
  // want visible, not hidden by rounding.
  const batchLo = computeLeftovers()[sk(person,day,s)];
  const isBatchMember = !!(batchLo && (batchLo.isLeftover || (batchLo.totalServings && batchLo.totalServings > 1)));
  if (isBatchMember && amt > 0) {
    qtyHtml = qtyHtml.replace(/(<option value="[\d.]+" selected>)(\d+\.\d{2,})(<\/option>)/, function(m, pre, num, post){
      const rounded = Math.round(parseFloat(num) * 10) / 10;
      return pre + rounded + post;
    });
  }
  const displayCal=db?Math.round(db.kcal*amt):0;
  const displayPro=db?Math.round(db.pro*amt):0;
  return '<div class="ingr-edit-row">'
    +'<select class="ingr-amt-select" id="'+amtId+'"'
    +' onchange="onIngrAmt(\''+person+'\',\''+day+'\',\''+slotEsc+'\','+idx+',this.value)">'
    +qtyHtml+'</select>'
    +'<span class="ingr-unit-label">'+unitLabel+'</span>'
    +'<select class="ingr-swap-select role-'+ing.role+'" onchange="onIngrSwap(\''+person+'\',\''+day+'\',\''+slotEsc+'\','+idx+',this.value)">'
    +optHtml+'</select>'
    +'<span class="ingr-cal">'+displayCal+'cal</span>'
    +'<span class="ingr-pro">'+(displayPro>0?displayPro+'p':'')+'</span>'
    +'</div>';
}

// 2a. Shared card renderer (used inside renderSharedView)
function renderSharedCard(meal, s, badges, himMult, herMult, extraLabel, day){
  // Build combined view from the batch's actual portions (lo.portions).
  // Each portion contributes its balanced per-serving amount directly —
  // sums to the real batch total. Him / Her single per-serving amounts
  // are still shown on each row for reference.
  const leftovers = computeLeftovers();
  const himKey = sk('him', day, s);
  const herKey = sk('her', day, s);
  const himLo = leftovers[himKey];
  const herLo = leftovers[herKey];
  // Resolve the cook anchor (whichever side isn't marked sameDayShared/leftover)
  let anchorLo = null;
  if (himLo && !himLo.isLeftover && himLo.portions) anchorLo = himLo;
  else if (herLo && !herLo.isLeftover && herLo.portions) anchorLo = herLo;
  const portionList = anchorLo ? anchorLo.portions : [{p:'him',d:day,s:s},{p:'her',d:day,s:s}];

  function perPersonPerServing(p){
    const bal = getBalancedSlotIngredients(p, day, s);
    if (bal) return bal.map(i => ({dbKey:i.dbKey, amt:i.amt, role:i.role}));
    const port = meal[p];
    if (!port || !port.ingredients) return [];
    const ingr = applyOverrides(port, p, day, s);
    return ingr.map(i => ({dbKey:i.dbKey, amt:i.amt, role:i.role}));
  }
  const himOne = perPersonPerServing('him');
  const herOne = perPersonPerServing('her');
  const himOneByKey = {}; himOne.forEach(i => himOneByKey[i.dbKey] = i);
  const herOneByKey = {}; herOne.forEach(i => herOneByKey[i.dbKey] = i);

  // Total batch amount per ingredient = sum across every portion
  const orderedKeys = [];
  const bucket = {};
  (meal.ingredients||[]).forEach(function(ing){
    if(!ing || !ing.dbKey || !((ing.amt||0) > 0)) return;
    orderedKeys.push(ing.dbKey);
    bucket[ing.dbKey] = {dbKey:ing.dbKey, role:ing.role, total:0};
  });
  portionList.forEach(function(pt){
    const pb = getBalancedSlotIngredients(pt.p, pt.d, pt.s);
    if (!pb) return;
    pb.forEach(i => {
      if (!bucket[i.dbKey]) { orderedKeys.push(i.dbKey); bucket[i.dbKey] = {dbKey:i.dbKey, role:i.role, total:0}; }
      bucket[i.dbKey].total += i.amt;
    });
  });
  const combinedIngr = orderedKeys.filter(function(k,idx){return orderedKeys.indexOf(k)===idx;}).map(function(k){
    const c = bucket[k];
    const db = NUTRI_DB[c.dbKey], unit = db ? db.unit : '';
    const amt = Math.round(c.total * 1000) / 1000;
    const hAmt = himOneByKey[k] ? himOneByKey[k].amt : 0;
    const rAmt = herOneByKey[k] ? herOneByKey[k].amt : 0;
    return {dbKey:c.dbKey, amt:amt, hAmt, rAmt, role:c.role, displayText: amt + (unit?' '+unit:'') + ' ' + c.dbKey};
  }).filter(function(x){return x.amt > 0;});
  const pm={kcal:0,pro:0,fat:0,carb:0};
  combinedIngr.forEach(function(i){const db=NUTRI_DB[i.dbKey];if(db){pm.kcal+=Math.round(db.kcal*i.amt);pm.pro+=Math.round(db.pro*i.amt);pm.fat+=Math.round(db.fat*i.amt);pm.carb+=Math.round(db.carb*i.amt);}});
  const macroLine=pm.kcal+' kcal · P '+pm.pro+'g · C '+pm.carb+'g · F '+pm.fat+'g';
  let ingrHtml='<div class="shared-ingr-grid">';
  ingrHtml+=combinedIngr.map(function(i){
    const db=NUTRI_DB[i.dbKey];const kcal=db?Math.round(db.kcal*i.amt):0;
    const hFmt=i.hAmt?(Math.round(i.hAmt*10)/10):'—';
    const rFmt=i.rAmt?(Math.round(i.rAmt*10)/10):'—';
    const rc=ROLE_COLORS[i.role]||'var(--border)';
    return '<div class="sig-row">'
      +'<span class="sig-name" style="border-left:3px solid '+rc+';padding-left:6px">'+i.displayText+'</span>'
      +'<span class="sig-him">'+hFmt+'</span><span class="sig-sep">/</span><span class="sig-her">'+rFmt+'</span>'
      +'<span class="sig-cal">'+kcal+'cal</span></div>';
  }).join('')+'</div>';
  const stepsHtml=(meal._colorSteps||meal.steps||[]).map(function(st){return'<li>'+st+'</li>'}).join('');
  const totalServings = portionList.length;
  const servesLabel='🥗 Combined ingredients (serves '+totalServings+')';
  const k='shared_'+day+'_'+s+(extraLabel||'');
  const isOpen=openCards[k]||false;
  return '<div class="mc slot-'+s+(isOpen?' open':'')+'" id="mc_'+k+'">'
    +'<div class="mc-top"><div class="slot-label">'+SLOT_LABEL[s]+'</div>'
    +'<div class="sv-meal-title">'+meal.label+' '+badges+'</div></div>'
    +'<div class="mc-meta" onclick="toggleCard(\''+k.replace(/'/g,"\\'")+'\')"><div><div class="mc-macros">'+macroLine+'</div>'
    +macroBar(pm.kcal,pm.pro,pm.fat,pm.carb)
    +'</div><div class="expand-btn">⌄</div></div>'
    +'<div class="mc-body">'
    +'<div class="bsec"><div class="bsec-title ingr">'+servesLabel+'</div>'+ingrHtml+'</div>'
    +'<div class="bsec"><div class="bsec-title cook">👨‍🍳 How to make it</div><ol class="step-list">'+stepsHtml+'</ol></div>'
    +'</div></div>';
}

// 2b. Shared cooking view
function renderSharedView(day, scrollY, mealEl, prefixHtml){
  let html=(prefixHtml||'')+'<div class="shared-intro">Shared cooking. Combined amounts for shopping & prep.</div>';
  let hasShared=false;
  const leftovers=computeLeftovers();

  // 1) Same-day shared meals (him & her have identical meal in same slot)
  // Skip: snacks, shakes, late_snack, and yogurt breakfast (individual meals, not shared cooking)
  SLOTS.forEach(function(s){
    if(s==='snack'||s==='shake'||s==='late_snack')return;
    const hisId=getMealId('him',day,s);
    const herId=getMealId('her',day,s);
    if(!hisId||!herId||hisId!==herId)return;
    const meal=getMeal(hisId);
    if(!meal||(!meal.him&&!meal.her))return;
    // Skip yogurt/no-cook breakfast items from shared view
    if(s==='breakfast'&&meal.noLeftover)return;
    hasShared=true;
    const himLo=leftovers[sk('him',day,s)];
    const herLo=leftovers[sk('her',day,s)];
    // Resolve the batch anchor — whichever side carries portions list.
    const anchorLoSV = (himLo&&!himLo.isLeftover&&himLo.portions)?himLo:
                      (herLo&&!herLo.isLeftover&&herLo.portions)?herLo:null;
    const batchSize = anchorLoSV ? anchorLoSV.portions.length : 2;
    let badges='';
    if(himLo&&himLo.isLeftover&&!himLo.sameDayShared){
      badges='<span class="mc-pill mc-pill-leftover on no-click" style="vertical-align:middle">Leftovers</span>'
        +'<span class="mc-pill mc-pill-cook on no-click" style="margin-left:3px;vertical-align:middle;font-size:9px;padding:1px 6px">'+himLo.cookDay.slice(0,3)+'</span>';
    } else if(batchSize>2){
      // Find which days get leftovers and who eats them
      const loDayMap={};
      Object.keys(leftovers).forEach(function(lk){
        const lo=leftovers[lk];
        if(lo&&lo.isLeftover&&lo.cookDay===day){
          const parts=lk.split('_');
          const who=parts[0],loDay=parts[1];
          if(!loDayMap[loDay])loDayMap[loDay]=[];
          if(loDayMap[loDay].indexOf(who)<0)loDayMap[loDay].push(who);
        }
      });
      const feedsDays=Object.keys(loDayMap).map(function(d){
        const who=loDayMap[d];
        const col=who.length>1?'#34D399':who[0]==='him'?'var(--his)':'var(--her)';
        const bg=who.length>1?'rgba(16,185,129,.15)':who[0]==='him'?'rgba(96,165,250,.15)':'rgba(244,114,182,.15)';
        const bdr=who.length>1?'rgba(16,185,129,.3)':who[0]==='him'?'rgba(96,165,250,.3)':'rgba(244,114,182,.3)';
        return '<span class="day-badge" style="background:'+bg+';color:'+col+';border:1.5px solid '+bdr+'">'+d.slice(0,3)+'</span>';
      }).join('');
      badges='<span class="mc-pill mc-pill-cook on no-click" style="vertical-align:middle">Big Cook</span>'
        +feedsDays;
    }
    html+=renderSharedCard(meal,s,badges,1,1,'',day);
  });

  if(!hasShared)html+='<div class="empty-shop" style="padding:40px 20px;text-align:center;color:var(--gray)">No shared meals on '+day+'.</div>';
  // Prep for tomorrow banner
  html+=buildPrepBanner(day);
  mealEl.innerHTML=html;
  window.scrollTo(0,scrollY);
  requestAnimationFrame(function(){window.scrollTo(0,scrollY);mealEl.style.minHeight='';});
}

// 2b. Prep for tomorrow banner (shared view only)
function buildPrepBanner(day){
  const di=DAYS.indexOf(day);
  const tomorrowDay=DAYS[(di+1)%7]; // Sunday wraps to Monday
  const items=[];
  const seenMeals={};

  // For Sunday, tomorrow (Monday) is on the next week — look up from next week's data
  const isCrossWeek=(di===6);
  function getTomorrowMealId(p,d,s){
    if(isCrossWeek){
      // Look in next week's selections
      const nextWeekKey=activeWeek==='last'?'this':activeWeek==='this'?'next':null;
      if(nextWeekKey&&weekData[nextWeekKey]&&weekData[nextWeekKey].sel){
        const val=weekData[nextWeekKey].sel[sk(p,d,s)];
        if(val)return val;
      }
    }
    return getMealId(p,d,s);
  }
  function isTomorrowSkipped(p,d,s){
    if(isCrossWeek){
      const nextWeekKey=activeWeek==='last'?'this':activeWeek==='this'?'next':null;
      if(nextWeekKey&&weekData[nextWeekKey]&&weekData[nextWeekKey].skipped)return !!weekData[nextWeekKey].skipped[sk(p,d,s)];
    }
    return !!SKIPPED[sk(p,d,s)];
  }
  function isTomorrowEatOut(p,d,s){
    if(isCrossWeek){
      const nextWeekKey=activeWeek==='last'?'this':activeWeek==='this'?'next':null;
      if(nextWeekKey&&weekData[nextWeekKey]&&weekData[nextWeekKey].eatOut)return !!weekData[nextWeekKey].eatOut[sk(p,d,s)];
    }
    return !!EAT_OUT[sk(p,d,s)];
  }

  // Meat/seafood dbKeys that might need thawing
  const meatKeys={'chicken breast':1,'chicken thigh':1,'ground turkey 93':1,'ground chicken':1,
    'salmon':1,'halibut':1,'filet mignon':1,'shrimp':1,'tofu firm':1,'silken tofu':1};

  // Bean dbKeys that need overnight soaking (NOT lentils)
  const soakBeans={'black beans canned':'black beans','black beans cooked':'black beans','cannellini beans canned':'cannellini beans','cannellini beans cooked':'cannellini beans','chickpeas cooked':'chickpeas'};

  // Veggie prep keywords
  const vegPrepRe=/\b(dice|chop|cut|slice|mince|julienne)\b/i;

  // Aggregate beans per type
  const beanTotals={};

  ['him','her'].forEach(function(p){
    ['breakfast','lunch','dinner'].forEach(function(s){
      const key=sk(p,tomorrowDay,s);
      if(isTomorrowSkipped(p,tomorrowDay,s)||isTomorrowEatOut(p,tomorrowDay,s))return;
      const id=getTomorrowMealId(p,tomorrowDay,s);
      if(!id)return;
      const meal=getMeal(id);
      if(!meal)return;

      // Check if this is a leftover day (skip — cook day handles prep)
      const lo=computeLeftovers()[key];
      if(lo&&lo.isLeftover)return;

      const mealKey=id+'_'+s;
      const alreadySeen=seenMeals[mealKey];
      seenMeals[mealKey]=true;

      // 1. Meat thaw
      if(!alreadySeen){
        meal.ingredients.forEach(function(ing){
          if(meatKeys[ing.dbKey]&&ing.amt>0){
            const already=items.some(function(it){return it.type==='thaw'&&it.dbKey===ing.dbKey;});
            if(!already){
              items.push({type:'thaw',emoji:'🥩',text:'Thaw '+ing.dbKey+' ('+SLOT_LABEL[s]+': '+meal.label+')'});
            }
          }
        });
      }

      // 2. Bean soak (aggregate per type — include leftover servings since all beans cook on day 1)
      const loServings=(lo&&!lo.isLeftover&&lo.servings>1)?lo.servings:1;
      meal.ingredients.forEach(function(ing){
        if(soakBeans[ing.dbKey]&&ing.amt>0){
          const beanName=soakBeans[ing.dbKey];
          if(!beanTotals[beanName])beanTotals[beanName]={cups:0,meals:[]};
          beanTotals[beanName].cups+=ing.amt*loServings;
          const mealLabel=SLOT_LABEL[s]+': '+meal.label+(loServings>1?' (×'+loServings+' servings)':'');
          if(beanTotals[beanName].meals.indexOf(mealLabel)<0)beanTotals[beanName].meals.push(mealLabel);
        }
      });

      // 3. Veggie prep from steps
      if(!alreadySeen&&meal.steps){
        meal.steps.forEach(function(step){
          const match=step.match(vegPrepRe);
          if(!match)return;
          const verb=match[1].charAt(0).toUpperCase()+match[1].slice(1).toLowerCase();
          // Find which veg ingredient is referenced
          meal.ingredients.forEach(function(ing){
            if(ing.role!=='veg')return;
            const words=ing.dbKey.toLowerCase().split(/\s+/);
            const stepLower=step.toLowerCase();
            const mentioned=words.some(function(w){return w.length>2&&stepLower.indexOf(w)>=0;});
            if(mentioned){
              const already=items.some(function(it){return it.type==='veg'&&it.dbKey===ing.dbKey&&it.verb===verb;});
              if(!already){
                items.push({type:'veg',emoji:'🥬',dbKey:ing.dbKey,verb:verb,
                  text:verb+' '+ing.dbKey+' ('+SLOT_LABEL[s]+': '+meal.label+')'});
              }
            }
          });
        });
      }

      // 4. Advance prep from steps (marinate, overnight, refrigerate)
      if(!alreadySeen&&meal.steps){
        meal.steps.forEach(function(step){
          const lower=step.toLowerCase();
          if(lower.indexOf('marinate')>=0||lower.indexOf('overnight')>=0||lower.indexOf('refrigerate')>=0){
            const already=items.some(function(it){return it.type==='advance'&&it.mealId===id;});
            if(!already){
              // Extract a short description
              let desc=step;
              if(desc.length>80)desc=desc.substring(0,77)+'...';
              items.push({type:'advance',emoji:'⏰',mealId:id,
                text:desc+' ('+SLOT_LABEL[s]+': '+meal.label+')'});
            }
          }
        });
      }
    });
  });

  // Convert aggregated bean totals to soak items
  Object.keys(beanTotals).forEach(function(beanName){
    const bt=beanTotals[beanName];
    const driedCups=bt.cups*0.429; // 0.75 dried / 1.75 cooked
    const displayAmt=fmtFrac(Math.round(driedCups*4)/4); // snap to nearest ¼
    items.push({type:'bean',emoji:'🫘',
      text:'Soak '+displayAmt+' cup dried '+beanName+' overnight ('+bt.meals.join(', ')+')'});
  });

  if(!items.length)return '';

  // Sort: thaw first, then veg, then beans, then advance
  const order={thaw:0,veg:1,bean:2,advance:3};
  items.sort(function(a,b){return(order[a.type]||9)-(order[b.type]||9);});

  let html='<div class="prep-banner">';
  html+='<div class="prep-banner-title">🔔 Prep for tomorrow ('+tomorrowDay+')</div>';
  items.forEach(function(it){
    html+='<div class="prep-banner-item">'+it.emoji+' '+it.text+'</div>';
  });
  html+='</div>';
  return html;
}

    +'<div class="eo-field"><label>Kcal</label><input id="eo_'+k+'_kcal" type="number" min="0" value="'+(eo.kcal!=null?eo.kcal:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'kcal\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div>'
    +'<div class="eo-field"><label>Protein</label><input id="eo_'+k+'_pro" type="number" min="0" value="'+(eo.pro!=null?eo.pro:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'pro\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div>'
    +'<div class="eo-field"><label>Fat</label><input id="eo_'+k+'_fat" type="number" min="0" value="'+(eo.fat!=null?eo.fat:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'fat\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div>'
    +'<div class="eo-field"><label>Carbs</label><input id="eo_'+k+'_carb" type="number" min="0" value="'+(eo.carb!=null?eo.carb:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'carb\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div></div>'
    +'<button class="eo-save-btn" onclick="saveEatOut(\''+person+'\',\''+day+'\',\''+s+'\')">Save to Eat Out History</button>'
    +eoSummary
    +'</div></div>';
}

// 3b. Build a single meal card HTML (normal him/her view)
// Build grouped <option> HTML for meal selector dropdown
function buildMealSelectOpts(slotMeals, activeId){
  const byProt={};
  slotMeals.forEach(function(m){
    const p=getPrimaryProtein(m,true);
    if(!byProt[p])byProt[p]=[];
    byProt[p].push(m);
  });
  const protKeys=Object.keys(byProt).sort();
  protKeys.forEach(function(pk){byProt[pk].sort(function(a,b){return a.label<b.label?-1:1;});});
  if(protKeys.length<=1){
    return slotMeals.map(function(m){return'<option value="'+m.id+'"'+(m.id===activeId?' selected':'')+'>'+m.label+'</option>';}).join('');
  }
  return protKeys.map(function(pk){
    const optHtml=byProt[pk].map(function(m){
      return'<option value="'+m.id+'"'+(m.id===activeId?' selected':'')+'>'+m.label+'</option>';
    }).join('');
    return'<optgroup label="'+pk+'">'+optHtml+'</optgroup>';
  }).join('');
}

// Compute adjusted macros and ingredient HTML for a meal card
function computeCardMacros(port, person, day, s, cookServings, showBanner, mealTotalServings){
  const ovrMacros = getPortMacrosOvr(port,person,day,s);
  // Each person gets their own calorie adjustment — same recipe ratios, different portion sizes
  const slotAdj = getSlotAdjustment(person,day,s);
  const isSkipped = !!SKIPPED[sk(person,day,s)];
  const hasOverrides = !!getOverrides(person,day,s);
  let pm, adjBanner='', ingrHtml='';

  if(isSkipped){
    pm={kcal:0,pro:0,fat:0,carb:0};
  } else if(slotAdj!==0){
    const adjIngr = applyOverrides(port,person,day,s);
    if(adjIngr && adjIngr.length && adjIngr[0].dbKey!==undefined){
      // Use day-balanced ingredients (per-slot adjust + whole-day macro balance)
      const balanced = getBalancedSlotIngredients(person,day,s);
      const adjResult = balanced
        ? balanced.map(function(i,ix){return {ing:adjIngr[ix]||{dbKey:i.dbKey,amt:i.origAmt||i.amt,role:i.role,scalable:i.scalable}, newAmt:i.amt};})
        : adjustIngredients(adjIngr, slotAdj, s, buildMacroHints(person,day,s), mealTotalServings);
      pm = {kcal:0,pro:0,fat:0,carb:0};
      adjResult.forEach(function(a){
        const db = NUTRI_DB[a.ing.dbKey];
        if(!db)return;
        // Sum raw, round once at end — keeps INV5 reconstruction matching
        // computeCardMacros without the ~5 kcal slack from per-ingredient
        // rounding (10 ingredients × ±0.5 = up to ±5 kcal).
        pm.kcal+=db.kcal*a.newAmt;
        pm.pro+=db.pro*a.newAmt;
        pm.fat+=db.fat*a.newAmt;
        pm.carb+=db.carb*a.newAmt;
      });
      pm.kcal=Math.round(pm.kcal); pm.pro=Math.round(pm.pro);
      pm.fat=Math.round(pm.fat);   pm.carb=Math.round(pm.carb);
      ingrHtml = adjResult.map(function(a, idx) {
        return buildIngrEditRow(a.ing, a.newAmt*cookServings, person, day, s, idx);
      }).join('');
      ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';
      if(showBanner){
        const adjDir = slotAdj>0?'+':'';
        const changeLines = [];
        adjResult.forEach(function(a){
          if(Math.abs(a.newAmt - a.ing.amt) > 0.02){
            const db = NUTRI_DB[a.ing.dbKey];
            const unit = db ? db.unit : '';
            const fmtAmt = fmtFrac;
            const dir = a.newAmt > a.ing.amt ? '↑' : '↓';
            const kcalDiff = Math.round((a.newAmt - a.ing.amt) * (db?db.kcal:0));
            const diffSign = kcalDiff > 0 ? '+' : '';
            changeLines.push(dir+' <b>'+a.ing.dbKey+'</b>: '+fmtAmt(a.ing.amt)+' → '+fmtAmt(a.newAmt)+' '+unit+' ('+diffSign+kcalDiff+' kcal)');
          }
        });
        if(changeLines.length){
          adjBanner='<div class="adj-info">⚡ Auto-adjusted <b>'+adjDir+slotAdj+' kcal</b> to hit daily target:<br>'
            +changeLines.join('<br>')+'</div>';
        }
      }
    } else {
      pm = ovrMacros;
    }
  } else {
    // slotAdj === 0: per-slot adjuster didn't change anything, but the
    // day-level balancer may have. Use balanced amounts if available.
    const adjIngr0 = applyOverrides(port,person,day,s);
    const balanced0 = (adjIngr0 && adjIngr0.length && adjIngr0[0].dbKey!==undefined)
                      ? getBalancedSlotIngredients(person,day,s) : null;
    if(balanced0){
      pm = {kcal:0,pro:0,fat:0,carb:0};
      balanced0.forEach(function(i){
        const db=NUTRI_DB[i.dbKey]; if(!db)return;
        // Sum raw, round once at end (see same-pattern note above).
        pm.kcal+=db.kcal*i.amt; pm.pro+=db.pro*i.amt;
        pm.fat+=db.fat*i.amt;   pm.carb+=db.carb*i.amt;
      });
      pm.kcal=Math.round(pm.kcal); pm.pro=Math.round(pm.pro);
      pm.fat=Math.round(pm.fat);   pm.carb=Math.round(pm.carb);
      ingrHtml = balanced0.map(function(i, idx) {
        var origIng = adjIngr0[idx]||{dbKey:i.dbKey,amt:i.origAmt||i.amt,role:i.role,scalable:i.scalable};
        return buildIngrEditRow(origIng, i.amt*cookServings, person, day, s, idx);
      }).join('');
      ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';
    } else {
      pm = ovrMacros;
    }
  }
  return {pm:pm, adjBanner:adjBanner, ingrHtml:ingrHtml};
}

// Whether the Him/Her tab card should display the "🥗 Combined ingredients
// (serves N)" header. The Shared tab always owns combined display for
// same-day-shared cooks, so this returns false for any slot flagged as
// `lo.shared || lo.sameDayShared`.
//
// SINGLE SOURCE OF TRUTH: both render paths in `buildMealCardHtml`
// (default and the `crossPersonCook` rebuild block) consult this helper.
// INV9 also calls it to verify the data conditions never let the render
// produce a Combined header on a same-day-shared slot. If a future edit
// drops the !isSameDayShared guard from this helper, INV9 fires and the
// regression is caught at the data layer.
function cardShowsCombinedHeader(lo){
  if(!lo) return false;
  const isSameDayShared = !!(lo.shared || lo.sameDayShared);
  if(isSameDayShared) return false;
  return !lo.isLeftover && ((lo.servings>1) || lo.crossPersonCook);
}

function buildMealCardHtml(s, person, day, other){
  const slotMeals=getMealsForSlot(s).filter(function(m){return m[person]});
  if(!slotMeals.length)return '';
  const activeId=getMealId(person,day,s);
  const activeMeal=getMeal(activeId)||slotMeals[0];
  const port=activeMeal[person];if(!port)return '';
  const k=sk(person,day,s);
  const isOpen=openCards[k]||false;
  const isManual=!!MANUAL_SET[k];
  const setPill=isManual?'<span class="set-pill">Set</span>':'';

  const opts=buildMealSelectOpts(slotMeals, activeId);

  const otherId=getMealId(other,day,s);
  const isSharedSlot=(otherId&&otherId===activeId);
  const sharedPill='<div class="mc-pill mc-pill-shared'+(isSharedSlot?' on':'')+'" onclick="event.stopPropagation();toggleShared(\''+s+'\','+(!isSharedSlot)+')">Shared</div>';
  const leftovers=computeLeftovers();
  const loKey=sk(person,day,s);
  const loInfo=leftovers[loKey];
  let leftoverBadge='';
  let leftoverPill='';
  if(loInfo&&loInfo.isLeftover&&!loInfo.sameDayShared){
    const fromLabel=loInfo.crossPerson?(loInfo.cookedBy==='him'?'his':'her')+' '+loInfo.cookDay:loInfo.cookDay;
    leftoverBadge='<span class="leftover-badge">🍱 '+fromLabel+'</span>';
    leftoverPill='<div class="mc-pill mc-pill-leftover on no-click">Leftovers</div>';
  }
  let cookPill='';
  if(loInfo&&!loInfo.isLeftover){
    if(loInfo.servings>1||loInfo.crossPersonCook) cookPill='<div class="mc-pill mc-pill-cook on no-click">Big Cook</div>';
  }
  const notePill=activeMeal.note?'<div class="note-pill">⏰ '+activeMeal.note+'</div>':'';

  // Ingredient display with per-ingredient nutrition — EDITABLE
  const hasOverrides = !!getOverrides(person,day,s);
  let ingrHtml='';
  // On same-day shared slots, the Shared tab owns the combined view.
  // Individual Him/Her tabs should just show per-portion amounts. Detect
  // via the leftover metadata (loInfo.shared on cook anchor, sameDayShared
  // on the other-person same-day portion) — more reliable than reading
  // SHARED_SCHEDULE which isn't always populated by the randomizer.
  const isSameDayShared = !!(loInfo && (loInfo.shared || loInfo.sameDayShared));
  const isBigCookHere = !!(loInfo && !loInfo.isLeftover && (loInfo.servings > 1 || loInfo.crossPersonCook));
  const showCombinedOnThisTab = cardShowsCombinedHeader(loInfo);
  // cookServings = portion multiplier applied to ingredient amounts.
  //   - Shared slot: 1 (show per-portion; Shared tab combines)
  //   - Non-shared Big Cook (solo leftovers or cross-person cook): total batch size
  //   - Otherwise: 1
  const cookServings = showCombinedOnThisTab ? (loInfo.totalServings||loInfo.servings||1) : 1;
  let displayServings = cookServings;
  let ingrSectionTitle=displayServings>1?'🥗 Combined ingredients (serves '+displayServings+')':'🥗 Ingredients';
  if (port.ingredients && port.ingredients.length && port.ingredients[0].dbKey !== undefined) {
    // Get ingredients with overrides applied
    const ovrIngr = applyOverrides(port,person,day,s);

    ingrHtml = ovrIngr.map(function(ing, idx) {
      const displayAmt=Math.round(ing.amt*cookServings*1000)/1000;
      return buildIngrEditRow(ing, displayAmt, person, day, s, idx);
    }).join('');
    ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';

    // Add reset button if there are overrides
    if(hasOverrides){
      const slotEsc2 = s.replace(/'/g,"\\'");
      ingrHtml += '<button class="ingr-reset-btn" onclick="onIngrReset(\''+person+'\',\''+day+'\',\''+slotEsc2+'\')">↺ Reset to original</button>';
    }
  } else {
    ingrHtml=(port.ingredients||[]).map(function(i){return'<li>'+(typeof i==='string'?i:i.displayText)+'</li>'}).join('');
    ingrHtml='<ul class="ingr-list">'+ingrHtml+'</ul>';
  }

  // Compute macros: base from overridden ingredients, then with calorie adjustment
  // Leftover days: use the COOK DAY's adjusted amounts (not re-adjust for this day's budget)
  const isLeftoverDay=!!(loInfo&&loInfo.isLeftover);
  const isSkipped = !!SKIPPED[sk(person,day,s)];
  const hasSkips = SLOTS.some(function(sl){return !!SKIPPED[sk(person,day,sl)];});
  const hasAnyEatOut = SLOTS.some(function(sl){const eo=EAT_OUT[sk(person,day,sl)];return eo&&eo.kcal>0;});
  const showBanner = !isLeftoverDay && (hasSkips || hasAnyEatOut || hasOverrides);
  // For leftovers, compute macros using the cook day's adjustment instead of this day's
  const cookDay=isLeftoverDay?loInfo.cookDay:day;
  // Compute the total cook batch size for snapping purposes.
  // On a leftover day, look up the cook day's entry (which carries totalServings).
  let cookLoInfo = loInfo;
  if (isLeftoverDay && loInfo) {
    const cookKey = sk(person, loInfo.cookDay, s);
    cookLoInfo = leftovers[cookKey] || loInfo;
  }
  const mealTotalServings = (cookLoInfo && !cookLoInfo.isLeftover)
    ? (cookLoInfo.totalServings || cookLoInfo.servings || 1)
    : 1;
  const macroResult = computeCardMacros(port, person, cookDay, s, cookServings, showBanner, mealTotalServings);
  const pm = macroResult.pm;
  const adjBanner = macroResult.adjBanner;
  if(macroResult.ingrHtml) ingrHtml = macroResult.ingrHtml;

  // Cross-person cook: replace ingredient HTML with real combined amounts.
  // The cook person's portion × their servings + other person's actual portion.
  // cookServings used above was totalServings (him×2), which is wrong when
  // portions differ. Rebuild with the real amounts.
  // Skip for same-day shared batches — the Shared tab owns the combined
  // view; individual tabs render per-serving.
  if(loInfo&&loInfo.crossPersonCook&&cardShowsCombinedHeader(loInfo)){
    var cookBal=getBalancedSlotIngredients(person,day,s);
    // Iterate loInfo.portions for the full combined batch. Each portion
    // contributes its own per-serving balance × 1; totalServings = portions
    // length. Works for any mix of cross-person + same-person leftovers.
    var batchPortions=[];
    if(loInfo.portions){
      loInfo.portions.forEach(function(pt){
        var bal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
        if(bal)batchPortions.push({bal:bal});
      });
    }
    if(cookBal&&batchPortions.length>=2){
      displayServings=batchPortions.length;
      ingrSectionTitle='🥗 Combined ingredients (serves '+batchPortions.length+')';
      var ovrIngr2=applyOverrides(port,person,day,s);
      ingrHtml=cookBal.map(function(ci,idx){
        var combinedAmt=0;
        batchPortions.forEach(function(bp){
          for(var k=0;k<bp.bal.length;k++){
            if(bp.bal[k].dbKey===ci.dbKey){combinedAmt+=bp.bal[k].amt;break;}
          }
        });
        var origIng=ovrIngr2[idx]||{dbKey:ci.dbKey,amt:ci.origAmt||ci.amt,role:ci.role,scalable:ci.scalable};
        return buildIngrEditRow(origIng,Math.round(combinedAmt*1000)/1000,person,day,s,idx);
      }).join('');
      ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';
    }
  }
  const mFat=pm.fat||0,mCarb=pm.carb||0;
  let mMacroKcal=pm.pro*4+mFat*9+mCarb*4;
  if(!mMacroKcal)mMacroKcal=pm.kcal||1;
  const mPct=Math.round(pm.pro*4/mMacroKcal*100);
  const fPct2=Math.round(mFat*9/mMacroKcal*100);
  const cPct2=100-mPct-fPct2;
  // Compute fv text from the ACTUAL balanced ingredients on this card so
  // it reflects scaling — replaces the old static `port.fv` property
  // which frequently drifted from real veg/fruit totals. Falls back to
  // base recipe ingredients when no balanced data (e.g. pre-randomize).
  const fvIngr=getBalancedSlotIngredients(person,day,s)
             ||applyOverrides(port,person,day,s)
             ||activeMeal.ingredients;
  const fvText=computeFvText(fvIngr);
  const macroLine=pm.kcal+' kcal · P '+pm.pro+'g ('+mPct+'%) · C '+mCarb+'g ('+cPct2+'%) · F '+mFat+'g ('+fPct2+'%)'+(fvText?' · '+fvText:'');

  const colorSteps=activeMeal._colorSteps||activeMeal.steps||[];
  const stepsHtml=colorSteps.map(function(st){return'<li>'+st+'</li>'}).join('');

  const skipPill='<div class="mc-pill mc-pill-skip'+(isSkipped?' on':'')+'" onclick="event.stopPropagation();toggleSkip(\''+person+'\',\''+day+'\',\''+s+'\')">Skip</div>';

  const eoKey=sk(person,day,s);
  const isEatOut=!!EAT_OUT[eoKey];
  const eoPill='<div class="mc-pill mc-pill-eo'+(isEatOut?' on':'')+'" onclick="event.stopPropagation();toggleEatOut(\''+person+'\',\''+day+'\',\''+s+'\')">Eat Out</div>';
  const topRowPills='<div class="mc-pills">'+(isSkipped||isEatOut?'':leftoverPill+cookPill)
    +(isSkipped?'':isEatOut?'':sharedPill)
    +skipPill
    +eoPill
    +'</div>';

  // Build skip summary when skipped
  let skipSummary='';
  if(isSkipped){
    const origMacros=getPortMacrosOvr(port,person,day,s);
    const slotIdx=ADJ_SLOTS.indexOf(s);
    // Shake is before all ADJ_SLOTS, so all are "later"
    const startIdx=(s==='shake')?0:slotIdx+1;
    const adjResult=buildAdjCheckboxes(person,day,startIdx,'');

    skipSummary='<div class="skip-summary">Skipped: '+origMacros.kcal+' kcal · P '+origMacros.pro+'g · C '+origMacros.carb+'g · F '+origMacros.fat+'g'
      +(adjResult.hasAny?adjResult.html:'')+'</div>';
  }

  if(isEatOut){
    const eo=EAT_OUT[eoKey];
    return buildEatOutFormHtml(person, day, s, k, eo, topRowPills, setPill);
  }

  return '<div class="mc slot-'+s+(isOpen?' open':'')+(isSkipped?' skipped':'')+'" id="mc_'+k+'">'
    +'<div class="mc-top"><div class="mc-top-row"><div class="slot-label">'+SLOT_LABEL[s]+setPill+'</div>'+topRowPills+'</div>'
    +'<select class="meal-select" onchange="changeMeal(\''+s+'\',this.value)">'+opts+'</select></div>'
    +skipSummary
    +'<div class="mc-meta" onclick="toggleCard(\''+k+'\')"><div><div class="mc-macros">'+macroLine+'</div>'
    +macroBar(pm.kcal,pm.pro,mFat,mCarb,person)
    +'</div><div class="expand-btn">⌄</div></div>'
    +notePill
    +'<div class="mc-body">'
    +adjBanner
    +'<div class="bsec"><div class="bsec-title ingr" style="display:flex;align-items:center;justify-content:space-between">'+ingrSectionTitle+'<button style="border:none;background:var(--shop);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;cursor:pointer" onclick="event.stopPropagation();addTempIngredient(\''+person+'\',\''+day+'\',\''+s+'\')">+</button></div>'+ingrHtml+'</div>'
    +'<div class="bsec"><div class="bsec-title cook">👨‍🍳 How to make it</div><ol class="step-list">'+stepsHtml+'</ol></div>'
    +'</div></div>';
}

      +'<div class="eo-field"><label>Protein</label><input id="ls_'+lsKey+'_pro" type="number" min="0" value="'+(ls.pro!=null?ls.pro:'')+'"'+macroDisabled+' oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'pro\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div>'
      +'<div class="eo-field"><label>Fat</label><input id="ls_'+lsKey+'_fat" type="number" min="0" value="'+(ls.fat!=null?ls.fat:'')+'"'+macroDisabled+' oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'fat\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div>'
      +'<div class="eo-field"><label>Carbs</label><input id="ls_'+lsKey+'_carb" type="number" min="0" value="'+(ls.carb!=null?ls.carb:'')+'"'+macroDisabled+' oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'carb\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div></div>'
      +'</div></div>';
  }
  return '<div style="padding:8px 12px"><button class="rf-add-ingr-btn" onclick="addLateSnack(\''+person+'\',\''+day+'\')">+ Add Late Night Snack</button></div>';
}

// ── Meals render ────────────────────────────────────────────
function renderMeals(){

  // waste-nudged). Invalidating would force a rebuild from scratch on

    }

    if(sharedSchedOpen){

          const isShared=(state==='shared');
          const grn='rgba(52,211,153,';const red='rgba(239,68,68,';const prp='rgba(167,139,250,';const yel='rgba(245,158,11,';
          const himManual=!!MANUAL_SET[sk('him',dd,ss)];

          const rClick=isPaintCol
            ?'onclick="event.stopPropagation();paintTap(\''+de+'\',\'right\',\''+se+'\')"'
            :'onmousedown="event.stopPropagation();schedStartPress(\''+de+'\',\''+se+'\')" onmouseup="event.stopPropagation();schedEndPress(\''+de+'\',\''+se+'\',\'right\')" ontouchstart="event.stopPropagation();event.preventDefault();schedStartPress(\''+de+'\',\''+se+'\')" ontouchend="event.stopPropagation();event.preventDefault();schedEndPress(\''+de+'\',\''+se+'\',\'right\')" ontouchcancel="clearTimeout(_schedLongPress);_schedLongPress=null"';
          // 2026-05-03 (revised): center zone is paintable too. In paint mode

          const cClick=isPaintCol

            :'onclick="event.stopPropagation();schedTapCenter(\''+de+'\',\''+se+'\')"';
          // 2026-05-03: full 4-side highlight when only ONE side is highlighted

          const lSelfHi=isShared||himSkip||(himManual&&lNormal)||!!lGroup||(isPaintCol&&himQueued);
          const rSelfHi=isShared||herSkip||(herManual&&rNormal)||!!rGroup||(isPaintCol&&herQueued);
          const lOnlyHi=lSelfHi&&!rSelfHi;
          const rOnlyHi=rSelfHi&&!lSelfHi;
          const lBdrRightFinal=lOnlyHi?lBdr:(rOnlyHi?'none':(lBg!==rBg?'1.5px solid '+midCol:'none'));
          const rBdrLeftFinal=rOnlyHi?rBdr:'none';
          // 2026-05-03 (revised): center zone bg + top/bottom borders. Always
          // SOLID (not transparent) so the pill looks continuous — fixes the
          // "gap with no top/bottom lines" complaint. Color priority:
          //   1. Both halves in SAME link group (link state wins over shared green):
          //      both leftovers → yellow bg + group outline; both anchors → transparent
          //      bg + group outline.
          //   2. Both Him+Her queued in paint mode → orange (matches halves).
          //   3. Shared → green.
          //   4. Both eat-out → red.
          //   5. Both Manual (non-link) → purple.
          //   6. Otherwise → gray border, transparent bg (continuous with halves).
          let cBg, cBdrTopBot;
          const bothSameGroup = lGroup && lGroup === rGroup;
          const bothPaintQueued = isPaintCol && himQueued && herQueued;
          if(bothSameGroup && lIsLeftover && rIsLeftover){
            cBg = yel+'.25)';
            cBdrTopBot = '2px solid rgba('+lGroupRgb+',.85)';
          } else if(bothSameGroup && lIsAnchor && rIsAnchor){

          } else if(bothPaintQueued){

          }
          html+='<div class="sched-pill-wrap" style="'+dimStyle+'">'

            +'<div class="sched-pill-mid" style="background:'+cBg+';border-top:'+cBdrTopBot+';border-bottom:'+cBdrTopBot+'" '+cClick+'></div>'
            +'<div class="sched-pill-half sched-pill-r" style="background:'+rBg+';border:'+rBdr+';border-left:'+rBdrLeftFinal+';color:'+rCol+'" '+rClick+'>'+rLabel+'</div>'
            +'</div>';
        });
      });
      html+='</div>';
      // Meal painting UI
      html+='<div class="paint-bar">';
      if(_paintMode){
        const paintMeal=getMeal(_paintMealId);
        // 2026-05-03: paint mode now cross-column (any cell paintable). The

        html+='<div class="paint-info">Assigning: '+((paintMeal||{}).label||'?')+'</div>';

        html+='<div class="sched-btn" style="background:var(--shop);color:#000;font-weight:700;border-color:var(--shop)" onclick="event.stopPropagation();paintAccept()">Assign</div>';
        html+='</div>';
      } else {

          catMeals.forEach(function(m){

          });
        }
        html+='<select id="paintMealSel" class="paint-select" style="flex:1;min-width:0;text-overflow:ellipsis" onchange="onPaintMealChange()">';
        html+=mealOpts+'</select>';

      html+='</div>';

    html+='</div>';
    // Randomize button is now in the Schedule Meals header
  }

  // Shared view — render shared cards and return
  if(person==='shared'){

  const other=person==='him'?'her':'him';

  SLOTS.forEach(function(s){

function toggleCard(k){
  openCards[k]=!openCards[k];
  const card=document.getElementById('mc_'+k);
  if(card)card.classList.toggle('open',openCards[k]);
  // Mirror open state between him and her for the same day/slot so switching
  // person tabs keeps the same cards expanded (layout + scroll stays consistent).
  const parts=k.split('_');
  if(parts.length>=3&&(parts[0]==='him'||parts[0]==='her')){
    const other=parts[0]==='him'?'her':'him';
    const otherKey=other+'_'+parts.slice(1).join('_');
    openCards[otherKey]=openCards[k];
    const otherCard=document.getElementById('mc_'+otherKey);
    if(otherCard)otherCard.classList.toggle('open',openCards[k]);
  }
}
function toggleSkip(p,d,s){const k=sk(p,d,s);SKIPPED[k]=!SKIPPED[k];if(!SKIPPED[k]){delete SKIPPED[k];delete MANUAL_SET[k];}else{delete EAT_OUT[k];MANUAL_SET[k]=true;}invalidateLeftoverCache();renderMeals();}
function addLateSnack(p,d){LATE_SNACK[pk(p,d)]={name:'',kcal:null,pro:null,fat:null,carb:null};renderMeals();}
function removeLateSnack(p,d){delete LATE_SNACK[pk(p,d)];renderMeals();}
function setLateSnackField(p,d,field,val){
  const k=pk(p,d);if(!LATE_SNACK[k])return;
  if(field==='name')LATE_SNACK[k][field]=val;
  else{const n=Math.max(0,parseInt(val)||0);LATE_SNACK[k][field]=n;}
}
// Late-snack ingredient mode. When LATE_SNACK[k].ingredients is non-empty,
// macros (kcal/pro/fat/carb) are derived from them and shopping picks them
// up. Manual-mode (no ingredients) keeps existing behavior — user types
// macros directly and nothing is shopped. Late snack does NOT participate
// in the day balancer or any auto-adjust cycle (the cache builder + balancer
// already skip 'late_snack'), so adding ingredients here can never disturb
// other slots in the day.
function recomputeLateSnackMacros(p,d){
  const k=pk(p,d);
  const ls=LATE_SNACK[k]; if(!ls) return;
  if(!ls.ingredients||!ls.ingredients.length) return;
  let kcal=0, pro=0, fat=0, carb=0;
  ls.ingredients.forEach(function(ing){
    const db=NUTRI_DB[ing.dbKey]; if(!db) return;
    kcal+=db.kcal*ing.amt;
    pro+=(db.pro||0)*ing.amt;
    fat+=(db.fat||0)*ing.amt;
    carb+=(db.carb||0)*ing.amt;
  });
  ls.kcal=Math.round(kcal);
  ls.pro=Math.round(pro);
  ls.fat=Math.round(fat);
  ls.carb=Math.round(carb);
}
function addLateSnackIngredient(p,d){
  const overlay=document.getElementById('calPopupOverlay');
  if(!overlay)return;
  const keys=Object.keys(NUTRI_DB).sort();
  let optsHtml='<option value="">— Select ingredient —</option>';
  keys.forEach(function(k){
    const db=NUTRI_DB[k];
    optsHtml+='<option value="'+k+'">'+k+' ('+db.kcal+' kcal/'+db.unit+')</option>';
  });
  overlay.innerHTML='<div class="cal-popup-overlay" onclick="if(event.target===this){document.getElementById(\'calPopupOverlay\').style.display=\'none\';}">'
    +'<div style="background:var(--bg-card);border-radius:14px;padding:20px;width:85%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.5)">'
    +'<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">Add Late Snack Ingredient</div>'
    +'<select id="lsIngrSelect" style="width:100%;padding:8px;font-size:16px;background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:8px;margin-bottom:10px">'+optsHtml+'</select>'
    +'<div style="display:flex;gap:8px">'
    +'<button style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--gray);font-size:13px;font-weight:600;cursor:pointer" onclick="document.getElementById(\'calPopupOverlay\').style.display=\'none\'">Cancel</button>'
    +'<button style="flex:1;padding:10px;border:none;border-radius:8px;background:var(--shop);color:#000;font-size:13px;font-weight:700;cursor:pointer" onclick="confirmLateSnackIngredient(\''+p+'\',\''+d+'\')">Add</button>'
    +'</div></div></div>';
  overlay.style.display='';
}
function confirmLateSnackIngredient(p,d){
  const sel=document.getElementById('lsIngrSelect');
  if(!sel||!sel.value)return;
  const dbKey=sel.value;
  const db=NUTRI_DB[dbKey]; if(!db) return;
  const k=pk(p,d);
  if(!LATE_SNACK[k])LATE_SNACK[k]={name:'',kcal:null,pro:null,fat:null,carb:null};
  if(!LATE_SNACK[k].ingredients)LATE_SNACK[k].ingredients=[];
  const defaultAmt=db.unit==='cup'?0.5:db.unit==='tbsp'?1:db.unit==='oz'?4:1;
  LATE_SNACK[k].ingredients.push({dbKey:dbKey, amt:defaultAmt});
  recomputeLateSnackMacros(p,d);
  document.getElementById('calPopupOverlay').style.display='none';
  renderMeals();
  autoSaveWeek();
}
function removeLateSnackIngredient(p,d,idx){
  const k=pk(p,d);
  const ls=LATE_SNACK[k]; if(!ls||!ls.ingredients) return;
  ls.ingredients.splice(idx,1);
  if(ls.ingredients.length===0){
    delete ls.ingredients;
    // Macros stay at last-computed values; user can edit manually now.
  } else {
    recomputeLateSnackMacros(p,d);
  }
  renderMeals();
  autoSaveWeek();
}
function setLateSnackIngredientAmt(p,d,idx,val){
  const amt=parseFloat(val);
  if(isNaN(amt)||amt<0)return;
  const k=pk(p,d);
  const ls=LATE_SNACK[k]; if(!ls||!ls.ingredients||!ls.ingredients[idx]) return;
  ls.ingredients[idx].amt=amt;
  recomputeLateSnackMacros(p,d);
  renderMeals();
  autoSaveWeek();
}

function changeMeal(slot,mealId){
  const selKey=sk(person,day,slot);
  stampSel(selKey,mealId);
  MANUAL_SET[selKey]=true;
  // Clear schedule state — manual choice overrides the plan
  const schedKey=dk(day,slot);
  const schedState=SHARED_SCHEDULE[schedKey];
  if(schedState){
    // If shared, clear it (manual pick breaks sharing)
    // If eat-out for this person, clear it (they're now eating a home meal)
    if(schedState==='shared') delete SHARED_SCHEDULE[schedKey];
    else if(person==='him'&&(schedState==='skip-him')) delete SHARED_SCHEDULE[schedKey];
    else if(person==='her'&&(schedState==='skip-her')) delete SHARED_SCHEDULE[schedKey];
    else if(person==='him'&&schedState==='skip-both') SHARED_SCHEDULE[schedKey]='skip-her';
    else if(person==='her'&&schedState==='skip-both') SHARED_SCHEDULE[schedKey]='skip-him';
    saveSharedSchedule();
  }

function toggleShared(slot,checked){
  const other=person==='him'?'her':'him';
  if(checked){
    // Set the other person's meal to match — manual shared
    const myId=getMealId(person,day,slot);
    if(myId){
      const otherKey=sk(other,day,slot);
      stampSel(otherKey,myId);
      clearOverrides(other,day,slot);
      // Mark both as manual set and update schedule to shared
      MANUAL_SET[sk(person,day,slot)]=true;
      MANUAL_SET[otherKey]=true;
      SHARED_SCHEDULE[dk(day,slot)]='shared';
      saveSharedSchedule();
    }
  } else {
    // Unshare — randomize the other person's meal for that slot
    const candidates=getMealsForSlot(slot).filter(function(m){return m[other];});
    const myId=getMealId(person,day,slot);
    const others=candidates.filter(function(m){return m.id!==myId;});
    if(others.length){
      const pick=others[Math.floor(Math.random()*others.length)];
      const otherKey=sk(other,day,slot);
      stampSel(otherKey,pick.id);
      clearOverrides(other,day,slot);
    }
  }
  invalidateLeftoverCache();autoSaveWeek();renderMeals();if(topTab==='shop')renderShop();
}
