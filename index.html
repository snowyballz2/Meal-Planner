    // aren't reproducible otherwise if prior state populated last-week data.
    var lastSel = (weekData.last && weekData.last.sel) ? clone(weekData.last.sel) : {};
    // Capture _dayBalancedCache and _leftoverCache. These hold the
    // post-randomize pipeline mutations (unifyCrossPersonRatios,
    // snapBatchTotals, postBalanceWastePass, snapBatchTotalsToGrid,
    // boostBatchVegForDailyTarget, snapSoloSlotAmountsToGrid). Without
    // capturing them, restore() invalidates the cache and a rebuild
    // produces different (day-balancer-only) numbers — meaning inspectDay
    // showed totals that didn't match what runOne measured. Bug fix.
    var dayBal = (typeof _dayBalancedCache==='object' && _dayBalancedCache) ? clone(_dayBalancedCache) : {};
    var leftover = (typeof _leftoverCache==='object' && _leftoverCache) ? clone(_leftoverCache) : null;
    return{SEL:clone(SEL),SKIPPED:clone(SKIPPED),EAT_OUT:clone(EAT_OUT),MANUAL_SET:clone(MANUAL_SET),SHARED_SCHEDULE:clone(SHARED_SCHEDULE),ADJ_TARGETS:clone(ADJ_TARGETS),OVERRIDES:clone(OVERRIDES),LATE_SNACK:clone(LATE_SNACK),_lastSel:lastSel,_dayBalancedCache:dayBal,_leftoverCache:leftover};
  }
  function replace(g,v){Object.keys(g).forEach(function(k){delete g[k];});Object.keys(v).forEach(function(k){g[k]=v[k];});}
  function restore(s){
    replace(SEL,s.SEL);replace(SKIPPED,s.SKIPPED);replace(EAT_OUT,s.EAT_OUT);replace(MANUAL_SET,s.MANUAL_SET);replace(SHARED_SCHEDULE,s.SHARED_SCHEDULE);replace(ADJ_TARGETS,s.ADJ_TARGETS);replace(OVERRIDES,s.OVERRIDES);replace(LATE_SNACK,s.LATE_SNACK);

    // captured. If the snapshot doesn't include caches (legacy snapshots), fall
    // back to invalidate so callers get a fresh rebuild.
    if (s._dayBalancedCache) {

      // leak back into the stored snapshot. Symmetric with _leftoverCache
      // clone below.
      Object.keys(_dayBalancedCache).forEach(function(k){delete _dayBalancedCache[k];});
      Object.keys(s._dayBalancedCache).forEach(function(k){_dayBalancedCache[k]=JSON.parse(JSON.stringify(s._dayBalancedCache[k]));});

      invalidateDayBalancedCache();

    } else {
      _leftoverCache = null;
    }
  }

  // High-fat dinners used by applyVaried() to pre-lock a "rich dinner" day
  // into the random test config. Must match live meal IDs.
  //   - thai_tofu_curry: removed in a prior session (dropped here)
  //   - filet_din: 33% fat% after 2026-04-23 trim, still the highest-fat dinner
  var HIGH_FAT_MEALS=['coconut_turkey_curry','shrimp_coconut_curry','filet_din'];
  var SHARING_CONFIGS={
    'all-shared-dinner':function(){DAYS.forEach(function(d){SHARED_SCHEDULE[dk(d,'dinner')]='shared';});},
    'all-solo':function(){/* default */},
    'alternating':function(){DAYS.forEach(function(d,i){SHARED_SCHEDULE[dk(d,'dinner')]=(i%2===0)?'shared':undefined;if(!SHARED_SCHEDULE[dk(d,'dinner')])delete SHARED_SCHEDULE[dk(d,'dinner')];});},
    'him-heavy-skip':function(){['Tuesday','Thursday','Saturday'].forEach(function(d){SKIPPED[sk('him',d,'snack')]=true;SKIPPED[sk('him',d,'breakfast')]=true;});}
  };

  function applyVaried(rng){
    var cfg={eatOuts:0,skips:0,locks:0,shared:0};
    // Track every household placement so we don't manufacture INV11/INV14
    // violations the randomizer can't fix (MANUAL_SET bypasses the variety
    // filter and reroll passes). Enforce gap >= 5 between same-meal placements
    // — matches INV14's 5-day window and conservatively also prevents INV11
    // since the leftover detector's batch window is 3 days (cook + 2 leftovers
    // = max lastDayIdx of cook+2; INV11 needs gap_days >= 2 ⇒ next anchor
    // ≥ cook+5).
    var placed=[]; // [{mealId, dayIdx}]
    function wouldViolate(mealId, dayIdx){
      for(var i=0;i<placed.length;i++){
        if(placed[i].mealId===mealId && Math.abs(placed[i].dayIdx-dayIdx)<5)return true;
      }
      return false;
    }
    ['him','her'].forEach(function(p){
      // Eat-outs AND skips both excluded — focus stress on manual locks and
      // random sharing since those are the pipeline-driven variations.
      var lk=Math.floor(rng()*4);
      for(var i=0;i<lk;i++){
        var d=DAYS[Math.floor(rng()*7)];
        var s=(rng()<0.5)?'lunch':'dinner';
        var k=sk(p,d,s);
        if(EAT_OUT[k]||SKIPPED[k])continue;
        if(MANUAL_SET[k])continue; // skip overwrites of an earlier pick
        // Try each meal in shuffled order; place the first non-conflicting one.
        // If all 3 high-fat meals conflict at this day, skip this attempt
        // (don't increment cfg.locks — counter reflects successful placements).
        var pool=HIGH_FAT_MEALS.slice();
        for(var x=pool.length-1;x>0;x--){
          var j=Math.floor(rng()*(x+1));
          var tmp=pool[x];pool[x]=pool[j];pool[j]=tmp;

        var dayIdx=DAYS.indexOf(d);
        var meal=null;
        for(var m=0;m<pool.length;m++){
          if(!wouldViolate(pool[m],dayIdx)){meal=pool[m];break;}
        }
        if(!meal)continue;
        SEL[k]=meal;
        MANUAL_SET[k]=true;
        placed.push({mealId:meal,dayIdx:dayIdx});
        cfg.locks++;
      }
    });
    var sh=Math.floor(rng()*4);
    for(var i=0;i<sh;i++){
      var d=DAYS[Math.floor(rng()*7)];
      SHARED_SCHEDULE[dk(d,'dinner')]='shared';cfg.shared++;
    }
    return cfg;
  }

  function measureDay(p,d){
    var calT=CAL_BASE[p],proT=PRO_TARGET[p];
    var t=calcTotals(p,d);
    var fv=computeDailyFV(p,d);
    var mk=t.pro*4+t.fat*9+t.carb*4;
    var carbPct=mk>0?(t.carb*4)/mk:0;
    var fatPct=mk>0?(t.fat*9)/mk:0;
    var kd=t.kcal-calT;
    return{p:p,d:d,kcal:t.kcal,kcalDelta:kd,pro:t.pro,proDelta:t.pro-proT,carbPct:carbPct,fatPct:fatPct,veg:fv.veg,fruit:fv.fruit,

  }

  function collectVegCeilings(){
    var mx={};
    ['him','her'].forEach(function(p){
      DAYS.forEach(function(d){
        ['breakfast','lunch','snack','dinner'].forEach(function(s){
          if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
          var bal=getBalancedSlotIngredients(p,d,s);if(!bal)return;
          bal.forEach(function(i){
            if(i.role!=='veg')return;
            var db=NUTRI_DB[i.dbKey];if(!db)return;
            var cups=(db.unit==='cup')?i.amt:(db.unit==='each'&&db.cupsEach?i.amt*db.cupsEach:0);

        });
      });
    });

  }

  function parseInvariants(violations){
    var counts={INV1:0,INV2:0,INV3:0,INV4:0,INV5:0,INV6:0,INV7:0,INV8:0,INV9:0,INV10:0,INV11:0,INV12:0,INV13:0,INV14:0,INV15:0,INV16:0,INV17:0,INV18:0,INV19:0,INV20:0,INV20Soft:0,INV21:0,INV22:0};

    // on the same state must produce identical results. If they differ, that
    // means something between the two calls mutated state (cache rebuild,
    // lazy initialization, side effect) — a real snapshot/restore consistency
    // bug that would silently corrupt invCounts. Throw loudly so the harness

    // Capture meal picks per slot BEFORE restore — SEL currently holds the
    // randomized state we want to analyze.
    var picks={breakfast:{},lunch:{},dinner:{},snack:{}};

    // re-enter the exact finalized state of this seed for ingredient-level
    // drill-down. Includes all captured globals (SEL, weekData.last.sel, etc.)
    // via the same snapshot() helper. Small cost: a few KB per run.
    var postSnap=snapshot();

    // run starts from this run's output (used by runStandard2 to simulate
    // real-world repeated Randomize clicks and exercise state-evolution paths).
    if(!opts.persistState) restore(snap);

    var nonInv6=violations.filter(function(v){

    }).slice(0,30);

    // metrics even when no INV18 violation fires (rate ≤10%).

    var result={mode:mode,seed:seed,config:cfg,days:days,invCounts:invCounts,invSample:violations.slice(0,20),invSampleNonInv6:nonInv6,vegCeilings:vegCeilings,leftoversEaten:leftoversEaten,picks:picks,inv14Violations:inv14Violations,rbaStats:rbaStats,timing:timing,postSnap:postSnap};

    // and then calling inspectRun(seed) silently restored an old batch's

  // Inspect helpers — restore the saved post-randomize state for a specific
  // seed/run so the caller can use window.getBalancedSlotIngredients, calcTotals,
  // getMealId, etc. as if the randomize just finished. Caller MUST call
  // MPStress.exitInspect() when done to restore original state.

      // treat as seed if it doesn't match index position's seed

        if(!bal) return;
        var meal = getMeal(mealId);
        var kcal=0,pro=0,carb=0,fat=0;
        var ingredients = bal.map(function(i){
          var db = NUTRI_DB[i.dbKey]; if(!db) return null;
          kcal += db.kcal*i.amt; pro += db.pro*i.amt; carb += db.carb*i.amt; fat += db.fat*i.amt;

    // INV6 severity: parse `(+N%)` from each INV6 sample and bucket by
    // drift magnitude. Lets the report show the distribution so a few
    // extreme distortions stand out from a long tail of minor ones.
    var inv6Severity={'<60':0,'60-80':0,'80-100':0,'100-150':0,'150-200':0,'200-300':0,'>300':0};
    var inv6TopMeals={}; // mealId -> count
    var inv6MaxPct=0;
    runs.forEach(function(r){
      timings.push(r.timing);
      Object.keys(r.invCounts).forEach(function(k){invTotals[k]+=r.invCounts[k];});
      if(r.invSampleNonInv6&&r.invSampleNonInv6.length>0&&invSamples.length<20)invSamples.push({seed:r.seed,sample:r.invSampleNonInv6});
      Object.keys(r.vegCeilings).forEach(function(k){if(r.vegCeilings[k]>(vegCeilingAll[k]||0))vegCeilingAll[k]=r.vegCeilings[k];});
      if(r.leftoversEaten){
        leftoversEatenTotal.him+=r.leftoversEaten.him||0;
        leftoversEatenTotal.her+=r.leftoversEaten.her||0;
      }
      if(r.rbaStats){
        rbaCallsTotal+=r.rbaStats.callCount||0;
        rbaCapHitsTotal+=r.rbaStats.capHits||0;
        if(r.rbaStats.capRate>rbaMaxRate)rbaMaxRate=r.rbaStats.capRate;
      }
      // INV6 severity buckets — parse from invSample which contains up to 20
      // violations per run. Representative sample, not exhaustive, but good
      // enough to show distribution shape.
      (r.invSample||[]).forEach(function(s){
        if(s.indexOf('INV6 ')!==0)return;
        var m=s.match(/\(([+-]?\d+)%\)/);
        if(!m)return;
        var pct=Math.abs(parseInt(m[1]));
        if(pct>inv6MaxPct)inv6MaxPct=pct;
        if(pct<60)inv6Severity['<60']++;
        else if(pct<80)inv6Severity['60-80']++;
        else if(pct<100)inv6Severity['80-100']++;
        else if(pct<150)inv6Severity['100-150']++;
        else if(pct<200)inv6Severity['150-200']++;
        else if(pct<300)inv6Severity['200-300']++;
        else inv6Severity['>300']++;
        var mm=s.match(/INV6[^:]*:\s*(?:him|her)\s+\w+\/\w+\s+(\S+)/);
        if(mm)inv6TopMeals[mm[1]]=(inv6TopMeals[mm[1]]||0)+1;
      });
      r.days.forEach(function(day){
        total++;
        var f=day.fails;
        var anyFail=false;
        Object.keys(f).forEach(function(k){if(f[k]>0){missCounts[k]++;anyFail=true;}});
        if(!anyFail)hits++;
        var kd=day.kcalDelta;
        if(kd<-150)kcalBins['<-150']++;
        else if(kd<-120)kcalBins['-150..-120']++;
        else if(kd<-100)kcalBins['-120..-100']++;
        else if(kd>150)kcalBins['>+150']++;
        else if(kd>120)kcalBins['+120..+150']++;
        else if(kd>100)kcalBins['+100..+120']++;
        var fp=day.fatPct;
        if(fp>0.30){
          if(fp<=0.302)fatBins['30.0-30.2']++;
          else if(fp<=0.305)fatBins['30.2-30.5']++;
          else if(fp<=0.310)fatBins['30.5-31.0']++;
          else if(fp<=0.320)fatBins['31.0-32.0']++;
          else fatBins['>32.0']++;
        }
        var vg=day.veg;
        if(vg<3){
          if(vg>=2.75)vegBins['2.75-3.0']++;
          else if(vg>=2.5)vegBins['2.5-2.75']++;
          else vegBins['<2.5']++;
        }
        if(anyFail){
          ['breakfast','lunch','snack','dinner'].forEach(function(s){
            var mid=getMealId(day.p,day.d,s);
            if(!mid)return;
            var key=day.p+'/'+s+'/'+mid;
            mealMisses[key]=(mealMisses[key]||0)+1;
          });
        }
      });
    });
    var topMeals=Object.keys(mealMisses).map(function(k){return{key:k,count:mealMisses[k]};}).sort(function(a,b){return b.count-a.count;}).slice(0,10);
    var vegFlags=[];
    Object.keys(vegCeilingAll).forEach(function(k){if(vegCeilingAll[k]>3)vegFlags.push({item:k,maxPerServing:Math.round(vegCeilingAll[k]*100)/100});});
    vegFlags.sort(function(a,b){return b.maxPerServing-a.maxPerServing;});
    // Variety stats: aggregate picks across all runs
    var pickTotals={breakfast:{},lunch:{},dinner:{},snack:{}};
    runs.forEach(function(r){
      if(!r.picks)return;
      Object.keys(r.picks).forEach(function(s){
        Object.keys(r.picks[s]).forEach(function(id){
          pickTotals[s][id]=(pickTotals[s][id]||0)+r.picks[s][id];
        });
      });
    });
    var varietyBySlot={};
    Object.keys(pickTotals).forEach(function(s){
      var picks=pickTotals[s];
      var avail=getMealsForSlot(s).filter(function(m){return !m.noRandomize;});
      var availIds=avail.map(function(m){return m.id;});
      var pickedIds=Object.keys(picks);
      var neverPicked=availIds.filter(function(id){return !picks[id];});
      var totalPicks=0;
      pickedIds.forEach(function(id){totalPicks+=picks[id];});
      var entropy=0;
      pickedIds.forEach(function(id){
        var pr=picks[id]/totalPicks;
        if(pr>0)entropy+=-pr*Math.log2(pr);
      });
      var maxEntropy=avail.length>1?Math.log2(avail.length):0;
      var normEntropy=maxEntropy>0?entropy/maxEntropy:0;
      var top=pickedIds.map(function(id){return{id:id,count:picks[id],pct:(picks[id]/totalPicks)*100};})
        .sort(function(a,b){return b.count-a.count;});
      varietyBySlot[s]={
        available:avail.length,
        picked:pickedIds.length,
        neverPickedCount:neverPicked.length,
        neverPickedPct:avail.length>0?(neverPicked.length/avail.length)*100:0,
        neverPickedList:neverPicked,
        totalPicks:totalPicks,
        varietyIndex:normEntropy*100, // 0-100, higher = more variety
        effectiveMealCount:Math.pow(2,entropy),
        topPicks:top.slice(0,5)
      };
    });
    // INV14 breakdown: parse all INV14 violations
    var inv14Meals={};
    var inv14Gaps={0:0,1:0,2:0,3:0,4:0};
    var inv14Persons={him:0,her:0};
    var inv14Total=0;
    runs.forEach(function(r){
      (r.inv14Violations||[]).forEach(function(v){
        // Household format: "... household <mealId> at <p> <d>/<s> and <p> <d>/<s> (gap Nd)"
        var m=v.match(/^INV14 repeat-cook-within-5d: household (\S+) at (him|her) (\S+) and (him|her) (\S+) \(gap (\d+)d\)/);
        if(!m)return;
        inv14Total++;
        // Track both persons involved in the repeat (each fire has 2 cooks)
        inv14Persons[m[2]]++;
        inv14Persons[m[4]]++;
        inv14Meals[m[1]]=(inv14Meals[m[1]]||0)+1;
        var g=parseInt(m[6],10);
        if(g in inv14Gaps)inv14Gaps[g]++;
      });
    });
    var inv14TopMeals=Object.keys(inv14Meals).map(function(k){return{id:k,count:inv14Meals[k]};})
      .sort(function(a,b){return b.count-a.count;}).slice(0,10);
    return{
      nRuns:runs.length,nPersonDays:total,
      primaryHitRate:total>0?(hits/total):0,
      missCounts:missCounts,
      kcalBins:kcalBins,fatBins:fatBins,vegBins:vegBins,
      invTotals:invTotals,
      invAnyFailExceptINV6:Object.keys(invTotals).filter(function(k){return k!=='INV6'&&k!=='INV14'&&k!=='INV15'&&k!=='INV16'&&k!=='INV18'&&k!=='INV20Soft'&&k!=='INV21'&&k!=='INV22'&&invTotals[k]>0;}), // INV19/INV20 hard — count toward "any fail". INV20Soft/INV21/22 tracking-only.
      // INV13 fires per-ingredient that has db.minAmt/maxAmt defined; ingredients without those are exempt by construction.
      invSamples:invSamples,
      topMeals:topMeals,
      vegCeilings:vegCeilingAll,
      vegCeilingFlags:vegFlags,
      avgLeftoversEaten:{
        him:runs.length>0?leftoversEatenTotal.him/runs.length:0,
        her:runs.length>0?leftoversEatenTotal.her/runs.length:0
      },
      // INV18: aggregate cap-hit metrics across all runBalanceAdjusters
      // calls in this batch. avgRate is the OVERALL rate (all runs pooled);
      // worstRunRate is the highest per-run rate observed.
      rbaCap:{
        totalCalls:rbaCallsTotal,
        totalHits:rbaCapHitsTotal,
        avgRate:rbaCallsTotal>0?(rbaCapHitsTotal/rbaCallsTotal):0,
        worstRunRate:rbaMaxRate
      },
      inv6Severity:inv6Severity,
      inv6MaxPct:inv6MaxPct,
      inv6TopMeals:Object.keys(inv6TopMeals).map(function(k){return{id:k,count:inv6TopMeals[k]};}).sort(function(a,b){return b.count-a.count;}).slice(0,5),
      varietyBySlot:varietyBySlot,
      inv14Breakdown:{
        total:inv14Total,
        perRun:runs.length>0?inv14Total/runs.length:0,
        byPerson:inv14Persons,
        byGap:inv14Gaps,
        topMeals:inv14TopMeals
      },
      timing:{avg:timings.reduce(function(a,b){return a+b;},0)/Math.max(timings.length,1),max:Math.max.apply(null,timings)},
      mode:(runs[0]&&runs[0].mode)||'standard'
    };
  }

  function cleanSave(){clearTimeout(_selSaveTimer);saveWeeks();}

  // 2026-05-03: state-cleanliness detection for stress harness.
  // Returns array of "dirty" descriptors, empty if pristine. Used by
  // runStandard2/3/4 to warn at start and tag agg.startedDirty so
  // saveBaseline can refuse to persist a corrupted-state baseline.
  // Excludes SHARED_SCHEDULE because the harness overrides it via
  // _applyStandardSharedSchedule (user's own schedule is restored after).
  function _isPristine(){
    var dirty=[];
    if(Object.keys(SEL).length) dirty.push(Object.keys(SEL).length+' SEL entries');
    if(Object.keys(MANUAL_SET).length) dirty.push(Object.keys(MANUAL_SET).length+' MANUAL_SET');
    if(Object.keys(EAT_OUT).length) dirty.push(Object.keys(EAT_OUT).length+' EAT_OUT');
    if(Object.keys(SKIPPED).length) dirty.push(Object.keys(SKIPPED).length+' SKIPPED');
    if(Object.keys(OVERRIDES).length) dirty.push(Object.keys(OVERRIDES).length+' OVERRIDES');
    if(Object.keys(LATE_SNACK).length) dirty.push(Object.keys(LATE_SNACK).length+' LATE_SNACK');
    if(weekData.last && Object.keys(weekData.last.sel||{}).length) dirty.push(Object.keys(weekData.last.sel).length+' weekData.last.sel entries');
    if(weekData.next && Object.keys(weekData.next.sel||{}).length) dirty.push(Object.keys(weekData.next.sel).length+' weekData.next.sel entries');
    return dirty;
  }

  // 2026-05-03: full state clear for runStandard auto-clean. Globals
  // (SEL, OVERRIDES, etc.) are aliases of weekData.this.*; clearing them
  // clears that week. Also wipes weekData.last/next so the variety filter
  // starts from a clean prev-week pool. Restored via snapshot()/restore()
  // pair around the call site.
  function _clearAllState(){
    Object.keys(SEL).forEach(function(k){delete SEL[k];});
    Object.keys(OVERRIDES).forEach(function(k){delete OVERRIDES[k];});
    Object.keys(MANUAL_SET).forEach(function(k){delete MANUAL_SET[k];});
    Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
    Object.keys(EAT_OUT).forEach(function(k){delete EAT_OUT[k];});
    Object.keys(LATE_SNACK).forEach(function(k){delete LATE_SNACK[k];});
    Object.keys(SHARED_SCHEDULE).forEach(function(k){delete SHARED_SCHEDULE[k];});
    Object.keys(ADJ_TARGETS).forEach(function(k){delete ADJ_TARGETS[k];});
    if(weekData.last){
      if(weekData.last.sel) Object.keys(weekData.last.sel).forEach(function(k){delete weekData.last.sel[k];});
      if(weekData.last.overrides) Object.keys(weekData.last.overrides).forEach(function(k){delete weekData.last.overrides[k];});
      if(weekData.last.manualSet) Object.keys(weekData.last.manualSet).forEach(function(k){delete weekData.last.manualSet[k];});
    }
    if(weekData.next){
      if(weekData.next.sel) Object.keys(weekData.next.sel).forEach(function(k){delete weekData.next.sel[k];});
      if(weekData.next.overrides) Object.keys(weekData.next.overrides).forEach(function(k){delete weekData.next.overrides[k];});
      if(weekData.next.manualSet) Object.keys(weekData.next.manualSet).forEach(function(k){delete weekData.next.manualSet[k];});
    }
    invalidateLeftoverCache();
  }
  function runBaseline(runs){
    runs=runs||50;
    var results=[];
    var baseSeed=12345;
    for(var i=0;i<runs;i++){results.push(runOne('baseline',baseSeed+i,null));}
    cleanSave();
    window._stressRuns=results;
    return aggregate(results);
  }
  // Standard test: fixed 100-run baseline, deterministic seeds 12345..12444.
  // Carry-forward reference for session-over-session comparisons.
  // Logs a table report and returns full aggregate for programmatic inspection.
  // Standard-test shared schedule: 4 shared dinners (Mon/Wed/Fri/Sun) + 1
  // shared lunch (Wed). Everything else solo. Closer to a realistic household
  // workflow than the old "all 7 dinners shared" config, exercises more
  // code paths (solo lunches, solo dinners, INV4 enforcement, Phase 4 her-swap).
  function _applyStandardSharedSchedule(){
    Object.keys(SHARED_SCHEDULE).forEach(function(k){delete SHARED_SCHEDULE[k];});
    ['Monday','Wednesday','Friday','Sunday'].forEach(function(d){
      SHARED_SCHEDULE[dk(d,'dinner')]='shared';
    });
    SHARED_SCHEDULE[dk('Wednesday','lunch')]='shared';
  }
  function runStandard(runs){
    runs=runs||100;
    // 2026-05-03: auto-clear state for Test 1. Prevents the state-corruption
    // class of bugs where prior experiments leak meals/overrides/etc. into
    // the snapshot that every seed restores to. Snapshot+restore wraps the
    // whole run so user's state survives unchanged.
    var userSnap=snapshot();
    _clearAllState();
    _applyStandardSharedSchedule();
    try{
      var results=[];
      var baseSeed=12345;
      for(var i=0;i<runs;i++){results.push(runOne('standard',baseSeed+i,null));}
      window._stressRuns=results;
      var agg=aggregate(results);
      agg.startedDirty=false; // auto-cleared, always clean
      console.log(formatReport(agg));
      return agg;
    }finally{
      restore(userSnap);
      cleanSave(); // persist user's restored state to localStorage
    }
  }
  // Test 2: true-randomized counterpart to runStandard. Differs on THREE axes:
  // (1) nondeterministic — randomizeWeek uses real Math.random, not the
  //     seeded PRNG. Each run walks a different combinatoric path.
  // (2) persistState — no snapshot/restore between runs. Each run starts
  //     from the prior run's output, simulating real-world repeated
  //     Randomize clicks. Exercises state-evolution paths (variety filter
  //     against accumulating recent picks, etc.) that the deterministic
  //     seeded test cannot reach.
  // (3) random prior-week SEL pre-population — before each run, weekData.last.sel
  //     gets ~40% randomly populated. The variety filter reads
  //     weekData[_prevWeekKey()].sel; varying that prior-week state per run
  //     exercises filter code paths that natural state-evolution alone
  //     doesn't reach (since persistState's drift converges into similar
  //     prior-week states across many runs).
  // Tradeoff: failures are NOT directly reproducible (Math.random state
  //   isn't captured). Use postSnap (preserved per run in window._stressRuns)
  //   + MPStress.inspectDay to drill into a failing day after-the-fact.
  function _randomizePriorWeekSel(){
    if(!weekData.last) return;
    if(!weekData.last.sel) weekData.last.sel = {};
    Object.keys(weekData.last.sel).forEach(function(k){delete weekData.last.sel[k];});
    ['him','her'].forEach(function(p){
      DAYS.forEach(function(d){
        ['breakfast','lunch','dinner','snack'].forEach(function(s){
          if(Math.random() > 0.4) return; // ~40% slot population
          var meals = MEALS.filter(function(m){return m.slots && m.slots.indexOf(s)>=0 && m[p];});
          if(!meals.length) return;
          weekData.last.sel[sk(p,d,s)] = meals[Math.floor(Math.random()*meals.length)].id;
        });
      });
    });
  }
  function runStandard2(runs){
    runs=runs||100;
    // 2026-05-03: detect pristine state at start. Test 2 intentionally
    // evolves state (persistState:true) — but if the FIRST run starts from
    // a contaminated baseline, all numbers are skewed. Warn + tag agg so
    // saveBaseline can refuse to persist a corrupted-state baseline.
    var dirty=_isPristine();
    if(dirty.length){
      console.warn('⚠ runStandard2: starting from non-pristine state ('+dirty.join(', ')+'). Numbers may not match clean baselines. saveBaseline will refuse this run unless force:true.');
    }
    var userSched=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
    _applyStandardSharedSchedule();
    var initSnap=snapshot();
    try{
      var results=[];
      for(var i=0;i<runs;i++){
        _randomizePriorWeekSel(); // varies variety-filter input per run
        results.push(runOne('standard2', i, null, {nondeterministic:true, persistState:true}));
      }
      cleanSave();
      window._stressRuns=results;
      var agg=aggregate(results);
      agg.startedDirty=dirty.length>0;
      agg.dirtyDetails=dirty;
      console.log(formatReport(agg));
      return agg;
    }finally{
      restore(initSnap);
      Object.keys(SHARED_SCHEDULE).forEach(function(k){delete SHARED_SCHEDULE[k];});
      Object.keys(userSched).forEach(function(k){SHARED_SCHEDULE[k]=userSched[k];});
    }
  }
  // Test 3: maximally-random variant. Combines true-random Math.random with
  // applyVaried per-run config (random eat-outs, skips, manual locks on
  // high-fat dinners, random shared-slot additions). Exercises code paths
  // that neither Test 1 nor Test 2 hit well: skip kcal redistribution,
  // eat-out kcal absorption, manual-lock interaction with randomizer
  // constraints, sharing-config space.
  //
  // applyVaried mutates SEL/MANUAL_SET/SHARED_SCHEDULE directly. Called
  // INSIDE cfgFn so the mutations land between runOne's snapshot and
  // its restore — they revert at end of each runOne. Math.random as the
  // rng = truly-random varied config (vs runVaried which uses the seeded
  // harness rng for reproducibility). No persistState — each run resets,
  // so applyVaried's random configs accumulate cleanly without drift.
  function runStandard3(runs){
    runs=runs||100;
    // 2026-05-03: detect pristine state at start (same rationale as runStandard2).
    var dirty=_isPristine();
    if(dirty.length){
      console.warn('⚠ runStandard3: starting from non-pristine state ('+dirty.join(', ')+'). Numbers may not match clean baselines. saveBaseline will refuse this run unless force:true.');
    }
    var userSched=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
    _applyStandardSharedSchedule();
    var initSnap=snapshot();
    try{
      var results=[];
      for(var i=0;i<runs;i++){
        results.push(runOne('standard3', i, function(){return applyVaried(Math.random);}, {nondeterministic:true}));
      }
      cleanSave();
      window._stressRuns=results;
      var agg=aggregate(results);
      agg.startedDirty=dirty.length>0;
      agg.dirtyDetails=dirty;
      console.log(formatReport(agg));
      return agg;
    }finally{
      restore(initSnap);
      Object.keys(SHARED_SCHEDULE).forEach(function(k){delete SHARED_SCHEDULE[k];});
      Object.keys(userSched).forEach(function(k){SHARED_SCHEDULE[k]=userSched[k];});
    }
  }
  // Test 4 — shopping-list integrity. Each scenario takes a fully-randomized
  // post-pipeline state and asserts a property of the shopping list. Unlike
  // INV3 (which only checks Both view of cook1/cook2), Test 4 covers per-person
  // views, custom modes, dedupe, late-snack ingredient flow, and per-trip
  // grid alignment. Failures roll up by scenario name with first-N example
  // seeds for drill-down.
  function _t4ShopMap(shop){
    var m={};
    Object.keys(shop).forEach(function(c){
      shop[c].forEach(function(it){
        if(!m[it.dbKey])m[it.dbKey]={his:0,her:0};
        m[it.dbKey].his+=it.hisSum?it.hisSum.num:0;
        m[it.dbKey].her+=it.herSum?it.herSum.num:0;
      });
    });
    return m;
  }
  function _t4ExpectedMap(persons,days){
    // Mirrors buildShoppingList's cook-anchor architecture: each batch's
    // full snapped total is attributed to the cook anchor's person bucket
    // for the trip its cook day falls in. Leftover slots don't contribute
    // (already shopped via the cook anchor).
    var m={};
    var leftovers = computeLeftovers();
    var tripDaySet={};
    days.forEach(function(d){tripDaySet[d]=true;});
    persons.forEach(function(p){
      DAYS.forEach(function(d){
        SLOTS.forEach(function(s){
          if(s==='late_snack')return;
          var k=sk(p,d,s);
          if(SKIPPED[k]||EAT_OUT[k])return;
          var mealId=getMealId(p,d,s);if(!mealId)return;
          var meal=getMeal(mealId);if(!meal||!meal[p])return;
          var port=meal[p];
          if(!port.ingredients||!port.ingredients.length||port.ingredients[0].dbKey===undefined)return;

          var lo = leftovers[k];
          if(lo && lo.isLeftover) return;
          if(!tripDaySet[d]) return;

          if(lo && lo.portions && lo.portions.length > 1){
            lo.portions.forEach(function(pt){
              var bal = getBalancedSlotIngredients(pt.p, pt.d, pt.s);
              var meal2 = getMeal(getMealId(pt.p, pt.d, pt.s));
              var src = bal || (meal2 && meal2[pt.p] ? applyOverrides(meal2[pt.p], pt.p, pt.d, pt.s) : null);
              if(src){
                src.forEach(function(i){
                  if(!m[i.dbKey])m[i.dbKey]={him:0,her:0};
                  m[i.dbKey][p]+=i.amt;
                });
              }
            });
          } else {
            var bal=getBalancedSlotIngredients(p,d,s);
            var src=bal||applyOverrides(port,p,d,s);
            if(src){
              src.forEach(function(i){
                if(!m[i.dbKey])m[i.dbKey]={him:0,her:0};
                m[i.dbKey][p]+=i.amt;
              });
            }
          }
        });
        if(tripDaySet[d]){
          var ls=LATE_SNACK[pk(p,d)];
          if(ls&&ls.ingredients&&ls.ingredients.length){
            ls.ingredients.forEach(function(i){
              if(!m[i.dbKey])m[i.dbKey]={him:0,her:0};
              m[i.dbKey][p]+=i.amt;
            });
          }
        }
      });
    });
    return m;
  }
  function _t4DiffMaps(actual,expected,allowlist){
    allowlist=allowlist||['water'];
    var diffs=[];
    Object.keys(actual).forEach(function(k){
      var a=actual[k];
      var e=expected[k]||{him:0,her:0};
      if(Math.abs(a.his-e.him)>0.001)diffs.push(k+' his shop='+a.his.toFixed(3)+' exp='+e.him.toFixed(3));
      if(Math.abs(a.her-e.her)>0.001)diffs.push(k+' her shop='+a.her.toFixed(3)+' exp='+e.her.toFixed(3));
    });
    Object.keys(expected).forEach(function(k){
      if(allowlist.indexOf(k)>=0)return;
      if(actual[k])return;

  function runStandard4(runs){
    runs=runs||100;
    // 2026-05-03: detect pristine state at start. Test 4 doesn't roll up to
    // a saveBaseline-able agg, but the warning still surfaces user-visible
    // contamination so they can clean before drawing conclusions.
    var dirty=_isPristine();
    if(dirty.length){
      console.warn('⚠ runStandard4: starting from non-pristine state ('+dirty.join(', ')+'). Shopping integrity scenario results may not match clean baselines.');
    }
    var userSched=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
    _applyStandardSharedSchedule();
    var initSnap=snapshot();
    try{
      var stats={}, totalRuns=0, totalFails=0, scenarios=_t4Scenarios();
      scenarios.forEach(function(sc){stats[sc.name]={pass:0,fail:0,errors:[]};});
      var baseSeed=12345;
      for(var i=0;i<runs;i++){
        var seed=baseSeed+i;
        var seedSnap=snapshot();
        try{
          randomizeWeek('shared',(seed|0)+1000000);
          clearTimeout(_selSaveTimer);
          scenarios.forEach(function(sc){
            // Save shopping state before scenario, restore after
            var savedShop=JSON.parse(JSON.stringify(CUSTOM_SHOP_SEL));
            var savedRecipe=JSON.parse(JSON.stringify(CUSTOM_RECIPE_SEL));
            var savedPlan=JSON.parse(JSON.stringify(CUSTOM_PLAN_SEL));
            try{
              var result=sc.run();
              if(result.ok){stats[sc.name].pass++;}
              else{
                stats[sc.name].fail++; totalFails++;
                if(stats[sc.name].errors.length<5){
                  stats[sc.name].errors.push({seed:seed,msg:result.msg});
                }
              }
            }catch(e){
              stats[sc.name].fail++; totalFails++;
              if(stats[sc.name].errors.length<5){
                stats[sc.name].errors.push({seed:seed,msg:'EXCEPTION: '+e.message});
              }
            }finally{
              CUSTOM_SHOP_SEL=savedShop;
              CUSTOM_RECIPE_SEL=savedRecipe;
              CUSTOM_PLAN_SEL=savedPlan;
            }
          });
          totalRuns++;
        }finally{
          restore(seedSnap);
        }
      }
      var report=_t4FormatReport(stats,totalRuns,totalFails,scenarios);
      console.log(report);
      return{stats:stats,totalRuns:totalRuns,totalFails:totalFails,report:report};
    }finally{
      restore(initSnap);
      Object.keys(SHARED_SCHEDULE).forEach(function(k){delete SHARED_SCHEDULE[k];});
      Object.keys(userSched).forEach(function(k){SHARED_SCHEDULE[k]=userSched[k];});
    }
  }
  function _t4FormatReport(stats,totalRuns,totalFails,scenarios){
    var lines=[];
    lines.push('## MPStress.runStandard4 — '+totalRuns+' runs × '+scenarios.length+' scenarios = '+(totalRuns*scenarios.length)+' total scenario-runs');
    lines.push('');
    var passed=Object.keys(stats).filter(function(k){return stats[k].fail===0;}).length;
    lines.push('**'+(totalFails===0?'✅ ALL CLEAN':('⚠️ '+totalFails+' total failures'))+'** — '+passed+'/'+scenarios.length+' scenarios passed all seeds.');
    lines.push('');
    lines.push('| Scenario | Pass | Fail | First failures |');
    lines.push('|---|---:|---:|---|');
    scenarios.forEach(function(sc){
      var s=stats[sc.name];
      var errs=s.errors.length?s.errors.map(function(e){return 'seed '+e.seed+': '+e.msg;}).join(' \\| '):'—';
      lines.push('| '+sc.name+' | '+s.pass+' | '+s.fail+' | '+(s.fail?errs:'—')+' |');
    });
    return lines.join('\n');
  }
  function formatReport(a){
    function pct(v,d){d=d==null?1:d;return v.toFixed(d)+'%';}
    function f(v,d){d=d==null?2:d;return v.toFixed(d);}
    function delta(cur,prev,unit){
      if(prev==null||isNaN(prev))return'—';
      var d=cur-prev;
      var sign=d>=0?'+':'';
      return sign+d.toFixed(unit==='pp'?2:(unit==='pct'?2:0))+(unit||'');
    }
    // INV20 hard-count: total INV20 fires minus INV20Soft (marinara/broth
    // accepted-waste items still fire INV20 for visibility but don't count
    // as hard regressions). The hardFail flag includes INV20 only if its
    // hard portion (= INV20 - INV20Soft) is > 0.
    var _inv20Hard = (a.invTotals.INV20||0) - (a.invTotals.INV20Soft||0);
    var cur={
      primary: a.primaryHitRate*100,
      inv14: a.inv14Breakdown.total,
      inv20Hard: _inv20Hard,
      hardFail: Object.keys(a.invTotals).filter(function(k){
        if(k==='INV20') return _inv20Hard > 0;
        // Tracking-only invariants
        return k!=='INV6'&&k!=='INV14'&&k!=='INV15'&&k!=='INV16'&&k!=='INV18'&&k!=='INV20Soft'&&k!=='INV21'&&k!=='INV22'&&a.invTotals[k]>0;
      }).length,
      closedPct: (function(){
        var ta=0,tc=0;
        ['breakfast','lunch','dinner','snack'].forEach(function(s){
          var v=a.varietyBySlot[s]; if(!v)return;
          ta+=v.available; tc+=v.neverPickedCount;
        });
        return ta>0?(tc/ta)*100:0;
      })(),
      avgVariance: (function(){
        var sum=0,n=0;
        ['breakfast','lunch','dinner','snack'].forEach(function(s){
          var v=a.varietyBySlot[s]; if(!v)return;
          sum+=v.varietyIndex; n++;
        });
        return n>0?sum/n:0;
      })()
    };
    // Mode-specific baseline key so Test 1 (deterministic) and Test 2
    // (true randomized) keep separate reference numbers. Defaults to the
    // legacy key when mode is unknown or 'standard'.
    var mode=a.mode||'standard';
    var baselineKey=(mode==='standard2')?'mealPlannerStressBaseline2':(mode==='standard3')?'mealPlannerStressBaseline3':'mealPlannerStressBaseline';
    var baseline=null;
    try{var raw=localStorage.getItem(baselineKey);if(raw)baseline=JSON.parse(raw);}catch(e){}
    var lines=[];

    // ── HEADER ──────────────────────────────────────────────────
    var fnName=(mode==='standard2')?'runStandard2':(mode==='standard3')?'runStandard3':'runStandard';
    lines.push('## MPStress.'+fnName+' — '+a.nRuns+' runs × 14 person-days = '+a.nPersonDays+' total');
    lines.push('');

    // ── KEY METRICS ─────────────────────────────────────────────
    lines.push('### Key Metrics'+(baseline?' (vs saved baseline)':''));
    lines.push('');
    if(baseline){
      var baseInv20 = (baseline.invTotals && baseline.invTotals.INV20!=null) ? baseline.invTotals.INV20 : null;
      var baseInv20Soft = (baseline.invTotals && baseline.invTotals.INV20Soft!=null) ? baseline.invTotals.INV20Soft : 0;
      var curInv20 = a.invTotals.INV20||0;
      var curInv20Soft = a.invTotals.INV20Soft||0;
      var inv20Cell = function(total, soft){
        return total + (soft>0 ? ' ('+soft+' soft, '+(total-soft)+' hard)' : '');
      };
      lines.push('| Metric | Baseline | Current | Δ |');
      lines.push('|---|---|---|---|');
      lines.push('| Primary hit rate | '+pct(baseline.primary,2)+' | '+pct(cur.primary,2)+' | '+delta(cur.primary,baseline.primary,'pp')+' |');
      lines.push('| INV20 (waste) | '+(baseInv20!=null?inv20Cell(baseInv20,baseInv20Soft):'—')+' | '+inv20Cell(curInv20,curInv20Soft)+' | '+(baseInv20!=null?delta(curInv20,baseInv20,''):'—')+' |');
      lines.push('| INV6 (P/C drift) | '+(baseline.inv6!=null?baseline.inv6:'—')+' | '+(a.invTotals.INV6||0)+' | '+(baseline.inv6!=null?delta(a.invTotals.INV6||0,baseline.inv6,''):'—')+' |');
      lines.push('| INV14 total | '+baseline.inv14+' | '+cur.inv14+' | '+delta(cur.inv14,baseline.inv14,'')+' |');
      lines.push('| Hard invariants | '+(baseline.hardFail===0?'all 0':baseline.hardFail+' fail')+' | '+(cur.hardFail===0?'all 0 ✓':cur.hardFail+' FAIL')+' | '+(cur.hardFail===baseline.hardFail?'unchanged':(cur.hardFail>baseline.hardFail?'+'+(cur.hardFail-baseline.hardFail):(cur.hardFail-baseline.hardFail).toString()))+' |');
      lines.push('| Meals closed-off | '+pct(baseline.closedPct,1)+' | '+pct(cur.closedPct,1)+' | '+delta(cur.closedPct,baseline.closedPct,'pp')+' |');
      lines.push('| Avg variance | '+pct(baseline.avgVariance,1)+' | '+pct(cur.avgVariance,1)+' | '+delta(cur.avgVariance,baseline.avgVariance,'pp')+' |');
    }else{
      var _curInv20=a.invTotals.INV20||0, _curInv20S=a.invTotals.INV20Soft||0;
      lines.push('| Metric | Value |');
      lines.push('|---|---|');
      lines.push('| Primary hit rate | '+pct(cur.primary,2)+' |');
      lines.push('| INV20 (waste) | '+_curInv20+(_curInv20S>0?' ('+_curInv20S+' soft, '+(_curInv20-_curInv20S)+' hard)':'')+' |');
      lines.push('| INV14 total | '+cur.inv14+' ('+f(cur.inv14/a.nRuns,2)+'/run) |');
      lines.push('| Hard invariants | '+(cur.hardFail===0?'all 0 ✓':cur.hardFail+' FAILING')+' |');
      lines.push('| Meals closed-off | '+pct(cur.closedPct,1)+' (never picked) |');
      lines.push('| Avg variance | '+pct(cur.avgVariance,1)+' (uniformity) |');
      lines.push('');
      lines.push('_No baseline saved. Call `MPStress.saveBaseline(agg)` to capture this run as reference._');

    // Show per-category miss counts; if a baseline is loaded, append delta
    // for each category so regressions in specific miss types are visible.

    var allKeys={};

    var missLines=[];
    Object.keys(allKeys).sort().forEach(function(k){

    lines.push('');

    // ── HARD INVARIANTS ─────────────────────────────────────────
    var hardKeys=['INV1','INV2','INV3','INV4','INV5','INV7','INV8','INV9','INV10','INV11','INV12','INV13','INV17','INV19','INV20'];
    // INV20 hard-count subtracts soft-waste fires (marinara, chicken broth)
    // so the "Hard Invariants" line reflects only items that actually need

    var inv20HardCnt = (a.invTotals.INV20||0) - (a.invTotals.INV20Soft||0);
    var firedHard=hardKeys.filter(function(k){

        return k+'='+a.invTotals[k];

    }

    // "all 0" collapse. Lets the user spot balancer-view drift immediately.
    lines.push('- INV17 (balancer↔calcTotals kcal): '+a.invTotals.INV17+(a.invTotals.INV17===0?' ✓':' ⚠ FIRING'));
    lines.push('');

    // ── TRACKING INVARIANTS ─────────────────────────────────────
    // With baseline loaded, append a Δ column for INV6/14/15/16. Without
    // baseline, just show raw values. Tracking-only metrics — informational.
    lines.push('### Tracking Invariants'+(baseline?' (vs baseline)':''));
    lines.push('');
    if(baseline){
      lines.push('| INV | Metric | Baseline | Current | Δ |');
      lines.push('|---|---|---|---|---|');
      lines.push('| INV6 | P/C-ratio | '+(baseline.inv6!=null?baseline.inv6:'—')+' | '+a.invTotals.INV6+' ('+f(a.invTotals.INV6/a.nRuns,2)+'/run) | '+(baseline.inv6!=null?delta(a.invTotals.INV6,baseline.inv6,''):'—')+' |');
      lines.push('| INV14 | cook-within-5d | '+baseline.inv14+' | '+a.inv14Breakdown.total+' (him='+a.inv14Breakdown.byPerson.him+' her='+a.inv14Breakdown.byPerson.her+') | '+delta(a.inv14Breakdown.total,baseline.inv14,'')+' |');
      lines.push('| INV15 | leftovers/wk (him) | '+(baseline.inv15Him!=null?f(baseline.inv15Him,1):'—')+' | '+f(a.avgLeftoversEaten.him,1)+' | '+(baseline.inv15Him!=null?delta(a.avgLeftoversEaten.him,baseline.inv15Him,''):'—')+' |');
      lines.push('| INV16 | leftovers/wk (her) | '+(baseline.inv16Her!=null?f(baseline.inv16Her,1):'—')+' | '+f(a.avgLeftoversEaten.her,1)+' | '+(baseline.inv16Her!=null?delta(a.avgLeftoversEaten.her,baseline.inv16Her,''):'—')+' |');
      var rbaCurStr=f(a.rbaCap.avgRate*100,1)+'% avg, '+f(a.rbaCap.worstRunRate*100,1)+'% worst-run';
      lines.push('| INV18 | rba cap-hit rate | '+(baseline.inv18AvgPct!=null?(f(baseline.inv18AvgPct,1)+'%'):'—')+' | '+rbaCurStr+' | '+(baseline.inv18AvgPct!=null?delta(a.rbaCap.avgRate*100,baseline.inv18AvgPct,'pp'):'—')+' |');
    }else{
      lines.push('| INV | Metric | Value |');
      lines.push('|---|---|---|');
      lines.push('| INV6 | P/C-ratio | '+a.invTotals.INV6+' total ('+f(a.invTotals.INV6/a.nRuns,2)+'/run) |');
      var inv14Val=a.inv14Breakdown.total+' total ('+f(a.inv14Breakdown.perRun,2)+'/run) · him='+a.inv14Breakdown.byPerson.him+' her='+a.inv14Breakdown.byPerson.her;
      lines.push('| INV14 | cook-within-5d | '+inv14Val+' |');
      lines.push('| INV15 | leftovers eaten/wk (him) | '+f(a.avgLeftoversEaten.him,1)+' |');
      lines.push('| INV16 | leftovers eaten/wk (her) | '+f(a.avgLeftoversEaten.her,1)+' |');
      lines.push('| INV18 | rba cap-hit rate | '+f(a.rbaCap.avgRate*100,1)+'% avg ('+a.rbaCap.totalHits+'/'+a.rbaCap.totalCalls+'), '+f(a.rbaCap.worstRunRate*100,1)+'% worst-run |');
    }
    if(a.inv14Breakdown.total>0){
      var gapStr=Object.keys(a.inv14Breakdown.byGap).filter(function(g){return a.inv14Breakdown.byGap[g]>0;}).map(function(g){return 'gap'+g+'d='+a.inv14Breakdown.byGap[g];}).join(', ');
      lines.push('');
      lines.push('**INV14 gap distribution:** '+gapStr);
      lines.push('**INV14 top offenders:** '+a.inv14Breakdown.topMeals.slice(0,5).map(function(m){return '`'+m.id+'`('+m.count+')';}).join(', '));
    }

    // INV6 severity — drift-magnitude distribution. Lets the user see if
    // the total count is mostly minor (<60%) or has a meaningful tail of
    // severe distortions (>=150%). A long heavy tail signals a recipe
    // that's structurally mismatched to its scaling budget; a bulk at
    // <60% is acceptable noise from per-slot adjustment.
    if(a.invTotals.INV6>0){
      lines.push('');
      lines.push('**INV6 severity (drift% from base P/C ratio)'+(baseline&&baseline.inv6Severity?' — vs baseline':'')+'**');
      lines.push('');
      // Show baseline columns when severity data available.
      var baseSev = baseline && baseline.inv6Severity ? baseline.inv6Severity : null;
      if(baseSev){
        lines.push('| Bucket | Baseline | Current | Δ |');
        lines.push('|---|---|---|---|');
        ['<60','60-80','80-100','100-150','150-200','200-300','>300'].forEach(function(b){
          var bv=baseSev[b]||0, cv=a.inv6Severity[b]||0;
          lines.push('| '+b+'% | '+bv+' | '+cv+' | '+delta(cv,bv,'')+' |');
        });
      }else{
        lines.push('| Bucket | Count |');
        lines.push('|---|---|');
        ['<60','60-80','80-100','100-150','150-200','200-300','>300'].forEach(function(b){
          lines.push('| '+b+'% | '+(a.inv6Severity[b]||0)+' |');
        });
      }
      lines.push('');
      var maxLine='**INV6 max drift:** '+a.inv6MaxPct+'%';
      if(baseline&&baseline.inv6MaxPct!=null){
        maxLine+=' (baseline '+baseline.inv6MaxPct+'%, '+delta(a.inv6MaxPct,baseline.inv6MaxPct,'pp')+')';
      }
      lines.push(maxLine);
      if(a.inv6TopMeals && a.inv6TopMeals.length){
        var topLine='**INV6 top offenders:** '+a.inv6TopMeals.map(function(m){return '`'+m.id+'`('+m.count+')';}).join(', ');
        // If baseline has top offenders, show which meals are NEW vs persisted.
        if(baseline && baseline.inv6TopMeals && baseline.inv6TopMeals.length){
          var baseSet={}; baseline.inv6TopMeals.forEach(function(m){baseSet[m.id]=m.count;});
          var curSet={}; a.inv6TopMeals.forEach(function(m){curSet[m.id]=m.count;});
          var newOffenders=a.inv6TopMeals.filter(function(m){return !baseSet[m.id];}).map(function(m){return m.id;});
          var resolvedOffenders=baseline.inv6TopMeals.filter(function(m){return !curSet[m.id];}).map(function(m){return m.id;});
          if(newOffenders.length || resolvedOffenders.length){
            topLine+='\n_Diff vs baseline:'
              +(newOffenders.length?' NEW ['+newOffenders.join(', ')+']':'')
              +(resolvedOffenders.length?' RESOLVED ['+resolvedOffenders.join(', ')+']':'')+'_';
          }
        }
        lines.push(topLine);
      }
    }
    lines.push('');

    // ── PER-INVARIANT TOTALS (vs baseline) ──────────────────────
    // When baseline has full invTotals, surface a compact per-INV grid so
    // any individual invariant's count change is visible — not just the
    // rolled-up tracking metrics. Hard INVs should always be 0; tracking
    // INVs (6,14,15,16,18) get their own delta rows.
    if(baseline && baseline.invTotals){
      var changedInvs=[];
      ['INV1','INV2','INV3','INV4','INV5','INV6','INV7','INV8','INV9','INV10','INV11','INV12','INV13','INV14','INV15','INV16','INV17','INV18','INV19','INV20','INV21','INV22'].forEach(function(k){
        var bv=baseline.invTotals[k]||0;
        var cv=a.invTotals[k]||0;
        if(bv!==cv){
          changedInvs.push({inv:k, baseline:bv, current:cv, d:cv-bv});
        }
      });
      if(changedInvs.length){
        lines.push('### Per-Invariant Totals — Changed vs Baseline');
        lines.push('');
        lines.push('| INV | Baseline | Current | Δ |');
        lines.push('|---|---|---|---|');
        changedInvs.forEach(function(c){
          lines.push('| '+c.inv+' | '+c.baseline+' | '+c.current+' | '+(c.d>0?'+'+c.d:c.d.toString())+' |');
        });
        lines.push('');
      }
    }

    // ── PER-SLOT MEAL USAGE ─────────────────────────────────────
    lines.push('### Per-slot Meal Usage');
    lines.push('');
    lines.push('| Slot | Available | Picked | Closed-off | Variance | effN |');
    lines.push('|---|---|---|---|---|---|');
    var totalAvail=0,totalClosed=0;
    ['breakfast','lunch','dinner','snack'].forEach(function(s){
      var v=a.varietyBySlot[s];
      if(!v)return;
      totalAvail+=v.available; totalClosed+=v.neverPickedCount;
      lines.push('| '+s+' | '+v.available+' | '+v.picked+' | '+pct(v.neverPickedPct)+' | '+pct(v.varietyIndex,1)+' | '+f(v.effectiveMealCount,1)+' |');
    });
    if(totalAvail>0){
      lines.push('| **OVERALL** | **'+totalAvail+'** | **'+(totalAvail-totalClosed)+'** | **'+pct((totalClosed/totalAvail)*100,1)+'** ('+totalClosed+' never picked) | — | — |');
    }
    lines.push('');

    // ── TOP PICKS PER SLOT ──────────────────────────────────────
    lines.push('### Top Picks Per Slot');
    lines.push('');
    ['breakfast','lunch','dinner','snack'].forEach(function(s){
      var v=a.varietyBySlot[s];
      if(!v||!v.topPicks.length)return;
      lines.push('- **'+s+':** '+v.topPicks.slice(0,3).map(function(p){return '`'+p.id+'`='+pct(p.pct);}).join(', '));
    });
    lines.push('');

    // ── NEVER PICKED ────────────────────────────────────────────
    var hasNever=['breakfast','lunch','dinner','snack'].some(function(s){var v=a.varietyBySlot[s];return v&&v.neverPickedList.length;});
    if(hasNever){
      lines.push('### Never Picked in '+a.nRuns+' runs');
      lines.push('');
      ['breakfast','lunch','dinner','snack'].forEach(function(s){
        var v=a.varietyBySlot[s];
        if(!v||!v.neverPickedList.length)return;
        var list=v.neverPickedList.slice(0,12).map(function(x){return '`'+x+'`';}).join(', ');
        if(v.neverPickedList.length>12)list+=' … (+'+(v.neverPickedList.length-12)+' more)';
        lines.push('- **'+s+':** '+list);
      });
      lines.push('');
    }

    // ── MISS SEVERITY ───────────────────────────────────────────
    function nonzero(obj){
      var out=[]; Object.keys(obj).forEach(function(k){if(obj[k]>0)out.push(k+'='+obj[k]);});
      return out.join(', ');
    }
    var kb=nonzero(a.kcalBins), fb=nonzero(a.fatBins), vb=nonzero(a.vegBins);
    if(kb||fb||vb){
      lines.push('### Miss Severity');
      lines.push('');
      lines.push('| Bucket | Distribution |');
      lines.push('|---|---|');
      if(kb)lines.push('| kcal Δ | '+kb+' |');
      if(fb)lines.push('| fat% over 30 | '+fb+' |');
      if(vb)lines.push('| veg under 3c | '+vb+' |');
      lines.push('');
    }

    // ── TOP MEALS IN FAILING DAYS ───────────────────────────────
    if(a.topMeals && a.topMeals.length){
      lines.push('### Top Meals in Failing Days (goal-miss correlation)');
      lines.push('');
      lines.push(a.topMeals.slice(0,5).map(function(m){return '`'+m.key+'`('+m.count+')';}).join(', '));
      lines.push('');
    }

    // ── HARD INV VIOLATION SAMPLES ──────────────────────────────
    var invSampleTotal=(a.invSamples||[]).reduce(function(s,r){return s+r.sample.length;},0);
    if(invSampleTotal>0){
      lines.push('### Hard INV Violation Samples');
      lines.push('');
      lines.push('**'+invSampleTotal+' violations across '+a.invSamples.length+' seeds**');
      lines.push('');
      a.invSamples.slice(0,3).forEach(function(rs){
        lines.push('- seed `'+rs.seed+'`: '+rs.sample.slice(0,2).join(' | '));
      });
      lines.push('');
    }

    // ── VEG CEILING FLAGS ───────────────────────────────────────
    if(a.vegCeilingFlags && a.vegCeilingFlags.length){
      lines.push('### Veg Ceiling Flags (>3c/serving)');
      lines.push('');
      lines.push(a.vegCeilingFlags.map(function(f){return '`'+f.item+'`='+f.maxPerServing+'c';}).join(', '));
      lines.push('');
    }

    // ── TIMING ──────────────────────────────────────────────────
    lines.push('### Timing');
    lines.push('');
    lines.push('avg='+Math.round(a.timing.avg)+'ms · max='+Math.round(a.timing.max)+'ms');

    return lines.join('\n');
  }
  function runVaried(runs){
    runs=runs||50;
    var results=[];
    var baseSeed=42000;
    for(var i=0;i<runs;i++){
      var seed=baseSeed+i;
      (function(s){results.push(runOne('varied',s,function(rng){return applyVaried(rng);}));})(seed);
    }
    cleanSave();
    window._stressRuns=results;
    return aggregate(results);
  }
  function runSharing(runsPerConfig){
    runsPerConfig=runsPerConfig||30;
    var out={};
    var allResults=[];
    Object.keys(SHARING_CONFIGS).forEach(function(name){
      var results=[];
      for(var i=0;i<runsPerConfig;i++){
        (function(cname,s){results.push(runOne('sharing/'+cname,s,function(rng){SHARING_CONFIGS[cname]();return{shared:1,config:cname};}));})(name,90000+i);
      }
      out[name]=aggregate(results);
      allResults.push.apply(allResults,results);
    });
    window._stressRuns=allResults;
    return out;
  }
  function runAll(opts){
    opts=opts||{};
    var tStart=performance.now();
    var origAW=window._selSaveTimer;clearTimeout(_selSaveTimer);
    var out={baseline:runBaseline(opts.baseline||50),varied:runVaried(opts.varied||50),sharing:runSharing(opts.sharingPer||30)};
    clearTimeout(_selSaveTimer);saveWeeks();
    out.totalTimeMs=Math.round(performance.now()-tStart);
    console.log('[MPStress] baseline hit='+ (out.baseline.primaryHitRate*100).toFixed(2)+'% varied='+(out.varied.primaryHitRate*100).toFixed(2)+'% time='+out.totalTimeMs+'ms');
    return out;
  }

  // Run N baseline randomizations and enumerate failing combos.
  // Returns top offenders grouped by: (meal, slot, person, missType), plus
  // pairwise (breakfast+lunch, lunch+dinner, etc.), and raw failing-day list.
  function enumerateFailures(runs, startSeed){
    runs=runs||500;
    startSeed=startSeed||12345;
    var failingDays=[]; // {seed, p, d, meals:{breakfast, lunch, snack, dinner}, misses:[type1,type2]}
    var mealMissByType={}; // "meal|slot|person|missType" -> count
    var comboMissByType={}; // "breakfast=X|lunch=Y|snack=Z|dinner=W|person|missType" -> count
    var pairMissByType={}; // "slotA=X + slotB=Y|person|missType" -> count
    for(var i=0;i<runs;i++){
      var r=runOne('enum',startSeed+i,null);
      r.days.forEach(function(day){
        var f=day.fails;
        var missTypes=[];
        if(f.kcalLow>0)missTypes.push('kcalLow');
        if(f.kcalHigh>0)missTypes.push('kcalHigh');
        if(f.pro>0)missTypes.push('pro');
        if(f.carbPct>0)missTypes.push('carbPct');
        if(f.fatPct>0)missTypes.push('fatPct');
        if(f.veg>0)missTypes.push('veg');
        if(f.fruit>0)missTypes.push('fruit');
        if(missTypes.length===0)return;
        var meals={};
        ['breakfast','lunch','snack','dinner'].forEach(function(s){
          meals[s]=getMealId(day.p,day.d,s)||'_skip_';
        });
        failingDays.push({seed:r.seed,p:day.p,d:day.d,meals:meals,misses:missTypes,kcal:day.kcal,fatPct:Math.round(day.fatPct*1000)/1000,veg:day.veg});
        // Per-meal counts
        missTypes.forEach(function(mt){
          ['breakfast','lunch','snack','dinner'].forEach(function(s){
            var key=meals[s]+'|'+s+'|'+day.p+'|'+mt;
            mealMissByType[key]=(mealMissByType[key]||0)+1;
          });
          // Full combo
          var comboKey='b='+meals.breakfast+'|l='+meals.lunch+'|sn='+meals.snack+'|d='+meals.dinner+'|'+day.p+'|'+mt;
          comboMissByType[comboKey]=(comboMissByType[comboKey]||0)+1;
          // Pair counts (focus on high-impact pairings)
          [['breakfast','dinner'],['lunch','dinner'],['breakfast','snack'],['snack','dinner']].forEach(function(pair){
            var pKey=pair[0]+'='+meals[pair[0]]+' + '+pair[1]+'='+meals[pair[1]]+'|'+day.p+'|'+mt;
            pairMissByType[pKey]=(pairMissByType[pKey]||0)+1;
          });
        });
      });
    }
    cleanSave();
    function topN(obj,n){return Object.keys(obj).map(function(k){return{key:k,count:obj[k]};}).sort(function(a,b){return b.count-a.count;}).slice(0,n);}
    return{
      totalRuns:runs,
      totalPersonDays:runs*14,
      nFailingDays:failingDays.length,
      failRate:failingDays.length/(runs*14),
      topMealMissByType:topN(mealMissByType,30),
      topComboMissByType:topN(comboMissByType,20),
      topPairMissByType:topN(pairMissByType,25),
      allFailingDays:failingDays,
      sampleFailures:failingDays.slice(0,20)
    };
  }

  // Save/clear reference baseline (persisted to localStorage) for session-
  // over-session deltas in formatReport's KEY METRICS block.
  // 2026-05-03: refuse to save when agg.startedDirty is true. Use
  // saveBaseline(agg, {force:true}) to override (e.g., if you intentionally
  // want a dirty-state reference).
  function saveBaseline(agg, opts){
    opts = opts || {};
    if(agg && agg.startedDirty && !opts.force){
      console.error('saveBaseline: REFUSED — run started from non-pristine state ('+(agg.dirtyDetails||['unknown']).join(', ')+'). Saving this baseline would corrupt future deltas. Either re-run from a clean state (runStandard auto-clears) or pass {force:true} to override.');
      return false;
    }
    var mode=(agg&&agg.mode)||'standard';
    var key=(mode==='standard2')?'mealPlannerStressBaseline2':(mode==='standard3')?'mealPlannerStressBaseline3':'mealPlannerStressBaseline';
    var b={
      primary: agg.primaryHitRate*100,
      inv6: agg.invTotals.INV6||0,
      inv14: agg.inv14Breakdown.total,
      inv15Him: (agg.avgLeftoversEaten&&agg.avgLeftoversEaten.him)||0,
      inv16Her: (agg.avgLeftoversEaten&&agg.avgLeftoversEaten.her)||0,
      inv18AvgPct: agg.rbaCap?(agg.rbaCap.avgRate*100):0,
      // Worst single-run cap-hit rate, for monitoring stragglers (one
      // outlier can hide under a healthy avg). Surfaced alongside avgPct.
      inv18WorstRunPct: agg.rbaCap?(agg.rbaCap.worstRunRate*100):0,
      hardFail: (function(){
        var inv20Hard = (agg.invTotals.INV20||0) - (agg.invTotals.INV20Soft||0);
        return Object.keys(agg.invTotals).filter(function(k){
          if(k==='INV20') return inv20Hard > 0;
          return k!=='INV6'&&k!=='INV14'&&k!=='INV15'&&k!=='INV16'&&k!=='INV18'&&k!=='INV20Soft'&&k!=='INV21'&&k!=='INV22'&&agg.invTotals[k]>0;
        }).length;
      })(),
      closedPct: (function(){
        var ta=0,tc=0;
        ['breakfast','lunch','dinner','snack'].forEach(function(s){
          var v=agg.varietyBySlot[s]; if(!v)return;
          ta+=v.available; tc+=v.neverPickedCount;
        });
        return ta>0?(tc/ta)*100:0;
      })(),
      avgVariance: (function(){
        var sum=0,n=0;
        ['breakfast','lunch','dinner','snack'].forEach(function(s){
          var v=agg.varietyBySlot[s]; if(!v)return;
          sum+=v.varietyIndex; n++;
        });
        return n>0?sum/n:0;
      })(),
      missCounts: JSON.parse(JSON.stringify(agg.missCounts||{})),
      timingAvg: agg.timing&&agg.timing.avg||0,
      // Full per-invariant counts. Lets future runs delta against EVERY
      // invariant individually, not just the rolled-up tracking metrics.
      // Hard INVs should stay at 0, so this primarily benefits tracking
      // INVs and surfaces if a previously-clean hard INV starts firing.
      invTotals: JSON.parse(JSON.stringify(agg.invTotals||{})),
      // INV6 severity — drift-bucket distribution + max + top offenders.
      // Captures the SHAPE of the P/C ratio drift, not just the count.
      // Lets future runs detect "same total, different shape" regressions
      // (e.g., shifting from <60% bucket to 100-150% bucket).
      inv6Severity: JSON.parse(JSON.stringify(agg.inv6Severity||{})),
      inv6MaxPct: agg.inv6MaxPct||0,
      inv6TopMeals: JSON.parse(JSON.stringify(agg.inv6TopMeals||[])).slice(0,10),
      // INV14 detail — gap distribution + per-person + top offenders.
      // Lets future runs see "INV14=2" and know if it's the same recipe
      // pair recurring or new ones cropping up.
      inv14Breakdown: agg.inv14Breakdown ? {
        total: agg.inv14Breakdown.total,
        perRun: agg.inv14Breakdown.perRun,
        byPerson: JSON.parse(JSON.stringify(agg.inv14Breakdown.byPerson||{})),
        byGap: JSON.parse(JSON.stringify(agg.inv14Breakdown.byGap||{})),
        topMeals: JSON.parse(JSON.stringify(agg.inv14Breakdown.topMeals||[])).slice(0,5)
      } : null,
      mode:mode,
      savedAt: new Date().toISOString()
    };
    try{localStorage.setItem(key,JSON.stringify(b));}catch(e){}
    console.log('[MPStress] '+mode+' baseline saved: primary='+b.primary.toFixed(2)+'% INV6='+b.inv6+' (max '+b.inv6MaxPct+'%) INV14='+b.inv14+' INV15='+b.inv15Him.toFixed(1)+' INV16='+b.inv16Her.toFixed(1)+' hardFail='+b.hardFail);
    return b;
  }
  function clearBaseline(mode){
    var key=(mode==='standard2')?'mealPlannerStressBaseline2':(mode==='standard3')?'mealPlannerStressBaseline3':'mealPlannerStressBaseline';
    try{localStorage.removeItem(key);}catch(e){}
    console.log('[MPStress] '+(mode||'standard')+' baseline cleared');
  }

  // ── Vegetable baseline collector ─────────────────────────────────
  // Captures detailed per-veg-ingredient stats across N stress runs.
  // Designed as a comparison baseline for evaluating future changes
  // that affect veg amounts (e.g., the relaxation experiment).
  //
  // For every veg portion across all runs, records:
  //   - per-portion amount distribution (min/max/mean/p25/p50/p75)
  //   - shared vs solo split
  //   - count below recipe-base floor (the "small eater" cases)
  //   - distribution of "% of recipe base" for shared smallest portions
  //   - count at db.maxAmt (cap-binding)
  //   - count above db.maxAmt (would be INV13 fire — should be 0)
  //   - count below db.minAmt (would be INV13 fire — should be 0)
  //
  // Aggregate metrics:
  //   - per-day total veg cups (him/her avg)
  //   - daily veg distribution
  //   - most-skewed shared batches (largest min/max ratio)
  //
  // Saves to localStorage 'mealPlannerVegBaseline' for future delta diffs.
  // Internal: collect veg data for one seed into a shared accumulator.
  function _collectVegOneSeed(seed, acc){
    var snap=snapshot();
    try{randomizeWeek('shared', seed+1000000);}catch(e){restore(snap);throw e;}
    clearTimeout(_selSaveTimer);
    acc._totalRuns=(acc._totalRuns||0)+1;

    function ensureIng(dbKey){
      if(!acc.ingrStats[dbKey])acc.ingrStats[dbKey]={
        portions:[], sharedCount:0, soloCount:0,
        belowMinCount:0, aboveMaxCount:0, atMaxCount:0,
        sharedBelowFloorCount:0, sharedSmallestPctOfBase:[]
      };
      return acc.ingrStats[dbKey];
    }
    var leftovers=computeLeftovers();
    ['him','her'].forEach(function(p){
      DAYS.forEach(function(d){
        var fv = computeDailyFV(p,d);
        if(p==='him')acc.dayVegHim.push(fv.veg);
        else acc.dayVegHer.push(fv.veg);
        ['breakfast','lunch','snack','dinner'].forEach(function(s){
          if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
          var bal=getBalancedSlotIngredients(p,d,s);if(!bal)return;
          var slotLo=leftovers[sk(p,d,s)];
          var isSolo=!slotLo;
          var mealId=getMealId(p,d,s);
          var meal=getMeal(mealId);
          var baseAmts={};
          if(meal&&meal.ingredients)meal.ingredients.forEach(function(ri){baseAmts[ri.dbKey]=ri.amt;});
          bal.forEach(function(bi){
            if(bi.role!=='veg')return;
            var db=NUTRI_DB[bi.dbKey];if(!db)return;
            if(bi.amt<0.001)return;
            var rec=ensureIng(bi.dbKey);
            rec.portions.push(bi.amt);
            if(isSolo)rec.soloCount++; else rec.sharedCount++;
            if(db.minAmt!=null && bi.amt < db.minAmt - 0.001)rec.belowMinCount++;
            if(db.maxAmt!=null){
              if(bi.amt > db.maxAmt + 0.001)rec.aboveMaxCount++;
              else if(Math.abs(bi.amt - db.maxAmt) < 0.001)rec.atMaxCount++;
            }
            // Per-meal aggregation: track each (meal, ingredient) combo
            // separately so we can see what amounts a SINGLE recipe lands at,
            // not just the union across all recipes.
            var mealKey = mealId + '/' + bi.dbKey;
            if(!acc.perMealStats) acc.perMealStats = {};
            if(!acc.perMealStats[mealKey]) acc.perMealStats[mealKey] = {
              meal: mealId, ingr: bi.dbKey, portions: [], shared: 0, solo: 0, recipeBase: baseAmts[bi.dbKey] || 0
            };
            var pmStats = acc.perMealStats[mealKey];
            pmStats.portions.push(bi.amt);
            if(isSolo) pmStats.solo++; else pmStats.shared++;

            var recipeBase = baseAmts[bi.dbKey];
            if(!isSolo && recipeBase && bi.amt < recipeBase - 0.001){
              rec.sharedBelowFloorCount++;
              var pctOfBase = bi.amt / recipeBase;
              rec.sharedSmallestPctOfBase.push(pctOfBase);
              if(pctOfBase < 0.75){
                acc.infeasibleBatches.push({seed:seed, meal:mealId, ingr:bi.dbKey, p:p, d:d, s:s, amt:bi.amt, base:recipeBase, pctOfBase:pctOfBase});
              }
            }
          });
        });
      });
    });
    ['him','her'].forEach(function(p){
      DAYS.forEach(function(d){
        ['lunch','dinner'].forEach(function(s){
          var lo=leftovers[sk(p,d,s)];
          if(!lo||lo.isLeftover)return;
          if(!lo.portions||lo.portions.length<2)return;
          var anchorBal=getBalancedSlotIngredients(p,d,s);if(!anchorBal)return;
          var mealId=getMealId(p,d,s);
          anchorBal.forEach(function(bi){
            if(bi.role!=='veg')return;
            var amts=[];
            lo.portions.forEach(function(pt){
              var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
              if(!pbal)return;
              for(var k=0;k<pbal.length;k++){
                if(pbal[k].dbKey===bi.dbKey){amts.push(pbal[k].amt);break;}
              }
            });
            if(amts.length<2)return;
            var mn=Math.min.apply(null,amts), mx=Math.max.apply(null,amts);
            if(mx>0)acc.sharedBatchSkew.push({seed:seed, meal:mealId, ingr:bi.dbKey, ratio:mn/mx, smallest:mn, largest:mx, portions:amts.length});
          });
        });
      });
    });
    restore(snap);
  }

  function _newVegAcc(){
    return {ingrStats:{}, dayVegHim:[], dayVegHer:[], sharedBatchSkew:[], infeasibleBatches:[], perMealStats:{}, _totalRuns:0};
  }

  // Public: chunk-friendly collector. Pass `state` to accumulate across calls.
  // Pass `finalize:true` (or omit, with no state) to build summary + save.
  function collectVegBaseline(opts){
    opts = (typeof opts === 'number') ? {runs:opts} : (opts||{});
    var runs = (opts.runs != null) ? opts.runs : 100;
    var startSeed = opts.startSeed || 12345;
    var state = opts.state || null;
    var finalize = (opts.finalize !== false);
    var userSched=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
    _applyStandardSharedSchedule();
    var initSnap=snapshot();
    try{
      var acc = state || _newVegAcc();
      for(var i=0;i<runs;i++){
        _collectVegOneSeed(startSeed+i, acc);
      }
      if(!finalize) return acc;

      // Aggregate per-ingredient
      function pct(arr,p){
        if(!arr.length)return 0;
        var sorted=arr.slice().sort(function(a,b){return a-b;});
        var idx=Math.floor(sorted.length*p/100);
        return sorted[Math.min(idx,sorted.length-1)];
      }
      var ingrSummary={};
      Object.keys(acc.ingrStats).forEach(function(k){
        var r=acc.ingrStats[k];
        var db=NUTRI_DB[k];
        ingrSummary[k]={
          total: r.portions.length,
          shared: r.sharedCount,
          solo: r.soloCount,
          mean: r.portions.reduce(function(a,b){return a+b;},0)/r.portions.length,
          min: Math.min.apply(null,r.portions),
          max: Math.max.apply(null,r.portions),
          p25: pct(r.portions,25),
          p50: pct(r.portions,50),
          p75: pct(r.portions,75),
          dbMin: db?db.minAmt:null,
          dbMax: db?db.maxAmt:null,
          atMaxCount: r.atMaxCount,
          aboveMaxCount: r.aboveMaxCount,
          belowMinCount: r.belowMinCount,
          sharedBelowFloorCount: r.sharedBelowFloorCount,
          sharedBelowFloorPct: r.sharedCount>0?(r.sharedBelowFloorCount/r.sharedCount*100):0,
          smallestPctOfBaseDistribution: {
            p25: pct(r.sharedSmallestPctOfBase,25)*100,
            p50: pct(r.sharedSmallestPctOfBase,50)*100,
            p75: pct(r.sharedSmallestPctOfBase,75)*100,
            min: r.sharedSmallestPctOfBase.length?Math.min.apply(null,r.sharedSmallestPctOfBase)*100:0
          }
        };
      });

      var dayVegHimAvg = acc.dayVegHim.reduce(function(a,b){return a+b;},0)/acc.dayVegHim.length;
      var dayVegHerAvg = acc.dayVegHer.reduce(function(a,b){return a+b;},0)/acc.dayVegHer.length;
      var dayVegHimMin = Math.min.apply(null,acc.dayVegHim);
      var dayVegHerMin = Math.min.apply(null,acc.dayVegHer);

      // Most-skewed shared batches
      acc.sharedBatchSkew.sort(function(a,b){return a.ratio-b.ratio;});
      var topSkewed = acc.sharedBatchSkew.slice(0,15);

      // Top infeasible cases (most below floor)
      acc.infeasibleBatches.sort(function(a,b){return a.pctOfBase-b.pctOfBase;});
      var topInfeasible = acc.infeasibleBatches.slice(0,15);

      var baseline = {
        capturedAt: new Date().toISOString(),
        runs: (state ? state._totalRuns||runs : runs),
        ingredients: ingrSummary,
        daily: {
          him: {avg:dayVegHimAvg, min:dayVegHimMin, count:acc.dayVegHim.length},
          her: {avg:dayVegHerAvg, min:dayVegHerMin, count:acc.dayVegHer.length}
        },
        sharedBatches: {
          total: acc.sharedBatchSkew.length,
          minSkewRatio: acc.sharedBatchSkew.length?acc.sharedBatchSkew[0].ratio:0,
          medianSkewRatio: pct(acc.sharedBatchSkew.map(function(b){return b.ratio;}),50),
          topMostSkewed: topSkewed
        },
        infeasibility: {
          totalSharedBelowFloor: acc.infeasibleBatches.length,
          topMostBelowFloor: topInfeasible
        },
        perMeal: (function(){
          var pm = {};
          if(!acc.perMealStats) return pm;
          Object.keys(acc.perMealStats).forEach(function(k){
            var s = acc.perMealStats[k];
            var sortedAmts = s.portions.slice().sort(function(a,b){return a-b;});
            pm[k] = {
              meal: s.meal, ingr: s.ingr, recipeBase: s.recipeBase,
              total: s.portions.length, shared: s.shared, solo: s.solo,
              min: sortedAmts[0],
              p50: sortedAmts[Math.floor(sortedAmts.length/2)],
              max: sortedAmts[sortedAmts.length-1],
              mean: s.portions.reduce(function(a,b){return a+b;},0)/s.portions.length,
              dbMax: NUTRI_DB[s.ingr] ? NUTRI_DB[s.ingr].maxAmt : null
            };
          });
          return pm;
        })()
      };
      try{localStorage.setItem('mealPlannerVegBaseline',JSON.stringify(baseline));}catch(e){}
      console.log('[MPStress] Veg baseline saved. '+Object.keys(ingrSummary).length+' ingredients, '+acc.sharedBatchSkew.length+' shared-batch instances, '+acc.infeasibleBatches.length+' below-floor cases.');
      return baseline;
    } finally {
      restore(initSnap);
      Object.keys(SHARED_SCHEDULE).forEach(function(k){delete SHARED_SCHEDULE[k];});
      Object.keys(userSched).forEach(function(k){SHARED_SCHEDULE[k]=userSched[k];});
    }
  }

  // Print human-readable veg baseline summary.
  function formatVegBaseline(b){
    if(!b)b=JSON.parse(localStorage.getItem('mealPlannerVegBaseline')||'null');
    if(!b)return 'No veg baseline saved. Run MPStress.collectVegBaseline() first.';
    var lines=[];
    var f=function(v,d){d=d==null?2:d;return v.toFixed(d);};
    lines.push('## Vegetable Baseline');
    lines.push('Captured: '+b.capturedAt+' · '+b.runs+' runs');
    lines.push('');
    lines.push('### Daily Veg Totals (cups)');
    lines.push('| Person | Avg | Min | Sample |');
    lines.push('|---|---|---|---|');
    lines.push('| Him | '+f(b.daily.him.avg)+' | '+f(b.daily.him.min)+' | '+b.daily.him.count+' |');
    lines.push('| Her | '+f(b.daily.her.avg)+' | '+f(b.daily.her.min)+' | '+b.daily.her.count+' |');
    lines.push('');
    lines.push('### Per-Ingredient (sorted by total portions)');
    lines.push('| Ingredient | n (shared/solo) | dbMin | dbMax | min | p50 | mean | max | atMax | <floor (shared) |');
    lines.push('|---|---|---|---|---|---|---|---|---|---|');
    var ings=Object.keys(b.ingredients).sort(function(a,bk){return b.ingredients[bk].total-b.ingredients[a].total;});
    ings.forEach(function(k){
      var ig=b.ingredients[k];
      lines.push('| '+k+' | '+ig.total+' ('+ig.shared+'/'+ig.solo+') | '+ig.dbMin+' | '+ig.dbMax+' | '+f(ig.min,3)+' | '+f(ig.p50,3)+' | '+f(ig.mean,3)+' | '+f(ig.max,3)+' | '+ig.atMaxCount+' | '+ig.sharedBelowFloorCount+' ('+f(ig.sharedBelowFloorPct,1)+'%) |');
    });
    lines.push('');
    lines.push('### Below-Floor Distribution (shared veg, % of recipe base)');
    lines.push('| Ingredient | min | p25 | p50 | p75 |');
    lines.push('|---|---|---|---|---|');
    ings.forEach(function(k){
      var ig=b.ingredients[k];
      if(ig.sharedBelowFloorCount===0)return;
      var d=ig.smallestPctOfBaseDistribution;
      lines.push('| '+k+' | '+f(d.min,1)+'% | '+f(d.p25,1)+'% | '+f(d.p50,1)+'% | '+f(d.p75,1)+'% |');
    });
    lines.push('');
    lines.push('### Shared-Batch Skew');
    lines.push('Total shared-veg batch instances: '+b.sharedBatches.total);
    lines.push('Min skew ratio (smallest/largest portion): '+f(b.sharedBatches.minSkewRatio,3));
    lines.push('Median skew ratio: '+f(b.sharedBatches.medianSkewRatio,3));
    lines.push('');
    lines.push('### Top 15 Most-Skewed Shared Batches');
    lines.push('| seed | meal | ingr | smallest | largest | ratio |');
    lines.push('|---|---|---|---|---|---|');
    b.sharedBatches.topMostSkewed.forEach(function(s){
      lines.push('| '+s.seed+' | '+s.meal+' | '+s.ingr+' | '+f(s.smallest,3)+' | '+f(s.largest,3)+' | '+f(s.ratio,3)+' |');
    });
    lines.push('');
    lines.push('### Top 15 Most-Below-Floor Cases');
    lines.push('Total shared-veg portions below recipe-base floor: '+b.infeasibility.totalSharedBelowFloor);
    lines.push('| seed | meal | ingr | p/d/s | amt | base | % |');
    lines.push('|---|---|---|---|---|---|---|');
    b.infeasibility.topMostBelowFloor.forEach(function(c){
      lines.push('| '+c.seed+' | '+c.meal+' | '+c.ingr+' | '+c.p+'/'+c.d+'/'+c.s+' | '+f(c.amt,3)+' | '+f(c.base,3)+' | '+f(c.pctOfBase*100,1)+'% |');
    });
    return lines.join('\n');
  }

  return{runOne:runOne,runBaseline:runBaseline,runVaried:runVaried,runSharing:runSharing,runStandard:runStandard,runStandard2:runStandard2,runStandard3:runStandard3,runStandard4:runStandard4,runAll:runAll,enumerateFailures:enumerateFailures,aggregate:aggregate,formatReport:formatReport,saveBaseline:saveBaseline,clearBaseline:clearBaseline,snapshot:snapshot,restore:restore,inspectRun:inspectRun,inspectDay:inspectDay,exitInspect:exitInspect,collectVegBaseline:collectVegBaseline,formatVegBaseline:formatVegBaseline};
})();

</script>
