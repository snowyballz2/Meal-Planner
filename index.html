function randomizeWeek(target){
  sharedSchedOpen=false;
  const randTarget=target||person; // use passed target or current person tab
  const savedSel = JSON.parse(JSON.stringify(SEL));
  const maxRetries = 30;
  // Track the best retry ‚ÄĒ prefer (zero waste, then zero goal-misses).
  // Score lexicographic: (totalWaste, goalMisses). Lower is better.
  let bestWaste = Infinity;
  let bestMisses = Infinity;
  let bestSEL = null;
  for (let retry = 0; retry < maxRetries; retry++) {
    Object.keys(SEL).forEach(function(k){delete SEL[k];});
    Object.keys(savedSel).forEach(function(k){SEL[k]=savedSel[k];});

    _randomizeWeekCore(randTarget);

    invalidateLeftoverCache();
    // Fast approximate waste count for retry selection (avoids running the
    // full day-balancer + shopping pipeline). Uses the same estimate Phase 3
    // uses internally, so scoring is consistent with the optimizer's signal.
    let totalWaste = 0;
    ['sun','wed'].forEach(function(trip){
      const days = TRIP_DAYS_STATIC[trip] || [];
      // Inline analysis: per-slot scale factor √ó base amount
      const totals = {};
      days.forEach(function(d){
        ['him','her'].forEach(function(p){
          if (randTarget !== 'shared' && p !== randTarget) return;
          SLOTS.forEach(function(s){
            if (s === 'late_snack') return;
            const key = sk(p,d,s);
            if (SKIPPED[key] || EAT_OUT[key]) return;
            const mealId = getMealId(p,d,s); if (!mealId) return;
            const lo = (_leftoverCache || computeLeftovers())[key];
            if (lo && lo.isLeftover) return;
            const lMult = (lo && !lo.isLeftover && lo.servings > 1) ? lo.servings : 1;
            const m = getMeal(mealId); if (!m || !m.ingredients) return;
            let scale = 1;
            if (s !== 'shake' && SLOT_BUDGET[s] && (p === 'him' || p === 'her')) {
              let bk = 0;
              m.ingredients.forEach(function(i){ const db=NUTRI_DB[i.dbKey]; if(db) bk += db.kcal*(i.amt||0); });
              if (bk > 0) { scale = Math.min(1.75, getSlotBudget(p,d,s) / bk); }
            }
            m.ingredients.forEach(function(ing){
              const db = NUTRI_DB[ing.dbKey];
              if (!db || !db.pkg || db.pkg.longShelfLife) return;
              const eff = (ing.scalable === false) ? (ing.amt||0) : (ing.amt||0) * scale;
              totals[ing.dbKey] = (totals[ing.dbKey]||0) + eff * lMult;
            });
          });
        });
      });
      Object.keys(totals).forEach(function(k){
        const db = NUTRI_DB[k]; if (!db || !db.pkg) return;
        const unit = db.unit;
        const perPkg = (db.pkg.drained && (unit==='cup'||unit==='oz')) ? db.pkg.drained : (db.pkg.cups||0);
        if (perPkg <= 0) return;
        const pkgs = Math.ceil(totals[k] / perPkg);
        const waste = pkgs * perPkg - totals[k];
        if (waste > 0.01) totalWaste++;
      });
    });
    // Only compute goal misses (expensive ‚ÄĒ full day-balancer) for retries
    // that already achieved zero waste. Waste is the dominant criterion anyway.
    let goalMisses = Infinity;
    if (totalWaste === 0) {
      goalMisses = 0;
      const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
      persons.forEach(function(p){
        if(p!=='him'&&p!=='her')return;
        const calT=CAL_BASE[p], proT=PRO_TARGET[p];
        DAYS.forEach(function(d){
          const t=calcTotals(p,d);
          const fv=computeDailyFV(p,d);
          const mk=t.pro*4+t.fat*9+t.carb*4;
          const carbPct=mk>0?(t.carb*4)/mk:0;
          const fatPct=mk>0?(t.fat*9)/mk:0;
          const ok=(Math.abs(t.kcal-calT)<=100)&&(t.pro>=proT)&&(carbPct<=0.55)&&(fatPct<=0.30)&&(fv.veg>=3)&&(fv.fruit>=1);
          if(!ok)goalMisses++;
        });
      });
    }
    const better = (totalWaste < bestWaste) || (totalWaste === bestWaste && goalMisses < bestMisses);
    if (better) {
      bestWaste = totalWaste;
      bestMisses = goalMisses;
      bestSEL = JSON.parse(JSON.stringify(SEL));
    }
    if (totalWaste === 0 && goalMisses === 0) break;
  }
  // Restore best state (if we exited with improvement room remaining)
  if (bestSEL && (bestWaste > 0 || bestMisses > 0)) {
    Object.keys(SEL).forEach(function(k){delete SEL[k];});
    Object.keys(bestSEL).forEach(function(k){SEL[k]=bestSEL[k];});
  }
  // Targeted day re-rolls: fix any remaining miss-days without breaking waste.
  if (bestMisses > 0) {
    rerollMissDays(randTarget);
  }
  // Trip-level flex scaling: proportionally scale flex-ingredient usage across
  // all trip meals to hit clean package boundaries. Calorie-aware ‚ÄĒ skips any
  // scale that would push a day beyond ¬Ī100 kcal.
  applyTripFlexScaling(randTarget);
  invalidateLeftoverCache();renderMeals(); if(topTab==='shop') renderShop();autoSaveWeek();
}

// Trip-level package-fitting scale for flex ingredients. Proportionally scales
// ALL meals in a trip that use a flex ingredient (marinara, beans, coconut) to
// hit the nearest clean package boundary. Respects per-ingredient flex ranges
// and keeps every day within ¬Ī100 kcal of target.
function applyTripFlexScaling(randTarget){
  const FLEX = {
    'marinara':                 {maxUp:1.0,  maxDown:0,    kcalCap:200},
    'black beans canned':       {maxUp:0.75, maxDown:0,    kcalCap:180},
    'cannellini beans canned':  {maxUp:0.75, maxDown:0,    kcalCap:180},
    'chickpeas roasted':        {maxUp:0.75, maxDown:0,    kcalCap:180},
    'coconut milk':             {maxUp:0.75, maxDown:0.5,  kcalCap:200},
    'chicken broth':            {maxUp:1.0,  maxDown:0.5,  kcalCap:100}, // 15 kcal/cup, very low cal impact
    'tofu firm':                {maxUp:1.0,  maxDown:0,    kcalCap:300},
    'silken tofu':              {maxUp:1.0,  maxDown:0,    kcalCap:300},
    'canned tuna':              {maxUp:0.75, maxDown:0.25, kcalCap:200}, // opened quickly ‚ÄĒ small down-flex OK
    'ground turkey 93':         {maxUp:0.75, maxDown:0.10, kcalCap:300}, // 38 kcal/oz, 16oz bag ‚ÄĒ small down-flex avoids buying an extra bag
    'ground chicken':           {maxUp:0.75, maxDown:0.10, kcalCap:300}  // 35 kcal/oz, 16oz bag
  };
  const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  ['sun','wed'].forEach(function(trip){
    const days = TRIP_DAYS_STATIC[trip] || [];
    Object.keys(FLEX).forEach(function(dbKey){
      const db = NUTRI_DB[dbKey]; if (!db || !db.pkg) return;
      const perPkg = (db.pkg.drained && (db.unit === 'cup' || db.unit === 'oz')) ? db.pkg.drained : (db.pkg.cups || 0);
      if (perPkg <= 0) return;
      const cfg = FLEX[dbKey];

      // Find all cook-day usages of this ingredient in this trip
      invalidateLeftoverCache();
      const leftovers = computeLeftovers();
      const usages = []; // {p, d, s, idx, curAmt, lMult}
      let tripTotal = 0;
      days.forEach(function(d){
        persons.forEach(function(p){
          SLOTS.forEach(function(s){
            if (s==='late_snack'||s==='shake') return;
            const key = sk(p,d,s);
            if (SKIPPED[key]||EAT_OUT[key]) return;
            const lo = leftovers[key];
            if (lo && lo.isLeftover) return;
            const lMult = (lo && !lo.isLeftover && lo.servings > 1) ? lo.servings : 1;
            const mealId = getMealId(p,d,s); if (!mealId) return;
            const meal = MEALS.find(m=>m.id===mealId); if (!meal || !meal[p]) return;
            const ovrIngr = applyOverrides(meal[p], p, d, s);
            // Get adjusted amount from day-balanced data (matches what cards/shopping show)
            const balanced = getBalancedSlotIngredients(p,d,s);
            ovrIngr.forEach(function(ing, idx){
              if (ing.dbKey !== dbKey) return;
              let curAmt = ing.amt;
              if (balanced) {
                const bi = balanced.find(function(b){return b.dbKey === dbKey;});
                if (bi) curAmt = bi.amt;
              }
              usages.push({p:p, d:d, s:s, idx:idx, curAmt:curAmt, lMult:lMult});
              tripTotal += curAmt * lMult;
            });
          });
        });
      });
      if (usages.length === 0 || tripTotal <= 0) return;

      // Compute best target: nearest package multiple reachable within flex bounds
      const pkgsCeil = Math.ceil(tripTotal / perPkg);
      const pkgsFloor = Math.floor(tripTotal / perPkg);
      const targetUp = pkgsCeil * perPkg;
      const targetDown = pkgsFloor * perPkg;
      const scaleUp = tripTotal > 0 ? targetUp / tripTotal : 1;
      const scaleDown = tripTotal > 0 ? targetDown / tripTotal : 1;
      let chosenScale = null;
      // Prefer scaling UP to nearest pkg (buy an extra can, cook more)
      if (targetUp > tripTotal + 0.01 && (scaleUp - 1) <= cfg.maxUp) {
        chosenScale = scaleUp;
      }
      // Else try scaling DOWN to fewer packages (only if allowed)
      else if (targetDown > 0 && targetDown < tripTotal - 0.01 && cfg.maxDown > 0 && (1 - scaleDown) <= cfg.maxDown) {
        chosenScale = scaleDown;
      }
      if (chosenScale === null || Math.abs(chosenScale - 1) < 0.001) return;

      // Sanity check: ensure each affected meal has enough scalable carb/fat
      // capacity for the day-balancer to trim the added calories back. If a
      // meal is already rock-bottom on carb/fat, skip.
      const dayDeltaKcal = {};
      usages.forEach(function(u){
        const perServAddKcal = (chosenScale - 1) * u.curAmt * db.kcal;
        const dayKey = u.p + '_' + u.d;
        dayDeltaKcal[dayKey] = (dayDeltaKcal[dayKey] || 0) + perServAddKcal;
      });
      let hasTrimCapacity = true;
      Object.keys(dayDeltaKcal).forEach(function(k){
        const p = k.split('_')[0], d = k.split('_')[1];
        const addKcal = dayDeltaKcal[k];
        if (addKcal <= 0) return;
        // Count trimable scalable carb/fat kcal across the day's slots
        let trimable = 0;
        SLOTS.forEach(function(s){
          if (s === 'late_snack' || s === 'shake') return;
          if (SKIPPED[sk(p,d,s)] || EAT_OUT[sk(p,d,s)]) return;
          const bal = getBalancedSlotIngredients(p,d,s);
          if (!bal) return;
          bal.forEach(function(i){
            if (i.scalable === false) return;
            if (i.role !== 'carb' && i.role !== 'fat') return;
            const idb = NUTRI_DB[i.dbKey];
            if (!idb) return;
            // Allowable trim: down to 50% of original amt for carb, to 0.25 for fat
            const minAmt = (i.role === 'fat') ? 0.25 : (i.origAmt || i.amt) * 0.5;
            const trimAmt = Math.max(0, i.amt - minAmt);
            trimable += trimAmt * idb.kcal;
          });
        });
        // Need trim capacity to absorb at least the added kcal (with some slack)
        if (trimable < addKcal * 0.75) hasTrimCapacity = false;
      });
      if (!hasTrimCapacity) return;

      // Per-usage scaling: try each meal individually. If scaling that day's
      // usage breaks a daily goal, skip it and move on. This way we get as
      // close to the package boundary as possible without blowing any day.
      function checkDayGoals(p, d){
        var t = calcTotals(p, d);
        var fv = computeDailyFV(p, d);
        var mk = t.pro*4 + t.fat*9 + t.carb*4;
        return (Math.abs(t.kcal - CAL_BASE[p]) <= 100) && (t.pro >= (PRO_TARGET[p]||0))
            && (mk === 0 || (t.carb*4)/mk <= 0.55) && (mk === 0 || (t.fat*9)/mk <= 0.30)
            && (fv.veg >= 3) && (fv.fruit >= 1);
      }
      usages.forEach(function(u){
        // Snapshot this specific override
        var ovs = getOverrides(u.p, u.d, u.s);
        var existing = ovs ? ovs.find(function(o){return o.idx === u.idx;}) : null;
        var prevAmt = existing && existing.amt !== undefined ? existing.amt : null;
        // Apply scaled amount
        setOverride(u.p, u.d, u.s, u.idx, 'amt', u.curAmt * chosenScale);
        invalidateLeftoverCache();
        // Check if this day still hits all goals (day-balancer re-runs via calcTotals)
        if (!checkDayGoals(u.p, u.d)) {
          // Revert just this usage ‚ÄĒ day can't absorb it
          if (prevAmt !== null) {
            setOverride(u.p, u.d, u.s, u.idx, 'amt', prevAmt);
          } else {
            var ovrList = getOverrides(u.p, u.d, u.s);
            if (ovrList) {
              var filtered = ovrList.filter(function(o){return o.idx !== u.idx;});
              if (filtered.length) OVERRIDES[sk(u.p,u.d,u.s)] = filtered;
              else delete OVERRIDES[sk(u.p,u.d,u.s)];
            }
          }
          invalidateLeftoverCache();
        }
      });
    });
  });
}

// For each day whose per-person goals aren't all met, try random meal swaps
// for that day only. Revert if waste worsens or the day still fails.
function rerollMissDays(randTarget){
  const now = Date.now();
  // Fast waste approximation for reroll checks ‚ÄĒ matches what the retry loop uses.
  function fastTripWaste(days, persons){
    const totals = {};
    days.forEach(function(d){
      persons.forEach(function(p){
        if(p!=='him'&&p!=='her')return;
        SLOTS.forEach(function(s){
          if(s==='late_snack')return;
          const key=sk(p,d,s);
          if(SKIPPED[key]||EAT_OUT[key])return;
          const mealId=getMealId(p,d,s); if(!mealId)return;
          const lo=(_leftoverCache||computeLeftovers())[key];
          if(lo&&lo.isLeftover)return;
          const lMult=(lo&&!lo.isLeftover&&lo.servings>1)?lo.servings:1;
          const m=getMeal(mealId); if(!m||!m.ingredients)return;
          let scale=1;
          if(s!=='shake'&&SLOT_BUDGET[s]){
            let bk=0;
            m.ingredients.forEach(function(i){const db=NUTRI_DB[i.dbKey]; if(db) bk+=db.kcal*(i.amt||0);});
            if(bk>0) scale=Math.min(1.75, getSlotBudget(p,d,s)/bk);
          }
          m.ingredients.forEach(function(ing){
            const db=NUTRI_DB[ing.dbKey];
            if(!db||!db.pkg||db.pkg.longShelfLife)return;
            const eff=(ing.scalable===false)?(ing.amt||0):(ing.amt||0)*scale;
            totals[ing.dbKey]=(totals[ing.dbKey]||0)+eff*lMult;
          });
        });
      });
    });
    let w=0;
    Object.keys(totals).forEach(function(k){
      const db=NUTRI_DB[k]; if(!db||!db.pkg) return;
      const perPkg=(db.pkg.drained&&(db.unit==='cup'||db.unit==='oz'))?db.pkg.drained:(db.pkg.cups||0);
      if(perPkg<=0) return;
      const waste=Math.ceil(totals[k]/perPkg)*perPkg - totals[k];
      if(waste>0.01) w++;
    });
    return w;
  }
  const rerollPersons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  function totalWaste(){
    return fastTripWaste(TRIP_DAYS_STATIC.sun, rerollPersons) + fastTripWaste(TRIP_DAYS_STATIC.wed, rerollPersons);
  }
  function dayAllOk(d, persons){
    let ok = true;
    persons.forEach(function(p){
      if(!ok)return;
      if(p!=='him'&&p!=='her')return;
      const calT=CAL_BASE[p], proT=PRO_TARGET[p];
      const t=calcTotals(p,d);
      const fv=computeDailyFV(p,d);
      const mk=t.pro*4+t.fat*9+t.carb*4;
      const carbPct=mk>0?(t.carb*4)/mk:0;
      const fatPct=mk>0?(t.fat*9)/mk:0;
      if(!(Math.abs(t.kcal-calT)<=100)||!(t.pro>=proT)||!(carbPct<=0.55)||!(fatPct<=0.30)||!(fv.veg>=3)||!(fv.fruit>=1))ok=false;
    });
    return ok;
  }
  const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  // Count how many primary goals a day misses (per person, summed)
  function missCount(d){
    let misses = 0;
    persons.forEach(function(p){
      if(p!=='him'&&p!=='her')return;
      const calT=CAL_BASE[p], proT=PRO_TARGET[p];
      const t=calcTotals(p,d);
      const fv=computeDailyFV(p,d);
      const mk=t.pro*4+t.fat*9+t.carb*4;
      const carbPct=mk>0?(t.carb*4)/mk:0;
      const fatPct=mk>0?(t.fat*9)/mk:0;
      if(Math.abs(t.kcal-calT)>100)misses++;
      if(t.pro<proT)misses++;
      if(carbPct>0.55)misses++;
      if(fatPct>0.30)misses++;
      if(fv.veg<3)misses++;
      if(fv.fruit<1)misses++;
    });
    return misses;
  }

  const maxIters = 7;
  DAYS.forEach(function(d){
    if (dayAllOk(d, persons)) return;
    const baseWaste = totalWaste();
    const snap = {};
    persons.forEach(function(p){
      SLOTS.forEach(function(s){ snap[sk(p,d,s)] = SEL[sk(p,d,s)]; });
    });

    // Iterate: each loop, find the single best non-pkg meal swap that reduces
    // miss count for this day, without increasing waste. Stop when the day
    // passes, or no improving swap exists.
    for (let iter = 0; iter < maxIters; iter++) {
      if (dayAllOk(d, persons)) break;
      const currentMisses = missCount(d);
      let bestSwap = null;
      let bestMisses = currentMisses;

      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        persons.forEach(function(p){
          const key = sk(p,d,s);
          if (EAT_OUT[key] || SKIPPED[key]) return;
          const currentId = SEL[key];
          if (currentId && mealUsesPkg(currentId)) return; // never remove pkg meals
          const isShared = SHARED_SCHEDULE[dk(d,s)] === 'shared';
          // If shared and we're processing her, skip ‚ÄĒ him already tried every swap
          if (isShared && p === 'her') return;
          const otherP = p==='him'?'her':'him';
          const candidates = getMealsForSlot(s).filter(function(m){
            if (!m[p]) return false;
            if (isShared && !m[otherP]) return false;
            if (mealUsesPkg(m.id)) return false; // never introduce pkg meals
            if (m.id === currentId) return false;
            return true;
          });
          candidates.forEach(function(c){
            const origSel = SEL[key];
            let otherKey = null, otherOrig = null;
            SEL[key] = c.id;
            if (isShared) {
              otherKey = sk(otherP, d, s);
              otherOrig = SEL[otherKey];
              SEL[otherKey] = c.id;
            }
            invalidateLeftoverCache();
            const newMisses = missCount(d);
            const newWaste = totalWaste();
            // Accept swap only if strictly fewer misses AND waste unchanged
            if (newMisses < bestMisses && newWaste <= baseWaste) {
              bestMisses = newMisses;
              bestSwap = { key, otherKey, id: c.id };
            }
            // Revert for next candidate
            SEL[key] = origSel;
            if (otherKey) SEL[otherKey] = otherOrig;
          });
        });
      });

      if (!bestSwap) {
        invalidateLeftoverCache();
        break;
      }
      // Apply the best swap and iterate
      SEL[bestSwap.key] = bestSwap.id;
      weekData[activeWeek].ts[bestSwap.key] = now;
      if (bestSwap.otherKey) {
        SEL[bestSwap.otherKey] = bestSwap.id;
        weekData[activeWeek].ts[bestSwap.otherKey] = now;
      }
      invalidateLeftoverCache();
    }

    // Final safety check ‚ÄĒ revert if waste worsened (shouldn't happen, but belt+suspenders)
    if (totalWaste() > baseWaste) {
      Object.keys(snap).forEach(function(k){ SEL[k] = snap[k]; });
      invalidateLeftoverCache();
    }
  });
}

function _randomizeWeekCore(randTarget){
  const days = DAYS;
  const persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  const bothPersons = persons.length > 1 || randTarget === 'shared';
  const locked = {};

  if(!weekData[activeWeek].ts) weekData[activeWeek].ts={};
  const now = Date.now();

  // ‚ĒÄ‚ĒÄ PRE-PHASE: Lock eat-out slots (manual overrides), clear old skips ‚ĒÄ‚ĒÄ
  persons.forEach(function(p){
    days.forEach(function(d){
      SLOTS.forEach(function(s){
        const k=sk(p,d,s);
        if(EAT_OUT[k]){locked[k]=true;}
      });
    });
  });
  Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
  days.forEach(function(d){
    ['breakfast','lunch','dinner','shake','snack'].forEach(function(s){
      const state = SHARED_SCHEDULE[dk(d,s)];
      if(state==='skip-him'||state==='skip-both'){
        if(!EAT_OUT[sk('him',d,s)]) EAT_OUT[sk('him',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
      if(state==='skip-her'||state==='skip-both'){
        if(!EAT_OUT[sk('her',d,s)]) EAT_OUT[sk('her',d,s)]={name:'',restaurant:'',kcal:null,pro:null,fat:null,carb:null};
      }
    });
  });
  // Lock eat-out slots created by schedule
  persons.forEach(function(p){
    days.forEach(function(d){
      SLOTS.forEach(function(s){
        var k=sk(p,d,s);
        if(EAT_OUT[k]) locked[k]=true;
      });
    });
  });

  // ‚ĒÄ‚ĒÄ PHASE 1: Initial random selection (ALL slots, any meal) ‚ĒÄ‚ĒÄ
  // For each person/day, try 60 combos and pick closest to daily calorie target.
  // Package meals are allowed everywhere ‚ÄĒ Phase 2+3 resolve waste afterward.
  persons.forEach(function(p) {
    var target = CAL_BASE[p];

    days.forEach(function(d, di) {
      var bestSel = null;
      var bestScore = Infinity;
      var attempts = 60;
      var recentIds = getRecentMealIds(di, days, p, 2);
      // Pre-compute per-slot kcal budgets so Phase 1 scoring matches reality:
      // the adjuster scales each slot to its budget, so a low-base meal is
      // NOT actually worse than a high-base one ‚ÄĒ it just gets scaled up.
      var slotBudgets = computeSlotBudgets(p, d);
      var MAX_UP_SCALE = 1.75; // matches the adjuster's per-slot scale cap

      for (var a = 0; a < attempts; a++) {
        var used = [];
        var trySel = {};
        var totalKcal = 0;

        var totalFatCal = 0;
        var totalPro = 0;

        SLOTS.forEach(function(s) {
          if (locked[sk(p,d,s)]) {
            var lockedId = SEL[sk(p,d,s)];
            if (lockedId) {
              trySel[s] = lockedId;
              used.push(lockedId);
              var lm = getMeal(lockedId);
              if (lm && lm[p]) {
                var lmm = getPortMacros(lm[p]);
                // Locked slots: approximate adjusted kcal same as unlocked below.
                var lBudget = slotBudgets[s] || 0;
                var lEff = (s==='shake' || !lBudget) ? lmm.kcal
                          : Math.min(lmm.kcal * MAX_UP_SCALE, lBudget);
                var lScale = lmm.kcal > 0 ? lEff / lmm.kcal : 1;
                totalKcal += lEff;
                totalFatCal += lmm.fat * 9 * lScale;
                totalPro += lmm.pro * lScale;
              }
            }
            return;
          }
          // For shared-schedule slots, only pick meals both people have
          var isSharedSlot = bothPersons && SHARED_SCHEDULE[dk(d,s)] === 'shared';
          var candidates = getMealsForSlot(s).filter(function(m){
            if (!m[p]) return false;
            if (used.indexOf(m.id) >= 0) return false;
            if (recentIds.indexOf(m.id) >= 0) return false;
            if (isSharedSlot && (!m.him || !m.her)) return false;
            return true;
          });
          if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){
            if (!m[p]) return false;
            if (isSharedSlot && (!m.him || !m.her)) return false;
            return true;
          });
          if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){ return !!m[p]; });
          if (!candidates.length) return;
          var pick = randomPick(candidates);
          trySel[s] = pick.id;
          used.push(pick.id);
          var port = pick[p];
          if (port) {
            var pm = getPortMacros(port);
            // Simulate what the adjuster will do: scale this slot to its budget
            // (capped at 1.75x so meals too small to scale up still get penalized).
            var budget = slotBudgets[s] || 0;
            var effKcal = (s==='shake' || !budget) ? pm.kcal
                        : Math.min(pm.kcal * MAX_UP_SCALE, budget);
            var macroScale = pm.kcal > 0 ? effKcal / pm.kcal : 1;
            totalKcal += effKcal;
            totalFatCal += pm.fat * 9 * macroScale;
            totalPro += pm.pro * macroScale;
          }
        });

        // Score: calorie fit + fat penalty + discouraged-ingredient penalty
        var calDiff = Math.abs(totalKcal - target);
        var fatPct = totalKcal > 0 ? totalFatCal / totalKcal : 0;
        var fatPenalty = fatPct > 0.30 ? (fatPct - 0.30) * 1000 : 0;
        // Mild penalty per meal containing a discouraged ingredient (coconut milk etc.).
        // Still allows picks when cal/macro fit requires it; just biases away by default.
        var discouragedCount = 0;
        SLOTS.forEach(function(s2){
          var mid = trySel[s2]; if (!mid) return;
          var mm = getMeal(mid); if (!mm || !mm.ingredients) return;
          if (mm.ingredients.some(function(i){ return DISCOURAGED_INGREDIENTS.indexOf(i.dbKey) >= 0; })) discouragedCount++;
        });
        var discouragedPenalty = discouragedCount * 500;
        var score = calDiff + fatPenalty + discouragedPenalty;

        if (score < bestScore) {
          bestScore = score;
          bestSel = trySel;
          if (calDiff <= 100 && fatPct <= 0.30) break;
        }
      }

      if (bestSel) {
        SLOTS.forEach(function(s) {
          if (locked[sk(p,d,s)]) return;
          clearOverrides(p, d, s);
          var selKey = sk(p,d,s);
          if (bestSel[s]) {
            SEL[selKey] = bestSel[s];
            weekData[activeWeek].ts[selKey] = now;
          } else {
            delete SEL[selKey];
          }
        });
      }
    });

    // For shared-schedule slots, sync her to him after him is placed
    if (bothPersons && p === 'him') {
      days.forEach(function(d) {
        ['breakfast','lunch','dinner'].forEach(function(s) {
          if (SHARED_SCHEDULE[dk(d,s)] === 'shared') {
            var himId = getMealId('him', d, s);
            if (himId) {
              SEL[sk('her',d,s)] = himId;
              weekData[activeWeek].ts[sk('her',d,s)] = now;
              locked[sk('her',d,s)] = true;
            }
          }
        });
      });
    }
  });

  // ‚ĒÄ‚ĒÄ PHASE 1.5: Remove solo package meals ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
  // A package meal that isn't shared or part of a leftover pair wastes most
  // of its package (e.g. 0.5 cup beans from a 1.75 cup can). Replace with
  // a non-pkg alternative now, before Phase 2/3 waste analysis.
  invalidateLeftoverCache();
  var leftoversPh15 = computeLeftovers();
  days.forEach(function(d){
    persons.forEach(function(p){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var key = sk(p,d,s);
        if (locked[key] || SKIPPED[key] || EAT_OUT[key]) return;
        var mealId = getMealId(p,d,s);
        if (!mealId || !mealUsesPkg(mealId)) return;
        // Check: is this slot shared?
        var isShared = bothPersons && SHARED_SCHEDULE[dk(d,s)] === 'shared';
        if (isShared) return; // shared = at least 2 portions, keep
        // Check: is this meal part of a leftover chain (cook or leftover)?
        var lo = leftoversPh15[key];
        if (lo) return; // any leftover info = it's paired, keep
        // Solo pkg meal with no pairing ‚ÄĒ replace with non-pkg
        var isSharedForFilter = bothPersons && SHARED_SCHEDULE[dk(d,s)] === 'shared';
        var candidates = getMealsForSlot(s).filter(function(m){
          if (!m[p] || m.id === mealId) return false;
          if (isSharedForFilter && (!m.him || !m.her)) return false;
          if (mealUsesPkg(m.id)) return false;
          return true;
        });
        if (!candidates.length) return;
        var pick = randomPick(candidates);
        SEL[key] = pick.id;
        weekData[activeWeek].ts[key] = now;
      });
    });
  });

  // ‚ĒÄ‚ĒÄ PHASE 2: Package analysis per shopping trip ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
  // Compute leftover pairing, then sum package ingredient needs per trip.
  invalidateLeftoverCache();
  var leftovers = computeLeftovers();

  var trips = [
    { key: 'sun', days: TRIP_DAYS_STATIC.sun },
    { key: 'wed', days: TRIP_DAYS_STATIC.wed }
  ];

  // Helper: get perPkg amount for a packaged ingredient
  function _perPkg(dbKey) {
    var db = NUTRI_DB[dbKey];
    if (!db || !db.pkg) return 0;
    return (db.pkg.drained && (db.unit === 'cup' || db.unit === 'oz')) ? db.pkg.drained : (db.pkg.cups || 0);
  }

  // Helper: analyze package waste for a trip
  function _analyzeTripPackages(tripDays) {
    var totals = {}; // dbKey -> {total, mealsUsing:[{p,d,s,mealId,amt}]}
    // Fast approximation: apply uniform scale (slot budget / base kcal) to
    // estimate post-adjuster package usage. Good enough for Phase 3's
    // optimization signal; the shopping list itself uses the exact
    // day-balanced amounts for display.
    tripDays.forEach(function(d) {
      persons.forEach(function(p) {
        SLOTS.forEach(function(s) {
          if (s === 'late_snack') return;
          var selKey = sk(p,d,s);
          if (SKIPPED[selKey] || EAT_OUT[selKey]) return;
          var mealId = getMealId(p, d, s);
          if (!mealId) return;
          var loInfo = leftovers[selKey];
          if (loInfo && loInfo.isLeftover) return;
          var leftoverMult = (loInfo && !loInfo.isLeftover && loInfo.servings > 1) ? loInfo.servings : 1;
          var m = getMeal(mealId);
          if (!m || !m.ingredients) return;
          // Fast scale estimate: base kcal vs slot budget.
          var scale = 1;
          if (s !== 'shake' && SLOT_BUDGET[s] && (p === 'him' || p === 'her')) {
            var baseKcal = 0;
            m.ingredients.forEach(function(i){
              var db = NUTRI_DB[i.dbKey]; if (db) baseKcal += db.kcal * (i.amt||0);
            });
            if (baseKcal > 0) {
              var budget = getSlotBudget(p, d, s);
              scale = budget / baseKcal;
              if (scale > 1.75) scale = 1.75; // mirror adjuster cap
            }
          }
          m.ingredients.forEach(function(ing) {
            var db = NUTRI_DB[ing.dbKey];
            if (!db || !db.pkg) return;
            if (db.pkg.longShelfLife) return;
            if (!totals[ing.dbKey]) totals[ing.dbKey] = {total:0, mealsUsing:[]};
            // Scalable items scale with the slot; non-scalable (veg/fruit/condiment) stay at base
            var effectiveAmt = (ing.scalable === false) ? (ing.amt || 0) : (ing.amt || 0) * scale;
            var amt = effectiveAmt * leftoverMult;
            totals[ing.dbKey].total += amt;
            totals[ing.dbKey].mealsUsing.push({p:p, d:d, s:s, mealId:mealId, amt:effectiveAmt, servings:leftoverMult});
          });
          // Cross-person cook adds the other person's base serving
          if (loInfo && loInfo.crossPersonCook) {
            var otherP = loInfo.feedsAlso;
            var otherPort = m[otherP];
            if (otherPort && otherPort.ingredients) {
              otherPort.ingredients.forEach(function(oi) {
                var odb = NUTRI_DB[oi.dbKey];
                if (!odb || !odb.pkg || odb.pkg.longShelfLife) return;
                if (!totals[oi.dbKey]) totals[oi.dbKey] = {total:0, mealsUsing:[]};
                totals[oi.dbKey].total += (oi.amt || 0);
                totals[oi.dbKey].mealsUsing.push({p:otherP, d:d, s:s, mealId:mealId, amt:oi.amt, servings:1});
              });
            }
          }
        });
      });
    });

    var results = [];
    Object.keys(totals).forEach(function(dbKey) {
      var ppkg = _perPkg(dbKey);
      if (ppkg <= 0) return;
      var info = totals[dbKey];
      var pkgsNeeded = Math.ceil(info.total / ppkg);
      var waste = (pkgsNeeded * ppkg) - info.total;
      results.push({
        dbKey: dbKey,
        totalNeeded: info.total,
        perPkg: ppkg,
        packagesNeeded: pkgsNeeded,
        waste: waste,
        mealsUsing: info.mealsUsing
      });
    });
    return results;
  }

  // ‚ĒÄ‚ĒÄ PHASE 3: Package resolution ‚ÄĒ SMART ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
  // Iterate until waste stops decreasing (convergence). Each outer pass
  // re-analyzes the trip so swaps applied for one package are reflected
  // when scoring swaps for the next package.
  trips.forEach(function(trip) {
    var maxPhase3Iters = 6;
    var prevTripWaste = Infinity;
    for (var ph3iter = 0; ph3iter < maxPhase3Iters; ph3iter++) {
    var analysis = _analyzeTripPackages(trip.days);
    var currentTripWaste = 0;
    analysis.forEach(function(p){ currentTripWaste += (p.waste || 0); });
    if (currentTripWaste < 0.01) break;       // nothing left to fix
    if (currentTripWaste >= prevTripWaste) break; // no progress ‚Üí stop
    prevTripWaste = currentTripWaste;

    analysis.forEach(function(pkg) {
      if (pkg.waste < 0.01) return; // no waste to resolve

      var resolved = false;

      // ‚ĒÄ‚ĒÄ Strategy A: Swap in a meal that uses this ingredient ‚ĒÄ‚ĒÄ
      // Find non-package slots that could be swapped to a meal using this ingredient
      if (!resolved) {
        var swapSlots = ['breakfast','lunch','dinner'];
        var swapCandidates = [];
        trip.days.forEach(function(d) {
          persons.forEach(function(p) {
            swapSlots.forEach(function(s) {
              var selKey = sk(p,d,s);
              if (locked[selKey] || SKIPPED[selKey] || EAT_OUT[selKey]) return;
              var curId = getMealId(p, d, s);
              if (!curId) return;
              // Skip if this slot already uses this package ingredient
              var curMeal = getMeal(curId);
              if (curMeal && curMeal.ingredients) {
                var alreadyUses = curMeal.ingredients.some(function(ing){ return ing.dbKey === pkg.dbKey; });
                if (alreadyUses) return;
              }
              // Find meals for this slot that use the needed ingredient
              var isSharedSlot = bothPersons && SHARED_SCHEDULE[dk(d,s)] === 'shared';
              var replacements = getMealsForSlot(s).filter(function(m) {
                if (!m[p] || m.id === curId) return false;
                if (isSharedSlot && (!m.him || !m.her)) return false;
                if (!m.ingredients) return false;
                return m.ingredients.some(function(ing){ return ing.dbKey === pkg.dbKey; });
              });
              if (replacements.length) {
                swapCandidates.push({p:p, d:d, s:s, curId:curId, replacements:replacements, isSharedSlot:isSharedSlot});
              }
            });
          });
        });

        // Baseline TOTAL trip waste across ALL packages (before swap)
        var baselineTripWaste = 0;
        _analyzeTripPackages(trip.days).forEach(function(px){ baselineTripWaste += (px.waste || 0); });

        // Try each candidate, pick the one that best reduces TOTAL trip waste
        // (not just waste for this one package ‚ÄĒ a swap that fixes tofu but
        // creates bean waste is a wash).
        var bestSwap = null;
        var bestTotalTripWaste = baselineTripWaste;
        // Cheap base-kcal lookup for calDiff estimate (avoids day-balancer recompute per swap)
        function _baseKcalOf(mealId){
          var mm = getMeal(mealId); if (!mm || !mm.ingredients) return 0;
          var k = 0;
          mm.ingredients.forEach(function(i){ var db = NUTRI_DB[i.dbKey]; if (db) k += db.kcal*(i.amt||0); });
          return k;
        }
        swapCandidates.forEach(function(sc) {
          sc.replacements.forEach(function(rep) {
            // Approximate cal impact: compare candidate's base kcal vs current slot budget.
            // If the candidate is way outside the slot budget (can't be scaled to fit), skip.
            var slotBudget = getSlotBudget(sc.p, sc.d, sc.s);
            var repBase = _baseKcalOf(rep.id);
            if (slotBudget > 0 && (repBase < slotBudget * 0.4 || repBase > slotBudget * 2.2)) return;

            // Temporarily apply swap
            var origSel = SEL[sk(sc.p, sc.d, sc.s)];
            SEL[sk(sc.p, sc.d, sc.s)] = rep.id;
            var otherKey = null, otherOrig = null;
            if (sc.isSharedSlot) {
              var otherP = sc.p === 'him' ? 'her' : 'him';
              otherKey = sk(otherP, sc.d, sc.s);
              otherOrig = SEL[otherKey];
              SEL[otherKey] = rep.id;
            }
            invalidateLeftoverCache();

            // Score by total trip waste
            var postSwapTripWaste = 0;
            _analyzeTripPackages(trip.days).forEach(function(px){ postSwapTripWaste += (px.waste || 0); });
            var calDiff = 0; // calDiff check already satisfied by slotBudget guard above

            // Revert
            SEL[sk(sc.p, sc.d, sc.s)] = origSel;
            if (otherKey) SEL[otherKey] = otherOrig;
            invalidateLeftoverCache();

            if (calDiff > 150) return;
            if (postSwapTripWaste < bestTotalTripWaste) {
              bestTotalTripWaste = postSwapTripWaste;
              bestSwap = {sc:sc, rep:rep};
            }
          });
        });

        if (bestSwap) {
          var bsc = bestSwap.sc;
          SEL[sk(bsc.p, bsc.d, bsc.s)] = bestSwap.rep.id;
          weekData[activeWeek].ts[sk(bsc.p, bsc.d, bsc.s)] = now;
          if (bsc.isSharedSlot) {
            var otherP3 = bsc.p === 'him' ? 'her' : 'him';
            SEL[sk(otherP3, bsc.d, bsc.s)] = bestSwap.rep.id;
            weekData[activeWeek].ts[sk(otherP3, bsc.d, bsc.s)] = now;
          }
          invalidateLeftoverCache();
          // Recompute this pkg's waste post-swap for downstream resolved check
          var re = _analyzeTripPackages(trip.days).filter(function(px){return px.dbKey===pkg.dbKey;})[0];
          if (re) {
            pkg.totalNeeded = re.totalNeeded;
            pkg.packagesNeeded = re.packagesNeeded;
            pkg.waste = re.waste;
          }
          if (pkg.waste < 0.01) resolved = true;
        }
      }

      // ‚ĒÄ‚ĒÄ Strategy B: Nudge ingredient amounts to fill packages ‚ĒÄ‚ĒÄ
      if (!resolved && pkg.mealsUsing.length > 0) {
        var targetTotal = pkg.packagesNeeded * pkg.perPkg;
        var totalServings = 0;
        pkg.mealsUsing.forEach(function(mu){ totalServings += mu.servings; });
        var targetPerServing = targetTotal / totalServings;

        // Per-ingredient flex ranges
        var maxUp = 0.25, maxDown = 0.25;
        var flexIngr = ['black beans canned','cannellini beans canned','marinara','chickpeas roasted'];
        if (flexIngr.indexOf(pkg.dbKey) >= 0) { maxDown = 0; maxUp = 1.0; }
        if (pkg.dbKey === 'coconut milk') { maxDown = 0.50; maxUp = 0.75; }

        var canNudge = true;
        pkg.mealsUsing.forEach(function(mu) {
          var diff = targetPerServing - mu.amt;
          if (diff > 0 && diff > mu.amt * maxUp) canNudge = false;
          if (diff < 0 && Math.abs(diff) > mu.amt * maxDown) canNudge = false;
          // Check calorie impact of nudge
          var db = NUTRI_DB[pkg.dbKey];
          var kcalChange = Math.abs(diff) * db.kcal;
          if (kcalChange > 75) canNudge = false;
        });

        if (canNudge && Math.abs(targetPerServing - (pkg.mealsUsing[0] && pkg.mealsUsing[0].amt || 0)) > 0.001) {
          // Apply the nudge ‚ÄĒ note: this adjusts the base recipe amounts via OVERRIDES
          // Since we only need to affect shopping totals, we don't modify the meal definition.
          // The shopping list builder already applies calorie adjustments per-slot which will
          // handle the flex. The waste is resolved at the shopping-list level by buildShoppingList.
          // So Strategy B is effectively a signal that the flex ranges CAN absorb the waste,
          // and the existing shopping optimizer will handle it.
          resolved = true;
        }
      }

      // ‚ĒÄ‚ĒÄ Strategy C: Remove package meals if waste can't be resolved ‚ĒÄ‚ĒÄ
      // Fires on ANY residual waste, but only removes a meal if the removal
      // STRICTLY reduces total trip waste. This means:
      //  - Unpairable singles get removed (removal reduces waste ‚Üí zero).
      //  - Pairable meals with acceptable combined waste are preserved
      //    (removal would INCREASE waste ‚Üí no action).
      if (!resolved && pkg.mealsUsing.length > 0) {
        // Find package meals that appear only once (no leftover pairing)
        var singleUse = [];
        pkg.mealsUsing.forEach(function(mu) {
          var loInfo = leftovers[sk(mu.p, mu.d, mu.s)];
          var isPaired = loInfo && !loInfo.isLeftover && loInfo.servings > 1;
          var isLeftover = loInfo && loInfo.isLeftover;
          if (!isPaired && !isLeftover) singleUse.push(mu);
        });

        singleUse.forEach(function(mu) {
          var selKey = sk(mu.p, mu.d, mu.s);
          if (locked[selKey]) return;
          var isSharedSlot = bothPersons && SHARED_SCHEDULE[dk(mu.d, mu.s)] === 'shared';
          var candidates = getMealsForSlot(mu.s).filter(function(m) {
            if (!m[mu.p] || m.id === mu.mealId) return false;
            if (isSharedSlot && (!m.him || !m.her)) return false;
            if (mealUsesPkg(m.id)) return false;
            return true;
          });
          if (!candidates.length) return;

          // Current trip waste (across ALL packages) as baseline
          var baselineTripWaste = 0;
          _analyzeTripPackages(trip.days).forEach(function(px){ baselineTripWaste += (px.waste || 0); });

          // Pick the candidate that minimizes TOTAL trip waste (not just kcal)
          var bestRep = null;
          var bestTripWaste = baselineTripWaste;
          var bestCalDiff = Infinity;
          candidates.forEach(function(c) {
            // Cheap base-kcal check ‚ÄĒ avoid the expensive calcTotals/day-balancer
            var cBase = 0;
            if (c.ingredients) c.ingredients.forEach(function(i){ var db=NUTRI_DB[i.dbKey]; if(db) cBase += db.kcal*(i.amt||0); });
            var slotBudget = getSlotBudget(mu.p, mu.d, mu.s);
            if (slotBudget > 0 && (cBase < slotBudget * 0.35 || cBase > slotBudget * 2.5)) return;
            var origSel = SEL[selKey];
            var otherKey = null, otherOrig = null;
            SEL[selKey] = c.id;
            if (isSharedSlot) {
              var otherP = mu.p === 'him' ? 'her' : 'him';
              otherKey = sk(otherP, mu.d, mu.s); otherOrig = SEL[otherKey]; SEL[otherKey] = c.id;
            }
            invalidateLeftoverCache();
            var newTripWaste = 0;
            _analyzeTripPackages(trip.days).forEach(function(px){ newTripWaste += (px.waste || 0); });
            var calDiff = 0; // Satisfied by slotBudget guard
            SEL[selKey] = origSel;
            if (otherKey) SEL[otherKey] = otherOrig;
            invalidateLeftoverCache();
            // Only accept removal if it actually reduces total trip waste
            if (newTripWaste < bestTripWaste - 0.01) {
              bestTripWaste = newTripWaste;
              bestRep = c;
              bestCalDiff = calDiff;
            }
          });

          if (bestRep) {
            SEL[selKey] = bestRep.id;
            weekData[activeWeek].ts[selKey] = now;
            if (isSharedSlot) {
              var otherP4 = mu.p === 'him' ? 'her' : 'him';
              SEL[sk(otherP4, mu.d, mu.s)] = bestRep.id;
              weekData[activeWeek].ts[sk(otherP4, mu.d, mu.s)] = now;
            }
            invalidateLeftoverCache();
          }
        });
      }
    });
    } // end Phase 3 convergence loop
  });

  // ‚ĒÄ‚ĒÄ PHASE 4: Enforce shared schedule (runs absolutely last) ‚ĒÄ‚ĒÄ
  days.forEach(function(d) {
    ['breakfast','lunch','dinner'].forEach(function(s) {
      var himId = getMealId('him', d, s);
      var herId = getMealId('her', d, s);
      if (SHARED_SCHEDULE[dk(d,s)] === 'shared') {
        if (himId && himId !== herId) {
          SEL[sk('her',d,s)] = himId;
          weekData[activeWeek].ts[sk('her',d,s)] = now;
        }
      } else if (himId && himId === herId && !MANUAL_SET[sk('him',d,s)] && !MANUAL_SET[sk('her',d,s)]) {
        var candidates = getMealsForSlot(s).filter(function(m){ return m.her && m.id !== himId && !mealUsesPkg(m.id); });
        if (candidates.length) {
          var pick = randomPick(candidates);
          SEL[sk('her',d,s)] = pick.id;
          weekData[activeWeek].ts[sk('her',d,s)] = now;
        }
      }
    });
  });

}

function getShopPersons(){return shopPerson==='both'?['him','her']:shopPerson==='him'?['him']:['her'];}

function setShopPerson(p){shopPerson=p;renderShop();}
function toggleCustomMeal(d,s){
  const persons=getShopPersons();
  const allChecked=persons.every(function(p){return !!CUSTOM_SHOP_SEL[sk(p,d,s)];});
  persons.forEach(function(p){
    const k=sk(p,d,s);
    if(allChecked)delete CUSTOM_SHOP_SEL[k];
    else CUSTOM_SHOP_SEL[k]=true;
  });
  renderShop();
}
function toggleCustomDay(d){
  const persons=getShopPersons();
  let allChecked=true;
  persons.forEach(function(p){
    SLOTS.forEach(function(s){
      if(s==='late_snack')return;
      const id=getMealId(p,d,s);if(!id)return;
      if(!CUSTOM_SHOP_SEL[sk(p,d,s)])allChecked=false;
    });
  });
  persons.forEach(function(p){
    SLOTS.forEach(function(s){
      if(s==='late_snack')return;
      const id=getMealId(p,d,s);if(!id)return;
      const k=sk(p,d,s);
      if(allChecked)delete CUSTOM_SHOP_SEL[k];
      else CUSTOM_SHOP_SEL[k]=true;
    });
  });
  renderShop();
}

  persons.forEach(function(p){DAYS.forEach(function(d){SLOTS.forEach(function(s){
    if(s==='late_snack')return;

    CUSTOM_SHOP_SEL[sk(p,d,s)]=true;
  });});});

}
function customShopClearAll(){CUSTOM_SHOP_SEL={};CUSTOM_RECIPE_SEL={};renderShop();}
function toggleCustomRecipe(mealId,p){
  const k=mealId+'_'+p;
  CUSTOM_RECIPE_SEL[k]=!CUSTOM_RECIPE_SEL[k];
  if(!CUSTOM_RECIPE_SEL[k])delete CUSTOM_RECIPE_SEL[k];

}
function clearCustomRecipes(){CUSTOM_RECIPE_SEL={};renderShop();}
function toggleCustomRecipeBoth(mealId){
  const hk=mealId+'_him',rk=mealId+'_her';

  else{CUSTOM_RECIPE_SEL[hk]=true;CUSTOM_RECIPE_SEL[rk]=true;}
  renderShop();
}
function toggleCheck(k){
  CHECKS[k]=!CHECKS[k];if(!CHECKS[k])delete CHECKS[k];
  renderShop();
}
function clearAll(){Object.keys(CHECKS).forEach(function(k){if(k.indexOf(shopTrip+'_')===0)delete CHECKS[k]});renderShop();}
function checkAll(){
  const grouped=buildShoppingList(shopTrip,shopPerson);
  Object.keys(grouped).forEach(function(cat){grouped[cat].forEach(function(item){CHECKS[shopTrip+'_'+cat+'_'+item.name.toLowerCase()]=true});});
  renderShop();
}
function checkCategory(cat){
  const grouped=buildShoppingList(shopTrip,shopPerson);
  if(!grouped[cat])return;
  grouped[cat].forEach(function(item){CHECKS[shopTrip+'_'+cat+'_'+item.name.toLowerCase()]=true;});
  renderShop();
}

    +'<div class="shop-trip-tab'+(shopTrip==='wed'?' on':'')+'" onclick="setShopTrip(\'wed\')">ūüďč Thu‚ÄďSun<br><span style="font-size:11px;font-weight:400">'+weekLabel+'</span></div>'
    +'<div class="shop-trip-tab'+(shopTrip==='custom'?' on':'')+'" onclick="setShopTrip(\'custom\')">ūüõí Shop Now<br><span style="font-size:11px;font-weight:400">Pick meals</span></div></div>'

          if(!CUSTOM_SHOP_SEL[sk(p,d,s)])allDaySelected=false;
        });

      html+='<div class="cs-day-col'+(allDaySelected?' on':'')+'" onclick="toggleCustomDay(\''+d+'\')">'+d.substring(0,3)+'</div>';

// ‚ĒÄ‚ĒÄ WEEK MANAGEMENT ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
var activeWeek='this'; // 'last', 'this', or 'next'
var weekData={last:{sel:{},monday:''},this:{sel:{},monday:''},next:{sel:{},monday:''}};

function getMondayStr(d){const dt=new Date(d+'T12:00:00');const diff=dt.getDay()===0?-6:1-dt.getDay();dt.setDate(dt.getDate()+diff);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function fmtWeekLabel(mondayStr){const d=new Date(mondayStr+'T12:00:00');const end=new Date(d);end.setDate(d.getDate()+6);const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[d.getMonth()]+' '+d.getDate()+' ‚Äď '+mo[end.getMonth()]+' '+end.getDate();}
function todayMonday(){const d=new Date();return getMondayStr(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
function nextMonday(){const d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);}
function lastMonday(){const d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);}

function loadWeeks(){
  const saved=lsGet('mealPlannerWeekData',null);
  if(saved)weekData=saved;
  
  // Ensure all week slots exist (old localStorage may not have 'last')
  if(!weekData['last'])weekData['last']={sel:{},monday:''};
  if(!weekData['this'])weekData['this']={sel:{},monday:''};
  if(!weekData['next'])weekData['next']={sel:{},monday:''};

  // Auto-rollover: check if the calendar has moved forward
  const currentMonday=todayMonday();
  const thisMonday=weekData['this'].monday||'';
  const nextMon=weekData['next'].monday||'';
  
  if(thisMonday && thisMonday!==currentMonday){
    // The real-world week has changed
    if(nextMon===currentMonday){
      // Shift: last <- this (full state), this <- next (with schedule copied forward), next <- empty
      const prevSchedule=JSON.parse(JSON.stringify(weekData['this'].sharedSchedule||{}));
      weekData['last']=JSON.parse(JSON.stringify(weekData['this']));
      weekData['last'].monday=weekData['this'].monday;
      weekData['this']=JSON.parse(JSON.stringify(weekData['next']));
      weekData['this'].monday=currentMonday;
      weekData['this'].sharedSchedule=prevSchedule; // carry schedule forward
      weekData['next']={sel:{},monday:nextMonday(),sharedSchedule:JSON.parse(JSON.stringify(prevSchedule))};
    } else {
      // More than a week has passed, or dates don't match ‚ÄĒ reset all
      weekData['last']={sel:{},monday:lastMonday()};
      weekData['this']={sel:{},monday:currentMonday};
      weekData['next']={sel:{},monday:nextMonday()};
    }
    // Clear manual overrides for the new week
    Object.keys(SKIPPED).forEach(function(k){delete SKIPPED[k];});
    Object.keys(EAT_OUT).forEach(function(k){delete EAT_OUT[k];});
    Object.keys(OVERRIDES).forEach(function(k){delete OVERRIDES[k];});
    Object.keys(LATE_SNACK).forEach(function(k){delete LATE_SNACK[k];});
    Object.keys(MANUAL_SET).forEach(function(k){delete MANUAL_SET[k];});
    // Save the rollover
    lsSet('mealPlannerWeekData',weekData);
  }

  // Ensure monday stamps are set
  if(!weekData['last'].monday)weekData['last'].monday=lastMonday();
  if(!weekData['this'].monday)weekData['this'].monday=currentMonday;
  if(!weekData['next'].monday)weekData['next'].monday=nextMonday();
  
  // Load active week's state into globals
  loadWeekState(activeWeek);

  // Migrate old shared schedule from separate localStorage into this week's weekData
  if(!weekData[activeWeek].sharedSchedule){
    const ss=lsGet('mealPlannerSharedSchedule',null);if(ss)weekData[activeWeek].sharedSchedule=ss;
  }
}
function saveWeeks(){
  // Bundle per-week state into weekData
  weekData[activeWeek].sel=JSON.parse(JSON.stringify(SEL));
  weekData[activeWeek].skipped=JSON.parse(JSON.stringify(SKIPPED));
  weekData[activeWeek].eatOut=JSON.parse(JSON.stringify(EAT_OUT));
  weekData[activeWeek].overrides=JSON.parse(JSON.stringify(OVERRIDES));
  weekData[activeWeek].lateSnack=JSON.parse(JSON.stringify(LATE_SNACK));
  weekData[activeWeek].manualSet=JSON.parse(JSON.stringify(MANUAL_SET));
  weekData[activeWeek].sharedSchedule=JSON.parse(JSON.stringify(SHARED_SCHEDULE));
  weekData['last'].monday=lastMonday();
  weekData['this'].monday=todayMonday();
  weekData['next'].monday=nextMonday();
  lsSet('mealPlannerWeekData',weekData);
}
function loadWeekState(w){
  // Load all per-week state from weekData into globals
  const wd=weekData[w]||{};
  function loadInto(target,source){Object.keys(target).forEach(function(k){delete target[k];});Object.keys(source||{}).forEach(function(k){target[k]=source[k];});}
  loadInto(SEL,wd.sel);
  loadInto(SKIPPED,wd.skipped);
  loadInto(EAT_OUT,wd.eatOut);
  loadInto(OVERRIDES,wd.overrides);
  loadInto(LATE_SNACK,wd.lateSnack);
  loadInto(MANUAL_SET,wd.manualSet);
  loadInto(SHARED_SCHEDULE,wd.sharedSchedule);
  initSharedSchedule(); // ensure defaults if empty
}
function switchWeek(w){
  saveWeeks();
  activeWeek=w;
  loadWeekState(w);
  renderWeekBar();renderDayTabs();renderMeals();
  if(topTab==='shop')renderShop();
}
function renderWeekBar(){
  const bar=document.getElementById('weekBar');if(!bar)return;
  const thisLabel=fmtWeekLabel(todayMonday());
  const theme=topTab==='shop'?'shop':topTab==='recipes'?'recipes':person==='shared'?'shared':person==='her'?'her':'him';
  function pill(w,label){
    const isOn=activeWeek===w;
    return '<div class="week-pill'+(isOn?' on on-'+theme:'')+'" onclick="switchWeek(\''+w+'\')">'+label+'</div>';
  }
  bar.innerHTML='<div class="week-toggle">'
    +pill('last','Last')

}

// ‚ĒÄ‚ĒÄ CLOUD SYNC (GitHub Gist) ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
var GIST_API='https://api.github.com/gists';
var syncId=null;var syncToken=null;var syncStatus='';
function loadSyncId(){
  syncId=lsGetRaw('mealPlannerSyncId');
  syncToken=lsGetRaw('mealPlannerSyncToken');
}
function saveSyncIdLocal(id){syncId=id;lsSetRaw('mealPlannerSyncId',id);}
function saveSyncToken(token){syncToken=token;lsSetRaw('mealPlannerSyncToken',token);}
function setSyncStatus(msg,type){const c=type==='err'?'#DC2626':type==='ok'?'#059669':'var(--gray)';syncStatus='<span style="color:'+c+'">'+msg+'</span>';const el=document.getElementById('syncStatusMsg');if(el)el.innerHTML=syncStatus;}
function gistHeaders(){return {'Content-Type':'application/json','Authorization':'token '+syncToken};}
function getSyncPayload(){
  return {weekData:weekData,customMeals:customMeals,customIngredients:customIngredients,eatOutDB:EAT_OUT_DB,calBase:CAL_BASE,proTarget:PRO_TARGET,version:3};
}
function mergeSyncData(remote){
  // Week data: merge by MONDAY DATE, not by position name.
  // Build a map of remote weeks keyed by monday date.
  if(remote.weekData){
    const remoteByDate={};
    ['last','this','next'].forEach(function(w){
      if(remote.weekData[w]&&remote.weekData[w].monday){
        remoteByDate[remote.weekData[w].monday]=remote.weekData[w];
      }
    });
    // Fuzzy match: if remote date is off by 1 day (timezone bug migration),
    // also index under the corrected date
    Object.keys(remoteByDate).forEach(function(dateStr){
      const d=new Date(dateStr+'T12:00:00');
      // Check day before and after
      for(let offset=-1;offset<=1;offset++){
        if(offset===0)continue;
        const adj=new Date(d);adj.setDate(adj.getDate()+offset);
        const adjStr=adj.getFullYear()+'-'+String(adj.getMonth()+1).padStart(2,'0')+'-'+String(adj.getDate()).padStart(2,'0');
        if(!remoteByDate[adjStr])remoteByDate[adjStr]=remoteByDate[dateStr];
      }
    });
    // For each local week, find the matching remote week by date and merge
    ['last','this','next'].forEach(function(w){
      if(!weekData[w])weekData[w]={sel:{},ts:{},monday:''};
      const localMonday=weekData[w].monday;
      if(!localMonday)return; // no date set yet, skip
      const remoteWeek=remoteByDate[localMonday];
      if(!remoteWeek)return; // no matching remote week for this date

      if(!weekData[w].ts)weekData[w].ts={};
      const remoteSel=remoteWeek.sel||{};
      const remoteTs=remoteWeek.ts||{};
      const localSel=weekData[w].sel;
      const localTs=weekData[w].ts;

      // All keys from both sides
      const allKeys={};
      Object.keys(remoteSel).forEach(function(k){allKeys[k]=true;});
      Object.keys(localSel).forEach(function(k){allKeys[k]=true;});

      // Bundled per-week state from remote
      const remoteState={skipped:remoteWeek.skipped||{},eatOut:remoteWeek.eatOut||{},overrides:remoteWeek.overrides||{},lateSnack:remoteWeek.lateSnack||{},manualSet:remoteWeek.manualSet||{}};
      if(!weekData[w].skipped)weekData[w].skipped={};
      if(!weekData[w].eatOut)weekData[w].eatOut={};
      if(!weekData[w].overrides)weekData[w].overrides={};
      if(!weekData[w].lateSnack)weekData[w].lateSnack={};
      if(!weekData[w].manualSet)weekData[w].manualSet={};

      Object.keys(allKeys).forEach(function(k){
        const localTime=localTs[k]||0;
        const remoteTime=remoteTs[k]||0;
        if(remoteTime>localTime){
          localSel[k]=remoteSel[k];
          localTs[k]=remoteTime;
          if(remoteState.skipped[k]!==undefined) weekData[w].skipped[k]=remoteState.skipped[k]; else delete weekData[w].skipped[k];
          if(remoteState.eatOut[k]!==undefined) weekData[w].eatOut[k]=remoteState.eatOut[k]; else delete weekData[w].eatOut[k];
          if(remoteState.overrides[k]!==undefined) weekData[w].overrides[k]=remoteState.overrides[k]; else delete weekData[w].overrides[k];
          if(remoteState.manualSet[k]!==undefined) weekData[w].manualSet[k]=remoteState.manualSet[k]; else delete weekData[w].manualSet[k];
        }
      });
      // Late snack uses person_day key, merge separately
      Object.keys(remoteState.lateSnack).forEach(function(k){
        if(!weekData[w].lateSnack[k]) weekData[w].lateSnack[k]=remoteState.lateSnack[k];
      });

      weekData[w].sel=localSel;
      weekData[w].ts=localTs;
      // Do NOT overwrite local monday ‚ÄĒ local rollover is authoritative
      // Merge shared schedule: take remote entries that local doesn't have
      const remSched=remoteWeek.sharedSchedule||{};
      if(!weekData[w].sharedSchedule)weekData[w].sharedSchedule={};
      Object.keys(remSched).forEach(function(k){
        if(!weekData[w].sharedSchedule[k])weekData[w].sharedSchedule[k]=remSched[k];
      });
    });
  }
  
  // Calorie and protein targets: take remote if present
  if(remote.calBase){CAL_BASE=remote.calBase;lsSet('mealPlannerCalBase',CAL_BASE);}
  if(remote.proTarget){PRO_TARGET=remote.proTarget;lsSet('mealPlannerProTarget',PRO_TARGET);}

  // Custom meals: merge by ID, don't overwrite existing
  if(remote.customMeals){
    Object.keys(remote.customMeals).forEach(function(k){
      if(!customMeals[k])customMeals[k]=remote.customMeals[k];
    });
  }
  
  // Custom ingredients: merge by key, don't overwrite existing
  if(remote.customIngredients){
    Object.keys(remote.customIngredients).forEach(function(k){
      if(!customIngredients[k]){
        customIngredients[k]=remote.customIngredients[k];
        NUTRI_DB[k]=remote.customIngredients[k];
      }
    });
  }
  
  // Eat-out DB: merge by name+restaurant, don't duplicate
  if(remote.eatOutDB){
    remote.eatOutDB.forEach(function(entry){
      const exists=EAT_OUT_DB.some(function(e){return e.name===entry.name&&e.restaurant===entry.restaurant;});
      if(!exists)EAT_OUT_DB.push(entry);
    });
  }
  
  // Shared schedule now per-week in weekData ‚ÄĒ merged with other bundled state above

  // Reload active week's state into globals
  loadWeekState(activeWeek);
  
  saveWeeks();saveCustomMeals();saveCustomIngredients();saveEatOutDB();
  injectCustomMeals();renderWeekBar();
}

function createSync(){
  if(!syncToken){setSyncStatus('Enter your GitHub token first.','err');return;}
  setSyncStatus('Creating sync...','loading');
  saveWeeks();
  const payload=getSyncPayload();
  fetch(GIST_API,{method:'POST',headers:gistHeaders(),body:JSON.stringify({
    description:'Meal Planner Sync',public:false,
    files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
  })}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(d){
    if(!d.id){setSyncStatus('Could not create.','err');return;}
    saveSyncIdLocal(d.id);
    setSyncStatus('Sync created! Share the Gist ID with your partner.','ok');
    renderSyncView();
  }).catch(function(e){setSyncStatus('Error: '+e.message,'err');});
}
function pushSync(){
  if(!syncId||!syncToken)return;
  saveWeeks();
  setSyncStatus('Syncing...','loading');
  // Pull first, merge, then push
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    const content=gist.files['meal-planner-sync.json'].content;
    const remote=JSON.parse(content);
    mergeSyncData(remote);
    saveWeeks(); // Re-save to ensure correct monday dates after merge
    const payload=getSyncPayload();
    return fetch(GIST_API+'/'+syncId,{method:'PATCH',headers:gistHeaders(),body:JSON.stringify({
      files:{'meal-planner-sync.json':{content:JSON.stringify(payload)}}
    })});
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('Synced!','ok');renderMeals();
  }).catch(function(e){setSyncStatus('Sync failed: '+e.message,'err');});
}
function pullSync(){
  if(!syncId||!syncToken)return;
  setSyncStatus('Pulling...','loading');
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    const content=gist.files['meal-planner-sync.json'].content;
    const data=JSON.parse(content);
    mergeSyncData(data);
    setSyncStatus('Pulled!','ok');renderMeals();renderSyncView();
  }).catch(function(e){setSyncStatus('Pull failed: '+e.message,'err');});
}
function connectSync(){
  const tokenEl=document.getElementById('syncTokenInput');
  const idEl=document.getElementById('syncIdInput');
  if(tokenEl&&tokenEl.value.trim()) saveSyncToken(tokenEl.value.trim());
  if(idEl&&idEl.value.trim()) saveSyncIdLocal(idEl.value.trim());
  if(!syncToken){setSyncStatus('Enter your GitHub token.','err');renderSyncView();return;}
  if(!syncId){setSyncStatus('Enter a Gist ID or create a new sync.','err');renderSyncView();return;}
  // Verify the connection works
  setSyncStatus('Connecting...','loading');
  fetch(GIST_API+'/'+syncId,{headers:gistHeaders()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(gist){
    if(!gist.files||!gist.files['meal-planner-sync.json']){throw new Error('Not a Meal Planner sync gist');}
    setSyncStatus('Connected!','ok');renderSyncView();
  }).catch(function(e){
    syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(x){}
    setSyncStatus('Connection failed: '+e.message,'err');renderSyncView();
  });
}
function clearSyncId(){syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(e){}setSyncStatus('Disconnected. Token saved.','ok');renderSyncView();}
function copyId(){if(syncId){navigator.clipboard.writeText(syncId).then(function(){setSyncStatus('ID copied!','ok');});}}
function shareSync(){

function injectCustomMeals(){
  for(let i=MEALS.length-1;i>=0;i--){if(MEALS[i]._custom)MEALS.splice(i,1);}
  Object.keys(customMeals).forEach(function(id){

function customMealId(label){return 'custom_'+label.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,40)+'_'+Date.now();}
function parseStepsLines(text){
  if(!text||!text.trim())return[];
  return text.trim().split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});

function buildCustomMeal(){
  const label=document.getElementById('rf_label').value.trim();
  if(!label){alert('Please enter a recipe name.');return null;}
  if(!selectedSlots.length){alert('Please select at least one slot.');return null;}
  const url=document.getElementById('rf_url').value.trim();
  const sharedSteps=parseStepsLines(document.getElementById('rf_steps').value);
  const ingr=collectFormIngredients();
  if(!ingr.length){alert('Please add at least one ingredient.');return null;}
  const hasAmt=ingr.some(function(i){return(i.amt||0)>0;});
  if(!hasAmt){alert('Please add amounts for at least one ingredient.');return null;}
  // Auto-compute fv from veg + fruit ingredients
  let vegCups=0,fruitCups=0;
  ingr.forEach(function(i){
    const db=NUTRI_DB[i.dbKey];
    if(!db)return;
    if(i.role==='veg'){
      if(db.unit==='cup')vegCups+=i.amt;
      else if(db.unit==='each'&&db.cupsEach)vegCups+=db.cupsEach*i.amt;
    }
    if(i.role==='fruit'){
      if(db.unit==='cup')fruitCups+=i.amt;
      else if(db.unit==='each'&&db.cupsEach)fruitCups+=db.cupsEach*i.amt;
      else if(db.unit==='each')fruitCups+=1*i.amt; // fallback: 1 fruit ‚Čą 1c
    }
  });
  let fv='';
  if(vegCups>0)fv+=vegCups+'c veg';
  if(fruitCups>0)fv+=(fv?' + ':'')+fruitCups+'c fruit';
  const note=document.getElementById('rf_note').value.trim();
  const noLeftover=document.getElementById('rf_noLeftover').value==='yes';
  const him=selectedRecipePersons==='her'?null:{fv:fv};
  const her=selectedRecipePersons==='him'?null:{fv:fv};
  const meal={id:editingRecipeId||customMealId(label),label:label,slots:selectedSlots.slice(),steps:sharedSteps,him:him,her:her,ingredients:ingr,_custom:true};
  if(url)meal.sourceUrl=url;
  if(note)meal.note=note;
  if(noLeftover)meal.noLeftover=true;
  return meal;
}

// Build role->ingredients map from all meals
function buildRoleIngredients(){
  const map={protein:{},carb:{},fat:{},veg:{},condiment:{},fixed:{}};
  MEALS.forEach(function(m){
    if(!m.ingredients)return;
    m.ingredients.forEach(function(ing){
      if(!ing.dbKey)return;
      const role=ing.role||'fixed';
      if(map[role])map[role][ing.dbKey]=true;
    });
  });
  // Convert to sorted arrays
  const result={};
  Object.keys(map).forEach(function(role){
    result[role]=Object.keys(map[role]).sort();
  });
  // Unused DB keys only go into 'fixed' as a catch-all
  const allUsed={};
  Object.keys(result).forEach(function(r){result[r].forEach(function(k){allUsed[k]=true;});});
  const unused=Object.keys(NUTRI_DB).filter(function(k){return !allUsed[k];}).sort();
  unused.forEach(function(k){if(result.fixed.indexOf(k)<0)result.fixed.push(k);});
  result.fixed.sort();
  result.all=Object.keys(NUTRI_DB).sort();
  return result;
}

function addNewDbIngredient(){

  const pro=Math.max(0,parseFloat(document.getElementById('rf_new_pro').value)||0);

  const unit=document.getElementById('rf_new_unit').value||'each';
  const role=document.getElementById('rf_new_role').value||'protein';
  if(!name){alert('Enter an ingredient name.');return;}
  if(NUTRI_DB[name]){alert(name+' already exists in the database.');return;}

  // Build entry with required fields
  const entry={kcal:kcal,pro:pro,fat:fat,carb:carb,unit:unit};

  // Optional behavior fields
  const minAmt=parseFloat(document.getElementById('rf_new_minAmt').value);
  if(minAmt>0)entry.minAmt=minAmt;
  if(document.getElementById('rf_new_halfSnap').value==='yes')entry.halfSnap=true;
  if(document.getElementById('rf_new_wholeOnly').value==='yes')entry.wholeOnly=true;

  // Optional package fields

  const pkgDrained=parseFloat(document.getElementById('rf_new_pkgDrained').value);

  if(pkgSize>0&&pkgUnit){
    entry.pkg={size:pkgSize,unit:pkgUnit};
    if(pkgDrained>0)entry.pkg.drained=pkgDrained;
    if(pkgUnit==='cups'&&pkgDrained>0)entry.pkg.cups=pkgDrained;
    if(pkgType)entry.pkg.type=pkgType;
  }

  NUTRI_DB[name]=entry;
  customIngredients[name]=entry;
  saveCustomIngredients();

  // Add to role cache so it appears in filtered dropdowns immediately
  if(ROLE_INGR){
    if(!ROLE_INGR[role])ROLE_INGR[role]=[];

    if(!ROLE_INGR.all)ROLE_INGR.all=[];

  document.getElementById('rf_new_pkgType').value='';
}

    +'<div class="ni-row">'
    +'<div class="ni-field" style="flex:1"><label>Kcal</label><input id="rf_new_kcal" type="number" min="0" placeholder="0"></div>'
    +'<div class="ni-field" style="flex:1"><label>Pro</label><input id="rf_new_pro" type="number" min="0" placeholder="0"></div>'
    +'<div class="ni-field" style="flex:1"><label>Fat</label><input id="rf_new_fat" type="number" min="0" placeholder="0"></div>'
    +'<div class="ni-field" style="flex:1"><label>Carb</label><input id="rf_new_carb" type="number" min="0" placeholder="0"></div>'
    +'</div>'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray);margin:8px 0 4px">Optional ‚ÄĒ Package &amp; Behavior</div>'
    +'<div class="ni-row">'
    +'<div class="ni-field" style="flex:1"><label>Min Amt</label><input id="rf_new_minAmt" type="number" min="0" step="0.25" placeholder="‚ÄĒ"></div>'
    +'<div class="ni-field" style="flex:1"><label>¬Ĺ Snap</label><select id="rf_new_halfSnap"><option value="no">No</option><option value="yes">Yes</option></select></div>'
    +'<div class="ni-field" style="flex:1"><label>Whole Only</label><select id="rf_new_wholeOnly"><option value="no">No</option><option value="yes">Yes</option></select></div>'
    +'</div>'
    +'<div class="ni-row">'
    +'<div class="ni-field" style="flex:1"><label>Pkg Size</label><input id="rf_new_pkgSize" type="number" min="0" step="0.5" placeholder="‚ÄĒ"></div>'
    +'<div class="ni-field" style="flex:1"><label>Pkg Unit</label><select id="rf_new_pkgUnit"><option value="">‚ÄĒ</option><option value="oz">oz</option><option value="cups">cups</option></select></div>'
    +'<div class="ni-field" style="flex:1"><label>Drained</label><input id="rf_new_pkgDrained" type="number" min="0" step="0.25" placeholder="‚ÄĒ"></div>'
    +'<div class="ni-field" style="flex:1"><label>Pkg Type</label><select id="rf_new_pkgType"><option value="">‚ÄĒ</option><option value="can">can</option><option value="carton">carton</option><option value="jar">jar</option><option value="bulk">bulk</option></select></div>'
    +'</div>'
    +'<button class="rf-save" style="padding:5px 14px;font-size:11px;margin-top:8px" onclick="addNewDbIngredient()">Add to Database</button>'
    +'</div>':'')
    +'</div>'
    // Edit Recipes collapsible
    +'<div style="background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);margin:10px 12px;box-shadow:var(--shadow)">'
    +'<div style="padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text)" onclick="_editRecipesOpen=!_editRecipesOpen;renderRecipesView()">'+erIcon+' Edit Recipes'+(listIds.length?' <span style="font-size:11px;color:var(--gray);font-weight:600">('+listIds.length+')</span>':'')+'</div>'
    +(_editRecipesOpen
      ?'<div style="padding:0 14px 14px">'
      // Slot + Meal picker + Edit button
      +'<div style="display:flex;gap:4px;align-items:center;margin-bottom:10px">'
      +'<select id="editSlotSel" style="padding:4px 4px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;flex-shrink:0" onchange="onEditSlotChange()">'
      +'<option value="">Slot</option><option value="breakfast"'+(_editSavedSlot==='breakfast'?' selected':'')+'>Bkfst</option><option value="lunch"'+(_editSavedSlot==='lunch'?' selected':'')+'>Lunch</option><option value="dinner"'+(_editSavedSlot==='dinner'?' selected':'')+'>Dinner</option><option value="snack"'+(_editSavedSlot==='snack'?' selected':'')+'>Snack</option><option value="shake"'+(_editSavedSlot==='shake'?' selected':'')+'>Shake</option>'
      +'</select>'
      +'<select id="editMealSel" style="flex:1;min-width:0;padding:4px 4px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;text-overflow:ellipsis" onchange="onEditMealChange()">'
      +(function(){
        let opts='<option value="">‚ÄĒ Meal ‚ÄĒ</option>';
        if(_editSavedSlot){
          const meals=getMealsForSlot(_editSavedSlot);
          meals.sort(function(a,b){return a.label<b.label?-1:1;});
          meals.forEach(function(m){opts+='<option value="'+m.id+'"'+(_editSavedMeal===m.id?' selected':'')+'>'+m.label+'</option>';});
        }
        return opts;
      })()
      +'</select>'
      +'<div style="padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);color:'+(_editSavedMeal?(_editMode?'var(--shop)':'var(--text)'):'var(--gray)')+';font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();toggleEditMode()">'+(_editMode?'Cancel':'Edit')+'</div>'
      +'</div>'
      // Show selected meal preview/edit form
      +(function(){
        if(!_editSavedMeal) return '';
        const m=getMeal(_editSavedMeal);
        if(!m) return '';
        let html='';
        if(m.ingredients&&m.ingredients.length){
          const mc=computeMacros(m.ingredients.filter(function(i){return(i.amt||0)>0;}).map(function(i){return{dbKey:i.dbKey,amt:i.amt};}));
          html+='<div style="font-size:12px;color:var(--gray);margin-bottom:6px">'+mc.kcal+' kcal ¬∑ P '+mc.pro+'g ¬∑ C '+mc.carb+'g ¬∑ F '+mc.fat+'g</div>';
          html+='<div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;margin-bottom:8px">';
          m.ingredients.forEach(function(ing,idx){
            const db=NUTRI_DB[ing.dbKey];
            const unit=db?db.unit:'';
            const kcal=db?Math.round(db.kcal*ing.amt):0;
            if(_editMode){
              const qtyOpts=buildQtyOptions(unit,ing.amt,db&&db.wholeOnly);
              const qtyHtml=qtyOpts.map(function(q){return '<option value="'+q.val+'"'+(Math.abs(q.val-ing.amt)<0.02?' selected':'')+'>'+q.label+'</option>';}).join('');
              html+='<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">'
                +'<select style="width:40px;padding:2px;border:1.5px solid var(--border);border-radius:4px;font-size:11px;background:var(--bg);color:var(--text)" onchange="_editChanges['+idx+']={amt:parseFloat(this.value)}">'
                +qtyHtml+'</select>'
                +'<span style="color:var(--gray);min-width:24px">'+unit+'</span>'
                +'<span style="flex:1;color:var(--text)">'+ing.dbKey+'</span>'
                +'<span style="color:var(--shop);font-size:10px">'+kcal+'cal</span></div>';
            } else {
              html+='<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">'
                +'<span style="color:var(--text);min-width:28px;text-align:right">'+fmtFrac(ing.amt)+'</span>'
                +'<span style="color:var(--gray);min-width:24px">'+unit+'</span>'
                +'<span style="flex:1;color:var(--text)">'+ing.dbKey+'</span>'
                +'<span style="color:var(--shop);font-size:10px">'+kcal+'cal</span></div>';
            }
          });
          html+='</div>';
        }
        if(m.steps&&m.steps.length){
          html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:4px">Steps</div>';
          html+='<ol style="font-size:11px;color:var(--text-mid);padding-left:16px;margin:0">';
          m.steps.forEach(function(st){html+='<li style="margin-bottom:3px">'+st+'</li>';});
          html+='</ol>';
        }
        if(_editMode){
          html+='<div style="margin-top:10px"><div style="padding:6px 14px;border-radius:6px;background:var(--shop);color:#000;font-size:12px;font-weight:700;cursor:pointer;display:inline-block" onclick="saveEditChanges()">Assign</div></div>';
        }
        return html;
      })()
      +'</div>'
      :'')
    +'</div>'
    +'</div>';
  renderSlotChips();
  // Add one starter ingredient row if not editing
  if(!editingRecipeId){
    addIngrRow();
  }
  if(editingRecipeId&&customMeals[editingRecipeId]){showRecipeForm(customMeals[editingRecipeId]);}
}

// ‚ĒÄ‚ĒÄ INIT ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
// Restore page state from sessionStorage (survives refresh)
(function(){
  var saved=sessionStorage.getItem('mealPlannerPageState');
  if(saved){
    try{
      var s=JSON.parse(saved);
      if(s.topTab)topTab=s.topTab;
      if(s.person)person=s.person;
      if(s.day)day=s.day;
      if(s.activeWeek)activeWeek=s.activeWeek;
      if(s.openCards)openCards=s.openCards;
      if(s.sharedSchedOpen!==undefined)sharedSchedOpen=s.sharedSchedOpen;
    }catch(e){}
  }
})();
// Save page state on unload
window.addEventListener('beforeunload',function(){
  sessionStorage.setItem('mealPlannerPageState',JSON.stringify({
    topTab:topTab,person:person,day:day,activeWeek:activeWeek,scrollY:window.scrollY,
    openCards:JSON.parse(JSON.stringify(openCards)),
    sharedSchedOpen:sharedSchedOpen
  }));
});

loadSyncId();loadCustomIngredients();loadWeeks();renderWeekBar();
loadCustomMeals();loadEatOutDB();
MEALS.forEach(function(m){expandMealIngredients(m);});
MEALS.forEach(function(m){buildColorizedSteps(m);});
renderDayTabs();setTopTab(topTab);renderMeals();

// Restore scroll position after render
(function(){
  var saved=sessionStorage.getItem('mealPlannerPageState');
  if(saved){
    try{
      var s=JSON.parse(saved);
      if(s.scrollY)setTimeout(function(){window.scrollTo(0,s.scrollY);},50);
    }catch(e){}
  }
})();

// Register service worker for offline PWA support
// Unregister any existing service worker ‚ÄĒ it causes stale code issues
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){r.unregister();});
  });
}

</script>
