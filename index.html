// Check if a meal uses any large-package ingredients
function mealUsesPkg(mealId) {
  const m = getMeal(mealId);
  if (!m || !m.ingredients) return false;
  return m.ingredients.some(function(ing) {
    const db = NUTRI_DB[ing.dbKey];
    return db && db.pkg && (db.pkg.drained || db.pkg.cups);
  });
}

// Flex ranges for trip-level pkg fitting. `applyTripFlexScaling` uses this
// to nudge per-serving amounts within [1-maxDown, 1+maxUp] ratio to hit a
// package boundary, backfilling kcal via carb/fat trim. Defined at module
// scope so the retry-loop waste check can anticipate what flex scaling
// will reach — otherwise turkey/chicken retries are rejected as wasteful
// before flex scaling ever runs on them.
const PKG_FLEX_CONFIG = {
  'marinara':                 {maxUp:1.0,  maxDown:0,    kcalCap:200},
  'black beans canned':       {maxUp:0.75, maxDown:0.25, kcalCap:180},
  'black beans cooked':       {maxUp:0.75, maxDown:0.25, kcalCap:180},
  'cannellini beans canned':  {maxUp:0.75, maxDown:0.25, kcalCap:180},
  'cannellini beans cooked':  {maxUp:0.75, maxDown:0.25, kcalCap:180},
  'chickpeas cooked':         {maxUp:0.75, maxDown:0.25, kcalCap:180},
  'chicken broth':            {maxUp:1.0,  maxDown:0.5,  kcalCap:100}, // 15 kcal/cup, very low cal impact
  'tofu firm':                {maxUp:1.0,  maxDown:0,    kcalCap:300},
  'silken tofu':              {maxUp:1.0,  maxDown:0,    kcalCap:300},
  'canned tuna':              {maxUp:0.75, maxDown:0.25, kcalCap:200}, // opened quickly — small down-flex OK
  'ground turkey 93':         {maxUp:0.75, maxDown:0.25, kcalCap:300}, // 38 kcal/oz, 16oz container
  'ground chicken':           {maxUp:0.75, maxDown:0.25, kcalCap:300}  // 35 kcal/oz, 16oz container
};

// Flex ranges for trip-level WHOLE-PRODUCE fitting. `applyTripProduceScaling`
// uses this to nudge per-serving amounts within [1-maxDown, 1+maxUp] ratio to
// hit a whole-produce-count boundary (e.g., 2.5c bell pepper across a trip
// → 3.75c = 3 peppers). Mirrors PKG_FLEX_CONFIG structure.
//
// kcalCap is the max kcal added per day per ingredient — keeps produce flex
// from blowing daily kcal budgets when scaling up. Most produce is low kcal/cup
// (broccoli 31, bell pepper 30, zucchini 20, etc.) so caps are generous.
//
// Items with a `produce` field but absent here are NOT flex-scaled (display-only
// whole-count conversion still happens via `shopQtyWithCount`). Currently all
// 14 produce items get flex coverage.
const PRODUCE_FLEX_CONFIG = {
  // Standard veg — match PKG_FLEX_CONFIG's beans/tuna/ground-meat ranges
  // (0.75/0.25). Earlier 0.5/0.25 was too tight to reach next perWhole on
  // typical trip totals (most flex calls fell short of boundary).
  'broccoli':       {maxUp:0.75, maxDown:0.25, kcalCap:200},
  'bell pepper':    {maxUp:0.75, maxDown:0.25, kcalCap:200},
  'zucchini':       {maxUp:0.75, maxDown:0.25, kcalCap:200},
  'asparagus':      {maxUp:0.75, maxDown:0.25, kcalCap:200},
  'grape tomatoes': {maxUp:0.75, maxDown:0.25, kcalCap:200},
  'cucumber':       {maxUp:0.75, maxDown:0.25, kcalCap:200},
  'bok choy':       {maxUp:0.75, maxDown:0.25, kcalCap:200},
  // Leafy bagged (perWhole 5/3 for spinach/kale): wider flex, very low kcal/cup
  'baby spinach':   {maxUp:1.0,  maxDown:0.5,  kcalCap:200},
  'kale':           {maxUp:1.0,  maxDown:0.5,  kcalCap:200},
  // Higher kcal/cup — slightly tighter than standard veg
  'carrots':        {maxUp:0.5,  maxDown:0.25, kcalCap:150},
  'sweet potato':   {maxUp:0.5,  maxDown:0.25, kcalCap:300},
  'yukon potato':   {maxUp:0.5,  maxDown:0.25, kcalCap:300},
  // Aromatic with strict per-portion cap (db.maxAmt 0.5c) — wider scale
  // ranges are moot because the maxAmt cap kicks in first.
  'red onion':      {maxUp:0.25, maxDown:0.25, kcalCap:100}
};

// Returns true if `amount` for ingredient `dbKey` can be flex-nudged to
// hit a perUnit-boundary multiple within its flex range. Used by the
// retry-loop waste check to avoid pessimistically counting flex-fixable
// waste as "bad waste". Handles both pkg (perPkg = drained/cups) and
// produce (perUnit = perWhole) — caller passes whichever is appropriate.
function canFlexFitToBoundary(dbKey, amount, perUnit) {
  const cfg = PKG_FLEX_CONFIG[dbKey] || PRODUCE_FLEX_CONFIG[dbKey];
  if (!cfg || amount <= 0 || perUnit <= 0) return false;
  const minReach = amount * (1 - (cfg.maxDown||0));
  const maxReach = amount * (1 + (cfg.maxUp||0));
  const floorMult = Math.floor(amount / perUnit) * perUnit;
  const ceilMult = Math.ceil(amount / perUnit) * perUnit;
  // Either boundary reachable counts as flex-fixable.
  if (floorMult > 0 && floorMult >= minReach - 0.0001) return true;
  if (ceilMult <= maxReach + 0.0001) return true;
  return false;
}

// Items that get the "round trip total to nearest perPkg multiple" freeze
// treatment. For each item per trip:
//   1. Compute trip total X (sum of estimated per-portion balanced amounts
//      across cook anchors, weighted by lMult for shared/leftover batches)
//   2. Compute Y_nearest = max(perPkg, round(X/perPkg) * perPkg) (never zero)
//   3. Try scaling each usage by (Y_nearest/X). If all per-portion amounts
//      stay within [minAmt(Solo), maxAmt], apply via setOverride with
//      `scalable:false` so the per-slot calorie adjuster doesn't re-scale
//      our pinned amount. Day balancer compensates via non-pkg items.
//   4. If Y_nearest blocks on maxAmt, try Y_floor (round DOWN) instead.
//      If Y_nearest blocks on minAmt, try Y_ceil (round UP) instead.
//      If both directions fail → leave as-is. Prevents oscillation.
//
// Items: 5 proteins (tofu firm, silken tofu, ground turkey 93, ground
// chicken, canned tuna) + 2 sauces/liquids (chicken broth, marinara).
// Skips db.pkg.acceptableWaste items (e.g. coconut milk).
// Added 2026-04-28.
var ROUND_PKG_ITEMS = ['tofu firm','silken tofu','ground turkey 93','ground chicken','canned tuna','chicken broth','marinara'];

// Produce items get the "round trip total to nearest perWhole multiple" freeze
// treatment too. perWhole comes from db.produce.perWhole. Same algorithm as
// ROUND_PKG_ITEMS, just a different per-unit value. Parallel structure to
// ROUND_PKG_ITEMS — keeps the freeze function symmetric across pkg + produce.
// 2026-04-29.
var ROUND_PRODUCE_ITEMS = ['baby spinach','kale','broccoli','bell pepper','carrots','grape tomatoes','red onion','zucchini','asparagus','bok choy','cucumber','sweet potato','yukon potato','celery'];

// freezeTripTotals — runs after the per-slot adjuster + day-balancer have
// populated the cache (stages 1+2). For each trip × eligible item:
//  - Sum trip total across solo cooks + multi-cook batches (uses cache amts).
//  - Round to nearest perUnit multiple. Solos snap to native grid; multi-cook
//    batches absorb the remainder via largest-remainder paired-snap so each
//    batch total lands on grid AND Σ batch totals == absorbable.
//  - Within each batch, per-portion amts are kcal-prop split of the new
//    batch total (preserved by scaling the whole batch uniformly).
//  - Trade hierarchy when per-portion bounds fail: cap the failing batch at
//    its max-feasible, redistribute surplus to other batches, then bump solos
//    up/down by one grid step at a time within [minAmt(Solo), maxAmt(Solo)].
//    If still infeasible at Y_nearest, try Y_other. If both fail, leave the
//    trip unfrozen for this item.
//  - Writes overrides {amt, scalable:false} on every affected portion and
//    invalidates affected day caches so the next read rebuilds via
//    adjustIngredients (respects scalable:false) + balanceDayMacros (com-
//    pensates non-frozen items for any kcal shift).
//
// Unify and snap functions skip ingredients where any portion's cache item
// carries scalable:false — the freeze is the authority on those amounts.
//
// `attemptSwap`=true enables the last-resort solo-pkg swap pass: when freeze
// can't reach a package boundary AND the trip would fire INV20, swap the
// offending solo meal to a non-pkg alternative. Caller passes true only for
// the post-retry call site (NOT the retry-loop site, which runs 60+ times
// and would compound cost). 2026-04-29 (late).
function freezeTripTotals(randTarget, attemptSwap){
  var persons = randTarget === 'shared' ? ['him','her'] : [randTarget];
  // Caller must run runBalanceAdjusters first so the cache is populated and
  // unify has produced kcal-prop ratios for every batch. Freeze applies
  // uniform scaling per batch, which preserves those ratios.
  //
  // CRITICAL: do NOT invalidate the cache at the start. It would wipe the
  // unified state we depend on — getBalancedSlotIngredients would lazy-
  // rebuild via adjustIngredients (per-slot, not unified), giving us non-
  // kcal-prop ratios on non-frozen items in cross-person batches → INV7.
  // We rely on the caller's runBalanceAdjusters having left both caches
  // valid (computeLeftovers populates _leftoverCache; unify/snap leave
  // _dayBalancedCache fully populated and unified).
  //
  // We DO invalidate affected day caches at the END so the caller can run
  // runBalanceAdjusters again — that rebuild calls adjustIngredients (which
  // respects the new scalable:false overrides → frozen items pinned) +
  // balanceDayMacros (which compensates non-frozen items for the kcal shift
  // freeze caused). Without that compensation, days drift off-budget.
  var leftovers = computeLeftovers();
  var allItems = ROUND_PKG_ITEMS.concat(ROUND_PRODUCE_ITEMS);
  var affectedDays = {};

  ['cook1','cook2'].forEach(function(trip){
    var days = TRIP_DAYS_STATIC[trip] || [];
    allItems.forEach(function(dbKey){
      var info = _freezeOneItem(dbKey, days, persons, leftovers);
      if(!info){
        if(attemptSwap){
          var swap = _trySwapForWaste(dbKey, trip, days, persons, leftovers);
          if(swap){
            var key = sk(swap.p, swap.d, swap.s);
            SEL[key] = swap.newMealId;
            if(weekData[activeWeek] && weekData[activeWeek].ts){
              weekData[activeWeek].ts[key] = Date.now();
            }
            clearOverrides(swap.p, swap.d, swap.s);
            affectedDays[swap.p+'_'+swap.d] = {p:swap.p, d:swap.d};
            if(swap.sharedSlot){
              var otherP = swap.p==='him' ? 'her' : 'him';
              var oKey = sk(otherP, swap.d, swap.s);
              SEL[oKey] = swap.newMealId;
              if(weekData[activeWeek] && weekData[activeWeek].ts){
                weekData[activeWeek].ts[oKey] = Date.now();
              }
              clearOverrides(otherP, swap.d, swap.s);
              affectedDays[otherP+'_'+swap.d] = {p:otherP, d:swap.d};
            }
            // CO-CONTRIBUTOR CLEANUP: the OUTGOING meal might have shared
            // pkg/produce ingredients with OTHER slots in this trip. Their
            // freeze overrides were sized assuming the OLD trip composition
            // (with the swapped-out meal contributing). Now that contribution
            // is gone — those overrides are stale and would lock subsequent
            // freezes into wrong amounts.
            //
            // Example: turkey_zucchini_boats (gt93 + marinara) on Him Sun.
            // Earlier in the freeze loop, gt93 cook2 wrote overrides:
            //   Him Sun gt93 = 9.6oz + Her Sat gt93 = 6.4oz = 16oz container.
            // Now we swap Him Sun → burrito_bowl (no gt93). Without this
            // cleanup, Her Sat keeps 6.4oz override even though it's now
            // alone in cook2 → trip total 6.4oz wastes 9.6oz of a 16oz can.
            // With cleanup: clear Her Sat's gt93 override; the post-swap RBA
            // re-adjusts gt93 to recipe-base; freeze re-evaluates; if it can
            // still resolve, great; otherwise this slot may also get swapped.
            var oldMeal = getMeal(swap.oldMealId);
            if(oldMeal && oldMeal.ingredients){
              var swapTargetKeys = {};
              swapTargetKeys[key] = true;
              if(swap.sharedSlot){
                var otherPck = swap.p==='him' ? 'her' : 'him';
                swapTargetKeys[sk(otherPck, swap.d, swap.s)] = true;
              }
              // Helper: clear OVERRIDES[k][idx for coKey] on a single slot.
              var _clearIngOverride = function(p, d, s, coKey){
                var k2 = sk(p, d, s);
                var mealId = SEL[k2]; if(!mealId) return false;
                var meal = getMeal(mealId);
                if(!meal || !meal.ingredients) return false;
                var idx = -1;
                for(var ii=0; ii<meal.ingredients.length; ii++){
                  if(meal.ingredients[ii].dbKey === coKey){ idx = ii; break; }
                }
                if(idx < 0) return false;
                var ovList = OVERRIDES[k2];
                if(!ovList) return false;
                var changed = false;
                for(var jj=ovList.length-1; jj>=0; jj--){
                  if(ovList[jj].idx === idx){ ovList.splice(jj, 1); changed = true; }
                }
                if(ovList.length === 0) delete OVERRIDES[k2];
                if(changed) affectedDays[p+'_'+d] = {p:p, d:d};
                return changed;
              };
              oldMeal.ingredients.forEach(function(ing){
                var coKey = ing.dbKey;
                if(coKey === dbKey) return; // already handled by this freeze attempt
                if(ROUND_PKG_ITEMS.indexOf(coKey) < 0 && ROUND_PRODUCE_ITEMS.indexOf(coKey) < 0) return;
                // Iterate THIS TRIP's days only. For each slot found using
                // coKey, also clear ANY cross-trip batch portions (anchor or
                // leftover) so the whole batch's state stays consistent —
                // partial override clearing across batch portions breaks
                // unify and triggers INV7/INV8.
                days.forEach(function(d){
                  ['him','her'].forEach(function(p){
                    if(p!=='him' && p!=='her') return;
                    ['breakfast','lunch','snack','dinner'].forEach(function(s){
                      var k2 = sk(p, d, s);
                      if(swapTargetKeys[k2]) return; // swap target already cleared via clearOverrides
                      var cleared = _clearIngOverride(p, d, s, coKey);
                      if(!cleared) return;
                      // If this slot is part of a batch (anchor with leftovers,
                      // or a leftover itself), clear coKey overrides on ALL
                      // batch portions — they may live in another trip.
                      var lo = leftovers[k2];
                      var anchorLo = null;
                      if(lo && !lo.isLeftover && lo.portions){
                        anchorLo = lo;
                      } else if(lo && lo.isLeftover){
                        // Leftover slot — find its anchor by scanning leftovers
                        // for an anchor whose portions include k2.
                        for(var akey in leftovers){
                          var alo = leftovers[akey];
                          if(alo && !alo.isLeftover && alo.portions){
                            for(var pi=0; pi<alo.portions.length; pi++){
                              var pp = alo.portions[pi];
                              if(sk(pp.p, pp.d, pp.s) === k2){ anchorLo = alo; break; }
                            }
                            if(anchorLo) break;
                          }
                        }
                      }
                      if(anchorLo){
                        anchorLo.portions.forEach(function(pt){
                          if(sk(pt.p, pt.d, pt.s) === k2) return; // already cleared above
                          _clearIngOverride(pt.p, pt.d, pt.s, coKey);
                        });
                      }
                    });
                  });
                });
              });
            }
            // Full cache invalidation + RBA so subsequent freeze items see
            // a consistent unified state with all stale overrides resolved.
            invalidateLeftoverCache();
            runBalanceAdjusters();
            leftovers = computeLeftovers();
          }
        }
        return;
      }
      // Write directly to cache AND record an override (with scalable:false).
      // Cache write makes the freeze immediately visible (avoids a stale read
      // before the post-freeze runBalanceAdjusters rebuilds). Override
      // persists across the cache rebuild we trigger below — adjustIngredients
      // reads it via applyOverrides, sees scalable:false, leaves frozen item
      // at the override amt; balanceDayMacros and the post-freeze unify then
      // compensate via non-frozen items.
      info.solos.forEach(function(so){
        var soCache = _dayBalancedCache[pk(so.p, so.d)];
        if(soCache && soCache[so.s] && soCache[so.s][so.idx]){
          soCache[so.s][so.idx].amt = so.amt;
          soCache[so.s][so.idx].scalable = false;
        }
        setOverride(so.p, so.d, so.s, so.idx, 'amt', so.amt);
        setOverride(so.p, so.d, so.s, so.idx, 'scalable', false);
        affectedDays[so.p+'_'+so.d] = {p:so.p, d:so.d};
      });
      info.batches.forEach(function(b){
        b.portions.forEach(function(pt){
          var ptCache = _dayBalancedCache[pk(pt.p, pt.d)];
          if(ptCache && ptCache[pt.s] && ptCache[pt.s][pt.idx]){
            ptCache[pt.s][pt.idx].amt = pt.amt;
            ptCache[pt.s][pt.idx].scalable = false;
          }
          setOverride(pt.p, pt.d, pt.s, pt.idx, 'amt', pt.amt);
          setOverride(pt.p, pt.d, pt.s, pt.idx, 'scalable', false);
          affectedDays[pt.p+'_'+pt.d] = {p:pt.p, d:pt.d};
        });
      });
    });
  });

  // Invalidate affected day caches so the caller's next runBalanceAdjusters
  // call rebuilds via adjustIngredients (frozen items pinned via overrides)
  // + balanceDayMacros (non-frozen items compensate for the kcal shift).
  // unify (also called by runBalanceAdjusters) skips frozen items via the
  // ROUND_*_ITEMS check we added; non-frozen items get re-unified kcal-prop.
  Object.keys(affectedDays).forEach(function(k){
    var ad = affectedDays[k];
    delete _dayBalancedCache[pk(ad.p, ad.d)];
  });
}

// Compute and return the freeze plan for one (item, trip), or null if the
// trip can't be cleanly frozen for this item.
function _freezeOneItem(dbKey, days, persons, leftovers){
  var db = NUTRI_DB[dbKey];
  if(!db) return null;
  var perUnit, grid;
  if(db.pkg && !db.pkg.longShelfLife && !db.pkg.acceptableWaste){
    perUnit = (db.pkg.drained && (db.unit==='cup'||db.unit==='oz')) ? db.pkg.drained : (db.pkg.cups||0);
  } else if(db.produce){
    perUnit = db.produce.perWhole;
  } else return null;
  if(!(perUnit > 0)) return null;
  // Native ingredient grid (oz=1, cup=0.25, tbsp=0.5 etc.).
  grid = 0.25;
  if(db.unit==='oz'||db.unit==='slice'||db.unit==='scoop'||db.unit==='serving') grid = 1;
  else if(db.unit==='cup') grid = 0.25;
  else if(db.unit==='tbsp'||db.halfSnap) grid = 0.5;
  else if(db.unit==='each') grid = db.wholeOnly ? 1 : 0.25;
  if(db.wholeOnly) grid = 1;

  // Collect contributors from cook anchors only.
  var solos = []; // [{p, d, s, idx, amt}]
  var batches = []; // [{portions:[{p,d,s,idx,amt,kcal}], batchTotal, batchKcal}]
  days.forEach(function(d){
    persons.forEach(function(p){
      if(p!=='him' && p!=='her') return;
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var key = sk(p, d, s);
        if(SKIPPED[key] || EAT_OUT[key]) return;
        var lo = leftovers[key];
        if(lo && lo.isLeftover) return; // anchors only
        var bal = getBalancedSlotIngredients(p, d, s); // triggers stages 1+2 build if cache missing
        if(!bal) return;
        var idx = -1;
        for(var k=0; k<bal.length; k++){
          if(bal[k].dbKey === dbKey){ idx = k; break; }
        }
        if(idx < 0) return;
        var portionList = (lo && lo.portions) ? lo.portions : [{p:p, d:d, s:s}];
        if(portionList.length === 1){
          solos.push({p:p, d:d, s:s, idx:idx, amt:bal[idx].amt});
        } else {
          var portions = [];
          var batchTotal = 0;
          var batchKcal = 0;
          portionList.forEach(function(pt){
            var pbal = getBalancedSlotIngredients(pt.p, pt.d, pt.s);
            if(!pbal) return;
            var pidx = -1;
            for(var kk=0; kk<pbal.length; kk++){
              if(pbal[kk].dbKey === dbKey){ pidx = kk; break; }
            }
            if(pidx < 0) return;
            var pkcal = 0;
            pbal.forEach(function(it){var idb = NUTRI_DB[it.dbKey]; if(idb) pkcal += idb.kcal * it.amt;});
            portions.push({p:pt.p, d:pt.d, s:pt.s, idx:pidx, amt:pbal[pidx].amt, kcal:pkcal});
            batchTotal += pbal[pidx].amt;
            batchKcal += pkcal;
          });
          if(portions.length > 0 && batchTotal > 0.001 && batchKcal > 0.001){
            batches.push({portions:portions, batchTotal:batchTotal, batchKcal:batchKcal});
          }
        }
      });
    });
  });
  if(solos.length === 0 && batches.length === 0) return null;

  var soloSum = solos.reduce(function(a,x){return a+x.amt;}, 0);
  var batchSum = batches.reduce(function(a,b){return a+b.batchTotal;}, 0);
  var tripTotal = soloSum + batchSum;
  if(!(tripTotal > 0.001)) return null;

  // Bounds (per-portion).
  var floorSolo = (typeof db.minAmtSolo==='number') ? db.minAmtSolo
                : (typeof db.minAmt==='number' ? db.minAmt : 0);
  var capSolo   = (typeof db.maxAmtSolo==='number') ? db.maxAmtSolo
                : (typeof db.maxAmt==='number' ? db.maxAmt : Infinity);
  var floorB    = (typeof db.minAmt==='number') ? db.minAmt : 0;
  var capB      = (typeof db.maxAmt==='number') ? db.maxAmt : Infinity;

  // Already on perUnit boundary — freeze current values, no scaling.
  var Y_round = Math.round(tripTotal/perUnit) * perUnit;
  if(Math.abs(tripTotal - Y_round) < 0.001 && Y_round >= perUnit){
    return _onBoundary(solos, batches);
  }
  // Try Y_nearest first, then Y_other.
  var Y_nearest = Math.max(perUnit, Y_round);
  var floorMult = Math.max(perUnit, Math.floor(tripTotal/perUnit) * perUnit);
  var ceilMult  = Math.max(perUnit, Math.ceil(tripTotal/perUnit) * perUnit);
  var Y_other   = (Y_nearest === ceilMult) ? floorMult : ceilMult;

  var ctx = {db:db, grid:grid, floorSolo:floorSolo, capSolo:capSolo, floorB:floorB, capB:capB};
  var attempt = _tryFreezeY(Y_nearest, solos, batches, tripTotal, ctx);
  if(!attempt.ok) attempt = _tryFreezeY(Y_other, solos, batches, tripTotal, ctx);
  if(!attempt.ok) return null;
  return {solos: attempt.solos, batches: attempt.batches};
}

// Last-resort swap when freeze can't reach a package boundary AND the trip
// would fire INV20. Targets solo single-meal cases. Replaces the offending
// meal with a non-pkg, non-discouraged alternative that fits the slot budget
// and passes a STRICTER variety filter (rejects ALL recent matches; doesn't
// allow leftover-extending — see comment below).
//
// Returns {p, d, s, newMealId, sharedSlot} or null. Caller applies the swap.
//
// 2026-04-29 (late): inside-freeze swap pass.
// Items where we accept package waste rather than swap out the offending meal.
// Strategy A (Phase 3) still tries to PAIR these — this only blocks the
// last-resort swap-out path. User preference: marinara jar + chicken broth
// carton waste is acceptable when no pairing exists.
// 2026-04-29 (late): added marinara. 2026-04-30: added chicken broth.
var SWAP_OUT_EXCLUDE = {'marinara':true, 'chicken broth':true};

function _trySwapForWaste(dbKey, trip, days, persons, leftovers){
  // SWAP_OUT_EXCLUDE check moved AFTER waste calculation. Items in
  // SWAP_OUT_EXCLUDE are exempt only when waste% < 25%; if waste exceeds
  // that, swap is allowed since the waste is no longer "acceptable single
  // jar/carton". 2026-05-01.
  var db = NUTRI_DB[dbKey];
  if(!db) return null;
  var perUnit = 0, isPkg = false;
  if(db.pkg && !db.pkg.longShelfLife && !db.pkg.acceptableWaste){
    perUnit = (db.pkg.drained && (db.unit==='cup'||db.unit==='oz')) ? db.pkg.drained : (db.pkg.cups||0);
    isPkg = true;
  } else if(db.produce && !db.produce.acceptableWaste){
    perUnit = db.produce.perWhole;
  } else return null;
  if(!(perUnit > 0)) return null;

  var usingMeals = [];
  var totalUsed = 0;
  days.forEach(function(d){
    persons.forEach(function(p){
      if(p!=='him' && p!=='her') return;
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var key = sk(p, d, s);
        if(SKIPPED[key] || EAT_OUT[key]) return;
        var lo = leftovers[key];
        if(lo && lo.isLeftover) return;
        var mealId = SEL[key]; if(!mealId) return;
        var meal = getMeal(mealId);
        if(!meal || !meal.ingredients) return;
        if(!meal.ingredients.some(function(i){return i.dbKey===dbKey;})) return;
        var portionList = (lo && lo.portions) ? lo.portions : [{p:p, d:d, s:s}];
        var portionTotal = 0;
        portionList.forEach(function(pt){
          var bal = getBalancedSlotIngredients(pt.p, pt.d, pt.s);
          if(!bal) return;
          var ing = bal.find(function(i){return i.dbKey===dbKey;});
          if(ing) portionTotal += ing.amt;
        });
        usingMeals.push({p:p, d:d, s:s, mealId:mealId, lo:lo, batchTotal:portionTotal});
        totalUsed += portionTotal;
      });
    });
  });
  if(usingMeals.length === 0) return null;

  // INV20 threshold check.
  var bought = _pkgsNeeded(totalUsed, perUnit) * perUnit;
  var waste = bought - totalUsed;
  if(isPkg){
    if(bought <= 0 || (waste / bought) <= 0.01) return null;
  } else {
    if(waste <= perUnit * 0.5) return null;
  }
  // SWAP_OUT_EXCLUDE: items like marinara/chicken broth are exempt from
  // last-resort swap-out ONLY when waste% is below 25%. Above that the
  // waste is too large to accept — proceed with normal swap path.
  // 2026-05-01.
  if(SWAP_OUT_EXCLUDE[dbKey]){
    var wastePctSE = isPkg ? (waste / bought) : (waste / perUnit);
    if(wastePctSE < 0.25) return null;
  }

  // Only solo single-meal — multi-meal/multi-portion cases are conservative skip.
  if(usingMeals.length !== 1) return null;
  var mu = usingMeals[0];
  if(mu.lo && (mu.lo.totalServings > 1 || mu.lo.crossPersonCook || mu.lo.shared)) return null;
  if(MANUAL_SET[sk(mu.p, mu.d, mu.s)]) return null;

  var noRandomizeIds = {};
  MEALS.forEach(function(m){if(m.noRandomize) noRandomizeIds[m.id] = true;});

  var slotBudget = getSlotBudget(mu.p, mu.d, mu.s);
  var dayIdx = DAYS.indexOf(mu.d);
  var recent = (mu.s==='lunch'||mu.s==='dinner') ? getRecentMealIds(dayIdx, DAYS, 4) : [];
  var lastWk = (mu.s==='lunch'||mu.s==='dinner') ? getLastWeekMealIds() : [];
  var sharedSlot = SHARED_SCHEDULE[dk(mu.d, mu.s)] === 'shared';

  var candidates = getMealsForSlot(mu.s).filter(function(m){
    if(m.id === mu.mealId) return false;
    if(!m[mu.p]) return false;
    if(noRandomizeIds[m.id]) return false;
    if(mealUsesDiscouraged(m)) return false;
    if(mealUsesPkg(m.id)) return false;
    if(sharedSlot && (!m.him || !m.her)) return false;
    // Variety filter STRICTER than other phases: reject ALL recent matches,
    // even if they could leftover-extend an existing anchor. Reason:
    // leftover-extending would CREATE a new cross-person batch (cook anchor
    // + new leftover) that may bind at maxAmt and trigger INV7.
    if(mu.s==='lunch' || mu.s==='dinner'){
      if(lastWk.indexOf(m.id) >= 0) return false;
      if(recent.indexOf(m.id) >= 0) return false;
    }
    var cBase = 0;
    m.ingredients.forEach(function(i){var idb = NUTRI_DB[i.dbKey]; if(idb) cBase += idb.kcal*(i.amt||0);});
    if(slotBudget > 0 && (cBase < slotBudget * 0.35 || cBase > slotBudget * 2.5)) return false;
    return true;
  });
  if(!candidates.length) return null;

  var best = null, bestDiff = Infinity;
  candidates.forEach(function(c){
    var cBase = 0;
    c.ingredients.forEach(function(i){var idb = NUTRI_DB[i.dbKey]; if(idb) cBase += idb.kcal*(i.amt||0);});
    var diff = Math.abs(cBase - slotBudget);
    if(diff < bestDiff){ bestDiff = diff; best = c; }
  });
  if(!best) return null;
  // oldMealId returned so caller can clean up co-contributor overrides for
  // the OUTGOING meal's pkg/produce ingredients in other trip slots.
  return {p:mu.p, d:mu.d, s:mu.s, oldMealId:mu.mealId, newMealId:best.id, sharedSlot:sharedSlot};
}

// Build a "no-scale" freeze plan for the on-boundary case.
function _onBoundary(solos, batches){
  return {
    solos: solos.map(function(s){return {p:s.p, d:s.d, s:s.s, idx:s.idx, amt:s.amt};}),
    batches: batches.map(function(b){
      return {portions: b.portions.map(function(pt){return {p:pt.p, d:pt.d, s:pt.s, idx:pt.idx, amt:pt.amt};})};
    })
  };
}

// Try to land trip total at Y. Solos snap to grid; batches absorb the
// remainder via largest-remainder paired-snap; trade kicks in when per-
// portion bounds fail (cap failing batch, redistribute, bump solos).
function _tryFreezeY(Y, solos, batches, tripTotal, ctx){
  var grid = ctx.grid;
  var scale = Y / tripTotal;

  // Step 1: scale + snap solos.
  // When a solo's scaled snap would exceed its per-portion cap (or fall below
  // its floor), CLAMP the solo at the bound rather than failing the whole Y
  // attempt. The clamped solo stops contributing additional absorption, but
  // the trade pass below (`_tradeSolosOnly`) can still bump OTHER solos to
  // make up the difference. Pattern that motivated this: trip = lentil 3c
  // (already at chicken-broth maxAmt:3) + congee 0.75c, target = 4c carton.
  // Without clamping, lentil's snap of 3.20 exceeds cap → return solo_bound,
  // 0.25c stays as waste. With clamping, lentil stays at 3, _tradeSolosOnly
  // bumps congee 0.75 → 1.00, trip lands on 4c boundary cleanly.
  // Snap clamp DOWN at cap (Math.floor) and UP at floor (Math.ceil) to keep
  // the clamped value on the ingredient grid for downstream consumers.
  var newSolos = [];
  for(var i=0; i<solos.length; i++){
    var so = solos[i];
    var scaled = so.amt * scale;
    var snapped = Math.round(scaled / grid) * grid;
    if(snapped < grid) snapped = grid;
    if(snapped > ctx.capSolo) snapped = Math.floor(ctx.capSolo / grid) * grid;
    if(snapped < ctx.floorSolo) snapped = Math.max(grid, Math.ceil(ctx.floorSolo / grid) * grid);
    newSolos.push({p:so.p, d:so.d, s:so.s, idx:so.idx, amt:snapped});
  }
  var soloSnapSum = newSolos.reduce(function(a,x){return a+x.amt;}, 0);
  var absorbable = Y - soloSnapSum;

  // Step 2: distribute absorbable across multi-cook batches.
  if(batches.length === 0){
    if(Math.abs(absorbable) <= 0.001){
      return {ok:true, solos:newSolos, batches:[]};
    }
    // No batch to absorb — try bumping solos by ±1 grid step toward Y.
    var traded = _tradeSolosOnly(newSolos, absorbable, ctx);
    if(traded) return {ok:true, solos:traded, batches:[]};
    return {ok:false, reason:'no_absorber'};
  }

  // Try basic distribution; if it fails per-portion bounds, trade.
  var basic = _distributeAcrossBatches(absorbable, batches, ctx);
  if(basic.ok){
    return {ok:true, solos:newSolos, batches:basic.batches};
  }
  // Trade: cap the failing batch and redistribute. Surplus may go to other
  // batches and then to solos (one grid step each, within maxAmtSolo).
  var traded = _tradeBatchesAndSolos(Y, soloSnapSum, newSolos, batches, basic, ctx);
  if(traded) return {ok:true, solos:traded.solos, batches:traded.batches};
  return {ok:false, reason:'trade_fail'};
}

// Largest-remainder distribution of absorbable across multi-cook batches.
// Each batch's new_total snaps to grid; sums preserved exactly.
function _distributeAcrossBatches(absorbable, batches, ctx){
  var grid = ctx.grid;
  if(batches.length === 1){
    var b = batches[0];
    var nt = absorbable;
    if(nt < grid) return {ok:false, reason:'batch_zero'};
    // Uniform scale: preserves the per-portion ratios that unify already
    // produced (kcal-prop). If unify ran before freeze, ratios are kcal-prop;
    // uniform scale keeps them that way without recomputing kcal denominators
    // (which would drift after freeze writes change portion kcals).
    var batchScale = nt / b.batchTotal;
    var portions = b.portions.map(function(pt){
      return {p:pt.p, d:pt.d, s:pt.s, idx:pt.idx, amt:pt.amt * batchScale};
    });
    var minP = Math.min.apply(null, portions.map(function(p){return p.amt;}));
    var maxP = Math.max.apply(null, portions.map(function(p){return p.amt;}));
    if(minP < ctx.floorB - 0.0001) return {ok:false, reason:'batch_min', batchIdx:0, newTotal:nt};
    if(maxP > ctx.capB + 0.0001) return {ok:false, reason:'batch_max', batchIdx:0, newTotal:nt};
    return {ok:true, batches:[{portions:portions, newTotal:nt}]};
  }
  var multiSum = batches.reduce(function(a,b){return a+b.batchTotal;}, 0);
  if(!(multiSum > 0.001)) return {ok:false, reason:'multi_zero'};
  var shares = batches.map(function(b){return b.batchTotal * absorbable / multiSum;});
  var floors = shares.map(function(sh){return Math.max(grid, Math.floor(sh / grid) * grid);});
  var totalFloor = floors.reduce(function(a,b){return a+b;}, 0);
  var rem = absorbable - totalFloor;
  var extraSteps = Math.round(rem / grid);
  // Sort batch indices by descending fractional part — top extraSteps get +1 grid.
  var indices = batches.map(function(_, i){return i;});
  indices.sort(function(a, b){
    var fa = (shares[a] - floors[a]) / grid;
    var fb = (shares[b] - floors[b]) / grid;
    return fb - fa;
  });
  var newTotals = floors.slice();
  for(var ei=0; ei<extraSteps && ei<indices.length; ei++) newTotals[indices[ei]] += grid;
  // Validate per-portion bounds for each batch.
  var newBatches = [];
  for(var bi=0; bi<batches.length; bi++){
    var bb = batches[bi];
    var nt2 = newTotals[bi];
    if(nt2 < grid) return {ok:false, reason:'batch_zero', batchIdx:bi, newTotal:nt2};
    // Uniform scale (see comment in batches.length===1 branch).
    var batchScale2 = nt2 / bb.batchTotal;
    var portions2 = bb.portions.map(function(pt){
      return {p:pt.p, d:pt.d, s:pt.s, idx:pt.idx, amt:pt.amt * batchScale2};
    });
    var minP2 = Math.min.apply(null, portions2.map(function(p){return p.amt;}));
    var maxP2 = Math.max.apply(null, portions2.map(function(p){return p.amt;}));
    if(minP2 < ctx.floorB - 0.0001) return {ok:false, reason:'batch_min', batchIdx:bi, newTotal:nt2};
    if(maxP2 > ctx.capB + 0.0001) return {ok:false, reason:'batch_max', batchIdx:bi, newTotal:nt2};
    newBatches.push({portions:portions2, newTotal:nt2});
  }
  return {ok:true, batches:newBatches};
}

// Trade when no batches exist and absorbable != 0: try bumping solos in the
// needed direction by 1 grid step each, within [minAmt(Solo), maxAmt(Solo)].
function _tradeSolosOnly(newSolos, absorbable, ctx){
  var grid = ctx.grid;
  var direction = absorbable > 0 ? 1 : -1;
  var stepsNeeded = Math.round(Math.abs(absorbable) / grid);
  if(stepsNeeded === 0) return newSolos;
  // Greedy: bump each solo at most enough times to satisfy.
  // Build a feasibility map per solo.
  var solos = newSolos.map(function(s){return {p:s.p, d:s.d, s:s.s, idx:s.idx, amt:s.amt};});
  var stepsRemaining = stepsNeeded;
  // Each iter: pick a solo with room in `direction`, bump 1 step.
  for(var iter=0; iter<stepsNeeded * solos.length + 1; iter++){
    if(stepsRemaining === 0) break;
    var picked = -1;
    for(var i=0; i<solos.length; i++){
      var nextAmt = solos[i].amt + direction * grid;
      if(direction > 0 && nextAmt <= ctx.capSolo + 0.0001){ picked = i; break; }
      if(direction < 0 && nextAmt >= ctx.floorSolo - 0.0001 && nextAmt >= grid){ picked = i; break; }
    }
    if(picked < 0) return null; // no room left
    solos[picked].amt += direction * grid;
    stepsRemaining--;
  }
  return stepsRemaining === 0 ? solos : null;
}

// Trade for the batch+solo case. Cap the failing batch at its max/min-feasible,
// redistribute leftover absorbable to other batches (proportional + snap),
// then bump solos within their bounds to absorb any final residue.
function _tradeBatchesAndSolos(Y, soloSnapSum, newSolos, batches, basicResult, ctx){
  var grid = ctx.grid;
  if(batches.length === 0) return null;
  if(basicResult.batchIdx === undefined || basicResult.reason === 'multi_zero') return null;

  // Cap the failing batch.
  var failIdx = basicResult.batchIdx;
  var failBatch = batches[failIdx];
  var capNewTotal;
  if(basicResult.reason === 'batch_max'){
    // Largest-kcal portion = capB → batch_total = capB × batch_kcal / max_portion_kcal.
    var maxKcal = Math.max.apply(null, failBatch.portions.map(function(p){return p.kcal;}));
    if(!(maxKcal > 0.001)) return null;
    capNewTotal = ctx.capB * failBatch.batchKcal / maxKcal;
    capNewTotal = Math.floor(capNewTotal / grid) * grid; // snap DOWN so cap holds
    if(capNewTotal < grid) return null;
  } else if(basicResult.reason === 'batch_min'){
    // Smallest-kcal portion = floorB → batch_total = floorB × batch_kcal / min_portion_kcal.
    var minKcal = Math.min.apply(null, failBatch.portions.map(function(p){return p.kcal;}));
    if(!(minKcal > 0.001)) return null;
    capNewTotal = ctx.floorB * failBatch.batchKcal / minKcal;
    capNewTotal = Math.ceil(capNewTotal / grid) * grid; // snap UP so floor holds
  } else if(basicResult.reason === 'batch_zero'){
    // Tried to drop to zero — set cap to grid (one step) and redistribute the rest.
    capNewTotal = grid;
  } else return null;

  // Re-validate failing batch with capped new_total. Uniform scale preserves
  // unify's per-portion ratios (matches _distributeAcrossBatches strategy).
  var capScale = capNewTotal / failBatch.batchTotal;
  var capPortions = failBatch.portions.map(function(pt){
    return {p:pt.p, d:pt.d, s:pt.s, idx:pt.idx, amt:pt.amt * capScale};
  });
  var minP = Math.min.apply(null, capPortions.map(function(p){return p.amt;}));
  var maxP = Math.max.apply(null, capPortions.map(function(p){return p.amt;}));
  if(minP < ctx.floorB - 0.0001 || maxP > ctx.capB + 0.0001) return null;

  // Distribute remaining absorbable across OTHER batches.
  var remainingAbsorbable = (Y - soloSnapSum) - capNewTotal;
  var otherBatches = batches.filter(function(_, i){return i !== failIdx;});
  var otherPlan = otherBatches.length > 0
    ? _distributeAcrossBatches(remainingAbsorbable, otherBatches, ctx)
    : (Math.abs(remainingAbsorbable) < 0.001 ? {ok:true, batches:[]} : {ok:false, reason:'no_other'});

  // If other batches couldn't absorb the residue, try bumping solos.
  var solosOut = newSolos.map(function(s){return {p:s.p, d:s.d, s:s.s, idx:s.idx, amt:s.amt};});
  if(!otherPlan.ok){
    // residue = how much we need to shift to/from solos
    var residue = otherPlan.reason === 'no_other'
      ? remainingAbsorbable
      : (otherPlan.batchIdx !== undefined ? remainingAbsorbable - otherPlan.newTotal : remainingAbsorbable);
    // If batch_max/min on another batch, that's deeper fail — give up trade for now.
    if(otherPlan.reason !== 'no_other') return null;
    // Try moving solos by ±grid step each, within [floorSolo, capSolo].
    var direction = residue > 0 ? 1 : -1;
    var stepsNeeded = Math.round(Math.abs(residue) / grid);
    for(var ii=0; ii<stepsNeeded; ii++){
      var picked = -1;
      for(var i=0; i<solosOut.length; i++){
        var nextAmt = solosOut[i].amt + direction * grid;
        if(direction > 0 && nextAmt <= ctx.capSolo + 0.0001){ picked = i; break; }
        if(direction < 0 && nextAmt >= ctx.floorSolo - 0.0001 && nextAmt >= grid){ picked = i; break; }
      }
      if(picked < 0) return null; // out of solo headroom
      solosOut[picked].amt += direction * grid;
    }
    otherPlan = {ok:true, batches:[]}; // residue absorbed by solos
  }

  // Reassemble the full batch plan in original order.
  var batchPlan = new Array(batches.length);
  batchPlan[failIdx] = {portions:capPortions, newTotal:capNewTotal};
  var op = 0;
  for(var i=0; i<batches.length; i++){
    if(i === failIdx) continue;
    batchPlan[i] = otherPlan.batches[op++] || null;
  }
  // Sanity: any null entries means we miscounted other batches — fail safe.
  for(var i=0; i<batchPlan.length; i++){ if(!batchPlan[i]) return null; }

  return {solos: solosOut, batches: batchPlan};
}

// Cold-path trip-waste estimator shared by `rerollMissDays` and
// `rerollInv14Violations`. The retry loop also calls this. Iterates over
// (Mon-Wed, Thu-Sun) trips separately, summing flex-aware waste counts.
// Returns the number of (pkg + produce) ingredients with non-flex-resolvable
// waste in `days`. Produce waste added 2026-04-27 to mirror PKG's full
// integration — Phase 1 retry-tie-breaker, rerolls, and Phase 3 swap stages
// all use this metric.
function _fastTripWasteForPersons(days, persons){
  const pkgTotals={};
  const produceTotals={};
  days.forEach(function(d){
    persons.forEach(function(p){
      if(p!=='him'&&p!=='her')return;
      SLOTS.forEach(function(s){
        if(s==='late_snack')return;
        const key=sk(p,d,s);
        if(SKIPPED[key]||EAT_OUT[key])return;
        const mealId=getMealId(p,d,s); if(!mealId)return;
        const lo=(_leftoverCache||computeLeftovers())[key];
        if(lo&&lo.isLeftover)return;
        const lMult=(lo&&!lo.isLeftover&&lo.servings>1)?lo.servings:1;
        const m=getMeal(mealId); if(!m||!m.ingredients)return;
        let scale=1;
        if(s!=='shake'&&SLOT_BUDGET[s]){
          let bk=0;
          m.ingredients.forEach(function(i){const db=NUTRI_DB[i.dbKey]; if(db) bk+=db.kcal*(i.amt||0);});
          if(bk>0) scale=getSlotBudget(p,d,s)/bk;
        }
        m.ingredients.forEach(function(ing){
          const db=NUTRI_DB[ing.dbKey];
          if(!db)return;
          const eff=(ing.scalable===false)?(ing.amt||0):(ing.amt||0)*scale;
          if(db.pkg && !db.pkg.longShelfLife){
            pkgTotals[ing.dbKey]=(pkgTotals[ing.dbKey]||0)+eff*lMult;
          }
          if(db.produce){
            produceTotals[ing.dbKey]=(produceTotals[ing.dbKey]||0)+eff*lMult;
          }
        });
      });
    });
  });
  let w=0;
  Object.keys(pkgTotals).forEach(function(k){
    const db=NUTRI_DB[k]; if(!db||!db.pkg) return;
    const perPkg=(db.pkg.drained&&(db.unit==='cup'||db.unit==='oz'))?db.pkg.drained:(db.pkg.cups||0);
    if(perPkg<=0) return;
    const waste=_pkgsNeeded(pkgTotals[k], perPkg)*perPkg - pkgTotals[k];
    // Fix A (2026-04-27): count ALL pkg waste >0.01 in the retry-loop
    // estimate. The previous version skipped waste that canFlexFitToBoundary
    // predicted as flex-fixable — but the predicate checks one ingredient's
    // flex bounds in isolation, ignoring per-day kcal budgets, INV13 maxAmt
    // caps, and per-usage day-goal-break reverts. Optimistic skipping let
    // the retry loop pick combos that *predicted* zero waste but the actual
    // pipeline couldn't deliver. Counting honestly: -35% pkg-waste fires
    // across 100 seeds (382 → 248 — measured against then-INV20, now INV21),
    // +0.43pp primary hit rate, no closed-off meals (all 124 picked meals
    // still get picked, just rebalanced frequencies).
    if(waste>0.01) w++;
  });
  Object.keys(produceTotals).forEach(function(k){
    const db=NUTRI_DB[k]; if(!db||!db.produce) return;
    const perWhole=db.produce.perWhole;
    if(perWhole<=0) return;
    const waste=_pkgsNeeded(produceTotals[k], perWhole)*perWhole - produceTotals[k];
    // Threshold matches the shopping-list waste warning: only count "real"
    // waste of >50% of one whole produce. Smaller fractional waste is
    // unavoidable noise on every produce item.
    if(waste>perWhole*0.5){
      if(canFlexFitToBoundary(k, produceTotals[k], perWhole)) return;
      w++;
    }
  });
  return w;
}

// Uniform-random pick from a non-empty array. Used by Phase 1 meal selection
// and several reroll stages. (For seeded runs, Math.random is replaced

function randomPick(arr){return arr[Math.floor(Math.random()*arr.length)];}


// Resolve the chronological "previous week" data key relative to activeWeek.
// When randomizing 'next', the prior week is 'this'; when randomizing 'this',
// the prior week is 'last'. Prevents the variety filter from reading the wrong
// week when planning ahead.
function _prevWeekKey() {
  return activeWeek === 'next' ? 'this' : 'last';
}

// Household-level: returns every meal ID used by EITHER person across all
// of the chronological previous week's slots.
function getLastWeekMealIds() {
  const ids = [];
  const lastSel = (weekData[_prevWeekKey()] && weekData[_prevWeekKey()].sel) || {};
  DAYS.forEach(function(d){
    SLOTS.forEach(function(s){
      if (s === 'late_snack' || s === 'shake') return;
      ['him','her'].forEach(function(pp){
        const key = pp + '_' + d + '_' + s;
        const id = lastSel[key];
        if (id && ids.indexOf(id) < 0) ids.push(id);
      });
    });
  });
  return ids;
}

// Household-level: scans BOTH persons' picks within ±`lookback` days of
// `dayIndex` (symmetric window), crossing into the chronological previous
// week on the backward side. If either him or her had meal X as an anchor
// cook recently, it's in the set for both. Leftover entries are skipped
// — eating a leftover isn't a new cook.
//
// SYMMETRIC (forward + backward): Phase 1 iterates persons-outer, days-inner
// (Him's whole week first, then Her's). Without the forward look, Her-Mon
// can't see Him-Thu (3 days forward) even though Him-Thu is already in SEL,
// and Her ends up picking the same meal — producing a hidden gap=3 INV14
// violation that rerollInv14Violations may not be able to swap out of.
// Forward look closes that hole. Post-Phase-1 callsites (rerollMissDays,
// Phase 3, Phase 4, rerollInv14Violations) also benefit: a swap candidate
// is rejected if it would create an N-day gap in EITHER direction.
//
// Reads SEL directly (not via getMealId) so DEFAULTS doesn't pollute the
// recent set. Variety is about what's been actively picked this randomize,
// not about the static starter plan. Mirrors getLastWeekMealIds which also
// reads weekData[...].sel directly.
function getRecentMealIds(dayIndex, days, lookback) {
  const recent = [];
  const leftovers = computeLeftovers();
  function pushFromDay(pp, d) {
    SLOTS.forEach(function(s) {
      if (s === 'late_snack' || s === 'shake') return;
      const id = SEL[sk(pp, d, s)];
      if (!id || recent.indexOf(id) >= 0) return;
      const lo = leftovers[sk(pp, d, s)];
      if (lo && lo.isLeftover) return;
      recent.push(id);
    });
  }
  // Same-day already-picked slots — covers cross-slot repeats Phase 1 would
  // otherwise create when iterating breakfast → lunch → snack → dinner.
  const todayDay = days[dayIndex];
  if (todayDay) {
    ['him','her'].forEach(function(pp){ pushFromDay(pp, todayDay); });
  }
  // Backward window (this week + cross into prev week)
  for (let b = 1; b <= lookback; b++) {
    const prevIdx = dayIndex - b;
    if (prevIdx >= 0) {
      const prevDay = days[prevIdx];
      ['him','her'].forEach(function(pp){ pushFromDay(pp, prevDay); });
    } else {
      const lastWeekDayIdx = 7 + prevIdx;
      if (lastWeekDayIdx >= 0 && lastWeekDayIdx < 7) {
        const lastDay = DAYS[lastWeekDayIdx];
        const lastSel = weekData[_prevWeekKey()] && weekData[_prevWeekKey()].sel || {};
        SLOTS.forEach(function(s) {
          if (s === 'late_snack' || s === 'shake') return;
          ['him','her'].forEach(function(pp){
            const key = pp + '_' + lastDay + '_' + s;
            const id = lastSel[key];
            if (id && recent.indexOf(id) < 0) recent.push(id);
          });
        });
      }
    }
  }
  // Forward window (this week only — no _nextWeekKey concept; future-week
  // SEL is not part of the current randomize's scope).
  for (let f = 1; f <= lookback; f++) {
    const fwdIdx = dayIndex + f;
    if (fwdIdx < days.length) {
      const fwdDay = days[fwdIdx];
      ['him','her'].forEach(function(pp){ pushFromDay(pp, fwdDay); });
    }
  }
  return recent;
}

// True if picking `mealId` at (p,d,s) would continue an EXISTING batch from a
// cook within the 3-day batch window (day-2, day-1). Batches only form for
// lunch/dinner of meals that don't have `noLeftover:true`. Breakfasts/snacks
// and no-leftover meals always represent fresh cooks.
function isBatchLeftoverEligible(d, s, mealId) {
  if (s !== 'lunch' && s !== 'dinner') return false;
  const meal = getMeal(mealId);
  if (meal && meal.noLeftover) return false;
  const dIdx = DAYS.indexOf(d);
  if (dIdx < 0) return false;
  // Must check leftover map: a prev slot with SEL===mealId could be either
  // a cook anchor or a leftover. Only anchors qualify — if the prev match is
  // itself a leftover, extending to today would form a NEW cook outside the
  // original 3-day batch window.
  const los = computeLeftovers();
  for (let b = 1; b <= 2; b++) {
    const prevIdx = dIdx - b;
    if (prevIdx < 0) continue;
    const prevDay = DAYS[prevIdx];
    const persons = ['him','her'];
    for (let i = 0; i < persons.length; i++) {
      const anchorSlots = ['lunch','dinner']; // anchors must be lunch/dinner
      for (let j = 0; j < anchorSlots.length; j++) {
        const prevKey = sk(persons[i], prevDay, anchorSlots[j]);
        if (SEL[prevKey] !== mealId) continue;
        const lo = los[prevKey];
        if (lo && lo.isLeftover) continue; // leftover, not an anchor — skip
        return true;
      }
    }
  }
  return false;
}

function paintAccept(){
  if(!_paintMode) return;
  const now=Date.now();
  if(!weekData[activeWeek].ts) weekData[activeWeek].ts={};
  // Collect queued slots as (p,d,s) tuples
  const queuedSlots=[];
  Object.keys(_paintQueued).forEach(function(k){
    if(!_paintQueued[k]) return;
    // Parse sk format: person_day_slot. Day can have spaces? No — DAYS are single
    // words like 'Monday'. So split by '_' yields [p, d, s].
    const parts=k.split('_');
    if(parts.length<3) return;
    queuedSlots.push({p:parts[0], d:parts[1], s:parts[2], key:k});
  });
  // Apply meal + MANUAL_SET to all queued slots, clear stale overrides
  queuedSlots.forEach(function(q){
    SEL[q.key]=_paintMealId;
    MANUAL_SET[q.key]=true;
    weekData[activeWeek].ts[q.key]=now;
    clearOverrides(q.p,q.d,q.s);
  });
  // Schedule: if a single (d,s) cell has both him+her queued, mark that cell
  // as 'shared' in SHARED_SCHEDULE so the shared visual + downstream sharing
  // logic kicks in. Otherwise leave the schedule alone (mixed leftovers can
  // be solo on different sides).
  const cellSidesPainted={}; // 'd_s' → {him:bool, her:bool}
  queuedSlots.forEach(function(q){
    const ck=q.d+'_'+q.s;
    if(!cellSidesPainted[ck]) cellSidesPainted[ck]={};
    cellSidesPainted[ck][q.p]=true;
  });
  Object.keys(cellSidesPainted).forEach(function(ck){
    const sides=cellSidesPainted[ck];
    if(sides.him && sides.her){
      SHARED_SCHEDULE[ck]='shared';
    }
  });
  saveSharedSchedule();
  // 2026-05-03: form or update the link group for this meal.
  // - First, remove any existing group for this meal (we'll rebuild from queued).
  // - If 2+ queued slots → create a new group with the queued slots.
  // - If <2 queued slots → no group (single Manual Set is fine alone).
  for(var gi=LEFTOVER_LINKS.length-1; gi>=0; gi--){
    if(LEFTOVER_LINKS[gi].meal===_paintMealId) LEFTOVER_LINKS.splice(gi,1);
  }
  if(queuedSlots.length>=2){
    LEFTOVER_LINKS.push({
      id:'lg_'+Date.now()+'_'+Math.floor(Math.random()*1000),
      meal:_paintMealId,
      slots:queuedSlots.map(function(q){return {p:q.p, d:q.d, s:q.s};}),
      colorIdx:_allocateLinkColor()
    });
  }
  _paintMode=false;_paintSlot='';_paintMealId='';_paintQueued={};
  invalidateLeftoverCache();autoSaveWeek();renderMeals();if(topTab==='shop')renderShop();
}
