// Epsilon-tolerant ceil for "how many packages/wholes do we need?" counts.
// Plain Math.ceil(total/perUnit) is fooled by JS float precision when the
// quotient is mathematically an integer: e.g. 6.75/0.75 evaluates to
// 9.000000000000002, and Math.ceil rounds that UP to 10 — buying one extra
// carrot you don't need. Subtracting a tiny epsilon (1e-9) before ceiling
// absorbs the noise: a quotient that's actually 9 + 1e-15 rounds back to 9,
// while a quotient that's 9.001 (genuinely needs the next pkg) is unchanged.
// 2026-04-29.
function _pkgsNeeded(total, perUnit){
  if(!(perUnit > 0) || !(total > 0)) return 0;
  return Math.ceil(total/perUnit - 1e-9);
}

function shopQtyWithCount(dbKey,qtyObj){
  const base=fmtQty(qtyObj);
  if(!qtyObj)return base;
  const db=NUTRI_DB[dbKey];
  if(!db)return base;

  // Custom display: leafy greens — show total oz needed (rounded up to 0.5oz).
  // 3.5oz container holds db.produce.perWhole cups (1.5c for spinach/kale).
  // User wants oz total since leafy greens are typically sold by oz with
  // varying container sizes (3.5oz / 5oz / bagged); count-of-containers is
  // less actionable than oz needed. 2026-05-01.
  if((dbKey==='baby spinach' || dbKey==='kale') && db.produce && db.produce.perWhole>0){
    var ozPerCup=3.5/db.produce.perWhole;
    var ozTotal=Math.ceil(qtyObj.num*ozPerCup*2)/2;
    return ozTotal+' oz';
  }

  // Produce count conversion
  if(db.produce){
    let count=_pkgsNeeded(qtyObj.num, db.produce.perWhole);
    if(count<=0)count=1;
    return count+' '+db.produce.label+(count>1&&!db.produce.label.match(/bunch|bag/)?'s':'');
  }

  // Long-shelf-life pkg (egg white carton): show trip-total amount with
  // container size in parens. Cartons carry between trips, so what user
  // needs is "how much this trip" + "container holds N cups".
  // 2026-05-01.
  if(db.pkg && db.pkg.longShelfLife){
    var amt=qtyObj.num;
    var unit=qtyObj.unit;
    var label=amt+' '+unit+(amt!==1&&unit!=='oz'?'s':'');
    var containerCups=db.pkg.cups;
    return label+' ('+containerCups+' cups)';
  }

  // Dry-equivalent conversion for cooked grains/beans/legumes. Recipe
  // measurements are in cooked-cup (what's eaten); shopping needs the dry
  // amount you actually buy. db.dry.ratio = cooked-cup → dry-cup multiplier
  // (e.g., 0.4 means 1 cup cooked rice = 0.4 cup dry). Round up to 1/4 cup
  // for clean shopping quantities (was 1/8 — user prefers 0.25 grid).
  // 2026-05-01.
  if(db.dry && qtyObj.unit==='cup'){
    let dryAmt=qtyObj.num*db.dry.ratio;
    let rounded=Math.ceil(dryAmt*4)/4;
    if(rounded<=0)rounded=0.25;
    let label=db.dry.label||'cup dry';
    // Pluralize "cup" → "cups" when amount > 1 (only for the default label)
    if(label==='cup dry' && rounded>1)label='cups dry';
    return rounded+' '+label;
  }

  // Package conversion (cans, cartons, pouches, containers, jars).
  if(db.pkg){
    const pkg=db.pkg;
    const label=pkg.type||'can';
    if(pkg.drained&&qtyObj.unit==='cup'){
      const cans=Math.ceil(qtyObj.num/pkg.drained);
      return cans+' '+label+(cans>1?'s':'')+' ('+pkg.size+pkg.unit+')';
    }
    if(pkg.cups&&qtyObj.unit==='cup'){
      const units=Math.ceil(qtyObj.num/pkg.cups);
      return units+' '+label+(units>1?'s':'')+' ('+pkg.size+pkg.unit+')';
    }
    if(pkg.drained&&qtyObj.unit==='oz'){
      const cans=Math.ceil(qtyObj.num/pkg.drained);
      return cans+' '+label+(cans>1?'s':'')+' ('+pkg.size+pkg.unit+')';
    }
  }

  return base;
}
function shopDisplayName(dbKey){return SHOP_DISPLAY_NAMES[dbKey]||(dbKey.charAt(0).toUpperCase()+dbKey.slice(1));}

function addShopIngredient(items,dbKey,amt,p){
  const db=NUTRI_DB[dbKey];if(!db)return;
  if(dbKey==='water'||amt<=0)return;
  // Egg whites are tracked as their own shopping line (liquid cartons), not folded into whole eggs
  const shopKey=dbKey;
  const shopDb=NUTRI_DB[shopKey]||db;
  const unit=shopDb.unit;
  const isLow=isIfLow(shopKey);
  let cat=getIngredientCategory(shopKey);
  if(isLow)cat='If Low — '+cat;
  const displayName=shopDisplayName(shopKey);
  const key=(cat+'_'+shopKey).toLowerCase().replace(/[^a-z0-9]/g,'_');
  if(!items[key])items[key]={name:displayName,dbKey:shopKey,cat:cat,hisSum:null,hisRaw:'—',herSum:null,herRaw:'—'};
  if(p==='him'){items[key].hisSum=addQty(items[key].hisSum,amt,unit);}
  else{items[key].herSum=addQty(items[key].herSum,amt,unit);}
}

function buildShoppingList(trip,who){
  const days=trip==='custom'?DAYS:(TRIP_DAYS_STATIC[trip]||[]);
  const persons=who==='both'?['him','her']:who==='him'?['him']:['her'];
  const items={};

  if(trip==='custom'){
    // Custom trip: user explicitly picks slots via the day-grid. Iterate the
    // selected slots one-by-one — slot-based attribution matches what the
    // user picked. (CUSTOM_PLAN_SEL and CUSTOM_RECIPE_SEL pickers handled
    // separately below.)
    persons.forEach(function(p){
      days.forEach(function(d){
        SLOTS.forEach(function(s){
          if(s==='late_snack')return;
          if(!CUSTOM_SHOP_SEL[sk(p,d,s)])return;
          if(SKIPPED[sk(p,d,s)])return;
          if(EAT_OUT[sk(p,d,s)])return;
          const id=getMealId(p,d,s);if(!id)return;
          const m=getMeal(id);if(!m||!m[p])return;
          const port=m[p];
          if(!port.ingredients||!port.ingredients.length||port.ingredients[0].dbKey===undefined)return;
          const balanced=getBalancedSlotIngredients(p,d,s);
          if(balanced){
            balanced.forEach(function(i){addShopIngredient(items,i.dbKey,i.amt,p);});
          } else {
            const ingr=applyOverrides(port,p,d,s);
            ingr.forEach(function(i){addShopIngredient(items,i.dbKey,i.amt,p);});
          }
        });
      });
    });
  } else {
    // Cook-anchor architecture for cook1/cook2 trips. Each batch is shopped
    // ONCE in the trip its cook day falls in. Leftover slots (in any trip)
    // contribute nothing to shopping — they were already shopped when the
    // cook anchor was added to its trip. Trip totals are automatically
    // grid-clean: each batch contributes its full snapped total to one
    // trip; cross-trip leftovers don't split a batch's amount across trips.
    //
    // Person attribution: a batch's full total goes into the COOK ANCHOR's
    // person bucket (`hisSum` if Him is the anchor, `herSum` if Her). The
    // cook is the one shopping for the batch; the other person's portion
    // is implicitly included in the cook's bucket. For solo cooks, anchor
    // person = eater person, no difference.
    const leftovers = computeLeftovers();
    const tripDaySet = {};
    days.forEach(function(d){tripDaySet[d]=true;});

    persons.forEach(function(p){
      DAYS.forEach(function(d){
        SLOTS.forEach(function(s){
          if(s==='late_snack')return;
          const k=sk(p,d,s);
          if(SKIPPED[k]||EAT_OUT[k])return;
          const id=getMealId(p,d,s);if(!id)return;
          const m=getMeal(id);if(!m||!m[p])return;
          const port=m[p];
          if(!port.ingredients||!port.ingredients.length||port.ingredients[0].dbKey===undefined)return;

          const lo = leftovers[k];
          // Skip leftover slots — already shopped via their cook anchor.
          if(lo && lo.isLeftover) return;
          // Cook day must be in this trip. (For batches whose cook is in
          // the OTHER trip, this excludes them from this trip's shopping.)
          if(!tripDaySet[d]) return;

          if(lo && lo.portions && lo.portions.length > 1){
            // Multi-portion batch (shared, leftover chain, or both).
            // Sum balanced amounts across ALL portions of the batch and
            // attribute the total to the cook anchor's person bucket.
            lo.portions.forEach(function(pt){
              const bal = getBalancedSlotIngredients(pt.p, pt.d, pt.s);
              if(bal){
                bal.forEach(function(i){addShopIngredient(items, i.dbKey, i.amt, p);});
              } else {
                const m2 = getMeal(getMealId(pt.p, pt.d, pt.s));
                if(m2 && m2[pt.p]){
                  const ingr = applyOverrides(m2[pt.p], pt.p, pt.d, pt.s);
                  ingr.forEach(function(i){addShopIngredient(items, i.dbKey, i.amt, p);});
                }
              }
            });
          } else {
            // Solo cook (no leftover entry, or single-portion).
            const balanced = getBalancedSlotIngredients(p, d, s);
            if(balanced){
              balanced.forEach(function(i){addShopIngredient(items, i.dbKey, i.amt, p);});
            } else {
              const ingr = applyOverrides(port, p, d, s);
              ingr.forEach(function(i){addShopIngredient(items, i.dbKey, i.amt, p);});
            }
          }
        });
        // Late snack: per-day, only on regular cook1/cook2 trips when DB-keyed
        // ingredients have been added via the + button. Manual-macro late
        // snacks aren't shopped (user buys those ad-hoc).
        if(tripDaySet[d]){
          const ls = LATE_SNACK[pk(p,d)];
          if(ls && ls.ingredients && ls.ingredients.length){
            ls.ingredients.forEach(function(ing){addShopIngredient(items, ing.dbKey, ing.amt, p);});
          }
        }
      });
    });
  }

  // Custom mode — Base Recipes picker. Adds raw recipe ingredients (not
  // tied to any plan slot, so no balanced/applyOverrides). Useful when the
  // user wants to make a meal that isn't in the current week's plan.
  if(trip==='custom'){
    Object.keys(CUSTOM_RECIPE_SEL).forEach(function(rk){
      if(!CUSTOM_RECIPE_SEL[rk])return;
      const parts=rk.split('_');
      const mealId=parts.slice(0,-1).join('_');
      const p=parts[parts.length-1];
      if(persons.indexOf(p)<0)return;
      const m=getMeal(mealId);
      if(!m||!m[p])return;
      const port=m[p];
      if(!port.ingredients||!port.ingredients.length||!port.ingredients[0].dbKey)return;
      port.ingredients.forEach(function(ing){
        addShopIngredient(items,ing.dbKey,ing.amt,p);
      });
    });
  }

  // Custom mode — This Week's Plan picker. Iterates active SEL for the
  // selected mealIds, reads post-pipeline balanced amounts, sums across
  // every matching (p,d,s). Naturally captures the full batch for cooks
  // (since each portion's per-serving amount sums to the batch total),
  // skips SKIPPED/EAT_OUT, and dedupes against CUSTOM_SHOP_SEL so the
  // same slot isn't counted twice when the user picks it both ways.
  if(trip==='custom'){
    Object.keys(CUSTOM_PLAN_SEL).forEach(function(mealId){
      if(!CUSTOM_PLAN_SEL[mealId])return;
      persons.forEach(function(p){
        DAYS.forEach(function(d){
          SLOTS.forEach(function(s){
            if(s==='late_snack')return;
            const k=sk(p,d,s);
            if(SKIPPED[k]||EAT_OUT[k])return;
            if(getMealId(p,d,s)!==mealId)return;
            if(CUSTOM_SHOP_SEL[k])return; // dedupe vs day-grid pass
            const balanced=getBalancedSlotIngredients(p,d,s);
            if(balanced){
              balanced.forEach(function(i){
                addShopIngredient(items,i.dbKey,i.amt,p);
              });
            } else {
              const m=getMeal(mealId);if(!m||!m[p])return;
              const ingr=applyOverrides(m[p],p,d,s);
              ingr.forEach(function(i){
                addShopIngredient(items,i.dbKey,i.amt,p);
              });
            }
          });
        });
      });
    });
  }

  const grouped={};
  Object.keys(items).forEach(function(k){
    const item=items[k];
    if(!grouped[item.cat])grouped[item.cat]=[];
    grouped[item.cat].push(Object.assign({},item));
  });
  Object.keys(grouped).forEach(function(c){
    grouped[c].sort(function(a,b){return a.name.toLowerCase()<b.name.toLowerCase()?-1:a.name.toLowerCase()>b.name.toLowerCase()?1:0;});
    grouped[c].forEach(function(item){
      item.hisQty=item.hisSum?fmtQty(item.hisSum):item.hisRaw;
      item.herQty=item.herSum?fmtQty(item.herSum):item.herRaw;
      // Combined total with produce count conversion for Both view
      if(item.hisSum&&item.herSum&&item.hisSum.unit===item.herSum.unit){
        item.bothQty=shopQtyWithCount(item.dbKey,{num:item.hisSum.num+item.herSum.num,unit:item.hisSum.unit});
      } else if(item.hisSum){
        item.bothQty=shopQtyWithCount(item.dbKey,item.hisSum);
      } else if(item.herSum){
        item.bothQty=shopQtyWithCount(item.dbKey,item.herSum);
      } else {
        item.bothQty='';
      }
      // Package-level waste check. hisSum/herSum reflect ACTUAL recipe usage —
      // we never modify them. The shopping display rounds UP to whole packages
      // (you can't buy a partial can); the gap between packages-needed and
      // usage is the real waste, flagged with a warning.
      const db=NUTRI_DB[item.dbKey];
      if(db&&db.pkg){
        const totalNum=(item.hisSum?item.hisSum.num:0)+(item.herSum?item.herSum.num:0);
        const unit=(item.hisSum||item.herSum||{}).unit;
        const perPkg=(db.pkg.drained&&(unit==='cup'||unit==='oz'))?db.pkg.drained:(db.pkg.cups||0);
        if(perPkg>0&&totalNum>0){
          // Calculate waste: how much of the last package isn't used.
          // Skip only for longShelfLife items (egg white carton) — those
          // legitimately carry between trips. Every other pkg type
          // (can/jar/carton/pouch/container) is flagged.
          if(!db.pkg.longShelfLife){
            const pkgsNeeded=_pkgsNeeded(totalNum, perPkg);
            const totalFromPkgs=pkgsNeeded*perPkg;
            const wasteAmt=totalFromPkgs-totalNum;
            if(wasteAmt>0.05){
              const wasteInPkgs=wasteAmt/perPkg;
              const pkgType=db.pkg.type||'can';
              item.wasteLabel=fmtFrac(wasteInPkgs)+' '+pkgType+' unused';
            }
          }
        }
      }
      // Produce waste — flag whole-produce items where the trip total falls
      // short of a clean unit count. After applyTripProduceScaling, residual
      // waste should be small for items in PRODUCE_FLEX_CONFIG; items not in
      // the config (or where flex couldn't fit due to per-day goal breaks)
      // still get the warning so the user sees the cost.
      if(db&&db.produce){
        const totalNum=(item.hisSum?item.hisSum.num:0)+(item.herSum?item.herSum.num:0);
        const perWhole=db.produce.perWhole;
        if(perWhole>0&&totalNum>0){
          const wholesNeeded=_pkgsNeeded(totalNum, perWhole);
          const totalFromWholes=wholesNeeded*perWhole;
          const wasteAmt=totalFromWholes-totalNum;
          // Threshold 0.5 unit (50% of one whole produce wasted) — flex pass
          // typically lands amounts within ±0.25 unit so this only fires when
          // flex couldn't reach the boundary.
          if(wasteAmt>perWhole*0.5){
            const wasteInWholes=wasteAmt/perWhole;
            const label=db.produce.label||'unit';
            item.wasteLabel=fmtFrac(wasteInWholes)+' '+label+' unused';
          }
        }
      }
    });
  });
  return grouped;
}

function lsGet(key,fallback){try{const r=localStorage.getItem(key);return r?JSON.parse(r):fallback;}catch(e){return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}
function lsGetRaw(key){try{return localStorage.getItem(key)||null;}catch(e){return null;}}
function lsSetRaw(key,val){try{localStorage.setItem(key,val);}catch(e){}}

function sk(p,d,s){return p+'_'+d+'_'+s;} // person_day_slot (e.g. 'him_Monday_lunch')
function dk(d,s){return d+'_'+s;}           // day_slot (e.g. 'Monday_dinner')
function pk(p,d){return p+'_'+d;}           // person_day (e.g. 'him_Monday')

// Common patterns extracted as helpers
function stampSel(key,mealId){
  SEL[key]=mealId;
  if(!weekData[activeWeek].ts)weekData[activeWeek].ts={};
  weekData[activeWeek].ts[key]=Date.now();
}
function updateSchedule(){saveSharedSchedule();renderMeals();}

function safeId(s){return s.replace(/[^a-zA-Z0-9_-]/g,'_')}

// ── Macro display helpers ─────────────────────────────────────
function macroBar(kcal,pro,fat,carb,p){
  if(!kcal)return'';
  let macroKcal=pro*4+fat*9+carb*4;
  if(!macroKcal)macroKcal=kcal;
  const pPct=Math.round(pro*4/macroKcal*100);
  const fPct=Math.round(fat*9/macroKcal*100);
  const cPct=100-pPct-fPct;
  const pCol=p==='her'?'#F472B6':'#60A5FA';
  return '<div class="macro-bar">'
    +'<div class="macro-seg" style="width:'+pPct+'%;background:'+pCol+'"></div>'
    +'<div class="macro-seg" style="width:'+cPct+'%;background:#4ADE80"></div>'
    +'<div class="macro-seg" style="width:'+fPct+'%;background:#FBBF24"></div>'
    +'</div>'
    +'<div class="macro-labels">'
    +'<span style="color:'+pCol+'">P '+pPct+'%</span>'
    +'<span style="color:#4ADE80">C '+cPct+'%</span>'
    +'<span style="color:#FBBF24">F '+fPct+'%</span>'
    +'</div>';
}

function saveRecipeFormState(){
  const label=document.getElementById('rf_label');
  const url=document.getElementById('rf_url');
  const steps=document.getElementById('rf_steps');
  const note=document.getElementById('rf_note');
  const noLo=document.getElementById('rf_noLeftover');
  if(label)_rfSaved.label=label.value;
  if(url)_rfSaved.url=url.value;
  if(steps)_rfSaved.steps=steps.value;
  if(note)_rfSaved.note=note.value;
  if(noLo)_rfSaved.noLeftover=noLo.value;
  // Save ingredient rows
  const rows=document.querySelectorAll('#rf_ingr_list .rf-ingr-row');
  _rfSaved.ingrRows=[];
  rows.forEach(function(row){
    const selects=row.querySelectorAll('select');
    if(selects.length>=3){
      _rfSaved.ingrRows.push({amt:selects[0].value,ingr:selects[1].value,role:selects[2].value});
    }
  });
}
function restoreRecipeFormState(){
  setTimeout(function(){
    const label=document.getElementById('rf_label');
    const url=document.getElementById('rf_url');
    const steps=document.getElementById('rf_steps');
    const note=document.getElementById('rf_note');
    const noLo=document.getElementById('rf_noLeftover');
    if(label&&_rfSaved.label)label.value=_rfSaved.label;
    if(url&&_rfSaved.url)url.value=_rfSaved.url;
    if(steps&&_rfSaved.steps)steps.value=_rfSaved.steps;
    if(note&&_rfSaved.note)note.value=_rfSaved.note;
    if(noLo&&_rfSaved.noLeftover)noLo.value=_rfSaved.noLeftover;
    // Restore ingredient rows
    if(_rfSaved.ingrRows.length){
      const list=document.getElementById('rf_ingr_list');
      if(list&&!list.children.length){
        _rfSaved.ingrRows.forEach(function(r){
          addIngrRow();
          const rows=list.querySelectorAll('.rf-ingr-row');
          const last=rows[rows.length-1];
          if(last){
            const selects=last.querySelectorAll('select');
            if(selects[2])selects[2].value=r.role;
            if(selects[2])selects[2].dispatchEvent(new Event('change'));
            setTimeout(function(){
              if(selects[1])selects[1].value=r.ingr;
              if(selects[0])selects[0].value=r.amt;
            },50);
          }
        });
      }
    }
  },20);
}
