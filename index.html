          return '<option value="'+q.val+'"'+sel+'>'+q.label+'</option>';
        }).join('');

        var displayCal=db?Math.round(db.kcal*displayAmt):0;
        var displayPro=db?Math.round(db.pro*displayAmt):0;

        return '<div class="ingr-edit-row">'
          +'<select class="ingr-amt-select" id="'+amtId+'"'
          +' onchange="onIngrAmt(\''+person+'\',\''+day+'\',\''+slotEsc+'\','+idx+',this.value)">'
          +qtyHtml+'</select>'
          +'<span class="ingr-unit-label">'+unitLabel+'</span>'
          +'<select class="ingr-swap-select role-'+ing.role+'" onchange="onIngrSwap(\''+person+'\',\''+day+'\',\''+slotEsc+'\','+idx+',this.value)">'
          +optHtml+'</select>'
          +'<span class="ingr-cal">'+displayCal+'cal</span>'
          +'<span class="ingr-pro">'+(displayPro>0?displayPro+'p':'')+'</span>'
          +'</div>';
      }).join('');
      ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';

      // Add reset button if there are overrides
      if(hasOverrides){
        var slotEsc2 = s.replace(/'/g,"\\'");
        ingrHtml += '<button class="ingr-reset-btn" onclick="onIngrReset(\''+person+'\',\''+day+'\',\''+slotEsc2+'\')">↺ Reset to original</button>';
      }
    } else {
      ingrHtml=(port.ingredients||[]).map(function(i){return'<li>'+(typeof i==='string'?i:i.displayText)+'</li>'}).join('');
      ingrHtml='<ul class="ingr-list">'+ingrHtml+'</ul>';
    }

    // Compute macros: base from overridden ingredients, then with calorie adjustment
    // Only apply auto-adjustment if user explicitly changed calories or ingredients
    var ovrMacros = getPortMacrosOvr(port,person,day,s);
    var isUserAdj = !!userAdjusted[person+'_'+day];
    var hasSkips = SLOTS.some(function(sl){return !!SKIPPED[person+'_'+day+'_'+sl];});
    var hasAnyEatOut = SLOTS.some(function(sl){var eo=EAT_OUT[person+'_'+day+'_'+sl];return eo&&eo.kcal>0;});
    var slotAdj = (isUserAdj||hasSkips||hasAnyEatOut) ? getSlotAdjustment(person,day,s) : 0;
    var isSkipped = !!SKIPPED[person+'_'+day+'_'+s];
    var pm, adjBanner='';
    if(isSkipped){
      pm={kcal:0,pro:0,fat:0,carb:0};
    } else if(slotAdj!==0){
      var adjIngr = applyOverrides(port,person,day,s);
      if(adjIngr && adjIngr.length && adjIngr[0].dbKey!==undefined){
        var adjResult = adjustIngredients(adjIngr, slotAdj);
        // Compute adjusted macros from the result
        pm = {kcal:0,pro:0,fat:0,carb:0};
        adjResult.forEach(function(a){
          var db = NUTRI_DB[a.ing.dbKey];
          if(!db)return;
          pm.kcal+=Math.round(db.kcal*a.newAmt);
          pm.pro+=Math.round(db.pro*a.newAmt);
          pm.fat+=Math.round(db.fat*a.newAmt);
          pm.carb+=Math.round(db.carb*a.newAmt);
        });
        // Rebuild ingredient rows with adjusted amounts
        if(!DB_KEYS_BY_ROLE) DB_KEYS_BY_ROLE = getDbKeysByRole();
        ingrHtml = adjResult.map(function(a, idx) {
          var ing = a.ing;
          var amt = a.newAmt;
          var db = NUTRI_DB[ing.dbKey];
          var pill = ingrMacroPill(ing, amt);
          var unitLabel = db ? db.unit : '';
          var allKeys = Object.keys(NUTRI_DB).sort();
          var optHtml = allKeys.map(function(k){
            return '<option value="'+k+'"'+(k===ing.dbKey?' selected':'')+'>'+k+'</option>';
          }).join('');
          var slotEsc = s.replace(/'/g,"\\'");
          var amtId = 'amt_'+person+'_'+day+'_'+s+'_'+idx;
          var qtyOpts = buildQtyOptions(unitLabel, amt);
          var qtyHtml = qtyOpts.map(function(q){
            var sel = (Math.abs(q.val - amt) < 0.02) ? ' selected' : '';
            return '<option value="'+q.val+'"'+sel+'>'+q.label+'</option>';
          }).join('');
          return '<div class="ingr-edit-row">'
            +'<select class="ingr-amt-select" id="'+amtId+'"'
            +' onchange="onIngrAmt(\''+person+'\',\''+day+'\',\''+slotEsc+'\','+idx+',this.value)">'
            +qtyHtml+'</select>'
            +'<span class="ingr-unit-label">'+unitLabel+'</span>'
            +'<select class="ingr-swap-select role-'+ing.role+'" onchange="onIngrSwap(\''+person+'\',\''+day+'\',\''+slotEsc+'\','+idx+',this.value)">'
            +optHtml+'</select>'
            +'<span class="ingr-cal">'+(db?Math.round(db.kcal*amt):0)+'cal</span>'
            +'<span class="ingr-pro">'+(db&&Math.round(db.pro*amt)>0?Math.round(db.pro*amt)+'p':'')+'</span>'
            +'</div>';
        }).join('');
        ingrHtml='<div class="ingr-edit-grid">'+ingrHtml+'</div>';
        // Build detailed change list
        var adjDir = slotAdj>0?'+':'';
        var changeLines = [];
        adjResult.forEach(function(a){
          if(Math.abs(a.newAmt - a.ing.amt) > 0.02){
            var db = NUTRI_DB[a.ing.dbKey];
            var unit = db ? db.unit : '';
            var fmtAmt = function(n){
              if(Math.abs(n-Math.round(n))<0.05) return String(Math.round(n));
              if(Math.abs(n%1-0.25)<0.05) return Math.floor(n)+(Math.floor(n)?'¼':'¼');
              if(Math.abs(n%1-0.5)<0.05) return Math.floor(n)+(Math.floor(n)?'½':'½');
              if(Math.abs(n%1-0.75)<0.05) return Math.floor(n)+(Math.floor(n)?'¾':'¾');
              return Math.round(n*4)/4+'';
            };
            var dir = a.newAmt > a.ing.amt ? '↑' : '↓';
            var kcalDiff = Math.round((a.newAmt - a.ing.amt) * (db?db.kcal:0));
            var diffSign = kcalDiff > 0 ? '+' : '';
            changeLines.push(dir+' <b>'+a.ing.dbKey+'</b>: '+fmtAmt(a.ing.amt)+' → '+fmtAmt(a.newAmt)+' '+unit+' ('+diffSign+kcalDiff+' kcal)');
          }
        });
        if(changeLines.length){
          adjBanner='<div class="adj-info">⚡ Auto-adjusted <b>'+adjDir+slotAdj+' kcal</b> to hit daily target:<br>'
            +changeLines.join('<br>')+'</div>';
        }
      } else {
        pm = ovrMacros;
      }
    } else {
      pm = ovrMacros;
    }
    var mFat=pm.fat||0,mCarb=pm.carb||0;
    var mPct=pm.kcal?Math.round(pm.pro*4/pm.kcal*100):0;
    var cPct2=pm.kcal?Math.round(mCarb*4/pm.kcal*100):0;
    var fPct2=pm.kcal?Math.round(mFat*9/pm.kcal*100):0;
    var macroLine=pm.kcal+' kcal · P '+pm.pro+'g ('+mPct+'%) · C '+mCarb+'g ('+cPct2+'%) · F '+mFat+'g ('+fPct2+'%)'+(port.fv?' · '+port.fv:'');

    var bestPort=(activeMeal.him&&activeMeal.him.steps)?activeMeal.him:port;
    var colorSteps=bestPort._colorSteps||bestPort.steps||[];
    var stepsHtml=colorSteps.map(function(st){return'<li>'+st+'</li>'}).join('');

    var isSkipped=!!SKIPPED[person+'_'+day+'_'+s];
    var skipTarget=(s==='pre'||s==='post')?'lunch':(s==='snack'||s==='evening')?'dinner':(s==='lunch')?'dinner':'';
    var skipCheck='<label class="skip-cb" onclick="event.stopPropagation()"><input type="checkbox" '+(isSkipped?'checked ':'')+' onchange="toggleSkip(\''+person+'\',\''+day+'\',\''+s+'\')"> Skip</label>';
    
    var eoKey=person+'_'+day+'_'+s;
    var isEatOut=!!EAT_OUT[eoKey];
    var eatOutCheck='<label class="skip-cb" onclick="event.stopPropagation()"><input type="checkbox" '+(isEatOut?'checked ':'')+' onchange="toggleEatOut(\''+person+'\',\''+day+'\',\''+s+'\')"> Eat out</label>';
    var topRowChecks='<div class="mc-checks">'+sharedCheck+skipCheck+eatOutCheck+'</div>';

    // Build skip/eat-out summary when skipped
    var skipSummary='';
    if(isSkipped){
      var origMacros=getPortMacrosOvr(port,person,day,s);
      var adjTargets=getAdjTargets(person,day);
      
      // Checkboxes for all available main meals
      var adjCheckHtml='<div style="margin-top:4px">⚡ Adjust: ';
      var hasAnyTarget=false;
      ['post','lunch','dinner'].forEach(function(sl){
        if(sl===s)return;
        if(EAT_OUT[person+'_'+day+'_'+sl]||SKIPPED[person+'_'+day+'_'+sl])return;
        var checked=adjTargets[sl]?'checked ':'';
        if(adjTargets[sl])hasAnyTarget=true;
        adjCheckHtml+='<label class="adj-target-cb" onclick="event.stopPropagation()"><input type="checkbox" '+checked+' onchange="toggleAdjTarget(\''+person+'\',\''+day+'\',\''+sl+'\')"> '+SLOT_LABEL[sl]+'</label>';
      });
      adjCheckHtml+='</div>';
      
      // Suggestion when dinner is skipped and nothing is checked
      var suggestion='';
      if(s==='dinner'&&!hasAnyTarget){
        var dayWithout=0;
        SLOTS.forEach(function(sl2){
          if(sl2===s||sl2==='late_snack'||SKIPPED[person+'_'+day+'_'+sl2])return;
          var eoK2=person+'_'+day+'_'+sl2;
          if(EAT_OUT[eoK2]){dayWithout+=(EAT_OUT[eoK2].kcal||0);return;}
          var p2=getPort(person,day,sl2);
          if(p2)dayWithout+=getPortMacrosOvr(p2,person,day,sl2).kcal;
        });
        var ls2=LATE_SNACK[person+'_'+day];if(ls2)dayWithout+=(ls2.kcal||0);
        var target=APPLIED_KCAL[person]||CAL_BASE[person];
        var diff=target-dayWithout;
        if(diff>100)suggestion='<div style="margin-top:4px;color:var(--gray)">Day total: <b>'+dayWithout+' kcal</b> (target '+target+'). Consider adding a late night snack for ~'+diff+' kcal.</div>';
        else if(diff<-100)suggestion='<div style="margin-top:4px;color:var(--gray)">Day total: <b>'+dayWithout+' kcal</b>. Over target by '+Math.abs(diff)+' kcal. Consider reducing evening snack.</div>';
      }
      
      skipSummary='<div class="skip-summary">↗ '+origMacros.kcal+' kcal · P '+origMacros.pro+'g · C '+origMacros.carb+'g · F '+origMacros.fat+'g'
        +adjCheckHtml+suggestion+'</div>';
    }

    if(isEatOut){
      var eo=EAT_OUT[eoKey];
      // Build saved meals dropdown
      var savedOpts=EAT_OUT_DB.length?'<option value="">— Load from history —</option>'+EAT_OUT_DB.map(function(e,i){return'<option value="'+i+'">'+e.name+(e.restaurant?' ('+e.restaurant+')':'')+' · '+e.kcal+' kcal</option>';}).join('')
        +'<option disabled>──────────</option>'+EAT_OUT_DB.map(function(e,i){return'<option value="del_'+i+'">✕ Delete: '+e.name+'</option>';}).join('')
        :'';
      var savedDropdown=EAT_OUT_DB.length?'<select class="eo-saved" onchange="var v=this.value;if(v.indexOf(\'del_\')===0){deleteEatOutEntry(parseInt(v.slice(4)));return;}if(v!==\'\')loadEatOutEntry(\''+person+'\',\''+day+'\',\''+s+'\',parseInt(v))">'+savedOpts+'</select>':'';
      
      // Build eat-out impact summary
      var eoSummary='';
      if(eo.kcal>0){
        var origPort=getPort(person,day,s);
        var origKcal=origPort?getPortMacrosOvr(origPort,person,day,s).kcal:0;
        var eoDiff=eo.kcal-origKcal;
        var diffSign=eoDiff>0?'+':'';
        var target=APPLIED_KCAL[person]||CAL_BASE[person];
        var adjTargets=getAdjTargets(person,day);
        
        eoSummary='<div class="eo-summary">'
          +'<div class="eo-summary-line">🍽️ Eat out: <b>'+eo.kcal+' kcal</b> vs original <b>'+origKcal+' kcal</b> ('+diffSign+eoDiff+' kcal)</div>';
        
        // Checkboxes for all available main meals
        var adjCheckHtml2='<div class="eo-summary-line">⚡ Adjust meals: ';
        var hasAnyTarget2=false;
        ['post','lunch','dinner'].forEach(function(sl){
          if(sl===s||EAT_OUT[person+'_'+day+'_'+sl]||SKIPPED[person+'_'+day+'_'+sl])return;
          var checked=adjTargets[sl]?'checked ':'';
          if(adjTargets[sl])hasAnyTarget2=true;
          var lbl=SLOT_LABEL[sl]||sl;
          adjCheckHtml2+='<label class="adj-target-cb" onclick="event.stopPropagation()"><input type="checkbox" '+checked+' onchange="toggleAdjTarget(\''+person+'\',\''+day+'\',\''+sl+'\')"> '+lbl+'</label>';
        });
        adjCheckHtml2+='</div>';
        eoSummary+=adjCheckHtml2;
        
        // Suggestion for dinner eat-out when nothing is checked
        if(s==='dinner'&&!hasAnyTarget2){
          var dayTotal=0;
          SLOTS.forEach(function(sl2){
            if(sl2==='late_snack')return;
            var eoK2=person+'_'+day+'_'+sl2;
            if(sl2===s){dayTotal+=eo.kcal;return;}
            if(SKIPPED[eoK2])return;
            if(EAT_OUT[eoK2]){dayTotal+=(EAT_OUT[eoK2].kcal||0);return;}
            var p2=getPort(person,day,sl2);if(p2)dayTotal+=getPortMacrosOvr(p2,person,day,sl2).kcal;
          });
          var ls2=LATE_SNACK[person+'_'+day];if(ls2)dayTotal+=(ls2.kcal||0);
          var diff2=target-dayTotal;
          if(diff2>100)eoSummary+='<div class="eo-summary-line" style="color:var(--gray)">Day total: <b>'+dayTotal+' kcal</b> (target '+target+'). Consider adding a late night snack for ~'+diff2+' kcal.</div>';
          else if(diff2<-100)eoSummary+='<div class="eo-summary-line" style="color:var(--gray)">Over target by '+Math.abs(diff2)+' kcal. Consider reducing evening snack.</div>';
        }
        eoSummary+='</div>';
      }
      
      html+='<div class="mc slot-'+s+'" id="mc_'+k+'">'
        +'<div class="mc-top"><div class="mc-top-row"><div class="slot-label">'+SLOT_LABEL[s]+'</div>'+topRowChecks+'</div></div>'
        +'<div class="eo-form">'
        +savedDropdown
        +'<div class="eo-row"><div style="flex:1"><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:2px">Meal Name</div><input id="eo_'+k+'_name" class="eo-input" placeholder="e.g. Chicken Burrito" value="'+(eo.name||'')+'" onchange="setEatOutField(\''+person+'\',\''+day+'\',\''+s+'\',\'name\',this.value)"></div>'
        +'<div style="flex:1"><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:2px">Restaurant</div><input id="eo_'+k+'_rest" class="eo-input" placeholder="e.g. Chipotle" value="'+(eo.restaurant||'')+'" onchange="setEatOutField(\''+person+'\',\''+day+'\',\''+s+'\',\'restaurant\',this.value)"></div></div>'
        +'<div class="eo-macros-row">'
        +'<div class="eo-field"><label>Kcal</label><input id="eo_'+k+'_kcal" type="number" min="0" value="'+(eo.kcal!=null?eo.kcal:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'kcal\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div>'
        +'<div class="eo-field"><label>Protein</label><input id="eo_'+k+'_pro" type="number" min="0" value="'+(eo.pro!=null?eo.pro:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'pro\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div>'
        +'<div class="eo-field"><label>Fat</label><input id="eo_'+k+'_fat" type="number" min="0" value="'+(eo.fat!=null?eo.fat:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'fat\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div>'
        +'<div class="eo-field"><label>Carbs</label><input id="eo_'+k+'_carb" type="number" min="0" value="'+(eo.carb!=null?eo.carb:'')+'" oninput="eoFieldChanged(\''+person+'\',\''+day+'\',\''+s+'\',\'carb\',this.value)" onblur="eoFieldBlur(\''+person+'\',\''+day+'\',\''+s+'\')"></div></div>'
        +'<button class="eo-save-btn" onclick="saveEatOut(\''+person+'\',\''+day+'\',\''+s+'\')">Save to Eat Out History</button>'
        +eoSummary
        +'</div></div>';
    } else {

    html+='<div class="mc slot-'+s+(isOpen?' open':'')+(isSkipped?' skipped':'')+'" id="mc_'+k+'">'
      +'<div class="mc-top"><div class="mc-top-row"><div class="slot-label">'+SLOT_LABEL[s]+'</div>'+topRowChecks+'</div>'
      +'<select class="meal-select" onchange="changeMeal(\''+s+'\',this.value)">'+opts+'</select></div>'
      +skipSummary
      +'<div class="mc-meta" onclick="toggleCard(\''+k+'\')"><div><div class="mc-macros">'+macroLine+leftoverBadge+cookBadge+'</div>'
      +macroBar(pm.kcal,pm.pro,mFat,mCarb)
      +'</div><div class="expand-btn">⌄</div></div>'
      +notePill
      +'<div class="mc-body">'
      +adjBanner
      +'<div class="bsec"><div class="bsec-title ingr">'+ingrSectionTitle+'</div>'+ingrHtml+'</div>'
      +'<div class="bsec"><div class="bsec-title cook">👨‍🍳 How to make it</div><ol class="step-list">'+stepsHtml+'</ol></div>'
      +'</div></div>';
    } // end else (not eat out)
  });

  // Late Night Snack — optional add-on, not in shopping list
  var lsKey=person+'_'+day;
  var ls=LATE_SNACK[lsKey];
  if(ls){
    html+='<div class="mc slot-late_snack">'
      +'<div class="mc-top"><div class="mc-top-row"><div class="slot-label">Late Night Snack</div>'
      +'<div class="mc-checks"><button class="skip-cb" style="border:none;background:none;cursor:pointer" onclick="removeLateSnack(\''+person+'\',\''+day+'\')">✕</button></div></div></div>'
      +'<div class="eo-form">'
      +'<div class="eo-row"><input id="ls_'+lsKey+'_name" class="eo-input eo-name" placeholder="Snack name" value="'+(ls.name||'')+'" onchange="setLateSnackField(\''+person+'\',\''+day+'\',\'name\',this.value)"></div>'
      +'<div class="eo-macros-row">'
      +'<div class="eo-field"><label>Kcal</label><input id="ls_'+lsKey+'_kcal" type="number" min="0" value="'+(ls.kcal!=null?ls.kcal:'')+'" oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'kcal\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div>'
      +'<div class="eo-field"><label>Protein</label><input id="ls_'+lsKey+'_pro" type="number" min="0" value="'+(ls.pro!=null?ls.pro:'')+'" oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'pro\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div>'
      +'<div class="eo-field"><label>Fat</label><input id="ls_'+lsKey+'_fat" type="number" min="0" value="'+(ls.fat!=null?ls.fat:'')+'" oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'fat\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div>'
      +'<div class="eo-field"><label>Carbs</label><input id="ls_'+lsKey+'_carb" type="number" min="0" value="'+(ls.carb!=null?ls.carb:'')+'" oninput="lsFieldChanged(\''+person+'\',\''+day+'\',\'carb\',this.value)" onblur="lsFieldBlur(\''+person+'\',\''+day+'\')"></div></div>'
      +'</div></div>';
  } else {
    html+='<div style="padding:8px 12px"><button class="rf-add-ingr-btn" onclick="addLateSnack(\''+person+'\',\''+day+'\')">+ Add Late Night Snack</button></div>';
  }

  document.getElementById('mealView').innerHTML=html;
  window.scrollTo(0,scrollY);
  requestAnimationFrame(function(){window.scrollTo(0,scrollY);mealEl.style.minHeight='';});
}

function toggleCard(k){openCards[k]=!openCards[k];var card=document.getElementById('mc_'+k);if(card)card.classList.toggle('open',openCards[k]);}
function toggleSkip(p,d,s){var k=p+'_'+d+'_'+s;SKIPPED[k]=!SKIPPED[k];if(!SKIPPED[k])delete SKIPPED[k];else delete EAT_OUT[k];renderMeals();}
function addLateSnack(p,d){LATE_SNACK[p+'_'+d]={name:'',kcal:0,pro:0,fat:0,carb:0};renderMeals();}
function removeLateSnack(p,d){delete LATE_SNACK[p+'_'+d];renderMeals();}
function toggleAdjTarget(p,d,slot){
  var k=p+'_'+d;
  if(!ADJ_TARGETS[k])ADJ_TARGETS[k]={post:false,lunch:false,dinner:false};
  ADJ_TARGETS[k][slot]=!ADJ_TARGETS[k][slot];
  renderMeals();
}
function getAdjTargets(p,d){return ADJ_TARGETS[p+'_'+d]||{post:false,lunch:false,dinner:false};}
function toggleEatOut(p,d,s){var k=p+'_'+d+'_'+s;if(EAT_OUT[k]){delete EAT_OUT[k];}else{EAT_OUT[k]={name:'',restaurant:'',kcal:0,pro:0,fat:0,carb:0};delete SKIPPED[k];}renderMeals();}
function setEatOutField(p,d,s,field,val){
  var k=p+'_'+d+'_'+s;if(!EAT_OUT[k])return;
  if(field==='name'||field==='restaurant')EAT_OUT[k][field]=val;
  else{var n=Math.max(0,parseInt(val)||0);EAT_OUT[k][field]=n;}
}
function eoFieldChanged(p,d,s,field,val){
  setEatOutField(p,d,s,field,val);
  updateStatsBar();
}
function eoFieldBlur(p,d,s){
  renderMeals();
}
function lsFieldChanged(p,d,field,val){
  setLateSnackField(p,d,field,val);
  updateStatsBar();
}
function lsFieldBlur(p,d){
  renderMeals();
}
function updateStatsBar(){
  var t=calcTotals(person,day);
  var statsEl=document.querySelector('.stats');
  if(statsEl){
    var stats=statsEl.querySelectorAll('.stat');
    if(stats[0]){var v=stats[0].querySelector('.v');if(v){var txt=v.childNodes[0];if(txt)txt.textContent=t.kcal.toLocaleString();}}
    if(stats[1]){var v=stats[1].querySelector('.v');if(v)v.textContent=t.pro+'g';}
    if(stats[2]){var v=stats[2].querySelector('.v');if(v)v.textContent=t.fat+'g';}
    if(stats[3]){var v=stats[3].querySelector('.v');if(v)v.textContent=t.carb+'g';}
  }
}
function saveEatOut(p,d,s){

  if(!anyLeft) delete userAdjusted[p+'_'+d];

function randomPick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randomizeDay(){
  var p = person === 'shared' ? 'him' : person;
  var target = APPLIED_KCAL[p] || CAL_BASE[p];
  var bestSel = null;
  var bestDiff = Infinity;
  var attempts = 80;

  for (var a = 0; a < attempts; a++) {
    var used = [];
    var trySel = {};
    var totalKcal = 0;

    SLOTS.forEach(function(s){
      var candidates = getMealsForSlot(s).filter(function(m){return m[p] && used.indexOf(m.id) < 0;});
      if (!candidates.length) candidates = getMealsForSlot(s).filter(function(m){return m[p];});
      if (!candidates.length) return;
      var pick = randomPick(candidates);
      trySel[s] = pick.id;
      used.push(pick.id);
      var port = pick[p];
      if (port) totalKcal += getPortMacros(port).kcal;
    });

    var diff = Math.abs(totalKcal - target);
    if (diff < bestDiff) {
      bestDiff = diff;
      bestSel = trySel;
      if (diff <= 100) break; // close enough
    }
  }

  if (bestSel) {
    delete userAdjusted[person+'_'+day];
    if(!weekData[activeWeek].ts)weekData[activeWeek].ts={};
    var now=Date.now();
    SLOTS.forEach(function(s){
      clearOverrides(person,day,s);
      var selKey=person+'_'+day+'_'+s;
      if (bestSel[s]){SEL[selKey]=bestSel[s];weekData[activeWeek].ts[selKey]=now;}
      else delete SEL[selKey];
    });
  }
  invalidateLeftoverCache();renderMeals(); if(topTab==='shop') renderShop();autoSaveWeek();
}

// ── WEEK MANAGEMENT ─────────────────────────────────────────
var activeWeek='this'; // 'this' or 'next'
var weekData={this:{sel:{},monday:''},next:{sel:{},monday:''}};

function getMondayStr(d){var dt=new Date(d);var diff=dt.getDay()===0?-6:1-dt.getDay();dt.setDate(dt.getDate()+diff);return dt.toISOString().slice(0,10);}
function fmtWeekLabel(mondayStr){var d=new Date(mondayStr+'T12:00:00');var end=new Date(d);end.setDate(d.getDate()+6);var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[d.getMonth()]+' '+d.getDate()+' – '+mo[end.getMonth()]+' '+end.getDate();}
function todayMonday(){return getMondayStr(new Date().toISOString().slice(0,10));}
function nextMonday(){var d=new Date(todayMonday()+'T12:00:00');d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);}

function loadWeeks(){
  try{
    var raw=localStorage.getItem('mealPlannerWeekData');
    if(raw)weekData=JSON.parse(raw);
  }catch(e){}
  
  // Auto-rollover: check if the calendar has moved forward
  var currentMonday=todayMonday();
  var thisMonday=weekData['this'].monday||'';
  var nextMon=weekData['next'].monday||'';
  
  if(thisMonday && thisMonday!==currentMonday){
    // The real-world week has changed
    if(nextMon===currentMonday){
      // Next week's plan is now this week — shift it over
      weekData['this']={sel:JSON.parse(JSON.stringify(weekData['next'].sel||{})),monday:currentMonday};
      weekData['next']={sel:{},monday:nextMonday()};
    } else {
      // More than a week has passed, or dates don't match — reset both
      weekData['this']={sel:{},monday:currentMonday};
      weekData['next']={sel:{},monday:nextMonday()};
    }
    // Save the rollover
    try{localStorage.setItem('mealPlannerWeekData',JSON.stringify(weekData));}catch(e){}
  }
  
  // Ensure monday stamps are set
  if(!weekData['this'].monday)weekData['this'].monday=currentMonday;
  if(!weekData['next'].monday)weekData['next'].monday=nextMonday();
  
  // Load active week's selections into SEL
  var saved=weekData[activeWeek]&&weekData[activeWeek].sel||{};
  Object.keys(SEL).forEach(function(k){delete SEL[k];});
  Object.keys(saved).forEach(function(k){SEL[k]=saved[k];});
}
function saveWeeks(){
  weekData[activeWeek].sel=JSON.parse(JSON.stringify(SEL));
  weekData['this'].monday=todayMonday();
  weekData['next'].monday=nextMonday();
  try{localStorage.setItem('mealPlannerWeekData',JSON.stringify(weekData));}catch(e){}
}
function switchWeek(w){
  // Save current week's selections first
  saveWeeks();
  activeWeek=w;
  // Load the target week's selections
  var saved=weekData[activeWeek]&&weekData[activeWeek].sel||{};
  Object.keys(SEL).forEach(function(k){delete SEL[k];});
  Object.keys(saved).forEach(function(k){SEL[k]=saved[k];});
  renderWeekBar();renderDayTabs();renderMeals();
  if(topTab==='shop')renderShop();
}
function renderWeekBar(){
  var bar=document.getElementById('weekBar');if(!bar)return;
  var thisLabel=fmtWeekLabel(todayMonday());
  var nextLabel=fmtWeekLabel(nextMonday());
  bar.innerHTML='<div class="week-toggle">'
    +'<div class="week-pill'+(activeWeek==='this'?' on':'')+'" onclick="switchWeek(\'this\')">This week</div>'
    +'<div class="week-pill'+(activeWeek==='next'?' on':'')+'" onclick="switchWeek(\'next\')">Next week</div>'
    +'</div>';
}

// ── CLOUD SYNC ──────────────────────────────────────────────
var JSONBLOB_BASE='https://jsonblob.com/api/jsonBlob';
var syncId=null;var syncStatus='';
function loadSyncId(){try{syncId=localStorage.getItem('mealPlannerSyncId')||null;}catch(e){}}
function saveSyncIdLocal(id){syncId=id;try{localStorage.setItem('mealPlannerSyncId',id);}catch(e){}}
function setSyncStatus(msg,type){syncStatus='<span style="color:'+(type==='err'?'#DC2626':type==='ok'?'#059669':'var(--gray)')+'">'+msg+'</span>';var el=document.getElementById('syncStatusMsg');if(el)el.innerHTML=syncStatus;}
function getSyncPayload(){
  return {weekData:weekData,customMeals:customMeals,customIngredients:customIngredients,eatOutDB:EAT_OUT_DB,version:2};
}
// Get the default meal ID for a SEL key like "him_Monday_lunch"
function getDefaultForSlot(selKey){
  var parts=selKey.split('_');
  var p=parts[0],d=parts[1],s=parts.slice(2).join('_');
  return DEFAULTS[p]&&DEFAULTS[p][d]&&DEFAULTS[p][d][s]||null;
}
function mergeSyncData(remote){
  // Week data: merge per-slot, last-write-wins using timestamps
  if(remote.weekData){
    ['this','next'].forEach(function(w){
      if(!remote.weekData[w])return;
      if(!weekData[w])weekData[w]={sel:{},ts:{},monday:''};
      if(!weekData[w].ts)weekData[w].ts={};
      var remoteSel=remote.weekData[w].sel||{};
      var remoteTs=remote.weekData[w].ts||{};
      var localSel=weekData[w].sel;
      var localTs=weekData[w].ts;
      
      // All keys from both sides
      var allKeys={};
      Object.keys(remoteSel).forEach(function(k){allKeys[k]=true;});
      Object.keys(localSel).forEach(function(k){allKeys[k]=true;});
      
      Object.keys(allKeys).forEach(function(k){
        var localTime=localTs[k]||0;
        var remoteTime=remoteTs[k]||0;
        if(remoteTime>localTime){
          // Remote is newer — take it
          localSel[k]=remoteSel[k];
          localTs[k]=remoteTime;
        }
        // Otherwise keep local (it's newer or same)
      });
      
      weekData[w].sel=localSel;
      weekData[w].ts=localTs;
      if(remote.weekData[w].monday)weekData[w].monday=remote.weekData[w].monday;
    });
  }
  
  // Custom meals: merge by ID, don't overwrite existing
  if(remote.customMeals){
    Object.keys(remote.customMeals).forEach(function(k){
      if(!customMeals[k])customMeals[k]=remote.customMeals[k];
    });
  }
  
  // Custom ingredients: merge by key, don't overwrite existing
  if(remote.customIngredients){
    Object.keys(remote.customIngredients).forEach(function(k){
      if(!customIngredients[k]){
        customIngredients[k]=remote.customIngredients[k];
        NUTRI_DB[k]=remote.customIngredients[k];
      }
    });
  }
  
  // Eat-out DB: merge by name+restaurant, don't duplicate
  if(remote.eatOutDB){
    remote.eatOutDB.forEach(function(entry){
      var exists=EAT_OUT_DB.some(function(e){return e.name===entry.name&&e.restaurant===entry.restaurant;});
      if(!exists)EAT_OUT_DB.push(entry);
    });
  }
  
  // Reload active week into SEL
  var saved=weekData[activeWeek]&&weekData[activeWeek].sel||{};
  Object.keys(SEL).forEach(function(k){delete SEL[k];});
  Object.keys(saved).forEach(function(k){SEL[k]=saved[k];});
  
  saveWeeks();saveCustomMeals();saveCustomIngredients();saveEatOutDB();
  injectCustomMeals();DB_KEYS_BY_ROLE=null;renderWeekBar();
}

function createSync(){
  setSyncStatus('Creating shared sync...','loading');
  var payload=getSyncPayload();
  fetch(JSONBLOB_BASE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    var loc=r.headers.get('Location')||r.headers.get('location')||'';
    var id=loc.split('/').pop();
    if(!id)return r.json().then(function(d){return d.id||''});
    return id;
  }).then(function(id){
    if(!id){setSyncStatus('Could not get ID.','err');return;}
    saveSyncIdLocal(id);setSyncStatus('Sync created! Share the ID with your partner.','ok');renderSyncView();
  }).catch(function(e){setSyncStatus('Error: '+e.message,'err');});
}
function pushSync(){
  if(!syncId)return;
  setSyncStatus('Syncing...','loading');
  // Pull first, merge, then push — prevents overwriting partner's additions
  fetch(JSONBLOB_BASE+'/'+syncId).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  }).then(function(remote){
    // Merge remote into local first
    mergeSyncData(remote);
    // Now push the merged result
    var payload=getSyncPayload();
    return fetch(JSONBLOB_BASE+'/'+syncId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('Synced successfully!','ok');renderMeals();
  }).catch(function(e){setSyncStatus('Sync failed: '+e.message,'err');});
}
function pullSync(){
  if(!syncId)return;
  setSyncStatus('Pulling from cloud...','loading');
  fetch(JSONBLOB_BASE+'/'+syncId).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
    mergeSyncData(data);
    setSyncStatus('Pulled successfully!','ok');renderMeals();renderSyncView();
  }).catch(function(e){setSyncStatus('Pull failed: '+e.message,'err');});
}
function connectSyncId(){var el=document.getElementById('syncIdInput');if(!el||!el.value.trim())return;saveSyncIdLocal(el.value.trim());setSyncStatus('Connected! Now pull to get data.','ok');renderSyncView();}
function clearSyncId(){syncId=null;try{localStorage.removeItem('mealPlannerSyncId');}catch(e){}setSyncStatus('Disconnected.','ok');renderSyncView();}
function copyId(){if(syncId){navigator.clipboard.writeText(syncId).then(function(){setSyncStatus('ID copied!','ok');});}}
function toggleSyncPanel(){
  var sv=document.getElementById('syncView');
  var isVisible=sv.style.display!=='none';

  }
}
function renderSyncView(){
  var el=document.getElementById('syncView');if(!el)return;
  var html='<div style="padding:0 0 80px"><div class="sync-panel"><div class="sync-title">☁️ Cloud Sync</div>'
    +'<p style="font-size:13px;color:var(--gray);margin-bottom:10px">Create a shared sync ID once, share with your partner, then push/pull to keep both devices in sync.</p>';
  if(syncId){
    html+='<div style="font-size:12px;color:var(--gray);margin-bottom:4px">Your Sync ID (tap to copy):</div>'

  } else {
    html+='<div class="sync-row"><button class="sync-btn primary" onclick="createSync()">✦ Create new Sync ID</button></div>'

      +'<div class="sync-row"><input class="sync-input" id="syncIdInput" placeholder="Paste Sync ID here">'
      +'<button class="sync-btn primary" onclick="connectSyncId()">Connect</button></div>';
  }
  html+='<div id="syncStatusMsg" class="sync-status">'+syncStatus+'</div></div></div>';
  el.innerHTML=html;
}

var customMeals={};var editingRecipeId=null;var selectedSlots=[];

function saveCustomMeals(){try{localStorage.setItem('mealPlannerCustom',JSON.stringify(customMeals));}catch(e){}}
function injectCustomMeals(){
  for(var i=MEALS.length-1;i>=0;i--){if(MEALS[i]._custom)MEALS.splice(i,1);}
  Object.keys(customMeals).forEach(function(id){MEALS.push(Object.assign({},customMeals[id],{_custom:true}));});
}
function customMealId(label){return 'custom_'+label.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,40)+'_'+Date.now();}
function parseShoppingLines(text){
  if(!text||!text.trim())return[];
  return text.trim().split('\n').map(function(line){var parts=line.split('|').map(function(s){return s.trim();});return[parts[0]||'',parts[1]||'Pantry',parts[2]||'—',parts[3]||'—'];}).filter(function(r){return r[0];});
}
function parseStepsLines(text){
  if(!text||!text.trim())return[];
  return text.trim().split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
}
function buildCustomMeal(){
  var label=document.getElementById('rf_label').value.trim();
  if(!label){alert('Please enter a recipe name.');return null;}
  if(!selectedSlots.length){alert('Please select at least one slot.');return null;}
  var url=document.getElementById('rf_url').value.trim();
  var himOn=document.getElementById('rf_him_on').checked;
  var herOn=document.getElementById('rf_her_on').checked;
  var sharedSteps=parseStepsLines(document.getElementById('rf_steps').value);
  var ingr=collectFormIngredients('m');
  if(!ingr.length){alert('Please add at least one ingredient.');return null;}
  var shop=ingr.map(function(ing){
    var db=NUTRI_DB[ing.dbKey];
    var unit=db?db.unit:'';
    var qtyStr=ing.amt+(unit?' '+unit:'');
    var hQty=himOn?qtyStr:'—';
    var rQty=herOn?qtyStr:'—';
    return [ing.dbKey,isIfLow(ing.dbKey)?'Pantry':'Produce',hQty,rQty];
  });
  var him=null,her=null;
  if(himOn){him={ingredients:ingr,fv:'',shopping:shop,steps:sharedSteps};}
  if(herOn){her={ingredients:ingr,fv:'',shopping:shop,steps:sharedSteps};}
  if(!him&&!her){alert('Please add at least one ingredient for Him or Her.');return null;}
  var meal={id:editingRecipeId||customMealId(label),label:label,slots:selectedSlots.slice(),him:him,her:her,_custom:true};
  if(url)meal.sourceUrl=url;
  return meal;
}

// Build role->ingredients map from all meals
function buildRoleIngredients(){
  var map={protein:{},carb:{},fat:{},veg:{},sauce:{},fixed:{}};
  MEALS.forEach(function(m){
    ['him','her'].forEach(function(p){
      if(!m[p]||!m[p].ingredients)return;
      m[p].ingredients.forEach(function(ing){
        if(!ing.dbKey)return;
        var role=ing.role||'fixed';
        if(map[role])map[role][ing.dbKey]=true;
      });
    });
  });
  // Convert to sorted arrays
  var result={};
  Object.keys(map).forEach(function(role){
    result[role]=Object.keys(map[role]).sort();
  });
  // Unused DB keys only go into 'fixed' as a catch-all
  var allUsed={};
  Object.keys(result).forEach(function(r){result[r].forEach(function(k){allUsed[k]=true;});});
  var unused=Object.keys(NUTRI_DB).filter(function(k){return !allUsed[k];}).sort();
  unused.forEach(function(k){if(result.fixed.indexOf(k)<0)result.fixed.push(k);});
  result.fixed.sort();
  result.all=Object.keys(NUTRI_DB).sort();
  return result;
}

  var name=document.getElementById('rf_new_name').value.trim().toLowerCase();
  var kcal=Math.max(0,parseFloat(document.getElementById('rf_new_kcal').value)||0);
  var pro=Math.max(0,parseFloat(document.getElementById('rf_new_pro').value)||0);
  var fat=Math.max(0,parseFloat(document.getElementById('rf_new_fat').value)||0);
  var carb=Math.max(0,parseFloat(document.getElementById('rf_new_carb').value)||0);
  var unit=document.getElementById('rf_new_unit').value||'each';
  var role=document.getElementById('rf_new_role').value||'protein';
  if(!name){alert('Enter an ingredient name.');return;}
  if(NUTRI_DB[name]){alert(name+' already exists in the database.');return;}
  NUTRI_DB[name]={kcal:kcal,pro:pro,fat:fat,carb:carb,unit:unit};
  customIngredients[name]={kcal:kcal,pro:pro,fat:fat,carb:carb,unit:unit};
  saveCustomIngredients();
  DB_KEYS_BY_ROLE=null;
  // Add to role cache so it appears in filtered dropdowns immediately
  if(ROLE_INGR){
    if(!ROLE_INGR[role])ROLE_INGR[role]=[];
    ROLE_INGR[role].push(name);ROLE_INGR[role].sort();
    if(!ROLE_INGR.all)ROLE_INGR.all=[];
    ROLE_INGR.all.push(name);ROLE_INGR.all.sort();
  }
  alert('Added "'+name+'" to the database!');
  ['rf_new_name','rf_new_kcal','rf_new_pro','rf_new_fat','rf_new_carb'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('rf_new_unit').value='oz';
  document.getElementById('rf_new_role').value='protein';
}
function saveRecipe(){var meal=buildCustomMeal();if(!meal)return;customMeals[meal.id]=meal;saveCustomMeals();injectCustomMeals();closeRecipeForm();renderRecipesView();}
function editRecipe(id){editingRecipeId=id;var m=customMeals[id];if(!m)return;showRecipeForm(m);}
function deleteRecipe(id){if(!confirm('Delete "'+customMeals[id].label+'"?'))return;delete customMeals[id];saveCustomMeals();injectCustomMeals();renderRecipesView();}
function closeRecipeForm(){editingRecipeId=null;selectedSlots=[];renderRecipesView();}
function clearRecipeForm(){editingRecipeId=null;selectedSlots=[];renderRecipesView();}
function renderSlotChips(){
  var container=document.getElementById('rf_slots');if(!container)return;
  container.innerHTML=Object.keys(SLOT_NAMES).map(function(s){
    var on=selectedSlots.indexOf(s)>=0;
    return '<button class="rf-slot-chip'+(on?' on':'')+'" onclick="toggleSlot(\''+s+'\')">'+SLOT_NAMES[s]+'</button>';
  }).join('');
}
function toggleSlot(s){var idx=selectedSlots.indexOf(s);if(idx>=0)selectedSlots.splice(idx,1);else selectedSlots.push(s);renderSlotChips();}
function showRecipeForm(existing){
  document.getElementById('recipesListWrap').style.display='none';
  document.getElementById('recipeFormWrap').style.display='';
  selectedSlots=existing?existing.slots.slice():[];renderSlotChips();
  document.getElementById('rf_label').value=existing?existing.label:'';
  document.getElementById('rf_url').value=existing?(existing.sourceUrl||''):'';
  // Clear ingredient list
  document.getElementById('rf_ingr_list').innerHTML='';
  // Load ingredients from him (or her if him is null)
  var srcPort=existing?(existing.him||existing.her):null;
  if(srcPort&&srcPort.ingredients){
    srcPort.ingredients.forEach(function(ing){
      if(ing.dbKey)addIngrRow('m',ing.dbKey,ing.amt,ing.role);
    });
  }
  // Him/Her checkboxes
  document.getElementById('rf_him_on').checked=existing?!!existing.him:true;
  document.getElementById('rf_her_on').checked=existing?!!existing.her:true;
  // Shared steps
  var steps=srcPort?srcPort.steps:[];
  document.getElementById('rf_steps').value=(steps||[]).join('\n');
  updateFormMacros('m');
}
function renderRecipesView(){
  var el=document.getElementById('recipesView');if(!el)return;
  var listIds=Object.keys(customMeals);
  el.innerHTML='<div style="padding:0 0 80px">'
    +'<div id="recipeFormWrap" style="padding:12px 14px"><div class="recipe-form">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:12px">'+(editingRecipeId?'Edit Recipe':'New Recipe')+'</div>'
    +'<div class="rf-section">Basic Info</div>'
    +'<div class="rf-row"><div class="rf-label">Name</div><input class="rf-input" id="rf_label" placeholder="e.g. Teriyaki Salmon Bowl"></div>'
    +'<div class="rf-row"><div class="rf-label">Source</div><input class="rf-input" id="rf_url" type="url" placeholder="https://... (optional)"></div>'
    +'<div class="rf-section">Meal Slot</div><div class="rf-hint">Which slot(s) should this appear in?</div><div id="rf_slots" class="rf-slot-grid"></div>'
    +'<div class="rf-section" style="margin-top:16px">Ingredients</div>'
    +'<div class="rf-macro-total" id="rf_macros">0 kcal · P 0g · F 0g · C 0g</div>'
    +'<div id="rf_ingr_list"></div>'
    +'<button class="rf-add-ingr-btn" onclick="addIngrRow(\'m\')">+ Add Ingredient to New Recipe</button>'
    +'<div style="display:flex;gap:16px;margin-top:12px;margin-bottom:8px">'
    +'<label style="font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px"><input type="checkbox" id="rf_him_on" checked> Include for Him</label>'
    +'<label style="font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px"><input type="checkbox" id="rf_her_on" checked> Include for Her</label></div>'
    +'<div class="rf-section" style="margin-top:16px">Instructions <span style="font-weight:400;font-size:11px">(one per line)</span></div>'
    +'<textarea class="rf-ta" id="rf_steps" placeholder="Preheat oven to 400°F."></textarea>'
    +'<div style="margin-top:20px;padding:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm)">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="var el=document.getElementById(\'rf_new_db\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">'
    +'<div style="font-size:15px;font-weight:700;color:#94A3B8">Add New Ingredient to Database</div>'
    +'<span style="font-size:12px;color:var(--shop);font-weight:600">▸ expand</span></div>'
    +'<div id="rf_new_db" style="display:none;margin-top:10px">'
    +'<div style="font-size:12px;color:var(--text-mid);margin-bottom:10px">Add an ingredient that isn\'t already in the dropdown.</div>'
    +'<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Ingredient Name</div><input class="rf-input" id="rf_new_name" placeholder="e.g. tempeh" style="width:100%"></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px">'
    +'<div style="flex:1"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Unit</div><select class="rf-input" id="rf_new_unit" style="width:100%"><option value="oz">oz</option><option value="cup">cup</option><option value="tbsp">tbsp</option><option value="tsp">tsp</option><option value="each">each</option><option value="scoop">scoop</option><option value="slice">slice</option></select></div>'
    +'<div style="flex:1"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Role</div><select class="rf-input" id="rf_new_role" style="width:100%"><option value="protein">protein</option><option value="carb">carb</option><option value="fat">fat</option><option value="veg">veg</option><option value="sauce">sauce</option><option value="fixed">fixed</option></select></div></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:10px">'
    +'<div style="flex:1"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Kcal</div><input class="rf-input" id="rf_new_kcal" type="number" min="0" placeholder="0" style="width:100%"></div>'
    +'<div style="flex:1"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Protein</div><input class="rf-input" id="rf_new_pro" type="number" min="0" placeholder="0" style="width:100%"></div>'
    +'<div style="flex:1"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Fat</div><input class="rf-input" id="rf_new_fat" type="number" min="0" placeholder="0" style="width:100%"></div>'
    +'<div style="flex:1"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-mid);margin-bottom:3px">Carbs</div><input class="rf-input" id="rf_new_carb" type="number" min="0" placeholder="0" style="width:100%"></div></div>'
    +'<button class="rf-save" style="width:100%;padding:10px;font-size:13px" onclick="addNewDbIngredient()">+ Add to Database</button></div></div>'
    +'<div class="rf-actions"><button class="rf-cancel" onclick="clearRecipeForm()">Clear</button>'
    +'<button class="rf-save" onclick="saveRecipe()">Save Recipe</button></div></div></div>'
    +(listIds.length>0
      ?'<div style="padding:14px"><div style="font-size:16px;font-weight:700;margin-bottom:10px">Saved Recipes</div>'
      +listIds.map(function(id){
        var m=customMeals[id];var slotNames=m.slots.map(function(s){return SLOT_NAMES[s]||s;}).join(', ');
        var macroSum='';
        if(m.him&&m.him.ingredients&&m.him.ingredients.length&&m.him.ingredients[0].dbKey){
          var mc=computeMacros(m.him.ingredients);macroSum=mc.kcal+' kcal · '+mc.pro+'g protein';
        }
        return '<div class="recipe-list-item"><div style="flex:1"><div class="rli-label">'+m.label+'</div><div class="rli-meta">'+slotNames+(macroSum?' · '+macroSum:'')+'</div>'
          +(m.sourceUrl?'<a href="'+m.sourceUrl+'" target="_blank" style="font-size:11px;color:var(--shop)">View source ↗</a>':'')
          +'</div><button class="rli-btn edit" onclick="editRecipe(\''+id+'\')">Edit</button>'
          +'<button class="rli-btn del" onclick="deleteRecipe(\''+id+'\')">Delete</button></div>';
      }).join('')+'</div>'
      :'')
    +'</div>';
  renderSlotChips();
  // Add one starter ingredient row if not editing
  if(!editingRecipeId){
    addIngrRow('m');
  }
  if(editingRecipeId&&customMeals[editingRecipeId]){showRecipeForm(customMeals[editingRecipeId]);}
}

// ── INIT ────────────────────────────────────────────────────
loadSyncId();loadCustomIngredients();loadWeeks();renderWeekBar();
loadCustomMeals();loadEatOutDB();
MEALS.forEach(function(m){buildColorizedSteps(m);});
renderDayTabs();renderMeals();

</script>
