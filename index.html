// ── Calorie Adjustment ──────────────────────────────────────
var CAL_BASE=lsGet('mealPlannerCalBase',{him:2800,her:1900});
var PRO_TARGET=lsGet('mealPlannerProTarget',{him:180,her:120});
// Macro ratio limits: carbs < 50% of kcal calories, fat < 30% of kcal calories
var MACRO_LIMITS={maxFatPct:0.30}; // carbPct threshold is hardcoded in balanceDayMacros; no live reads of MACRO_LIMITS.maxCarbPct.
// Ingredients the randomizer should avoid unless needed for macros/waste.
// Phase 1 scoring adds a strong penalty per meal containing any of these
// (3000/meal dominates typical calDiff). Reroll/swap phases filter them
// from candidate pools via `mealUsesDiscouraged` so only Phase 1 primary
// selection can introduce them — keeps them truly rare.
var DISCOURAGED_INGREDIENTS=['coconut milk'];
function mealUsesDiscouraged(mealOrId){
  var m = (typeof mealOrId === 'string') ? getMeal(mealOrId) : mealOrId;
  if(!m || !m.ingredients) return false;
  return m.ingredients.some(function(i){ return DISCOURAGED_INGREDIENTS.indexOf(i.dbKey) >= 0; });
}

// Build macro hints for the calorie adjuster based on person, day, slot
function buildMacroHints(p,d,s){
  if(!SLOT_BUDGET[s])return null;
  if(!PRO_TARGET[p])return null;
  return {
    slotKcalBudget:getSlotBudget(p,d,s),
    maxFatPct:MACRO_LIMITS.maxFatPct
  };
}

// ─── DAY-LEVEL MACRO BALANCER ───────────────────────────────
// After per-slot adjustments, swap ingredients across slots to hit daily
// protein/carb/fat targets. Each swap is calorie-neutral (+X of macro A,
// -X kcal of macro B). Prefers non-package items so the waste optimizer
// stays intact.
var _dayBalancedCache={};
function invalidateDayBalancedCache(){for(const k in _dayBalancedCache)delete _dayBalancedCache[k];}

function getDayBalancedIngredients(p,d){
  const key=pk(p,d);
  if(_dayBalancedCache[key])return _dayBalancedCache[key];
  const slots={};
  const frozenSlots={};
  const leftovers=computeLeftovers();

  // Classify leftover slots: same-day vs different-day.
  // Same-day leftovers are NOT added to slots before the balancer — the
  // balancer counts them via sameDayCookServings so it always sees the
  // live cook-slot amounts. Different-day leftovers are pinned from
  // their (already cached) cook day and frozen.
  const sameDayLeftovers={}; // leftover slot -> cook slot
  const diffDayLeftovers={}; // leftover slot -> {lo, mealId}
  const sameDayCookServings={}; // cook slot -> total servings (cook + same-day leftovers)
  SLOTS.forEach(function(s){
    if(s==='shake'||s==='late_snack')return;
    const selKey=sk(p,d,s);
    if(SKIPPED[selKey]||EAT_OUT[selKey])return;
    const lo=leftovers[selKey];
    if(!lo||!lo.isLeftover||lo.crossPerson)return;
    const port=getPort(p,d,s);if(!port)return;
    const ingr=applyOverrides(port,p,d,s);
    if(!ingr||!ingr.length||ingr[0].dbKey===undefined)return;
    const mealId=getMealId(p,d,s);
    if(lo.cookDay===d){
      // Same-day leftover: find the cook slot on this day
      ['breakfast','lunch','dinner','snack'].forEach(function(cs){
        if(sameDayLeftovers[s])return;
        if(getMealId(p,d,cs)===mealId){
          var clo=leftovers[sk(p,d,cs)];
          if(clo&&!clo.isLeftover){
            sameDayLeftovers[s]=cs;
            sameDayCookServings[cs]=(sameDayCookServings[cs]||1)+1;
          }
        }
      });
    } else {
      diffDayLeftovers[s]={lo:lo, mealId:mealId};
    }
  });

  // Pass 1: non-leftover slots (cook days, normal slots, shakes).
  // Same-day leftovers are excluded — handled after the balancer.
  SLOTS.forEach(function(s){
    if(s==='late_snack')return;
    if(sameDayLeftovers[s]||diffDayLeftovers[s])return;
    const selKey=sk(p,d,s);
    if(SKIPPED[selKey]||EAT_OUT[selKey])return;
    const port=getPort(p,d,s); if(!port)return;
    const ingr=applyOverrides(port,p,d,s);
    if(!ingr||!ingr.length||ingr[0].dbKey===undefined)return;
    const lo=leftovers[selKey];

    // Shake: raw amounts, no adjustment. Frozen so balancer doesn't touch.
    if(s==='shake'){
      slots[s]=ingr.map(function(i){
        return {dbKey:i.dbKey,amt:i.amt,role:i.role,scalable:i.scalable,origAmt:i.amt};
      });
      frozenSlots[s]=true;
      return;
    }

    // For dinner: compute target from actual amounts already in slots
    // (including frozen leftovers and same-day cook multipliers) rather than
    // the standalone getSlotAdjustment which recomputes everything from scratch
    // and doesn't know about leftover context.
    var slotAdj;
    if(s==='dinner'&&(p==='him'||p==='her')&&getAdjTargets(p,d).dinner){
      var othersKcal=0;
      // Sum all slots already computed in this pass
      Object.keys(slots).forEach(function(s2){
        var mult=sameDayCookServings[s2]||1;
        slots[s2].forEach(function(i){
          var db=NUTRI_DB[i.dbKey];if(db)othersKcal+=db.kcal*i.amt*mult;
        });
      });
      // Add different-day leftovers not yet materialized
      Object.keys(diffDayLeftovers).forEach(function(s2){
        if(s2==='dinner')return;
        var info=diffDayLeftovers[s2];
        var cdSlots=getDayBalancedIngredients(p,info.lo.cookDay);
        if(!cdSlots)return;
        var cs=null;
        ['breakfast','lunch','dinner','snack'].forEach(function(c){
          if(cs)return;
          if(getMealId(p,info.lo.cookDay,c)===info.mealId){
            var clo=leftovers[sk(p,info.lo.cookDay,c)];
            if(clo&&!clo.isLeftover&&cdSlots[c])cs=c;
          }
        });
        if(cs){cdSlots[cs].forEach(function(i){
          var db=NUTRI_DB[i.dbKey];if(db)othersKcal+=db.kcal*i.amt;
        });}
      });
      // Add same-day leftover slots of non-dinner cook slots (already counted via mult above)
      // Add eat-outs and late snack
      SLOTS.forEach(function(s2){
        if(EAT_OUT[sk(p,d,s2)])othersKcal+=(EAT_OUT[sk(p,d,s2)].kcal||0);
      });
      var lsn=LATE_SNACK[pk(p,d)];
      if(lsn)othersKcal+=(lsn.kcal||0);
      var dinnerBase=computeMacros(ingr).kcal;
      slotAdj=CAL_BASE[p]-othersKcal-dinnerBase;
      if(Math.abs(slotAdj)<=10)slotAdj=0;
    } else {
      slotAdj=getSlotAdjustment(p,d,s);
    }
    const hints=buildMacroHints(p,d,s);
    // 2026-04-29: leftover slots that belong to a multi-portion batch must
    // use the BATCH's totalServings (not 1) so adjustIngredients's mts-aware
    // bound logic (`_effMin`/`_effMax`) treats them as part of a shared/
    // leftover cook, not as solo. Without this, _effMin returns minAmtSolo
    // for cross-person leftover slots — which clamps post-freeze pinned
    // amounts UP to minAmtSolo and breaks ratio uniformity (the freeze's
    // bound check uses db.minAmt, but rebuild's clamp uses minAmtSolo →
    // mismatch fires INV7). Find the cook anchor's totalServings by
    // scanning the leftover map for an anchor whose `portions` includes
    // this slot.
    let mts;
    if(lo && !lo.isLeftover){
      mts = lo.totalServings || lo.servings || 1;
    } else if(lo && lo.isLeftover){
      mts = 1;
      const myKey = sk(p,d,s);
      for(const ak in leftovers){
        const al = leftovers[ak];
        if(!al || al.isLeftover || !al.portions) continue;
        if(al.portions.some(function(pt){return sk(pt.p,pt.d,pt.s)===myKey;})){
          mts = al.totalServings || al.servings || 1;
          break;
        }
      }
    } else {
      mts = 1;
    }
    // Always route through adjustIngredients — even when slotAdj=0, its
    // early-return branches apply the minAmt/maxAmt clamp so INV13 holds.
    const adj=adjustIngredients(ingr,slotAdj,s,hints,mts);
    // Look up base recipe amounts (kept for reference — used downstream by
    // unify's veg-floor logic and freeze's bound checks via recipeAmt).
    var mealDef=getMeal(getMealId(p,d,s));
    var baseAmts={};
    if(mealDef&&mealDef.ingredients)mealDef.ingredients.forEach(function(ri){baseAmts[ri.dbKey]=ri.amt;});
    // 2026-04-29: removed the veg/fruit recipe-base pin. The pin was forcing
    // veg/fruit to recipeAmt regardless of adjustIngredients output, which
    // (a) broke unify's kcal-prop ratios on cross-person batches because
    //     veg ratio stayed at 1.0 while scalable items hit the budget ratio,
    // (b) clobbered freezeTripTotals's pinned amounts on cache rebuild —
    //     freeze writes a scalable:false override, but the rebuild reset
    //     veg/fruit back to recipe base, leaving INV7 firing on frozen
    //     produce.
    // adjustIngredients now scales veg/fruit like other scalable items;
    // db.minAmt (with db.minAmtSolo for single-portion cooks) handles
    // per-portion floors and db.maxAmt handles ceilings inside adjust-
    // Ingredients itself. boostFV / boostBatchVegForDailyTarget still
    // grow veg upward when the daily veg target is missed.
    slots[s]=adj.map(function(a){
      var amt=a.newAmt;
      var recipeAmt=baseAmts[a.ing.dbKey]||a.ing.amt;
      return {dbKey:a.ing.dbKey, amt:amt, role:a.ing.role,
              scalable:a.ing.scalable, origAmt:a.ing.amt, recipeAmt:recipeAmt};
    });

    // Per-slot budget enforcement: if the slot exceeds its budget by >50 kcal
    // (from snap rounding, veg boosts, etc.), trim fat then carb to fit.
    // This prevents lunch/snack overages from crushing dinner's residual.
    if(s!=='dinner'&&s!=='shake'&&SLOT_BUDGET[s]){
      var slotBudget=getSlotBudget(p,d,s);
      var slotKcal=0;
      slots[s].forEach(function(i){var db=NUTRI_DB[i.dbKey];if(db)slotKcal+=db.kcal*i.amt;});
      var slotOver=slotKcal-slotBudget;
      if(slotOver>50){
        var trimRoles=['fat','carb','protein'];
        for(var ri=0;ri<trimRoles.length&&slotOver>20;ri++){
          for(var si=0;si<slots[s].length&&slotOver>20;si++){
            var item=slots[s][si];
            if(item.role!==trimRoles[ri]||item.scalable===false)continue;
            var db=NUTRI_DB[item.dbKey];if(!db)continue;
            var grid=db.unit==='oz'?1:db.unit==='cup'?0.25:db.unit==='tbsp'?0.5:1;
            if(db.wholeOnly)grid=1;
            var minAmt=item.role==='fat'?0.25:(item.origAmt||item.amt)*0.3;
            if(db.minAmt&&db.minAmt>minAmt)minAmt=db.minAmt;
            // Snap minAmt UP to grid — sub-grid floors (e.g. 0.075c from
            // 0.3 × 0.25) are not cookable/shoppable and trip INV8.
            var minSnap=Math.ceil(minAmt/grid)*grid;
            if(minSnap>minAmt)minAmt=minSnap;
            while(slotOver>20&&item.amt>minAmt+grid*0.5){
              item.amt-=grid;
              if(item.amt<minAmt)item.amt=minAmt;
              slotOver-=db.kcal*grid;
            }
          }
        }
      }
    }
  });

  // Pass 2: different-day leftover slots — pinned from cook day's cache.
  Object.keys(diffDayLeftovers).forEach(function(s){
    var info=diffDayLeftovers[s];
    var cookDaySlots=getDayBalancedIngredients(p,info.lo.cookDay);
    if(!cookDaySlots){return;}
    var cookSlot=null;
    ['breakfast','lunch','dinner','snack'].forEach(function(cs){
      if(cookSlot)return;
      if(getMealId(p,info.lo.cookDay,cs)===info.mealId){
        var clo=leftovers[sk(p,info.lo.cookDay,cs)];
        if(clo&&!clo.isLeftover&&cookDaySlots[cs])cookSlot=cs;
      }
    });
    if(cookSlot){
      slots[s]=cookDaySlots[cookSlot].map(function(i){
        return {dbKey:i.dbKey,amt:i.amt,role:i.role,
                scalable:i.scalable,origAmt:i.origAmt};
      });
      frozenSlots[s]=true;
    }
  });

  // Day-level macro balancing. sameDayCookServings tells the balancer to
  // count same-day cook slots × total servings (the leftover tracks the
  // cook slot live, so the balancer always has the true daily picture).
  balanceDayMacros(p,d,slots,frozenSlots,sameDayCookServings);

  // Post-balancer: materialize same-day leftovers as copies of their
  // (now finalized) cook slot.
  function materializeSameDayLeftovers(){
    Object.keys(sameDayLeftovers).forEach(function(s){
      var cs=sameDayLeftovers[s];
      if(slots[cs]){
        slots[s]=slots[cs].map(function(i){
          return {dbKey:i.dbKey,amt:i.amt,role:i.role,
                  scalable:i.scalable,origAmt:i.origAmt};
        });
      }
    });
  }
  materializeSameDayLeftovers();

  // (Post-balancer calorie correction removed — the new balanceDayMacros
  // restructure with P0 kcal-gap priority + multi-priority-per-pass closes
  // the day kcal gap iteratively within the balancer itself. The old role-
  // group scale pass was redundant on Test 1, and on Test 2 actively hurt
  // INV6 by 54 fires / 4 veg misses — the role-group scaling bypassed
  // per-serving grid alignment and distorted unified batch ratios on days
  // it fired. Confirmed dead by A/B on 2×100-run stress.)

  _dayBalancedCache[key]=slots;
  return slots;
}

function getBalancedSlotIngredients(p,d,s){
  const all=getDayBalancedIngredients(p,d);
  return all[s]||null;
}

function balanceDayMacros(p,d,slots,frozenSlots,sameDayCookServings){
  frozenSlots=frozenSlots||{};
  sameDayCookServings=sameDayCookServings||{};
  // Solo-slot map for this (p,d) so bestTrim respects minAmtSolo (pan-oil
  // floor, aromatic quality) and doesn't trim avocado oil below 0.5 in a
  // solo breakfast, etc. computeLeftovers() is cached — cheap repeat call.
  var _lvMap = computeLeftovers();
  function _isSoloSlot(s){
    var lo = _lvMap[sk(p,d,s)];
    var mts = (lo && !lo.isLeftover) ? (lo.totalServings || lo.servings || 1) : 1;
    return mts === 1;
  }
  function _trimFloor(db, slot){
    if(!db) return 0;
    if(_isSoloSlot(slot) && typeof db.minAmtSolo === 'number') return db.minAmtSolo;
    return (typeof db.minAmt === 'number') ? db.minAmt : 0;
  }
  // Solo-aware per-serving ceiling for bestAdd (P0 under-case + P1/P2/P3
  // protein-add). Oils (maxAmtSolo=1 tbsp) and milk (maxAmtSolo=1 cup) must
  // not be boosted past their solo caps on single-portion slots, even though
  // their batch-context maxAmt is higher. Mirrors _trimFloor.
  function _addCeil(db, slot){
    if(!db) return Infinity;
    if(_isSoloSlot(slot) && typeof db.maxAmtSolo === 'number') return db.maxAmtSolo;
    return (typeof db.maxAmt === 'number') ? db.maxAmt : Infinity;
  }
  const proTarget=PRO_TARGET[p]||0;
  if(!proTarget)return;

  function dailyMacros(){
    let kcal=0,pro=0,fat=0,carb=0;
    // Shake, adjusted slots, and frozen leftovers are all in slots now.
    // Same-day leftovers are NOT in slots — count them via cook slot × servings.
    Object.keys(slots).forEach(function(s){
      var mult=sameDayCookServings[s]||1;
      slots[s].forEach(function(i){
        const db=NUTRI_DB[i.dbKey]; if(!db)return;
        kcal+=db.kcal*i.amt*mult;pro+=db.pro*i.amt*mult;
        fat+=db.fat*i.amt*mult;carb+=db.carb*i.amt*mult;
      });
    });
    SLOTS.forEach(function(s){
      const eo=EAT_OUT[sk(p,d,s)];
      if(eo){kcal+=eo.kcal||0;pro+=eo.pro||0;fat+=eo.fat||0;carb+=eo.carb||0;}
    });
    const ls=LATE_SNACK[pk(p,d)];
    if(ls){kcal+=ls.kcal||0;pro+=ls.pro||0;fat+=ls.fat||0;carb+=ls.carb||0;}
    return {kcal:kcal,pro:pro,fat:fat,carb:carb};
  }

  function incrementFor(db){
    if(db.wholeOnly)return 1;
    if(db.unit==='cup')return 0.25;
    if(db.unit==='tbsp')return 0.5;
    if(db.unit==='each')return 0.25;
    if(db.unit==='oz')return 1;
    return 1;
  }

  function itemsByRole(role, ignoreScalableFalse){
    const out=[];
    Object.keys(slots).forEach(function(s){
      if(frozenSlots[s])return; // leftover slots: pre-cooked, can't modify
      slots[s].forEach(function(i,idx){
        if(!ignoreScalableFalse && i.scalable===false)return;
        if(role&&i.role!==role)return;
        const db=NUTRI_DB[i.dbKey]; if(!db)return;
        const isPkg=!!(db.pkg&&!db.pkg.longShelfLife);
        out.push({slot:s,idx:idx,db:db,cur:i.amt,isPkg:isPkg,role:i.role,origAmt:i.origAmt,recipeAmt:i.recipeAmt,dbKey:i.dbKey,scalable:i.scalable});
      });
    });
    return out;
  }

  // Compute daily veg/fruit in cup-equivalents (same conversion as computeDailyFV)
  function dailyFV(){
    let veg=0, fruit=0;
    Object.keys(slots).forEach(function(s){
      // Same-day cook slots feed multiple servings — count all of them
      var mult=sameDayCookServings[s]||1;
      slots[s].forEach(function(i){
        const db=NUTRI_DB[i.dbKey]; if(!db)return;
        let cups=0;
        if(db.unit==='cup')cups=i.amt;
        else if(db.unit==='each'&&typeof db.cupsEach==='number')cups=i.amt*db.cupsEach;
        if(i.role==='veg')veg+=cups*mult;
        else if(i.role==='fruit')fruit+=cups*mult;
      });
    });
    return {veg:veg,fruit:fruit};
  }

  function bestAdd(role, trimKcalStep, slotFilter){
    // Highest pro/kcal (for protein) or lowest kcal/g of macro (for other roles).
    // Non-pkg first. `trimKcalStep` is the kcal-per-step of the trim that will
    // pair with this add (priority 1/2/3 all do a swap). When provided, we:
    //   1. Skip items whose kcal-per-step exceeds 2× the trim's step. Keeps
    //      each swap close to kcal-neutral — prevents runaway inflation when a
    //      wholeOnly item (e.g. rxbar, +180 kcal/step) would be paired with a
    //      small trim (e.g. -0.25c rice, -54 kcal/step) for a net +126 kcal.
    //   2. Skip items whose slot would exceed its budget by >50% after the
    //      add. Prevents actively destroying a slot (e.g. tripling a snack
    //      that's already at 115% budget) while chasing daily protein.
    // Dinner and shake are exempt from the slot-budget cap (dinner absorbs
    // residual daily kcal; shake is frozen so it can't be picked anyway).
    // Protein powder is excluded from protein boosts — user preference: real
    // food choices only, not a supplement loophole.
    // slotFilter (optional): restrict picks to named slots (e.g.
    //   ['breakfast','lunch','dinner']). P0 kcal-gap priority uses this to
    //   keep snack untouched — snack is handled at end-of-pipeline via
    //   rerollKcalOffSnacks, not here.
    const allRaw=itemsByRole(role);
    const all = slotFilter
      ? allRaw.filter(function(x){return slotFilter.indexOf(x.slot) !== -1;})
      : allRaw;
    const nonPkg=all.filter(function(x){return !x.isPkg;});
    let pool=nonPkg.length?nonPkg:all;
    if(role==='protein'){
      pool=pool.filter(function(x){return x.dbKey!=='protein powder';});
      pool.sort(function(a,b){
        const ra=a.db.kcal>0?a.db.pro/a.db.kcal:0;
        const rb=b.db.kcal>0?b.db.pro/b.db.kcal:0;
        return rb-ra;
      });
    }
    for(let i=0;i<pool.length;i++){
      const item=pool[i];
      const pInc=incrementFor(item.db);
      // Cap 1: step kcal within 2× trim step kcal (when trim provided)
      if(typeof trimKcalStep==='number' && trimKcalStep>0){
        if(pInc*item.db.kcal > trimKcalStep*2) continue;
      }
      // Cap 2: slot budget sanity (non-dinner, non-shake slots)
      if(item.slot!=='dinner' && item.slot!=='shake' && SLOT_BUDGET[item.slot]){
        const slotBudget=getSlotBudget(p,d,item.slot);
        if(slotBudget>0){
          let slotKcal=0;
          slots[item.slot].forEach(function(si,sidx){
            const sdb=NUTRI_DB[si.dbKey]; if(!sdb) return;
            const amt = sidx===item.idx ? (si.amt + pInc) : si.amt;
            slotKcal += sdb.kcal * amt;
          });
          if(slotKcal > slotBudget*1.5) continue;
        }
      }
      // Cap 3: per-serving maxAmt (INV13 threshold), solo-aware via _addCeil.
      // Prevents balancer from pushing egg white past 1c, oils past 1 tbsp
      // on solo slots (maxAmtSolo), protein powder past 1.5 scoops, etc.
      var _ceil = _addCeil(item.db, item.slot);
      if(isFinite(_ceil) && (item.cur + pInc) > _ceil) continue;
      return item;
    }
    return null;
  }

  function bestTrim(roles, slotFilter){
    // Highest-kcal-contribution to trim, non-pkg first.
    // slotFilter (optional): restrict to named slots (e.g.
    //   ['breakfast','lunch','dinner']). P0 kcal-gap priority uses this so
    //   snack/shake stay untouched.
    const all=[];
    roles.forEach(function(r){
      itemsByRole(r).forEach(function(x){
        if(slotFilter && slotFilter.indexOf(x.slot) === -1) return;
        all.push(x);
      });
    });
    const nonPkg=all.filter(function(x){return !x.isPkg;});
    const pool=nonPkg.length?nonPkg:all;
    pool.sort(function(a,b){return (b.db.kcal*b.cur)-(a.db.kcal*a.cur);});
    for(let i=0;i<pool.length;i++){
      const t=pool[i];
      if(t.role==='veg'||t.role==='fruit')continue; // never trim veg/fruit
      const dec=incrementFor(t.db);
      const newAmt=t.cur-dec;
      if(newAmt<0)continue;
      if(t.role==='fat'&&newAmt<0.25)continue;
      if(t.role!=='fat'&&newAmt<(t.origAmt||0)*0.3)continue;
      // Use solo-aware floor: minAmtSolo when applicable (e.g. avocado oil 0.5
      // in solo slots), else minAmt. Without this, a solo breakfast could trim
      // avocado oil to 0.125 — below the pan-sauté floor.
      const _tf = _trimFloor(t.db, t.slot);
      if(_tf && newAmt < _tf) continue;
      return {item:t,dec:dec};
    }
    return null;
  }

  // Helper: scale up an existing veg/fruit ingredient by one increment
  // (bypassing scalable:false — veg/fruit ingredients in recipes are flagged
  // not-scalable so the calorie adjuster doesn't scale them, but the
  // day-level balancer CAN scale them UP to meet the daily fv floor).
  function boostFV(role, slotFilter){
    // Cap at 3× original recipe amount (4× for leaf veg: spinach/kale/bok choy,
    // all <35 kcal/cup — extra headroom for days with frozen high-kcal batches
    // that leave little room for daily veg boost).
    // slotFilter (optional): restrict to named slots. Used by P4 to avoid
    // touching snack (handled at end-of-pipeline).
    const items=itemsByRole(role, true).filter(function(x){
      if(slotFilter && slotFilter.indexOf(x.slot) === -1) return false;
      if(x.db.unit!=='cup' && !(x.db.unit==='each' && x.db.cupsEach))return false;
      // 2026-04-29: skip FREEZE-set frozen items. boostFV grew frozen veg
      // by 0.25c increments, which (a) pushed trip totals off perWhole and
      // (b) created post-rebuild ratios that didn't match what freeze locked
      // — INV7 fired because frozen items were rewritten asymmetrically
      // across cross-person batches.
      if(x.scalable===false &&
         (ROUND_PKG_ITEMS.indexOf(x.dbKey) >= 0 ||
          ROUND_PRODUCE_ITEMS.indexOf(x.dbKey) >= 0)) return false;
      var baseAmt=x.recipeAmt||x.origAmt||x.cur;
      var isLeaf=(x.dbKey==='baby spinach'||x.dbKey==='kale'||x.dbKey==='bok choy');
      // Per-ingredient maxAmt (when defined) takes precedence. Fallback:
      // baseAmt × (4 leaf, 3 other) — used only if maxAmt isn't set.
      var relativeMax=baseAmt*(isLeaf?4:3);
      var absoluteMax=(x.db.maxAmt!=null)?x.db.maxAmt:relativeMax;
      var maxAmt=Math.min(relativeMax, absoluteMax);
      if(x.cur>=maxAmt)return false;
      return true;
    });
    if(!items.length)return null;
    // Pick cheapest-kcal-per-cup (so adding veg/fruit minimizes calorie cost)
    items.sort(function(a,b){
      const cupKcalA=a.db.unit==='cup'?a.db.kcal:(a.db.kcal/(a.db.cupsEach||1));
      const cupKcalB=b.db.unit==='cup'?b.db.kcal:(b.db.kcal/(b.db.cupsEach||1));
      return cupKcalA-cupKcalB;
    });
    const item=items[0];
    const inc=incrementFor(item.db);
    return {item:item, inc:inc};
  }

  // Carb floor (40%): when daily carb% is already below floor, P1 restricts
  // trim candidates to fat only (doesn't trim carb further). Prevents
  // runaway rice/pasta trims when chasing protein on a carb-short day.
  const carbFloor = 0.40;
  // Balancer scope: breakfast/lunch/dinner only. Snack is handled at
  // end-of-pipeline by rerollKcalOffSnacks; shake is frozen.
  const CAL_SLOTS = ['breakfast','lunch','dinner'];

  // Each outer iteration is one "pass" through all 5 priorities in order.
  // Unlike the original if/else-if chain, a single pass can fire multiple
  // priorities — each one recomputes dailyMacros() fresh before deciding
  // whether to act. If a priority fails (no viable trim/add), it's skipped
  // for this pass but stays eligible next pass. The loop exits when a full
  // pass produces zero mutations, or when thrash is detected.
  // Thrash = last 6 pass signatures form A-B-A-B-A-B (3 full back-and-forth
  // cycles on the same pair of mutations). Safety cap 40 passes.
  // Helper: capture the ingredient's current kcal for mutation signature
  // so a trim-then-add-back pattern shows up as identical opposite mutations.
  function _mutSig(slot, dbKey, delta){
    var sign = delta > 0 ? '+' : '-';
    return slot + ':' + dbKey + ':' + sign + Math.abs(delta).toFixed(3);
  }

  const passSignatures = [];
  let safety = 40;
  while(safety-- > 0){
    const passMutations = [];
    let changed = false;

    // Shared per-pass state — refreshed after every mutation so any priority
    // downstream reads current macros, never stale. All derived values
    // (carbPct, fatPct, proGap, calGap0, vegGap) come from the same t/fv.
    let t, mk, carbPct, fatPct, proGap, calGap0, fv, vegGap;
    function refreshMacros(){
      t = dailyMacros();
      mk = t.pro*4 + t.fat*9 + t.carb*4;
      carbPct = mk >= 1 ? (t.carb*4)/mk : 0;
      fatPct  = mk >= 1 ? (t.fat*9)/mk : 0;
      proGap = proTarget - t.pro;
      calGap0 = CAL_BASE[p] ? (CAL_BASE[p] - t.kcal) : 0;
      fv = dailyFV();
      vegGap = 2.75 - fv.veg; // 2026-05-03: lowered from 3 — accepted veg range
    }
    refreshMacros();

    function applyDelta(slot, idx, newAmt){
      const cur = slots[slot][idx].amt;
      const delta = newAmt - cur;
      if(Math.abs(delta) < 1e-9) return;
      passMutations.push(_mutSig(slot, slots[slot][idx].dbKey, delta));
      slots[slot][idx].amt = newAmt;
      changed = true;
      refreshMacros();  // every priority downstream sees current state
    }

    // ── Priority 0: day kcal off target by >100 ──
    // Single-direction (non-neutral) correction. Threshold 100 matches the
    // primary kcal goal tolerance. Per-slot adjustIngredients scales to slot
    // kcal; skip-if-close thresholds + snap + leftover freezing can leave the
    // day total off. P0 closes this gap via one grid-step trim/boost in BLD.
    if(Math.abs(calGap0) > 100){
      if(calGap0 < 0){
        // Over target: trim one grid step. Order fat → carb → protein.
        const trim = bestTrim(['fat'], CAL_SLOTS)
                  || bestTrim(['carb'], CAL_SLOTS)
                  || bestTrim(['protein'], CAL_SLOTS);
        if(trim) applyDelta(trim.item.slot, trim.item.idx, trim.item.cur - trim.dec);
      } else {
        // Under target: boost one grid step. Order protein → carb → other → fat.
        const order = ['protein','carb','other','fat'];
        let added = null;
        for(let oi=0; oi<order.length && !added; oi++){
          added = bestAdd(order[oi], null, CAL_SLOTS);
        }
        if(added) applyDelta(added.slot, added.idx, added.cur + incrementFor(added.db));
      }
    }

    // ── Priority 1: protein shortfall ──
    // Cal-neutral swap (+pro / -fat or -carb). 7g threshold — smaller gaps
    // are acceptable variance; balancer effort on borderline cases often
    // spikes fat% or kcal without closing the gap meaningfully.
    if(mk >= 1 && proGap > 7){
      const trimRoles = (carbPct <= carbFloor) ? ['fat'] : ['fat','carb'];
      const trim = bestTrim(trimRoles, CAL_SLOTS);
      if(trim){
        const trimKcalStep = trim.dec * trim.item.db.kcal;
        const pItem = bestAdd('protein', trimKcalStep, CAL_SLOTS);
        // Both required — don't trim without a paired protein add,
        // otherwise we'd just be dropping kcal without raising pro.
        if(pItem){
          applyDelta(pItem.slot, pItem.idx, pItem.cur + incrementFor(pItem.db));
          applyDelta(trim.item.slot, trim.item.idx, trim.item.cur - trim.dec);
        }
      }
    }

    // ── Priority 2: carb% over 55 ──
    // Trim carb; paired protein add is optional (trimming alone still helps
    // carbPct come down). Dead carbFloor safety check removed — carbPct
    // can't be ≤ carbFloor when it's > 55%.
    if(mk >= 1 && carbPct - 0.55 > 0.001){
      const trim = bestTrim(['carb'], CAL_SLOTS);
      if(trim){
        const trimKcalStep = trim.dec * trim.item.db.kcal;
        applyDelta(trim.item.slot, trim.item.idx, trim.item.cur - trim.dec);
        const pItem = bestAdd('protein', trimKcalStep, CAL_SLOTS);
        if(pItem) applyDelta(pItem.slot, pItem.idx, pItem.cur + incrementFor(pItem.db));
      }
    }

    // ── Priority 3: fat% over 30 ──
    // Trim fat; paired protein add is optional.
    if(mk >= 1 && fatPct - 0.30 > 0.001){
      const trim = bestTrim(['fat'], CAL_SLOTS);
      if(trim){
        const trimKcalStep = trim.dec * trim.item.db.kcal;
        applyDelta(trim.item.slot, trim.item.idx, trim.item.cur - trim.dec);
        const pItem = bestAdd('protein', trimKcalStep, CAL_SLOTS);
        if(pItem) applyDelta(pItem.slot, pItem.idx, pItem.cur + incrementFor(pItem.db));
      }
    }

    // ── Priority 4: veg < 3c ──
    // Pure boost — no trim. Veg is so low-cal (spinach 7/cup, broccoli 31/cup)
    // that a min 0.25c trim would remove more kcal than the veg adds. Accept
    // the small cal bump (usually 2-30 kcal per day).
    if(vegGap > 0.005){
      const boost = boostFV('veg', CAL_SLOTS);
      if(boost) applyDelta(boost.item.slot, boost.item.idx, boost.item.cur + boost.inc);
    }
    // (No fruit boost — can't meaningfully adjust fruit without affecting
    // macros, and most days hit fruit target naturally.)

    if(!changed) break;

    // Thrash detection: 3 full A-B-A-B-A-B cycles of identical alternating
    // mutation signatures means we're stuck oscillating. Exit before safety
    // exhausts so we don't burn 40 passes on a hopeless loop.
    const sig = passMutations.slice().sort().join('|');
    passSignatures.push(sig);
    if(passSignatures.length >= 6){
      const n = passSignatures.length;
      const alternating =
        passSignatures[n-1] !== passSignatures[n-2] &&
        passSignatures[n-1] === passSignatures[n-3] &&
        passSignatures[n-3] === passSignatures[n-5] &&
        passSignatures[n-2] === passSignatures[n-4] &&
        passSignatures[n-4] === passSignatures[n-6];
      if(alternating) break;
    }
  }
}

// ── Runtime invariant checker ──────────────────────────────────
// Validates that all data consumers agree on ingredient amounts.
// Call after randomizeWeek or manually from console.
function verifyInvariants(){
  const violations=[];
  const leftovers=computeLeftovers();
  // Don't invalidate — we want to validate the CURRENT post-pipeline state
  // (unified + snapped + waste-passed). Invalidating would rebuild from
  // scratch and discard the unification, giving false INV7 violations.

  // ── Invariant 1: Leftover pair consistency ──
  // Same-person leftover days must have identical amounts to their cook day.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','dinner'].forEach(function(s){
        const lo=leftovers[sk(p,d,s)];
        if(!lo||!lo.isLeftover||lo.crossPerson)return;
        const mealId=getMealId(p,d,s);
        const cookDay=lo.cookDay;
        // Find cook slot
        var cookSlot=null;
        ['breakfast','lunch','dinner','snack'].forEach(function(cs){
          if(cookSlot)return;
          if(getMealId(p,cookDay,cs)===mealId){
            var clo=leftovers[sk(p,cookDay,cs)];
            if(clo&&!clo.isLeftover)cookSlot=cs;
          }
        });
        if(!cookSlot)return;
        const cookB=getBalancedSlotIngredients(p,cookDay,cookSlot);
        const leftB=getBalancedSlotIngredients(p,d,s);
        if(!cookB||!leftB)return;
        cookB.forEach(function(ci){
          const li=leftB.filter(function(x){return x.dbKey===ci.dbKey;})[0];
          if(!li||Math.abs(ci.amt-li.amt)>0.001){
            violations.push('INV1 leftover-pair: '+p+' '+d+'/'+s+' '+ci.dbKey
              +' cook='+ci.amt.toFixed(2)+' left='+(li?li.amt.toFixed(2):'MISSING'));
          }
        });
      });
    });
  });

  // ── Invariant 2: calcTotals ↔ balanced cache agreement ──
  // The macros from calcTotals must match summing balanced slot ingredients.
  // All slots (including shake) go through the balanced cache — no special cases.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      const tots=calcTotals(p,d);
      let bKcal=0;
      SLOTS.forEach(function(s2){
        if(s2==='late_snack'){
          const ls=LATE_SNACK[pk(p,d)];
          if(ls)bKcal+=(ls.kcal||0);
          return;
        }
        const key2=sk(p,d,s2);
        if(SKIPPED[key2])return;
        if(EAT_OUT[key2]){bKcal+=(EAT_OUT[key2].kcal||0);return;}
        const bal2=getBalancedSlotIngredients(p,d,s2);
        if(bal2){
          bal2.forEach(function(i){const db=NUTRI_DB[i.dbKey];if(db)bKcal+=db.kcal*i.amt;});
        } else {
          const port2=getPort(p,d,s2);
          if(port2){const m2=getPortMacrosOvr(port2,p,d,s2);bKcal+=m2.kcal;}
        }
      });
      if(Math.abs(tots.kcal-Math.round(bKcal))>2){
        violations.push('INV2 calcTotals-vs-balanced: '+p+' '+d
          +' calcTotals='+tots.kcal+' balanced='+Math.round(bKcal));
      }
    });
  });

  // ── Invariant 3: Shopping ↔ balanced cache agreement ──
  // Mirrors buildShoppingList's cook-anchor architecture for cook1/cook2:
  // each batch contributes its full snapped total to the trip its cook day
  // falls in. Leftover slots don't add (already shopped via cook anchor).
  // Person attribution: full batch goes to the cook anchor's person bucket
  // (cook is the one who shops; other person's portion implicitly included).
  // Bidirectional: forward catches shopping over/under-counting; reverse
  // catches expected ingredients that addShopIngredient silently dropped
  // (stale dbKeys, future skip rules, balanced-cache leakage).
  const _inv3Leftovers = computeLeftovers();
  ['cook1','cook2'].forEach(function(trip){
    const tripDays=TRIP_DAYS_STATIC[trip]||[];
    const tripDaySet={};
    tripDays.forEach(function(d){tripDaySet[d]=true;});
    const shopList=buildShoppingList(trip,'both');
    const expected={}; // dbKey -> {him:0, her:0}
    ['him','her'].forEach(function(p){
      DAYS.forEach(function(d){
        SLOTS.forEach(function(s2){
          if(s2==='late_snack')return;
          const key2=sk(p,d,s2);
          if(SKIPPED[key2]||EAT_OUT[key2])return;
          const mealId=getMealId(p,d,s2);if(!mealId)return;
          const m2=getMeal(mealId);if(!m2||!m2[p])return;
          const port2=m2[p];
          if(!port2.ingredients||!port2.ingredients.length||port2.ingredients[0].dbKey===undefined)return;

          const lo2 = _inv3Leftovers[key2];
          if(lo2 && lo2.isLeftover) return; // shopped via cook anchor
          if(!tripDaySet[d]) return;        // batch belongs to other trip

          if(lo2 && lo2.portions && lo2.portions.length > 1){
            // Multi-portion batch: sum across all portions, attribute to cook anchor's person.
            lo2.portions.forEach(function(pt){
              const bal = getBalancedSlotIngredients(pt.p, pt.d, pt.s);
              const m3 = getMeal(getMealId(pt.p, pt.d, pt.s));
              const src = bal || (m3 && m3[pt.p] ? applyOverrides(m3[pt.p], pt.p, pt.d, pt.s) : null);
              if(src){
                src.forEach(function(i){
                  if(!expected[i.dbKey])expected[i.dbKey]={him:0,her:0};
                  expected[i.dbKey][p]+=i.amt;
                });
              }
            });
          } else {
            // Solo cook
            const bal=getBalancedSlotIngredients(p,d,s2);
            const src=bal||applyOverrides(port2,p,d,s2);
            if(src){
              src.forEach(function(i){
                if(!expected[i.dbKey])expected[i.dbKey]={him:0,her:0};
                expected[i.dbKey][p]+=i.amt;
              });
            }
          }
        });
        // Late-snack ingredients (per-day, only on trip days).
        if(tripDaySet[d]){
          const ls2=LATE_SNACK[pk(p,d)];
          if(ls2&&ls2.ingredients&&ls2.ingredients.length){
            ls2.ingredients.forEach(function(i){
              if(!expected[i.dbKey])expected[i.dbKey]={him:0,her:0};
              expected[i.dbKey][p]+=i.amt;
            });
          }
        }
      });
    });
    // Forward: every shopList item must match expected.
    Object.keys(shopList).forEach(function(cat){
      shopList[cat].forEach(function(item){
        const exp=expected[item.dbKey];
        if(!exp)return;
        const shopHis=(item.hisSum?item.hisSum.num:0);
        const shopHer=(item.herSum?item.herSum.num:0);
        if(Math.abs(shopHis-exp.him)>0.001){
          violations.push('INV3 shop-vs-balanced: '+trip+' '+item.dbKey
            +' him shop='+shopHis.toFixed(3)+' balanced='+exp.him.toFixed(3));
        }
        if(Math.abs(shopHer-exp.her)>0.001){
          violations.push('INV3 shop-vs-balanced: '+trip+' '+item.dbKey
            +' her shop='+shopHer.toFixed(3)+' balanced='+exp.her.toFixed(3));
        }
      });
    });
    // Reverse: every expected dbKey (with non-zero amount) must appear in
    // shopList, unless explicitly allowlisted as "not shopped". Today
    // addShopIngredient drops 'water' (always available at home). Any
    // future skip rule MUST add itself to this allowlist or it'll fire.
    const SHOP_EXPECTED_ALLOWLIST=['water'];
    const shopDbKeys={};
    Object.keys(shopList).forEach(function(cat){
      shopList[cat].forEach(function(item){shopDbKeys[item.dbKey]=true;});
    });
    Object.keys(expected).forEach(function(dbKey){
      if(SHOP_EXPECTED_ALLOWLIST.indexOf(dbKey)>=0)return;
      if(shopDbKeys[dbKey])return;
      const exp=expected[dbKey];
      if(exp.him>0.001||exp.her>0.001){
        violations.push('INV3 expected-not-in-shop: '+trip+' '+dbKey
          +' him='+exp.him.toFixed(3)+' her='+exp.her.toFixed(3));
      }
    });
  });

  // ── Invariant 4: Solo pkg meal must be flex-resolvable ──
  // A pkg meal that ends up solo (not shared, not in a leftover chain) will
  // waste a package unless `applyTripFlexScaling` can nudge its per-serving
  // amount to a pkg boundary. That requires the pkg ingredient to be in
  // `PKG_FLEX_CONFIG`. If a non-flex-configured pkg ingredient ends up on
  // a solo slot, it's a bug — either the meal shouldn't be allowed solo,
  // or the ingredient needs a flex entry. Replaces the old Phase 1.5 inline
  // cleanup — enforced as a hard invariant instead.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var key=sk(p,d,s);
        if(SKIPPED[key]||EAT_OUT[key])return;
        var mealId=getMealId(p,d,s);
        if(!mealId||!mealUsesPkg(mealId))return;
        // Skip shared slots (≥2 portions → fills most of a pkg)
        if(SHARED_SCHEDULE[dk(d,s)]==='shared')return;
        // Skip if part of a batch (anchor with portions, or leftover)
        var lo=leftovers[key];
        if(lo)return;
        // Solo pkg slot — check all pkg ingredients are flex-configured
        var mealObj=getMeal(mealId);
        if(!mealObj||!mealObj.ingredients)return;
        var nonFlex=mealObj.ingredients.filter(function(ing){
          var db=NUTRI_DB[ing.dbKey];
          if(!db||!db.pkg||db.pkg.longShelfLife)return false;
          return !PKG_FLEX_CONFIG[ing.dbKey];
        });
        if(nonFlex.length>0){
          violations.push('INV4 solo-pkg-not-flexable: '+p+' '+d+'/'+s+' '+mealId
            +' ingredient(s)='+nonFlex.map(function(i){return i.dbKey;}).join(','));
        }
      });
    });
  });

  // ── Invariant 5: Card macros ↔ calcTotals agreement ──
  // For each slot, computeCardMacros kcal must match what calcTotals counts.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s2){
        const key2=sk(p,d,s2);
        if(SKIPPED[key2]||EAT_OUT[key2])return;
        const port2=getPort(p,d,s2);if(!port2)return;
        const ingr2=applyOverrides(port2,p,d,s2);
        if(!ingr2||!ingr2.length||ingr2[0].dbKey===undefined)return;
        // Card macros
        const card=computeCardMacros(port2,p,d,s2,1,false,1);
        // Balanced macros (what calcTotals uses)
        const bal=getBalancedSlotIngredients(p,d,s2);
        if(!bal)return;
        let balKcal=0;
        bal.forEach(function(i){const db=NUTRI_DB[i.dbKey];if(db)balKcal+=db.kcal*i.amt;});
        balKcal=Math.round(balKcal);
        if(Math.abs(card.pm.kcal-balKcal)>1){
          violations.push('INV5 card-vs-balanced: '+p+' '+d+'/'+s2
            +' card='+card.pm.kcal+' balanced='+balKcal);
        }
      });
    });
  });

  // ── Invariant 6: Per-meal Protein/Carb ratio change <50% ──
  // The balanced P/C ratio shouldn't deviate more than 50% from the
  // original recipe ratio. Catches the day balancer distorting meal identity.
  // Ingredients whose bal amount equals their `minAmtSolo` are EXCLUDED from
  // both raw+bal sums — hitting the solo floor is the threshold system doing
  // its job (e.g. avocado oil scaled to 0.5 for a single-portion sauté), not
  // balancer distortion. Same skip applies to the recipe base side so we
  // compare apples-to-apples.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s2){
        var key2=sk(p,d,s2);
        if(SKIPPED[key2]||EAT_OUT[key2])return;
        var mealId2=getMealId(p,d,s2);if(!mealId2)return;
        var meal2=getMeal(mealId2);if(!meal2||!meal2.ingredients)return;
        // Recipes can opt out with `noRatioCheck:true` — for dishes that are
        // structurally low-carb (shrimp+cucumber, etc.) where any protein
        // scale-up mechanically inflates P:C ratio. The meal is intentionally
        // unbalanced on P:C; judging distortion against its base is noise.
        if(meal2.noRatioCheck)return;
        var bal2=getBalancedSlotIngredients(p,d,s2);
        if(!bal2)return;
        // Build a set of dbKeys whose balanced amount hit minAmtSolo — exclude
        // them from both the raw (recipe) side and the balanced side.
        var skipKeys={};
        bal2.forEach(function(i){
          var db=NUTRI_DB[i.dbKey]; if(!db||db.minAmtSolo==null) return;
          if(Math.abs(i.amt - db.minAmtSolo) < 0.01) skipKeys[i.dbKey]=true;
        });
        // Use the BASE recipe ingredients (not scaled/overridden)
        var rawPro=0,rawCarb=0,balPro=0,balCarb=0;
        meal2.ingredients.forEach(function(i){if(skipKeys[i.dbKey])return;var db=NUTRI_DB[i.dbKey];if(db){rawPro+=db.pro*i.amt;rawCarb+=db.carb*i.amt;}});
        bal2.forEach(function(i){if(skipKeys[i.dbKey])return;var db=NUTRI_DB[i.dbKey];if(db){balPro+=db.pro*i.amt;balCarb+=db.carb*i.amt;}});
        if(rawCarb<1||balCarb<1)return;
        var rawRatio=rawPro/rawCarb;
        var balRatio=balPro/balCarb;
        var pctChange=Math.abs(balRatio-rawRatio)/rawRatio*100;
        if(pctChange>50){
          violations.push('INV6 P/C-ratio: '+p+' '+d+'/'+s2+' '+mealId2
            +' raw='+rawRatio.toFixed(2)+' bal='+balRatio.toFixed(2)+' (+'+pctChange.toFixed(0)+'%)');
        }
      });
    });
  });

  // ── Invariant 7: Cross-person cook "one pot, one recipe" ──
  // For every ingredient (including veg/fruit and floor-clamped items),
  // the cook:other scoop ratio must be consistent across the batch.
  // Unify now scales the whole batch up to hit floors instead of clamping
  // per-portion, so ratios should hold for ALL ingredients. Any deviation
  // above 1% indicates a genuine bug.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        const lo=leftovers[sk(p,d,s)];
        if(!lo||lo.isLeftover||!lo.crossPersonCook)return;
        const otherP=lo.feedsAlso;
        if(!otherP||!lo.portions)return;
        const mealId=getMealId(p,d,s);
        // Find the other-person portion IN THIS BATCH via the portions list.
        // Previously this iterated slots on the feedsDay looking for any slot
        // with the matching meal ID — but when the same meal appears in TWO
        // separate batches on the same day (e.g. her lunch = leftover of
        // Batch 1, her dinner = co-anchor of Batch 2), the slot-scan picked
        // the wrong one and reported a bogus cross-batch ratio.
        var otherPortion=null;
        for(var pi=0;pi<lo.portions.length;pi++){
          if(lo.portions[pi].p===otherP){otherPortion=lo.portions[pi];break;}
        }
        if(!otherPortion)return;
        const cookBal=getBalancedSlotIngredients(p,d,s);
        const otherBal=getBalancedSlotIngredients(otherPortion.p,otherPortion.d,otherPortion.s);
        if(!cookBal||!otherBal)return;
        var ratios=[];
        cookBal.forEach(function(ci){
          var db=NUTRI_DB[ci.dbKey];if(!db)return;
          // wholeOnly items (tortilla, toast, rxbar, eggs, tuna pouch) round
          // per-portion to whole numbers in unifyCrossPersonRatios — their
          // ratios don't follow the batch's kcal-proportional split by design.
          // Exempt from INV7 so the per-portion rounding doesn't report drift.
          if(db.wholeOnly)return;
          var oi=null;
          for(var k=0;k<otherBal.length;k++){
            if(otherBal[k].dbKey===ci.dbKey){oi=otherBal[k];break;}
          }
          if(!oi)return;
          if(ci.amt<0.01||oi.amt<0.01)return;
          ratios.push({dbKey:ci.dbKey,cook:ci.amt,other:oi.amt,ratio:ci.amt/oi.amt,role:ci.role});
        });
        if(ratios.length<2)return;
        var sorted=ratios.slice().sort(function(a,b){return a.ratio-b.ratio;});
        var refRatio=sorted[Math.floor(sorted.length/2)].ratio;
        ratios.forEach(function(r){
          var drift=Math.abs(r.ratio-refRatio)/Math.max(r.ratio,refRatio);
          if(drift>0.01){
            violations.push('INV7 xperson-ratio: '+p+'→'+otherP+' '+mealId+' '+r.dbKey
              +' ('+r.role+') cook='+r.cook.toFixed(3)+' other='+r.other.toFixed(3)
              +' ratio='+r.ratio.toFixed(3)+' ref='+refRatio.toFixed(3)
              +' drift='+(drift*100).toFixed(1)+'%');
          }
        });
      });
    });
  });

  // ── Invariant 8: Cookable cleanliness of what the user sees ──
  // Anything the user cooks/shops from must land on ≤2 decimals:
  //   - Solo slot per-serving amounts (what that person scoops)
  //   - Batch cook TOTAL (what goes into the pot)
  // Batch leftover per-serving is exempt — it's intentionally fractional
  // (kcal-proportional split) and displays as 1-decimal rounded text.
  function isClean(v){
    // Accepts 2-decimal values OR eighth-fractions (0.125, 0.375, 0.625, 0.875)
    // OR thirds (1/3, 2/3, 1+1/3, etc.). INV8's purpose is DISPLAY quality —
    // not hiding weird 7.701-style numbers. Clean fractions are cookable and
    // display as familiar symbols (⅛, ⅜, ⅓, ⅔, etc.) via fmtFrac.
    if (Math.abs(v - Math.round(v*100)/100) < 0.001) return true;  // 2-decimal
    if (Math.abs(v - Math.round(v*8)/8) < 0.001) return true;      // 1/8 grid
    if (Math.abs(v*3 - Math.round(v*3)) < 0.003) return true;      // thirds grid
    return false;
  }
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
        var lo=leftovers[sk(p,d,s)];
        var bal=getBalancedSlotIngredients(p,d,s);
        if(!bal)return;
        if(lo&&lo.isLeftover)return;
        function pkgSkip(bi){
          var db=NUTRI_DB[bi.dbKey];
          // pkg items align to package boundaries (4c carton, 14oz tofu)
          // rather than per-serving grid — their cleanliness is handled by
          // the waste pass, not INV8.
          return !!(db&&db.pkg&&!db.pkg.longShelfLife);
        }
        if(lo&&lo.portions&&lo.portions.length>1){
          bal.forEach(function(bi){
            if(pkgSkip(bi))return;
            var tot=0;
            lo.portions.forEach(function(pt){
              var pb=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
              if(!pb)return;
              for(var k=0;k<pb.length;k++){
                if(pb[k].dbKey===bi.dbKey){tot+=pb[k].amt;break;}
              }
            });
            if(tot>0.001&&!isClean(tot)){
              violations.push('INV8 unclean batch total: '+p+' '+d+'/'+s+' '+bi.dbKey
                +' total='+tot.toFixed(4));
            }
          });
        } else {
          bal.forEach(function(bi){
            if(pkgSkip(bi))return;
            if(bi.amt>0.001&&!isClean(bi.amt)){
              violations.push('INV8 unclean per-serving: '+p+' '+d+'/'+s+' '+bi.dbKey
                +' amt='+bi.amt.toFixed(4));
            }
          });
        }
      });
    });
  });

  // ── Invariant 10: Every lunch/dinner recipe has some veg ──
  // Static check over MEALS. Prevents 0-veg recipes from sneaking in,
  // which made days with them mathematically unable to hit the 3c veg
  // goal (e.g. the pre-bok-choy lemongrass_chicken_thigh).
  MEALS.forEach(function(m){
    if(!m.slots||(m.slots.indexOf('lunch')<0&&m.slots.indexOf('dinner')<0))return;
    if(!m.ingredients)return;
    var vegCups=0;
    m.ingredients.forEach(function(i){
      if(i.role!=='veg')return;
      var db=NUTRI_DB[i.dbKey];if(!db)return;
      if(db.unit==='cup')vegCups+=i.amt;
      else if(db.unit==='each'&&db.cupsEach)vegCups+=i.amt*db.cupsEach;
    });
    if(vegCups<=0){
      violations.push('INV10 no-veg meal: '+m.id+' (slots: '+m.slots.join(',')+')');
    }
  });

  // ── Invariant 11: ≥2-day gap between batches of the same meal ──
  // After a batch's last occurrence day, the meal cannot appear again
  // until 2 full gap days have passed (last_day + 3 earliest). Catches
  // randomizer regressions where a meal stacks too close to its own
  // leftover tail.
  //
  // Lunch/dinner only — these are the slots the leftover detector anchors
  // on (cookSlots in computeLeftovers). Breakfast/snack are exempt for the
  // same reason as INV14: small pools (~10-20 meals) can't always honor a
  // 2-day gap, so flagging would be noise. Same exclusion mirrors the
  // detector's batch semantics — breakfast/snack same-meal-on-different-
  // days never become "batches" in the detector's view.
  //
  // Uses the leftover detector's batch grouping directly (lo.portions on
  // each anchor). The previous gap-rolling-window approach unified all
  // consecutive same-meal days into one group, which made the firing
  // condition `gapDays<2` impossible to reach (splits required gap>=3,
  // which guaranteed gapDays>=2). Now: iterate cook anchors only, find
  // each batch's last day from its portions list, and compare against
  // the next anchor's day.
  var mealAnchors={};
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d,di){
      ['lunch','dinner'].forEach(function(s){
        if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
        var lo=leftovers[sk(p,d,s)];
        if(lo&&lo.isLeftover)return; // process anchors only (skip leftovers)
        var mealId=getMealId(p,d,s);
        if(!mealId)return;
        var m=getMeal(mealId);
        if(m&&m.noLeftover)return; // noLeftover meals exempt (freshly made)
        // Last day of this batch = max portion dayIdx (or this day if solo)
        var lastDayIdx=di;
        if(lo&&lo.portions){
          lo.portions.forEach(function(pt){
            var ptIdx=DAYS.indexOf(pt.d);
            if(ptIdx>lastDayIdx)lastDayIdx=ptIdx;
          });
        }
        if(!mealAnchors[mealId])mealAnchors[mealId]=[];
        mealAnchors[mealId].push({dayIdx:di, lastDayIdx:lastDayIdx});
      });
    });
  });
  Object.keys(mealAnchors).forEach(function(mealId){
    var anchors=mealAnchors[mealId].sort(function(a,b){return a.dayIdx-b.dayIdx;});
    if(anchors.length<2)return;
    for(var j=1;j<anchors.length;j++){
      var prev=anchors[j-1], curr=anchors[j];
      // Same-day duplicates collapse to one batch (e.g., shared cook listed
      // under both persons but with the other-person side already filtered
      // as isLeftover above). Skip identical anchor days.
      if(curr.dayIdx===prev.dayIdx)continue;
      var gapDays=curr.dayIdx-prev.lastDayIdx-1;
      if(gapDays<2){
        violations.push('INV11 gap-too-small: '+mealId
          +' prev_last='+DAYS[prev.lastDayIdx]+' curr_first='+DAYS[curr.dayIdx]
          +' gap_days='+gapDays);
      }
    }
  });

  // ── Invariant 12: Detector internal consistency ──
  // Every cook anchor must have totalServings === portions.length, and
  // every portion in the batch must reference the same meal ID as the
  // anchor. Catches detector drift early if the grouping logic ever
  // produces inconsistent state.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(!lo||lo.isLeftover||!lo.portions)return;
        if(lo.totalServings!==lo.portions.length){
          violations.push('INV12 servings-mismatch: '+p+' '+d+'/'+s
            +' totalServings='+lo.totalServings+' portions.length='+lo.portions.length);
        }
        var anchorMeal=getMealId(p,d,s);
        lo.portions.forEach(function(pt){
          var ptMeal=getMealId(pt.p,pt.d,pt.s);
          if(ptMeal!==anchorMeal){
            violations.push('INV12 portion-meal-mismatch: anchor='+p+'/'+d+'/'+s+'='+anchorMeal
              +' portion='+pt.p+'/'+pt.d+'/'+pt.s+'='+ptMeal);
          }
        });
      });
    });
  });

  // ── Invariant 9: Shared meals never show combined on Him/Her tabs ──
  // The Shared tab owns the batch/combined view for shared same-day meals.
  // Him and Her tabs must render per-serving only — no "Combined
  // ingredients (serves N)" header on a same-day-shared slot. Calls the
  // SAME helper that buildMealCardHtml uses for its render decision —
  // single source of truth. If a future edit drops the !isSameDayShared
  // guard from cardShowsCombinedHeader, INV9 fires immediately.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(!lo)return;
        var isSameDayShared=!!(lo.shared||lo.sameDayShared);
        if(!isSameDayShared)return;
        if(cardShowsCombinedHeader(lo)){
          violations.push('INV9 combined-on-shared: '+p+' '+d+'/'+s
            +' shared='+isSameDayShared
            +' big='+(!lo.isLeftover&&((lo.servings>1)||lo.crossPersonCook))
            +' xp='+!!lo.crossPersonCook);
        }
      });
    });
  });

  // ── Invariant 13: per-serving min/max threshold compliance ──
  // Every ingredient with db.minAmt or db.maxAmt must have its per-serving
  // amount within [minAmt, maxAmt] for every slot (solo OR batch portion).
  // Protein/carb roles don't have thresholds and are exempt implicitly
  // (only items with thresholds defined are checked).
  // Solo slots (no leftovers[sk] entry) use db.minAmtSolo if defined —
  // higher floor for pan-oil realism on single-portion cooks.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
        var bal=getBalancedSlotIngredients(p,d,s);
        if(!bal)return;
        var slotLo=leftovers[sk(p,d,s)];
        var isSoloSlot=!slotLo;
        bal.forEach(function(bi){
          var db=NUTRI_DB[bi.dbKey];if(!db)return;
          // Skip zero / near-zero amounts (ingredient effectively absent).
          if(bi.amt<0.001)return;
          var effMinCheck=(isSoloSlot && typeof db.minAmtSolo==='number')
            ? db.minAmtSolo
            : (db.minAmt!=null ? db.minAmt : null);
          if(effMinCheck!=null && bi.amt<effMinCheck-0.001){
            violations.push('INV13 below-min: '+p+' '+d+'/'+s+' '+bi.dbKey
              +' amt='+bi.amt.toFixed(3)+' min='+effMinCheck
              +(isSoloSlot&&db.minAmtSolo?' (solo)':''));
          }
          // Solo-aware max — solo slots use maxAmtSolo when defined (oils, milk
          // capped tighter on single-serving meals than batch per-portion).
          var effMaxCheck=(isSoloSlot && typeof db.maxAmtSolo==='number')
            ? db.maxAmtSolo
            : (db.maxAmt!=null ? db.maxAmt : null);
          if(effMaxCheck!=null && bi.amt>effMaxCheck+0.001){
            violations.push('INV13 above-max: '+p+' '+d+'/'+s+' '+bi.dbKey
              +' amt='+bi.amt.toFixed(3)+' max='+effMaxCheck
              +(isSoloSlot&&db.maxAmtSolo?' (solo)':''));
          }
        });
      });
    });
  });

  // ── Invariant 14: household same-meal cook within 5 days ──
  // Household-level: if EITHER person cooks a meal, neither person should
  // cook that same meal within 5 days. Leftovers of an existing cook don't
  // count (they share the batch's anchor). Shared same-day cooks count ONCE
  // via the anchor (sameDayShared other-person portion is a leftover).
  // Snacks and breakfasts are exempt — small pools, 5-day gap mathematically
  // impossible (14 slots/week, 9-21 meal pool).
  var householdCooks=_collectHouseholdCooks(leftovers); // [{dayIdx, mealId, p, d, s}]
  for(var hi=0;hi<householdCooks.length;hi++){
    for(var hj=hi+1;hj<householdCooks.length;hj++){
      if(householdCooks[hi].mealId===householdCooks[hj].mealId){
        var hgap=Math.abs(householdCooks[hj].dayIdx-householdCooks[hi].dayIdx);
        if(hgap<5){
          violations.push('INV14 repeat-cook-within-5d: household '+householdCooks[hi].mealId
            +' at '+householdCooks[hi].p+' '+householdCooks[hi].d+'/'+householdCooks[hi].s
            +' and '+householdCooks[hj].p+' '+householdCooks[hj].d+'/'+householdCooks[hj].s
            +' (gap '+hgap+'d)');
        }
      }
    }
  }

  // ── Invariants 15/16: leftovers eaten per person (tracking-only) ──
  // Counts how many lunch/dinner slots each person eats as a time-shifted
  // leftover (reheated from a prior cook). Excludes `sameDayShared` — those
  // are the other person's portion of a shared cook, eaten same day same
  // slot as the anchor, not a leftover in the colloquial sense. Without this
  // exclusion, Her's count was inflated 4-5/wk by shared dinners (detector
  // always picks Him as anchor for same-day ties).
  ['him','her'].forEach(function(p){
    var eaten=0;
    DAYS.forEach(function(d){
      ['lunch','dinner'].forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(lo && lo.isLeftover && !lo.sameDayShared) eaten++;
      });
    });
    var invNum=p==='him'?15:16;
    violations.push('INV'+invNum+' leftovers-eaten: '+p+' count='+eaten);
  });

  // ── Invariant 17: Balancer view ↔ calcTotals consistency ──
  // balanceDayMacros's internal dailyMacros() computes day kcal by iterating
  // its slots map with a sameDayCookServings[slot] multiplier — correct only
  // when the materialized same-day-leftover slot is NOT in the slots map.
  // Post-pipeline reruns (unifyCrossPersonRatios, snapBatchTotalsToGrid) see
  // a materialized cache; if they also apply mult=2, the portion is counted
  // 3× (cook×2 + materialized leftover×1) — a ~500-700 kcal inflation that
  // silently misleads the balancer. Conversely, forgetting to set mult when
  // the leftover slot isn't materialized undercounts by one portion.
  // calcTotals(p,d) sums each slot's balanced amount exactly once via the
  // day-balanced cache — no mult, no ambiguity. If the balancer's view
  // diverges by >2 kcal, the bookkeeping is broken. Hard invariant.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      if(p!=='him'&&p!=='her')return;
      var cache=_dayBalancedCache[pk(p,d)];
      if(!cache)return;
      // Reconstruct what balanceDayMacros's dailyMacros() WOULD see if it
      // ran now: iterate cache slots, apply sameDayCookServings mult based
      // on current leftover classification, add eat-outs + late snack.
      var sameDayCookServings={};
      Object.keys(cache).forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(!lo||lo.isLeftover||lo.crossPerson)return;
        if(!lo.portions)return;
        // same-day same-person batch: cook slot feeds 1+ leftover slots same day
        lo.portions.forEach(function(pt){
          if(pt.p!==p)return;
          if(pt.d!==d)return;
          if(pt.s===s)return; // skip the cook slot itself
          // pt is a same-day same-person leftover portion
          // If the leftover slot is ALREADY in cache (materialized), mult=1 is correct.
          // If NOT, then we'd need mult=(portions count). The canonical
          // getDayBalancedIngredients builds with mult=portions-for-cook-on-this-day.
          // Here we check the STATE AS-IS: if cache[pt.s] is populated (materialized),
          // don't set mult. If not, set mult to reflect the missing slot.
          if(cache[pt.s]) return; // materialized — counted separately, no mult needed
          sameDayCookServings[s]=(sameDayCookServings[s]||1)+1;
        });
      });
      var balancerKcal=0;
      Object.keys(cache).forEach(function(s){
        var mult=sameDayCookServings[s]||1;
        cache[s].forEach(function(i){
          var db=NUTRI_DB[i.dbKey]; if(!db)return;
          balancerKcal+=db.kcal*i.amt*mult;
        });
      });
      SLOTS.forEach(function(s){
        var eo=EAT_OUT[sk(p,d,s)];
        if(eo)balancerKcal+=(eo.kcal||0);
      });
      var ls=LATE_SNACK[pk(p,d)];
      if(ls)balancerKcal+=(ls.kcal||0);
      var truthKcal=calcTotals(p,d).kcal;
      if(Math.abs(balancerKcal-truthKcal)>2){
        violations.push('INV17 balancer-truth-kcal: '+p+' '+d
          +' balancer='+Math.round(balancerKcal)+' calcTotals='+truthKcal
          +' drift='+Math.round(balancerKcal-truthKcal));
      }
    });
  });

  // ── Invariant 18: runBalanceAdjusters cap-hit rate (tracking-only) ──
  // The convergence loop has a 6-iter safety cap. The known infeasible-
  // constraint cases (kcal-skewed batches where floor + maxAmt + ratio
  // can't all hold) hit it ~3% of calls — accepted: u twitches at its
  // ideal but downstream stages are stable. A rate >10% per randomize
  // signals a NEW oscillation: something in the pipeline is mutating
  // in a way the loop can't dampen within 6 iters. To investigate, run
  // with `window._rbaDiagEnabled = true` and inspect window._rbaDiag —
  // each entry's `iters` array shows which stages (u/s/w/g/b) fired
  // per iteration. The stage that keeps returning true is the one to
  // study next.
  if(_rbaCallCount > 0){
    var capPct = (_rbaCapHits/_rbaCallCount)*100;
    if(capPct > 10){
      violations.push('INV18 rba-cap-rate: '+_rbaCapHits+'/'+_rbaCallCount
        +' calls hit safety cap ('+capPct.toFixed(1)+'%). Convergence loop may have a new oscillation source.');
    }
  }

  // ── Invariant 19: cooked/dry DB consistency ──
  // Every entry whose key contains "cooked" must declare either `pkg`
  // (canned/pre-prepared, e.g. canned beans) or `dry` (cup-cooked → cup-dry
  // conversion, e.g. rice/quinoa/dry-cooked beans) so the shopping list
  // can show meaningful units. A cooked-cup count on the shopping list is
  // useless — the user buys dry product or cans, not cooked cups.
  //
  // Symmetrically, every entry whose key contains "dry"/"dried"/"uncooked"
  // AND uses `cup` unit must have a corresponding "cooked" or "canned"
  // sibling. Restricted to cup-unit so dried spices/herbs (tbsp halfSnap
  // items like `dried rosemary`/`dried thyme`/`dried oregano`) — which are
  // shopped/stored/used in dried form by definition — don't false-fire.
  // Catches grain/legume orphans like the deleted `lentils dried`.
  Object.keys(NUTRI_DB).forEach(function(k){
    var db = NUTRI_DB[k];
    if(/\bcooked\b/.test(k)){
      var hasPkg = !!(db.pkg && (db.pkg.drained || db.pkg.cups));
      var hasDry = !!db.dry;
      if(!hasPkg && !hasDry){
        violations.push('INV19 cooked-no-shopping: '+k
          +' (cooked entry needs `pkg` or `dry` so shopping shows real units)');
      }
    }
    if(/\b(dry|dried|uncooked)\b/.test(k) && db.unit==='cup'){
      var base = k.replace(/\b(dry|dried|uncooked)\b/g, '').replace(/\s+/g, ' ').trim();
      var cookedSibling = base + ' cooked';
      var cannedSibling = base + ' canned';
      if(!NUTRI_DB[cookedSibling] && !NUTRI_DB[cannedSibling]){
        violations.push('INV19 dry-no-cooked: '+k
          +' (no `'+cookedSibling+'` or `'+cannedSibling+'` sibling for the eaten form)');
      }
    }
  });

  // ── Invariants 20/21/22: Waste tracking (hard) ──
  // INV20 = combined "total" hard tracker. Fires once per pkg waste >1%
  //         AND once per produce waste >50%-of-perWhole. INV20 count =
  //         INV21 count + INV22 count by construction. Useful as a
  //         single number to answer "is there ANY waste violation?"
  // INV21 = pkg-only split (1% of bought threshold). Fires per pkg item
  //         per trip when (waste / bought) > 1%.
  // INV22 = produce-only split (>50% of one whole-produce unit threshold).
  //         Lax threshold because produce sizes are structurally coarse
  //         (broccoli head = 2c, carrots bunch = 0.75c) and recipes use
  //         fractional cups; small sub-50% waste is unavoidable noise.
  //
  // Skips pkg longShelfLife items (egg white carton — legitimately carries
  // between trips). Reads buildShoppingList output (post-pipeline) so the
  // gauge sees the same numbers the user sees in the shopping tab.
  // (INV20 was the original 2026-04-27 pkg-only invariant. On 2026-04-28
  //  it was repurposed as the rolled-up combined tracker, with INV21+INV22
  //  added as the split detail. Both old INV20 baselines and new ones
  //  remain comparable since the pkg threshold is unchanged.)
  ['cook1','cook2'].forEach(function(trip){
    var grouped = buildShoppingList(trip, 'both');
    Object.keys(grouped).forEach(function(cat){
      grouped[cat].forEach(function(item){
        var db = NUTRI_DB[item.dbKey];
        if(!db) return;
        var totalNum = (item.hisSum?item.hisSum.num:0) + (item.herSum?item.herSum.num:0);
        if(totalNum <= 0) return;
        var unit = (item.hisSum||item.herSum||{}).unit;

        // PKG branch (INV20 + INV21). `acceptableWaste:true` items (e.g.
        // coconut milk — manual-add curries only, container is shopping-only)
        // are excluded from the hard tracker but still appear in shopping
        // list with the standard waste warning. `softWaste:true` items
        // (marinara, chicken broth) STILL fire INV20 for visibility but
        // emit a parallel INV20Soft tracking line; the aggregator's hardFail
        // computation subtracts INV20Soft from INV20 so soft fires don't
        // count as hard regressions. User-accepted "single-jar/carton waste
        // is OK" items.
        if(db.pkg && !db.pkg.longShelfLife && !db.pkg.acceptableWaste){
          var perPkg = (db.pkg.drained && (unit==='cup'||unit==='oz')) ? db.pkg.drained : (db.pkg.cups||0);
          if(perPkg > 0){
            var bought = _pkgsNeeded(totalNum, perPkg) * perPkg;
            var waste = bought - totalNum;
            if(bought > 0){
              var wastePct = waste / bought;
              if(wastePct > 0.01){
                var detail = trip+' '+item.dbKey
                  +' used='+totalNum.toFixed(3)+unit
                  +' bought='+bought.toFixed(3)+unit
                  +' waste='+waste.toFixed(3)+unit
                  +' pct='+(wastePct*100).toFixed(1)+'%';
                violations.push('INV20 waste-over-threshold (pkg): '+detail);
                violations.push('INV21 pkg-waste-over-1pct: '+detail);
                if(db.pkg.softWaste){
                  violations.push('INV20Soft soft-waste (pkg): '+detail);
                }
              }
            }
          }
        }

        // PRODUCE branch (INV20 + INV22). `db.produce.acceptableWaste:true`
        // would skip; not currently used but reserved for symmetry with pkg.
        if(db.produce && !db.produce.acceptableWaste){
          var perWhole = db.produce.perWhole;
          if(perWhole > 0){
            var pBought = _pkgsNeeded(totalNum, perWhole) * perWhole;
            var pWaste = pBought - totalNum;
            if(pWaste > perWhole * 0.5){
              var pDetail = trip+' '+item.dbKey
                +' used='+totalNum.toFixed(3)+unit
                +' bought='+pBought.toFixed(3)+unit
                +' waste='+pWaste.toFixed(3)+unit+' ('+(pWaste/perWhole*100).toFixed(0)+'% of one whole)';
              violations.push('INV20 waste-over-threshold (produce): '+pDetail);
              violations.push('INV22 produce-waste-over-50pct-of-whole: '+pDetail);
            }
          }
        }
      });
    });
  });

  return violations;
}
