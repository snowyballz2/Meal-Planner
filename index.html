// ── Boost batch veg across portions to hit daily target ──────
// Last-resort veg booster for days stuck under 2.75c because their only
// veg-bearing slot is a frozen batch leftover. The regular boostFV skips
// frozen slots (can't modify a leftover in isolation without breaking
// INV1). This step grows the WHOLE BATCH by +0.25c of one veg item at a
// time, propagating to every portion. Physically: the cook makes a
// slightly bigger pot of veg. Other days eating from the same batch get
// the extra veg too — harmless (veg is ~30 kcal/cup at most).
// 2026-05-03: threshold lowered 3 → 2.75 to match accepted veg range.
function boostBatchVegForDailyTarget(){
  // Idempotent: reads via getBalancedSlotIngredients (lazy-build via
  // getDayBalancedIngredients when day cache missing). The top-of-loop
  // fast-path `if(fv.veg>=2.75)break` exits immediately when the day's veg
  // target is already met — so calling this twice in a row is a no-op on
  // the second call for every day (post-first-pass state has fv.veg >= 2.75
  // on boosted days, or else the inner loop hit its cap/no-picked break
  // conditions and veg is stuck below 2.75 regardless of how many times we
  // call). No affectedDays bookkeeping: this function grows a batch by
  // 0.25c at a time (~10-30 kcal); the balancer is NOT re-run because
  // the kcal drift is below meaningful thresholds.
  var changed=false; // true if any batch veg was grown — return value
                     // for the convergence loop's steady-state check.
  var leftovers=computeLeftovers();
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      var safety=10;
      while(safety-->0){
        var fv=computeDailyFV(p,d);
        if(fv.veg>=2.75)break;
        // Find a frozen batch slot with a veg item below 3× recipe base
        var picked=null;
        SLOTS.forEach(function(s){
          if(picked)return;
          if(s==='late_snack'||s==='shake')return;
          if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
          var lo=leftovers[sk(p,d,s)];
          if(!lo)return;
          // Must be part of a multi-portion batch (either the cook anchor or a leftover)
          var isBatchMember=(lo.isLeftover)||(lo.portions&&lo.portions.length>1);
          if(!isBatchMember)return;
          var bal=getBalancedSlotIngredients(p,d,s);
          if(!bal)return;
          // Find batch anchor (cook slot + portions list)
          var anchorKey=null;
          var anchorLo=null;
          if(!lo.isLeftover&&lo.portions){
            anchorKey=sk(p,d,s);anchorLo=lo;
          } else if(lo.isLeftover){
            var cookedBy=lo.cookedBy||p;
            var cookDay=lo.cookDay;
            var mealId=getMealId(p,d,s);
            ['lunch','dinner'].forEach(function(cs){
              if(anchorKey)return;
              var ck=sk(cookedBy,cookDay,cs);
              var clo=leftovers[ck];
              if(clo&&!clo.isLeftover&&clo.portions&&getMealId(cookedBy,cookDay,cs)===mealId){
                anchorKey=ck;anchorLo=clo;
              }
            });
          }
          if(!anchorKey||!anchorLo)return;
          var anchorParts=anchorKey.split('_');
          var mealAtAnchor=getMeal(getMealId(anchorParts[0],anchorParts[1],anchorParts[2]));
          if(!mealAtAnchor||!mealAtAnchor.ingredients)return;
          var recipeBase={};
          mealAtAnchor.ingredients.forEach(function(ri){recipeBase[ri.dbKey]=ri.amt;});
          // Find a veg ingredient in the batch with headroom (< 3× base,
          // 4× for leaf veg spinach/kale/bok choy, all <35 kcal/cup).
          // Hard user cap: no portion may exceed 3c per serving post-boost.
          // Cap check scans ALL portions — previously only checked current
          // person's side, letting the other person balloon past 3× base
          // when proportional scaling redistributed the boost.
          for(var k=0;k<bal.length;k++){
            var bi=bal[k];
            if(bi.role!=='veg')continue;
            var db=NUTRI_DB[bi.dbKey];
            if(!db||db.unit!=='cup')continue;
            var base=recipeBase[bi.dbKey];
            var isLeaf=(bi.dbKey==='baby spinach'||bi.dbKey==='kale'||bi.dbKey==='bok choy');
            if(!base)continue;
            var relMax=base*(isLeaf?4:3);
            var absMax=(db.maxAmt!=null)?db.maxAmt:relMax;
            var capAmt=Math.min(relMax, absMax);
            // Check the MAX amount across all portions against the cap
            var maxPortionAmt=0;
            anchorLo.portions.forEach(function(pt){
              var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
              if(!pbal)return;
              for(var kk=0;kk<pbal.length;kk++){
                if(pbal[kk].dbKey===bi.dbKey){
                  if(pbal[kk].amt>maxPortionAmt)maxPortionAmt=pbal[kk].amt;
                  break;
                }
              }
            });
            if(maxPortionAmt>=capAmt)continue;
            picked={anchorKey:anchorKey,anchorLo:anchorLo,dbKey:bi.dbKey};
            break;
          }
        });
        if(!picked)break;
        // Grow the BATCH TOTAL by one grid step (0.25c) and redistribute
        // proportionally. Keeps the batch total on-grid for clean display
        // and shopping, while preserving each portion's share (so INV7
        // scoop ratio stays intact). Per-portion amounts are fractional
        // but land inside the batch-aware 1-decimal display.
        var batchTotal=0;
        picked.anchorLo.portions.forEach(function(pt){
          var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
          if(!pbal)return;
          for(var k=0;k<pbal.length;k++){
            if(pbal[k].dbKey===picked.dbKey){batchTotal+=pbal[k].amt;break;}
          }
        });
        if(batchTotal<0.01)break;
        var newTotal=batchTotal+0.25;
        var factor=newTotal/batchTotal;
        // Per-serving cap: if the boost would push any portion above the
        // ingredient's db.maxAmt, stop growing this batch.
        var pickedDb=NUTRI_DB[picked.dbKey];
        var boostCap=(pickedDb && pickedDb.maxAmt!=null)?pickedDb.maxAmt:Infinity;
        var wouldExceedCap=false;
        picked.anchorLo.portions.forEach(function(pt){
          var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
          if(!pbal)return;
          for(var k=0;k<pbal.length;k++){
            if(pbal[k].dbKey===picked.dbKey){
              if(pbal[k].amt*factor>boostCap)wouldExceedCap=true;
              break;
            }
          }
        });
        if(wouldExceedCap)break;
        picked.anchorLo.portions.forEach(function(pt){
          var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
          if(!pbal)return;
          for(var k=0;k<pbal.length;k++){
            if(pbal[k].dbKey===picked.dbKey){pbal[k].amt=pbal[k].amt*factor;break;}
          }
        });
        changed=true;
      }
    });
  });
  return changed;
}

// ── Snap batch totals to per-serving grid ─────────────────────
// Final cleanup after waste + re-unify. Batch totals must land on the
// per-serving grid (1 oz, 0.25c, 0.5 tbsp) — sub-grid drift like 36.485 oz
// or 8.392 tbsp isn't cookable/shoppable. 1.25c beans and 2.5 tbsp oil
// ARE on-grid so they're fine. Direction: NEAREST across the board.
// Per-portion amounts redistribute proportionally from the snapped batch
// total, preserving unified ratios. Skips packaged ingredients (their
// waste-pass handled pkg boundaries) and veg/fruit (recipe-locked).
// Snap non-batch (solo) slot ingredient amounts to the per-serving grid.
// Runs after all balance/snap/flex passes. The day-balancer and applyTripFlexScaling
// can leave solo-slot amounts sub-grid (e.g. honey 6.7586 tbsp) when compensating
// for flex-scaled pkg ingredients. `snapBatchTotalsToGrid` only handles batch
// portions; this pass closes the gap for solo slots. Mutates the in-memory
// day-balanced cache directly so it's the last word before verifyInvariants.
// pkg items are exempt (per INV8 rules — their cleanliness is governed by
// pkg boundaries, not per-serving grid).
function snapSoloSlotAmountsToGrid(){
  // Solo slots target the unit's NATIVE grid (oz→whole, cup→0.25,
  // tbsp/halfSnap→0.5, each-eggs/wholeOnly→whole, other each→0.25).
  // Falls back to 2-decimal rounding only when native-grid would shift
  // kcal by >10 (rare). `wholeOnly` items always snap to whole.
  //
  // 2026-04-26 fix: previously this function bailed if bi.amt was already
  // ≤2 decimals OR on 1/8 grid (INV8-clean). That was the right rule for
  // batches (where per-portion fractions are kcal-prop splits), but this
  // function ONLY runs on solo slots (filter below) — where inputs should
  // always be on the unit's native grid. The "≤2 decimals" bail let bad
  // recipe data slip through (e.g., a recipe with 0.88 cup zucchini stayed
  // at 0.88 instead of snapping to 1.0). Now we always check native grid;
  // we only preserve the value if it's already on grid OR exactly at the
  // ingredient's threshold floor (minAmt/minAmtSolo, which can legitimately
  // sit on 1/8 grid for halfSnap items like cinnamon at 0.125 tbsp).
  var leftovers = computeLeftovers();
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      var cache = _dayBalancedCache[pk(p,d)];
      if (!cache) return;
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var key = sk(p,d,s);
        if (SKIPPED[key] || EAT_OUT[key]) return;
        var lo = leftovers[key];
        if (lo && !lo.isLeftover && lo.portions && lo.portions.length >= 2) return;
        if (lo && lo.isLeftover) return;
        var bal = cache[s];
        if (!bal || !bal.length) return;
        bal.forEach(function(bi){
          var db = NUTRI_DB[bi.dbKey];
          if (!db) return;
          if (db.pkg && !db.pkg.longShelfLife) return;
          if (bi.amt < 0.001) return;
          // Skip FREEZE-set frozen items only (not recipe-fixed scalable:false).
          if (bi.scalable === false &&
              (ROUND_PKG_ITEMS.indexOf(bi.dbKey) >= 0 ||
               ROUND_PRODUCE_ITEMS.indexOf(bi.dbKey) >= 0)) return;
          // Preserve threshold-floor values: halfSnap items at minAmt:0.125
          // (cinnamon, salt, etc.) and minAmtSolo overrides shouldn't be
          // bumped UP to the next native grid step.
          if (typeof db.minAmt === 'number' && Math.abs(bi.amt - db.minAmt) < 0.001) return;
          if (typeof db.minAmtSolo === 'number' && Math.abs(bi.amt - db.minAmtSolo) < 0.001) return;
          // Preserve thirds-grid values (1/3, 2/3, 1+1/3, 1+2/3, ...).
          // 1/3 cup is a standard kitchen measure — recipes that use it
          // (e.g. acai shake) should round-trip through snap unchanged.
          // Tolerance 0.001 handles JS float precision of `1/3` literal.
          if (Math.abs(bi.amt * 3 - Math.round(bi.amt * 3)) < 0.003) return;
          // Try native grid first
          var unit = db.unit || '';
          var grid = 0.25;
          if (unit==='oz'||unit==='slice'||unit==='scoop'||unit==='serving') grid = 1;
          else if (unit==='cup') grid = 0.25;
          else if (unit==='tbsp' || db.halfSnap) grid = 0.5;
          else if (unit==='each') grid = db.wholeOnly ? 1 : 0.25;
          if (db.wholeOnly) grid = 1;
          var gridSnapped = Math.round(bi.amt / grid) * grid;
          if (gridSnapped < grid) gridSnapped = grid;
          if (typeof db.minAmt === 'number' && gridSnapped < db.minAmt) gridSnapped = db.minAmt;
          if (typeof db.maxAmt === 'number' && gridSnapped > db.maxAmt) gridSnapped = db.maxAmt;
          // Check kcal delta of native grid snap
          var gridKcalDelta = Math.abs(gridSnapped - bi.amt) * (db.kcal || 0);
          var KCAL_TOLERANCE = 10;
          var snapped;
          if (gridKcalDelta <= KCAL_TOLERANCE || db.wholeOnly) {
            // Native grid snap acceptable
            snapped = gridSnapped;
          } else {
            // Large delta → fall back to 2-decimal (INV8 passes, minimal kcal shift)
            snapped = Math.round(bi.amt * 100) / 100;
            if (typeof db.minAmt === 'number' && snapped < db.minAmt) snapped = db.minAmt;
            if (typeof db.maxAmt === 'number' && snapped > db.maxAmt) snapped = db.maxAmt;
          }
          if (Math.abs(snapped - bi.amt) < 0.001) return;
          bi.amt = snapped;
        });
      });
    });
  });
}

function snapBatchTotalsToGrid(){
  // Idempotent + self-unifying: calls unifyCrossPersonRatios() first to
  // ensure kcal-proportional ratios before reading smallestShare. Without
  // this, post-waste desynced state makes smallestShare artificially
  // small, the per-portion floor blows up, the maxAmt cap pushes back,
  // and a portion ends up below db.minAmt (INV13 violation).
  //
  // The internal unify is a fast-path no-op when already unified (per-
  // ingredient write-skip tolerance 0.0001). Lets this function be safe
  // in a convergence loop regardless of prior stage ordering.
  unifyCrossPersonRatios();
  var leftovers=computeLeftovers();
  var affectedDays={};
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(!lo||lo.isLeftover)return;
        var portionList=lo.portions||[];
        if(portionList.length<2)return;
        var bal=getBalancedSlotIngredients(p,d,s);
        if(!bal)return;
        bal.forEach(function(bi,idx){
          var db=NUTRI_DB[bi.dbKey];if(!db)return;
          if(db.pkg&&!db.pkg.longShelfLife)return;
          // Skip FREEZE-set frozen items only (not recipe-fixed scalable:false).
          if(bi.scalable===false &&
             (ROUND_PKG_ITEMS.indexOf(bi.dbKey) >= 0 ||
              ROUND_PRODUCE_ITEMS.indexOf(bi.dbKey) >= 0)) return;

          var portions=[];
          var total=0;
          portionList.forEach(function(pt){
            var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
            if(!pbal)return;
            for(var k=0;k<pbal.length;k++){
              if(pbal[k].dbKey===bi.dbKey){
                portions.push({p:pt.p,d:pt.d,s:pt.s,idx:k,amt:pbal[k].amt});
                total+=pbal[k].amt;
                break;
              }
            }
          });
          if(total<0.001||portions.length===0)return;

          // Per-serving grid (matches adjuster/snapBatchTotals grid logic)
          var unit=db.unit||'';
          var grid=0.25;
          if(unit==='oz'||unit==='slice'||unit==='scoop'||unit==='serving')grid=1;
          else if(unit==='cup')grid=0.25;
          else if(unit==='tbsp'||db.halfSnap)grid=0.5;
          else if(unit==='each')grid=db.wholeOnly?1:0.25;
          if(db.wholeOnly)grid=1;

          // Floor-aware snap: snapping to NEAREST could drop portions below
          // their per-portion floor (recipe base for veg/fruit, db.minAmt
          // for PB/coconut). When that would happen, snap UP instead so
          // the smallest portion still meets its floor after redistribution.
          var mealDefSnap=getMeal(getMealId(p,d,s));
          var baseAmtsSnap={};
          if(mealDefSnap&&mealDefSnap.ingredients)mealDefSnap.ingredients.forEach(function(ri){baseAmtsSnap[ri.dbKey]=ri.amt;});
          var floorPer=0;
          if(db.minAmt)floorPer=db.minAmt;
          if(bi.role==='veg'||bi.role==='fruit')floorPer=Math.max(floorPer,baseAmtsSnap[bi.dbKey]||0);
          var smallestShare=Infinity;
          portions.forEach(function(pc){
            var sh=pc.amt/total;
            if(sh<smallestShare)smallestShare=sh;
          });
          var snapped=Math.round(total/grid)*grid;
          if(floorPer>0&&smallestShare>0){
            var requiredTotal=floorPer/smallestShare;
            if(snapped<requiredTotal){
              snapped=Math.ceil(requiredTotal/grid)*grid;
            }
          }
          if(snapped<grid)snapped=grid;
          if(db.minAmt){
            var minTotal=db.minAmt*portions.length;
            if(snapped<minTotal)snapped=minTotal;
          }
          // Per-serving cap: if the ingredient has db.maxAmt, reduce snapped
          // total so no portion exceeds it.
          var perServingCap = (db.maxAmt!=null)?db.maxAmt:Infinity;
          if(perServingCap<Infinity){
            var largestShare=0;
            portions.forEach(function(pc){var sh=pc.amt/total;if(sh>largestShare)largestShare=sh;});
            if(largestShare>0){
              var maxAllowed=perServingCap/largestShare;
              if(snapped>maxAllowed){snapped=Math.floor(maxAllowed/grid)*grid;if(snapped<grid)snapped=grid;}
            }
          }
          // Thirds-grid acceptance: if the current total is already on 1/3
          // grid (e.g., batch of N×(1/3 cup acai) = N/3), prefer keeping it
          // there over forcing a 1/4-grid round. Only override when the
          // floor-aware path above had to push snapped further from the
          // current total than the thirds path would.
          var totalOnThirds=Math.abs(total*3-Math.round(total*3))<0.003;
          if(totalOnThirds){
            var thirdsSnap=Math.round(total*3)/3;
            // Respect the floor (snapped already accounts for it). Only swap
            // back to thirds if it doesn't violate the floor we just enforced.
            if(thirdsSnap>=Math.max(grid,(db.minAmt||0)*portions.length)
               && (db.maxAmt==null || thirdsSnap<=perServingCap*portions.length)){
              snapped=thirdsSnap;
            }
          }
          // Idempotency fast-path: if the batch total is already on-grid,
          // skip the write. Lets this function no-op cleanly when called
          // twice in a row or when cache already reflects snapped state.
          if(Math.abs(snapped-total)<0.001)return;

          // Redistribute proportionally. affectedDays is set only when the
          // cache write actually lands — a no-op pass (or a missing cache
          // entry) leaves the day unflagged and triggers zero balancer work.
          portions.forEach(function(pc){
            var share=pc.amt/total;
            var newAmt=snapped*share;
            var cache=_dayBalancedCache[pk(pc.p,pc.d)];
            if(cache&&cache[pc.s]){
              cache[pc.s][pc.idx].amt=newAmt;
              affectedDays[pc.p+'_'+pc.d]={p:pc.p,d:pc.d};
            }
          });
        });
      });
    });
  });

  // Re-run day balancer on affected days with batch slots frozen so the
  // snap's kcal drift is absorbed via non-batch slots (snacks, singletons).
  Object.keys(affectedDays).forEach(function(key){
    var ad=affectedDays[key];
    var slots=_dayBalancedCache[pk(ad.p,ad.d)];
    if(!slots)return;
    balanceDayMacros(ad.p,ad.d,slots,_buildPostPipelineFrozenSlots(ad.p,ad.d,slots,leftovers));
  });
  // Return true if any portion amount was mutated — lets a convergence
  // loop skip further iterations when the pipeline reaches steady state.
  return Object.keys(affectedDays).length > 0;
}

// ── Unify cross-person cook ratios ─────────────────────────────
// When one person cooks for another (cross-person leftover), the cook and
// leftover slots are independently balanced to each person's calorie target.
// That's physically impossible — one pot has ONE ingredient ratio. This pass
// rewrites both slots so their per-serving amounts share the same ratio,
// weighted by servings. Total batch amount per ingredient is preserved
// (cookAmt×cookServings + otherAmt×otherServings unchanged). Each person's
// per-serving kcal is preserved because each new amount = perKcal × theirKcal.
// Veg/fruit are locked to recipe amounts so they're skipped (ratio drift on
// veg is negligible — kcal is tiny). Day balancer re-runs on each affected
// day with cook/leftover slots frozen; free slots absorb macro drift.
function unifyCrossPersonRatios(){
  // Idempotent: callers don't need to pre-rebuild the day-balanced cache.
  // Per portion, lazy-build via getDayBalancedIngredients (returns cached
  // when populated, builds from SEL when missing). Per-ingredient fast-path
  // below skips writes when ratios are already within tolerance — so
  // calling this twice in a row is a no-op on the second call.
  var leftovers=computeLeftovers();
  var affectedDays={};

  // Process each cook anchor exactly once. sharedWith entries are skipped
  // (processed via their main anchor). Only unify batches with multi-person
  // portions; same-person-only batches have uniform ratios by construction.
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(!lo||lo.isLeftover)return;
        if(lo.sharedWith)return;            // avoid double-processing
        if(!lo.portions)return;             // solo slot, no batch
        // Need ≥2 distinct people in the batch for unification to matter.
        var peopleSet={};
        lo.portions.forEach(function(pt){peopleSet[pt.p]=true;});
        if(Object.keys(peopleSet).length<2)return;

        // Gather each portion's balance + per-portion kcal.
        // Lazy-build day cache: getDayBalancedIngredients returns cached
        // entry when populated, builds from SEL when missing. Lets callers
        // skip the old unconditional-rebuild step.
        var portionInfo=[];
        lo.portions.forEach(function(pt){
          var slots=getDayBalancedIngredients(pt.p,pt.d);
          if(!slots||!slots[pt.s])return;
          var bal=slots[pt.s];
          // 2026-04-29 (option C): use slot BUDGET as the kcal-prop
          // denominator instead of the slot's actual current kcal. The slot
          // budget is a constant — independent of what's currently in the
          // slot's cache. Pre-freeze and post-freeze portion-kcal-share
          // ratios are therefore identical, so freeze's uniform scaling
          // (which preserves pre-freeze ratios) lands at the same ratio
          // post-freeze unify produces for non-frozen items. Frozen and
          // non-frozen items end up at the same ratio across batch portions
          // → INV7 clean. Without this, unify's actual-kcal denominator
          // shifts with freeze writes, drifting non-frozen items off the
          // frozen items' locked ratio. Solo cooks unchanged (unify only
          // processes multi-person batches).
          var kcal=getSlotBudget(pt.p,pt.d,pt.s);
          portionInfo.push({p:pt.p,d:pt.d,s:pt.s,bal:bal,kcal:kcal});
        });
        if(portionInfo.length<2)return;
        var totalBatchKcal=portionInfo.reduce(function(sum,pi){return sum+pi.kcal;},0);
        if(totalBatchKcal<1)return;

        // Use anchor's balance as canonical ingredient iteration order.
        var anchorInfo=portionInfo.find(function(pi){return pi.p===p&&pi.d===d&&pi.s===s;});
        if(!anchorInfo)return;

        // Look up recipe base amounts (used as per-portion floor for veg/fruit
        // so they scale with kcal ratio but never below the recipe minimum).
        var mealDef=getMeal(getMealId(p,d,s));
        var baseAmts={};
        if(mealDef&&mealDef.ingredients)mealDef.ingredients.forEach(function(ri){baseAmts[ri.dbKey]=ri.amt;});

        // Track whether any ingredient in this batch actually changed so we
        // can skip the balancer re-run on days whose batches were already
        // unified (idempotent on second+ calls).
        var batchChanged=false;
        anchorInfo.bal.forEach(function(anchorItem){
          var db=NUTRI_DB[anchorItem.dbKey];if(!db)return;
          // Skip FREEZE-set frozen items — freezeTripTotals owns these
          // per-portion amts. We must only skip items in our freeze lists,
          // NOT recipe-defined scalable:false items (spices, salsa, fixed
          // condiments) — those still need kcal-prop unification across
          // cross-person batches or INV7 will fire on them.
          if(anchorItem.scalable===false &&
             (ROUND_PKG_ITEMS.indexOf(anchorItem.dbKey) >= 0 ||
              ROUND_PRODUCE_ITEMS.indexOf(anchorItem.dbKey) >= 0)) return;
          // Resolve per-portion floor: db.minAmt for flagged items (PB, oils,
          // coconut), recipe base amount for veg/fruit, 0 otherwise.
          var floor=0;
          if(db.minAmt)floor=db.minAmt;
          if(anchorItem.role==='veg'||anchorItem.role==='fruit'){
            floor=Math.max(floor,baseAmts[anchorItem.dbKey]||0);
          }

          // Collect each portion's current amount.
          var portionItems=[];
          var totalAmt=0;
          portionInfo.forEach(function(pi){
            var item=null;
            for(var k=0;k<pi.bal.length;k++){
              if(pi.bal[k].dbKey===anchorItem.dbKey){item=pi.bal[k];break;}
            }
            portionItems.push({pi:pi,item:item,amt:item?item.amt:0});
            if(item)totalAmt+=item.amt;
          });
          if(totalAmt<0.0001)return;

          var perKcal=totalAmt/totalBatchKcal;
          // Ideal kcal-proportional per-portion amounts.
          var ideals=portionItems.map(function(pe){return perKcal*pe.pi.kcal;});

          // If any portion's ideal is below floor, scale the WHOLE batch up so
          // the smallest portion hits its floor. This preserves the scoop
          // ratio across all ingredients (INV7) while honoring the minimum.
          var scaleFactor=1;
          ideals.forEach(function(v,idx){
            if(floor>0&&v>0&&v<floor){
              var need=floor/v;
              if(need>scaleFactor)scaleFactor=need;
            }
          });
          // maxAmt enforcement: if any portion's post-scale amount would
          // exceed db.maxAmt, scale the WHOLE batch DOWN so the largest
          // portion lands at maxAmt. Preserves INV7 ratios.
          //
          // INFEASIBILITY CHECK: if floor-scale-up + maxAmt-cap-down leaves
          // the smallest portion STILL below floor, the constraints can't be
          // jointly satisfied (kcal-proportional ratio × portions-differ-too-
          // much-in-kcal puts floor above maxAmt/largestPortion). In that
          // case, giving up on floor enforcement produces a STABLE fixed
          // point (pure kcal-proportional with only maxAmt capping); keeping
          // the unsatisfiable floor scale-up would oscillate forever in a
          // convergence loop because s/g re-snap back to cap-feasible amounts.
          if(db.maxAmt!=null){
            var maxScaledAmt=0;
            ideals.forEach(function(v){var scaled=v*scaleFactor;if(scaled>maxScaledAmt)maxScaledAmt=scaled;});
            if(maxScaledAmt>db.maxAmt){
              var capFactor=db.maxAmt/maxScaledAmt;
              // Projected smallest portion after cap-down.
              var postCapMinIdeal=Infinity;
              ideals.forEach(function(v){var cap=v*scaleFactor*capFactor;if(cap<postCapMinIdeal)postCapMinIdeal=cap;});
              if(floor>0&&postCapMinIdeal<floor-0.0001){
                // Infeasible: can't meet floor AND maxAmt. Abandon floor;
                // use pure kcal-proportional with maxAmt cap only.
                scaleFactor=1;
                var maxIdealAtSF1=0;
                ideals.forEach(function(v){if(v>maxIdealAtSF1)maxIdealAtSF1=v;});
                if(maxIdealAtSF1>db.maxAmt){scaleFactor=db.maxAmt/maxIdealAtSF1;}
              } else {
                scaleFactor=scaleFactor*capFactor;
              }
            }
          }

          // Compute final per-portion amounts. wholeOnly items round per-
          // portion (can't serve ½ tortilla; INV7 exempts wholeOnly because
          // rounding breaks the kcal-proportional ratio anyway). Fractional
          // items use the kcal-proportional ideal × batch scale factor.
          var finalAmts = portionItems.map(function(pe, fi){
            if(!pe.item) return 0;
            var v = ideals[fi]*scaleFactor;
            if(db.wholeOnly){
              v = Math.round(v);
              if(floor>0 && v<floor) v = Math.ceil(floor);
              if(db.maxAmt!=null && v>db.maxAmt) v = Math.floor(db.maxAmt);
              if(v<1) v = 1;
            }
            return v;
          });

          // Idempotency fast-path: skip the write (and the day-flag) if every
          // portion is already at its target. wholeOnly uses exact equality
          // (rounded result is stable). Fractional uses 0.5% relative
          // tolerance — per-ingredient snap stages nudge cross-ingredient
          // ratios by a sub-grid fraction each iter; a tight 0.0001 absolute
          // tolerance would force u to re-unify forever while snap re-snaps.
          // The 0.5% relative tolerance accepts this sub-INV7 (1%) drift as
          // "unified enough", letting the convergence loop exit in 2-3 iters.
          // Downstream snap/gridSnap's fast-paths (0.001 absolute) are
          // tighter, so post-u state that u accepts also satisfies s/g.
          // (2026-04-25 convergence loop; wholeOnly fast-path added 2026-04-26.)
          var needsWrite=false;
          for(var wi=0;wi<portionItems.length;wi++){
            var pew=portionItems[wi]; if(!pew.item)continue;
            // Force write if floor/maxAmt would be violated (defense-in-depth
            // for INV13 — finalAmts already respect floor/maxAmt via scaleFactor).
            if(floor>0 && pew.item.amt<floor-0.0001){needsWrite=true;break;}
            if(db.maxAmt!=null && pew.item.amt>db.maxAmt+0.0001){needsWrite=true;break;}
            if(db.wholeOnly){
              if(pew.item.amt !== finalAmts[wi]){needsWrite=true;break;}
            }else{
              // Tightened 2026-04-27 late late: was 0.5% relative tolerance
              // (chose to be sub-INV7 1% to break unify↔snap oscillation).
              // 0.5% allowed sub-tolerance drift on intermediate-value
              // portions that could push downstream toward floor violations.
              // 0.001 absolute matches snap's tolerance; loop converges
              // because snap-accepted state is also unify-accepted.
              var _d=Math.abs(pew.item.amt-finalAmts[wi]);
              if(_d>0.001){needsWrite=true;break;}
            }
          }
          if(!needsWrite)return;

          portionItems.forEach(function(pe,idx){
            if(!pe.item)return;
            pe.item.amt=finalAmts[idx];
          });
          batchChanged=true;
        });

        // Only flag affected-days when we actually wrote amounts. If the batch
        // was already unified, skip the balancer re-run for its days too.
        if(batchChanged){
          portionInfo.forEach(function(pi){
            affectedDays[pi.p+'_'+pi.d]={p:pi.p,d:pi.d};
          });
        }
      });
    });
  });

  // Re-run day balancer for affected days with cook/leftover slots frozen.
  Object.keys(affectedDays).forEach(function(key){
    var ad=affectedDays[key];
    var slots=_dayBalancedCache[pk(ad.p,ad.d)];
    if(!slots)return;
    balanceDayMacros(ad.p,ad.d,slots,_buildPostPipelineFrozenSlots(ad.p,ad.d,slots,leftovers));
  });
  // Return true if any batch ratio was mutated — lets a convergence
  // loop skip further iterations when the pipeline reaches steady state.
  return Object.keys(affectedDays).length > 0;
}

// ── Snap batch totals ──────────────────────────────────────────
// After balanced amounts are computed for all days, snap each cook-day
// ingredient's TOTAL batch to the unit grid (whole oz, 0.25 cup, etc.),
// then split back proportionally across servings.
function snapBatchTotals(){
  // Idempotent: callers don't need to pre-populate the day-balanced cache.
  // Per portion, lazy-build via getDayBalancedIngredients (returns cached
  // when populated, builds from SEL when missing). The per-ingredient
  // fast-path below (|snapped-totalBatch|<0.001) skips writes when the
  // batch total is already on-grid — so calling this twice in a row is a
  // no-op on the second call. affectedDays is populated only on actual
  // writes, so the balancer re-run at the end is mutation-gated.
  var leftovers=computeLeftovers();
  var affectedDays={}; // p_d -> {p, d} — days needing re-balance

  // For each cook slot (same-person or shared), snap batch totals
  ['him','her'].forEach(function(p){
    DAYS.forEach(function(d){
      ['breakfast','lunch','snack','dinner'].forEach(function(s){
        var lo=leftovers[sk(p,d,s)];
        if(!lo||lo.isLeftover)return; // only process cook entries
        if(lo.servings<=1&&!lo.crossPersonCook&&!lo.shared)return; // solo, no batch
        // For shared meals, only process the primary cook (skip sharedWith entry
        // to avoid double-processing the same batch)
        if(lo.sharedWith)return;

        var mealId=getMealId(p,d,s);
        // Lazy-build day cache: getDayBalancedIngredients returns cached
        // entry when populated, builds from SEL when missing. Lets callers
        // skip the old unconditional-rebuild-all-14-days loop.
        var cookBal=getDayBalancedIngredients(p,d);
        if(!cookBal||!cookBal[s])return;

        // Each batch member is a distinct portion (servings=1). The detector's
        // `portions` list is authoritative — every entry in the batch appears
        // exactly once, so iterating it avoids the double-counting that
        // shared + same-person-leftover combos caused in the old collection.
        var portions=[]; // [{p, d, s, servings:1, bal}]
        var portionList=lo.portions||[{p:p,d:d,s:s}];
        portionList.forEach(function(pt){
          var cache=getDayBalancedIngredients(pt.p,pt.d);
          if(!cache||!cache[pt.s])return;
          portions.push({p:pt.p,d:pt.d,s:pt.s,servings:1,bal:cache[pt.s]});
        });
        if(portions.length<2)return;

        // For each ingredient, compute total batch, snap, redistribute
        var firstBal=portions[0].bal;
        firstBal.forEach(function(ingr,idx){
          var db=NUTRI_DB[ingr.dbKey];if(!db)return;
          // Skip packaged ingredients — their total is measured by opening
          // whole packages (e.g. 3 cans = 5.25 cups). The per-serving amount
          // is just total ÷ servings, nobody measures it directly.
          if(db.pkg&&!db.pkg.longShelfLife)return;
          // Skip FREEZE-set frozen items only (not recipe-fixed scalable:false).
          if(ingr.scalable===false &&
             (ROUND_PKG_ITEMS.indexOf(ingr.dbKey) >= 0 ||
              ROUND_PRODUCE_ITEMS.indexOf(ingr.dbKey) >= 0)) return;
          var unit=db.unit||'';
          var grid=0.25;
          if(unit==='oz'||unit==='slice'||unit==='scoop'||unit==='serving')grid=1;
          else if(unit==='cup')grid=0.25;
          else if(unit==='tbsp'||db.halfSnap)grid=0.5;
          else if(unit==='each')grid=db.wholeOnly?1:0.25;
          if(db.wholeOnly)grid=1;

          // Sum total batch
          var totalBatch=0;
          var partAmts=[];
          portions.forEach(function(pp,pi){
            var item=pp.bal[idx];
            if(!item||item.dbKey!==ingr.dbKey)return;
            var contrib=item.amt*pp.servings;
            totalBatch+=contrib;
            partAmts.push({pi:pi,amt:item.amt,servings:pp.servings,contrib:contrib});
          });
          if(totalBatch<grid*0.5)return;

          var snapped=Math.round(totalBatch/grid)*grid;
          if(snapped<grid)snapped=grid;
          if(db.minAmt&&snapped<db.minAmt)snapped=db.minAmt;
          // Per-serving cap: reduce snapped total so no portion exceeds db.maxAmt.
          var perServingCap2 = (db.maxAmt!=null)?db.maxAmt:Infinity;
          if(perServingCap2<Infinity){
            var largestContribShare=0;
            partAmts.forEach(function(pa){var sh=pa.contrib/totalBatch;if(sh>largestContribShare)largestContribShare=sh;});
            if(largestContribShare>0){
              var maxAllowedSnap=perServingCap2/largestContribShare;
              if(snapped>maxAllowedSnap){snapped=Math.floor(maxAllowedSnap/grid)*grid;if(snapped<grid)snapped=grid;}
            }
          }
          // Thirds-grid acceptance: if the batch total is already on 1/3
          // grid (e.g. 2 portions of 1/3 cup acai = 2/3), preserve it
          // rather than forcing 1/4-grid round.
          var totalOnThirdsB=Math.abs(totalBatch*3-Math.round(totalBatch*3))<0.003;
          if(totalOnThirdsB){
            var thirdsB=Math.round(totalBatch*3)/3;
            if(thirdsB>=grid && (db.minAmt==null || thirdsB>=db.minAmt)
               && (db.maxAmt==null || thirdsB<=perServingCap2*partAmts.length)){
              snapped=thirdsB;
            }
          }
          // Idempotency fast-path: if the batch total is already on-grid,
          // skip the write. Lets this function no-op cleanly when called
          // twice in a row or when cache already reflects snapped state.
          if(Math.abs(snapped-totalBatch)<0.001)return;

          // Redistribute proportionally. affectedDays is set only here, so
          // the balancer re-run is gated on actual mutation — a no-op pass
          // leaves affectedDays empty and triggers zero balancer work.
          partAmts.forEach(function(pa){
            var share=(totalBatch>0)?(pa.contrib/totalBatch):0;
            var newContrib=snapped*share;
            var newAmt=pa.servings>0?newContrib/pa.servings:pa.amt;
            var pp=portions[pa.pi];
            pp.bal[idx].amt=newAmt;
            // Track affected days for re-balance
            if(!affectedDays[pp.p+'_'+pp.d])affectedDays[pp.p+'_'+pp.d]={p:pp.p,d:pp.d};

            // Update same-person leftover copies
            DAYS.forEach(function(d2){
              ['breakfast','lunch','dinner','snack'].forEach(function(s2){
                if(d2===pp.d&&s2===pp.s)return;
                var lo2=leftovers[sk(pp.p,d2,s2)];
                if(!lo2||!lo2.isLeftover||lo2.crossPerson)return;
                if(getMealId(pp.p,d2,s2)!==mealId)return;
                // Batch membership: only propagate to leftovers whose cookDay
                // matches the anchor day `d`. Prevents cross-batch pollution
                // when the same meal has multiple independent cooks.
                if(lo2.cookDay!==d)return;
                var cache2=getDayBalancedIngredients(pp.p,d2);
                if(cache2&&cache2[s2]&&cache2[s2][idx]&&cache2[s2][idx].dbKey===ingr.dbKey){
                  cache2[s2][idx].amt=newAmt;
                  if(!affectedDays[pp.p+'_'+d2])affectedDays[pp.p+'_'+d2]={p:pp.p,d:d2};
                }
              });
            });
          });
        });
      });
    });
  });

  // Re-run the day balancer for each affected day with cook/leftover
  // slots frozen. The balancer adjusts free slots around the snapped amounts.
  Object.keys(affectedDays).forEach(function(key){
    var ad=affectedDays[key];
    var slots=_dayBalancedCache[pk(ad.p,ad.d)];
    if(!slots)return;
    balanceDayMacros(ad.p,ad.d,slots,_buildPostPipelineFrozenSlots(ad.p,ad.d,slots,leftovers));
  });
  // Return true if any batch total was mutated — lets a convergence
  // loop skip further iterations when the pipeline reaches steady state.
  return Object.keys(affectedDays).length > 0;
}

// ── Post-balance waste pass ────────────────────────────────────
// After the full balanced pipeline (adjuster + balancer + calorie correction),
// check each trip for pkg waste. For each ingredient with waste, nudge the
// final balanced amounts to hit a clean package boundary. Revert any day
// where the nudge breaks a primary goal.
//
// PKG-ONLY (not produce): unifying with produce was tried 2026-04-27 but
// produce items with perWhole NOT on 0.5 grid (sweet potato 1.25, bell
// pepper 1.25, carrots 0.75) conflict with the batch-grid math (grid×N
// portions = 0.5 for 2-portion batches), causing INV18 oscillation at 81%
// cap-hit rate. PKG perPkg values are all on 0.5 grid by design (1.5c,
// 4.0c, 1.75oz drained, etc.) so they don't have this conflict. Produce
// flex stays at the one-shot `applyTripProduceScaling` pre-loop pass.
function postBalanceWastePass(){
  // Idempotent: reads via getBalancedSlotIngredients (lazy-build via
  // getDayBalancedIngredients when day cache missing). The per-batch
  // fast-path (`|newBatchTotal-b.batchTotal|<0.001`) skips writes when
  // the batch total is already at the package boundary — so calling
  // this twice in a row is a no-op on the second call. The revert logic
  // also only fires when an adjustment was actually applied.
  var anyCommitted=false; // true if ≥1 batch adjustment stayed applied
                          // (not reverted) — return value for the
                          // convergence loop's steady-state check.
  var leftovers=computeLeftovers();

  ['cook1','cook2'].forEach(function(trip){
    var tripDays=TRIP_DAYS_STATIC[trip]||[];
    var inTrip={};
    tripDays.forEach(function(d){inTrip[d]=true;});

    // Batch-aware collection: iterate cook anchors (never leftovers) and
    // gather each batch's contribution as ONE unit. A batch is frozen —
    // all its portions move together so same-person leftover copies can
    // never drift from cook (preserves INV1).
    var pkgInfo={};
    ['him','her'].forEach(function(p){
      DAYS.forEach(function(d){
        SLOTS.forEach(function(s){
          if(s==='late_snack'||s==='shake')return;
          if(SKIPPED[sk(p,d,s)]||EAT_OUT[sk(p,d,s)])return;
          var lo=leftovers[sk(p,d,s)];
          if(lo&&lo.isLeftover)return;       // process only anchors
          var bal=getBalancedSlotIngredients(p,d,s);
          if(!bal)return;
          // Portions (batch members). For singletons, just this slot.
          var portionList=(lo&&lo.portions)?lo.portions:[{p:p,d:d,s:s}];
          // A batch is ONE cooking session using ONE package bought in the
          // cook-day's trip. Attribute the whole batch to the cook day's
          // trip — never split the batch's portions across trips (that
          // produced INV1/INV7 drift: waste pass applied different scale
          // factors to cook-trip portions vs leftover-trip portions).
          if(!inTrip[d])return;

          bal.forEach(function(bi,idx){
            var db=NUTRI_DB[bi.dbKey];
            if(!db)return;
            // Determine perUnit: pkg drained/cups OR produce perWhole.
            var unit=db.unit;
            var perUnit=0;
            if(db.pkg && !db.pkg.longShelfLife){
              perUnit=(db.pkg.drained&&(unit==='cup'||unit==='oz'))?db.pkg.drained:(db.pkg.cups||0);
            } else if(db.produce){
              perUnit=db.produce.perWhole;
            }
            if(perUnit<=0)return;
            // Skip ingredients with no flex config (can't be reshaped anyway).
            if(!PKG_FLEX_CONFIG[bi.dbKey] && !PRODUCE_FLEX_CONFIG[bi.dbKey])return;

            // Collect EVERY portion's contribution — including leftovers
            // on the other trip. They all eat from the same cook-day pkg.
            var portionContribs=[];
            var batchTotal=0;
            portionList.forEach(function(pt){
              var pbal=getBalancedSlotIngredients(pt.p,pt.d,pt.s);
              if(!pbal)return;
              for(var k=0;k<pbal.length;k++){
                if(pbal[k].dbKey===bi.dbKey){
                  portionContribs.push({p:pt.p,d:pt.d,s:pt.s,idx:k,amt:pbal[k].amt});
                  batchTotal+=pbal[k].amt;
                  break;
                }
              }
            });
            if(portionContribs.length===0||batchTotal<0.001)return;

            if(!pkgInfo[bi.dbKey])pkgInfo[bi.dbKey]={total:0,perPkg:perUnit,unit:unit,batches:[]};
            pkgInfo[bi.dbKey].total+=batchTotal;
            pkgInfo[bi.dbKey].batches.push({portions:portionContribs,batchTotal:batchTotal});
          });
        });
      });
    });

    Object.keys(pkgInfo).forEach(function(dbKey){
      var info=pkgInfo[dbKey];
      var pkgs=Math.ceil(info.total/info.perPkg);
      var waste=pkgs*info.perPkg-info.total;
      if(waste<0.05)return;

      var db=NUTRI_DB[dbKey];
      var upDelta=waste;
      var downDelta=info.total-(pkgs-1)*info.perPkg;
      var direction=(upDelta<=downDelta)?'up':'down';
      var target=direction==='up'?upDelta:downDelta;

      // Read flex caps from PKG_FLEX_CONFIG or PRODUCE_FLEX_CONFIG, picking
      // by direction. Falls back to legacy 0.25 default for pkg items not
      // in the config (none currently, but defensive).
      var cfg=PKG_FLEX_CONFIG[dbKey]||PRODUCE_FLEX_CONFIG[dbKey];
      var maxFlexPct=cfg ? (direction==='up'?(cfg.maxUp||0):(cfg.maxDown||0)) : 0.25;
      // Produce items: bypass maxFlexPct clamp so the waste pass can always
      // round to nearest perWhole boundary. Per-portion db.minAmt and
      // db.maxAmt caps below + the day-goal revert downstream still bound
      // the actual scale (so it's "round to nearest whole within per-portion
      // bounds" — not unlimited). For pkg, keep the configured cap since
      // pkg has cost per-unit and recipe distortion concerns are tighter.
      var isProduce = !!(db.produce && !db.pkg);

      var grid=0.25;
      if(info.unit==='oz')grid=1;
      else if(info.unit==='cup')grid=0.25;

      // For each batch, compute its share of the delta and apply uniformly
      // to every portion. Scaling by one factor preserves unified ratios
      // (cross-person batches) AND keeps equal portions equal (same-person
      // leftovers). Snap batch total to the per-ingredient grid (0.25 for
      // cup, 1 for oz). Per-portion amounts within multi-portion batches are
      // NOT constrained to the grid — INV8 only checks batch totals + solo
      // per-serving. This lets perWhole values like 1.25 (sweet potato) land
      // exactly on grid (1.25 IS on 0.25 grid) without the old batchGrid×N
      // forcing a 0.5-grid snap that would round 1.25 → 1.5 off perWhole.
      var batchAdjustments=[];
      info.batches.forEach(function(b){
        var batchShare=(info.total>0)?(b.batchTotal/info.total)*target:0;
        if(!isProduce){
          var maxFlex=b.batchTotal*maxFlexPct;
          if(batchShare>maxFlex)batchShare=maxFlex;
        }
        var newBatchTotal=direction==='up'?b.batchTotal+batchShare:b.batchTotal-batchShare;
        newBatchTotal=Math.round(newBatchTotal/grid)*grid;
        if(newBatchTotal<grid)newBatchTotal=grid;
        if(db.minAmt){
          var minBatch=db.minAmt*b.portions.length;
          if(newBatchTotal<minBatch)newBatchTotal=minBatch;
        }
        // Per-serving maxAmt cap — prevent the waste-scaling from pushing
        // any portion past its ceiling (INV13 gap otherwise). Compute the
        // largest per-serving share of the batch; if scaling would exceed
        // db.maxAmt, floor newBatchTotal so max portion = maxAmt.
        if(typeof db.maxAmt==='number'){
          var largestShare=0;
          b.portions.forEach(function(pc){var sh=pc.amt/b.batchTotal; if(sh>largestShare)largestShare=sh;});
          if(largestShare>0){
            var maxAllowedBatch=db.maxAmt/largestShare;
            if(newBatchTotal>maxAllowedBatch){
              newBatchTotal=Math.floor(maxAllowedBatch/grid)*grid;
              if(newBatchTotal<grid)newBatchTotal=grid;
            }
          }
        }
        if(Math.abs(newBatchTotal-b.batchTotal)<0.001)return;
        // Redistribute proportionally by each portion's existing share.
        var newPortions=[];
        b.portions.forEach(function(pc){
          var share=pc.amt/b.batchTotal;
          var newAmt=newBatchTotal*share;
          newPortions.push({p:pc.p,d:pc.d,s:pc.s,idx:pc.idx,oldAmt:pc.amt,newAmt:newAmt});
        });
        batchAdjustments.push({portions:newPortions});
      });

      if(batchAdjustments.length===0)return;

      // Apply tentatively (whole batch atomically)
      batchAdjustments.forEach(function(ba){
        ba.portions.forEach(function(pc){
          var daySlots=_dayBalancedCache[pk(pc.p,pc.d)];
          if(daySlots&&daySlots[pc.s])daySlots[pc.s][pc.idx].amt=pc.newAmt;
        });
      });

      // Revert whole batch if any of its affected days broke primary goals.
      batchAdjustments.forEach(function(ba){
        var affectedDays={};
        ba.portions.forEach(function(pc){affectedDays[pc.p+'_'+pc.d]=true;});
        var anyBroken=false;
        Object.keys(affectedDays).forEach(function(key){
          if(anyBroken)return;
          var parts=key.split('_');
          var ap=parts[0],ad=parts[1];
          var t=calcTotals(ap,ad);
          var tgt=CAL_BASE[ap],pm=ap==='him'?180:120;
          var mk=t.pro*4+t.fat*9+t.carb*4;
          var fatPct=mk>0?(t.fat*9)/mk:0;
          var carbPct=mk>0?(t.carb*4)/mk:0;
          var fv=computeDailyFV(ap,ad);
          if(Math.abs(t.kcal-tgt)>100||t.pro<pm||carbPct>0.55||fatPct>0.30||fv.veg<2.75||fv.fruit<1){
            anyBroken=true;
          }
        });
        if(anyBroken){
          ba.portions.forEach(function(pc){
            var daySlots=_dayBalancedCache[pk(pc.p,pc.d)];
            if(daySlots&&daySlots[pc.s])daySlots[pc.s][pc.idx].amt=pc.oldAmt;
          });
        } else {
          anyCommitted=true;
        }
      });
    });
  });
  return anyCommitted;
}

// ── Balance-adjuster pipeline ──────────────────────────────────
// Convergence loop over 5 balance-adjusters. Each returns `true` if it
// mutated state, `false` on fast-path no-op. Loop exits when the
// DOWNSTREAM stages (s/w/g/b) all report no-change — the observable
// pipeline output has reached steady state.
//
// Why u's return is NOT tracked for loop exit: `unifyCrossPersonRatios`
// targets kcal-proportional ratios, while s/g snap to per-ingredient
// grids. These fixed points aren't joint — each per-ingredient snap
// introduces sub-grid drift that u sees as "needs re-unifying". But the
// drift has no output effect: s/g fast-path on it, boost's veg target
// is already met, waste's pkg boundaries hold. Only u itself keeps
// twitching, asymptotically approaching its ideal at ~1% per iter.
// Tracking u's return would force the loop to hit its safety cap on
// most batches (confirmed empirically: 36/62 calls during testing).
// Tracking only downstream stages lets the loop exit cleanly as soon
// as OUTPUT-affecting state stabilizes. u still runs every iter (its
// writes feed s/g's correctness), but its drift is accepted.
//
// Ordering: unify → snap → waste → gridSnap → boost.
// `gridSnap` self-unifies internally (fast-path no-op when already
// unified), so the interim u₂ that existed in the pre-loop explicit
// sequence is subsumed.
//
// Diagnostic hooks at window._rbaDiag record per-iter mutations for
// debugging future oscillation (if any downstream stage keeps firing).
// INV18 counters — track convergence-loop cap-hit rate per randomize.
// Reset at start of randomizeWeek; checked in verifyInvariants. Tracking-
// only — a hit-cap rate >10% signals a new oscillation source (something
// in the pipeline is mutating in a way that doesn't converge within 6
// iters). When that happens, run with `window._rbaDiagEnabled = true`
// and inspect window._rbaDiag for which stages keep firing on iter N.
var _rbaCallCount = 0;
var _rbaCapHits = 0;

function runBalanceAdjusters(){
  // Diagnostic hooks: opt-in via window._rbaDiagEnabled (set to true before
  // calling to capture per-iter mutation flags in window._rbaDiag). When
  // off (default), no allocations or bookkeeping — zero hot-path cost.
  var _diag = (typeof window!=='undefined' && window._rbaDiagEnabled) ? (window._rbaDiag = window._rbaDiag || []) : null;
  var _rec = _diag ? {iters:[]} : null; if(_rec)_diag.push(_rec);
  _rbaCallCount++;
